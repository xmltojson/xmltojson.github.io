<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎄</text></svg>">
    <title>🎄 Merry Christmas 🎄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #0a1128 0%, #1a2456 50%, #2d3561 100%);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 10px 10px 30px;
        }

        .snow {
            position: fixed;
            top: -10px;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            color: white;
            font-size: 1em;
            opacity: 0.8;
            animation: fall linear infinite;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 10px;
            width: 100%;
            max-width: 700px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.4em, 4vw, 2.2em);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            }
            50% {
                text-shadow: 0 0 30px rgba(255, 215, 0, 1), 0 0 40px rgba(255, 215, 0, 0.8);
            }
        }

        .tree-container {
            position: relative;
            display: inline-block;
            margin: 5px auto;
        }

        canvas#treeCanvas {
            display: block;
            margin: 0 auto;
        }

        .star {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
            animation: starGlow 1.5s ease-in-out infinite, starPulse 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px gold);
            z-index: 20;
        }

        @keyframes starGlow {
            0%, 100% {
                filter: drop-shadow(0 0 20px gold) drop-shadow(0 0 10px #fff);
            }
            50% {
                filter: drop-shadow(0 0 35px gold) drop-shadow(0 0 50px orange) drop-shadow(0 0 15px #fff);
            }
        }

        @keyframes starPulse {
            0%, 100% { transform: translateX(-50%) scale(1) rotate(0deg); }
            25% { transform: translateX(-50%) scale(1.1) rotate(5deg); }
            50% { transform: translateX(-50%) scale(1) rotate(0deg); }
            75% { transform: translateX(-50%) scale(1.1) rotate(-5deg); }
        }

        .controls {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            font-size: 13px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .message {
            color: #fff;
            font-size: clamp(0.9em, 2.5vw, 1.2em);
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .presents {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }

        .present {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            border-radius: 4px;
            position: relative;
            animation: bounce 2s ease-in-out infinite;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .present::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 6px;
            background: gold;
            transform: translateY(-50%);
        }

        .present::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 6px;
            background: gold;
            transform: translateX(-50%);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .present:nth-child(2) {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            animation-delay: 0.3s;
        }

        .present:nth-child(3) {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            animation-delay: 0.6s;
        }

        .bow {
            position: absolute;
            top: -9px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 10px;
            z-index: 2;
        }
        .bow::before, .bow::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 8px;
            border-radius: 50%;
            top: 2px;
        }
        .bow::before {
            left: -2px;
            background: gold;
        }
        .bow::after {
            right: -2px;
            background: gold;
        }

        .music-note {
            position: fixed;
            font-size: 1.5em;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            animation: floatUp 3s ease-out;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) rotate(360deg);
            }
        }

        .ground {
            position: relative;
            width: 250px;
            height: 18px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0) 70%);
            margin-top: -5px;
            border-radius: 50%;
        }

        .music-visualizer {
            display: flex;
            gap: 2px;
            justify-content: center;
            align-items: flex-end;
            height: 22px;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .music-visualizer.active {
            opacity: 1;
        }

        .viz-bar {
            width: 3px;
            background: linear-gradient(to top, #667eea, #f093fb);
            border-radius: 2px;
            transition: height 0.1s;
            animation: vizPulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes vizPulse {
            from { opacity: 0.7; }
            to { opacity: 1; }
        }

        .song-selector {
            margin-top: 8px;
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .song-btn {
            padding: 5px 12px;
            font-size: 11px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            cursor: pointer;
            background: rgba(255,255,255,0.08);
            color: #ddd;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .song-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
            color: #fff;
        }

        .song-btn.active {
            background: linear-gradient(135deg, rgba(240,147,251,0.3), rgba(245,87,108,0.3));
            border-color: #f093fb;
            color: #fff;
        }

        .now-playing {
            color: #f093fb;
            font-size: 0.8em;
            margin-top: 5px;
            min-height: 1.1em;
            text-shadow: 0 0 10px rgba(240,147,251,0.5);
        }

        @media (max-height: 800px) {
            h1 { font-size: 1.3em; margin-bottom: 5px; }
            .star { font-size: 1.5em; top: 1px; }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }
            button {
                padding: 6px 12px;
                font-size: 12px;
            }
            .song-btn {
                padding: 4px 10px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="snow" id="snow"></div>
    
    <div class="container">
        <h1>🎄 Merry Christmas! 🎄</h1>
        
        <div class="tree-container" id="treeContainer">
            <div class="star" id="starEl">⭐</div>
            <canvas id="treeCanvas"></canvas>
        </div>

        <div class="ground"></div>

        <div class="presents">
            <div class="present"><div class="bow"></div></div>
            <div class="present"><div class="bow"></div></div>
            <div class="present"><div class="bow"></div></div>
        </div>

        <div class="controls">
            <button onclick="toggleSnow()">❄️ Toggle Snow</button>
            <button onclick="toggleLights()">💡 Toggle Lights</button>
            <button onclick="toggleMusic()" id="musicBtn">🎵 Play Music</button>
            <button onclick="addOrnament()">🎁 Add Ornament</button>
        </div>

        <div class="song-selector" id="songSelector">
            <button class="song-btn active" onclick="selectSong(0, this)">🔔 Jingle Bells</button>
            <button class="song-btn" onclick="selectSong(1, this)">🌲 O Christmas Tree</button>
            <button class="song-btn" onclick="selectSong(2, this)">🌙 Silent Night</button>
            <button class="song-btn" onclick="selectSong(3, this)">⛄ Deck the Halls</button>
            <button class="song-btn" onclick="selectSong(4, this)">🎅 We Wish You</button>
        </div>

        <div class="now-playing" id="nowPlaying"></div>

        <div class="music-visualizer" id="visualizer"></div>

        <div class="message">
            May your days be merry and bright! ✨
        </div>
    </div>

    <script>
        // ─── Configuration ───
        let snowEnabled = true;
        let lightsEnabled = true;
        let musicPlaying = false;
        let audioContext;
        let currentSong = 0;
        let scheduledNodes = [];
        let musicTimeout = null;
        let vizInterval = null;
        let snowTimer = null;
        let animFrameId = null;
        let noteEmitInterval = null;
        let autoRotate = true;

        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function getCanvasSize() {
            const vh = window.innerHeight;
            const vw = window.innerWidth;
            const reservedH = 340;
            const availH = Math.max(200, vh - reservedH);
            const availW = Math.min(vw - 40, 500);
            const h = Math.min(availH, 420);
            const w = Math.min(availW, Math.round(h * 0.77));
            return { w, h };
        }

        let canvasW, canvasH;
        let treeCenterX, treeTopY, treeBottomY, trunkTop, trunkBottom, trunkWidth, maxHalfWidth;

        function resizeCanvas() {
            const size = getCanvasSize();
            canvasW = size.w;
            canvasH = size.h;
            canvas.width = canvasW;
            canvas.height = canvasH;
            canvas.style.width = canvasW + 'px';
            canvas.style.height = canvasH + 'px';

            treeCenterX = canvasW / 2;
            treeTopY = Math.round(canvasH * 0.087);
            treeBottomY = Math.round(canvasH * 0.808);
            trunkTop = treeBottomY;
            trunkBottom = Math.round(canvasH * 0.942);
            trunkWidth = Math.round(canvasW * 0.088);
            maxHalfWidth = Math.round(canvasW * 0.39);

            initOrnaments();
            initLights();
        }

        function treeHalfWidthAt(y) {
            if (y < treeTopY || y > treeBottomY) return 0;
            const t = (y - treeTopY) / (treeBottomY - treeTopY);
            return 10 + (maxHalfWidth - 10) * t;
        }

        let ornaments = [];
        let lights = [];
        let extraOrnaments = [];

        function initOrnaments() {
            ornaments = [];
            const colors = ['#ff0000','#ffd700','#0066ff','#c0c0c0','#ff69b4','#ff4500','#00ced1','#9400d3'];
            const rowFractions = [0.25, 0.4, 0.55, 0.7, 0.85];
            const rowCounts = [2, 3, 4, 5, 6];
            rowFractions.forEach((frac, ri) => {
                const y = treeTopY + frac * (treeBottomY - treeTopY);
                const hw = treeHalfWidthAt(y) * 0.75;
                const count = rowCounts[ri];
                for (let i = 0; i < count; i++) {
                    const x = treeCenterX - hw + (2 * hw) * (i / (count - 1 || 1));
                    ornaments.push({
                        x: x,
                        y: y + (Math.random() - 0.5) * 12,
                        r: Math.max(4, canvasW * 0.018 + Math.random() * canvasW * 0.01),
                        color: colors[Math.floor(Math.random() * colors.length)],
                        phase: Math.random() * Math.PI * 2
                    });
                }
            });
        }

        function initLights() {
            lights = [];
            const lightColors = ['#ff0000','#00ff00','#ffff00','#ff00ff','#00ffff','#ff8800','#ffffff'];
            for (let i = 0; i < 50; i++) {
                const t = i / 50;
                const y = treeTopY + 20 + t * (treeBottomY - treeTopY - 30);
                const hw = treeHalfWidthAt(y) * 0.85;
                const angle = t * Math.PI * 6;
                const x = treeCenterX + Math.sin(angle) * hw;
                lights.push({
                    x: x,
                    y: y,
                    color: lightColors[i % lightColors.length],
                    phase: Math.random() * Math.PI * 2,
                    baseR: Math.max(2, canvasW * 0.007 + Math.random() * canvasW * 0.004)
                });
            }
        }

        function initVisualizer() {
            const viz = document.getElementById('visualizer');
            viz.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.classList.add('viz-bar');
                bar.style.height = '2px';
                bar.style.animationDelay = (i * 0.05) + 's';
                viz.appendChild(bar);
            }
        }
        initVisualizer();

        function updateVisualizer() {
            const bars = document.querySelectorAll('.viz-bar');
            bars.forEach((bar) => {
                const h = musicPlaying ? (3 + Math.random() * 19) : 2;
                bar.style.height = h + 'px';
            });
        }

        let time = 0;

        function drawTree() {
            ctx.clearRect(0, 0, canvasW, canvasH);
            time += 0.02;

            const trunkGrad = ctx.createLinearGradient(treeCenterX - trunkWidth/2, trunkTop, treeCenterX + trunkWidth/2, trunkTop);
            trunkGrad.addColorStop(0, '#3a1a08');
            trunkGrad.addColorStop(0.3, '#5c3310');
            trunkGrad.addColorStop(0.7, '#5c3310');
            trunkGrad.addColorStop(1, '#3a1a08');
            ctx.fillStyle = trunkGrad;
            ctx.beginPath();
            ctx.moveTo(treeCenterX - trunkWidth/2, trunkTop);
            ctx.lineTo(treeCenterX + trunkWidth/2, trunkTop);
            ctx.lineTo(treeCenterX + trunkWidth/2 + 3, trunkBottom);
            ctx.lineTo(treeCenterX - trunkWidth/2 - 3, trunkBottom);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 6; i++) {
                const bx = treeCenterX - trunkWidth/2 + 4 + Math.random() * (trunkWidth - 8);
                ctx.beginPath();
                ctx.moveTo(bx, trunkTop + 3);
                ctx.lineTo(bx + (Math.random()-0.5)*3, trunkBottom - 3);
                ctx.stroke();
            }

            const layers = [
                { topY: treeTopY, bottomY: treeTopY + (treeBottomY - treeTopY) * 0.36 },
                { topY: treeTopY + (treeBottomY - treeTopY) * 0.23, bottomY: treeTopY + (treeBottomY - treeTopY) * 0.6 },
                { topY: treeTopY + (treeBottomY - treeTopY) * 0.44, bottomY: treeTopY + (treeBottomY - treeTopY) * 0.84 },
                { topY: treeTopY + (treeBottomY - treeTopY) * 0.65, bottomY: treeBottomY }
            ];

            layers.forEach((layer, li) => {
                drawTreeLayer(layer.topY, layer.bottomY, li);
            });

            if (lightsEnabled) {
                lights.forEach((l) => {
                    const flicker = 0.5 + 0.5 * Math.sin(time * 3 + l.phase);
                    const r = l.baseR * (0.8 + 0.4 * flicker);

                    const glow = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, r * 4);
                    glow.addColorStop(0, l.color + 'aa');
                    glow.addColorStop(1, l.color + '00');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(l.x, l.y, r * 4, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = l.color;
                    ctx.shadowColor = l.color;
                    ctx.shadowBlur = 6 * flicker;
                    ctx.beginPath();
                    ctx.arc(l.x, l.y, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
            }

            const allOrn = ornaments.concat(extraOrnaments);
            allOrn.forEach(o => drawOrnament(o));

            drawSnowOnTree();
            animFrameId = requestAnimationFrame(drawTree);
        }

        function drawTreeLayer(topY, bottomY, layerIndex) {
            const topHW = treeHalfWidthAt(topY) * 0.3;
            const bottomHW = treeHalfWidthAt(bottomY);
            const jaggedSegments = 16;

            const darkGrad = ctx.createLinearGradient(treeCenterX, topY, treeCenterX, bottomY);
            darkGrad.addColorStop(0, '#1a4d0a');
            darkGrad.addColorStop(0.5, '#2d6b15');
            darkGrad.addColorStop(1, '#1a4d0a');

            ctx.beginPath();
            ctx.moveTo(treeCenterX, topY);

            for (let i = 0; i <= jaggedSegments; i++) {
                const t = i / jaggedSegments;
                const y = topY + t * (bottomY - topY);
                const baseHW = topHW + (bottomHW - topHW) * t;
                const jag = (i % 2 === 0) ? Math.random() * 6 : -Math.random() * 5;
                ctx.lineTo(treeCenterX + baseHW + jag, y);
            }

            for (let i = jaggedSegments; i >= 0; i--) {
                const t = i / jaggedSegments;
                const y = bottomY + (Math.random() - 0.5) * 5;
                const baseHW = bottomHW * (2 * t - 1);
                ctx.lineTo(treeCenterX + baseHW, y);
            }

            for (let i = jaggedSegments; i >= 0; i--) {
                const t = i / jaggedSegments;
                const y = topY + t * (bottomY - topY);
                const baseHW = topHW + (bottomHW - topHW) * t;
                const jag = (i % 2 === 0) ? Math.random() * 6 : -Math.random() * 5;
                ctx.lineTo(treeCenterX - baseHW - jag, y);
            }

            ctx.closePath();
            ctx.fillStyle = darkGrad;
            ctx.fill();

            const lightGrad = ctx.createLinearGradient(treeCenterX - bottomHW, topY, treeCenterX + bottomHW * 0.3, bottomY);
            lightGrad.addColorStop(0, 'rgba(60,140,30,0.0)');
            lightGrad.addColorStop(0.4, 'rgba(60,140,30,0.3)');
            lightGrad.addColorStop(0.7, 'rgba(40,100,20,0.1)');
            lightGrad.addColorStop(1, 'rgba(20,60,10,0.0)');
            ctx.fillStyle = lightGrad;
            ctx.fill();

            drawBranches(topY, bottomY, layerIndex);
        }

        function drawBranches(topY, bottomY, layerIndex) {
            ctx.strokeStyle = 'rgba(30,80,15,0.6)';
            ctx.lineWidth = 1.2;
            const numBranches = 10 + layerIndex * 3;
            const seed = layerIndex * 1000;

            for (let i = 0; i < numBranches; i++) {
                const pseudoRand = Math.sin(seed + i * 127.1) * 0.5 + 0.5;
                const pseudoRand2 = Math.sin(seed + i * 311.7) * 0.5 + 0.5;
                const pseudoRand3 = Math.sin(seed + i * 531.3) * 0.5 + 0.5;

                const y = topY + 10 + pseudoRand * (bottomY - topY - 15);
                const hw = treeHalfWidthAt(y);
                const side = pseudoRand2 > 0.5 ? 1 : -1;
                const startX = treeCenterX + side * pseudoRand3 * hw * 0.3;
                const endX = treeCenterX + side * hw * (0.5 + pseudoRand3 * 0.45);
                const endY = y + 6 + pseudoRand * 10;

                ctx.beginPath();
                ctx.moveTo(startX, y);
                ctx.quadraticCurveTo((startX + endX) / 2, y + 2, endX, endY);
                ctx.stroke();

                const steps = 3;
                for (let j = 1; j <= steps; j++) {
                    const t = j / (steps + 1);
                    const bx = startX + (endX - startX) * t;
                    const by = y + (endY - y) * t;
                    ctx.strokeStyle = `rgba(25,${70 + Math.floor(pseudoRand * 40)},12,0.4)`;
                    ctx.beginPath();
                    ctx.moveTo(bx, by);
                    ctx.lineTo(bx + side * (4 + pseudoRand * 5), by + 3 + pseudoRand * 3);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(bx, by);
                    ctx.lineTo(bx + side * (3 + pseudoRand * 4), by - 2 - pseudoRand * 2);
                    ctx.stroke();
                }
            }
        }

        function drawOrnament(o) {
            const pulse = 1 + 0.08 * Math.sin(time * 2 + o.phase);
            const r = o.r * pulse;

            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(o.x + 1.5, o.y + 1.5, r, r * 0.9, 0, 0, Math.PI * 2);
            ctx.fill();

            const ballGrad = ctx.createRadialGradient(o.x - r * 0.3, o.y - r * 0.3, r * 0.1, o.x, o.y, r);
            ballGrad.addColorStop(0, lightenColor(o.color, 80));
            ballGrad.addColorStop(0.5, o.color);
            ballGrad.addColorStop(1, darkenColor(o.color, 40));
            ctx.fillStyle = ballGrad;
            ctx.beginPath();
            ctx.arc(o.x, o.y, r, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.ellipse(o.x - r * 0.25, o.y - r * 0.3, r * 0.35, r * 0.2, -0.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#c0c0c0';
            ctx.fillRect(o.x - 2, o.y - r - 2, 4, 4);
            ctx.fillStyle = '#888';
            ctx.fillRect(o.x - 2, o.y - r - 2, 4, 1.5);

            const glowGrad = ctx.createRadialGradient(o.x, o.y, r, o.x, o.y, r * 2);
            glowGrad.addColorStop(0, o.color + '44');
            glowGrad.addColorStop(1, o.color + '00');
            ctx.fillStyle = glowGrad;
            ctx.beginPath();
            ctx.arc(o.x, o.y, r * 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawSnowOnTree() {
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            const fracs = [0.12, 0.3, 0.49, 0.69, 0.87];
            const spreads = [0.6, 0.7, 0.65, 0.7, 0.6];
            fracs.forEach((frac, i) => {
                const y = treeTopY + frac * (treeBottomY - treeTopY);
                const hw = treeHalfWidthAt(y);
                ctx.beginPath();
                ctx.ellipse(treeCenterX + hw * spreads[i], y, 9, 3, 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(treeCenterX - hw * spreads[i], y, 7, 2.5, -0.3, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath();
            ctx.ellipse(treeCenterX, treeTopY + 6, 10, 4, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function lightenColor(hex, amount) {
            const rgb = hexToRgb(hex);
            if (!rgb) return hex;
            return `rgb(${Math.min(255, rgb.r + amount)},${Math.min(255, rgb.g + amount)},${Math.min(255, rgb.b + amount)})`;
        }

        function darkenColor(hex, amount) {
            const rgb = hexToRgb(hex);
            if (!rgb) return hex;
            return `rgb(${Math.max(0, rgb.r - amount)},${Math.max(0, rgb.g - amount)},${Math.max(0, rgb.b - amount)})`;
        }

        function hexToRgb(hex) {
            hex = hex.replace('#', '');
            if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
            const num = parseInt(hex, 16);
            if (isNaN(num)) return null;
            return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
        }

        // ─── Instrument Synthesis ───

        function createReverb(ac, duration, decay) {
            const rate = ac.sampleRate;
            const length = rate * duration;
            const impulse = ac.createBuffer(2, length, rate);
            for (let ch = 0; ch < 2; ch++) {
                const data = impulse.getChannelData(ch);
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
                }
            }
            const convolver = ac.createConvolver();
            convolver.buffer = impulse;
            return convolver;
        }

        function playBellTone(ac, dest, f, startTime, duration, volume) {
            const harmonics = [1, 2, 3, 4.2, 5.4];
            const gains = [1, 0.6, 0.4, 0.25, 0.15];
            harmonics.forEach((h, i) => {
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = 'sine';
                osc.frequency.value = f * h;
                osc.detune.value = (Math.random() - 0.5) * 6;
                gain.gain.setValueAtTime(volume * gains[i], startTime);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration * (1 - i * 0.12));
                osc.connect(gain);
                gain.connect(dest);
                osc.start(startTime);
                osc.stop(startTime + duration);
                scheduledNodes.push(osc);
            });
        }

        function playPadTone(ac, dest, f, startTime, duration, volume) {
            const voices = 3;
            for (let v = 0; v < voices; v++) {
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                const filter = ac.createBiquadFilter();
                osc.type = 'sawtooth';
                osc.frequency.value = f;
                osc.detune.value = (v - 1) * 8 + (Math.random() - 0.5) * 4;
                filter.type = 'lowpass';
                filter.frequency.value = 800;
                filter.Q.value = 0.5;
                const vol = volume * 0.15 / voices;
                gain.gain.setValueAtTime(0.001, startTime);
                gain.gain.linearRampToValueAtTime(vol, startTime + 0.1);
                gain.gain.setValueAtTime(vol, startTime + duration - 0.15);
                gain.gain.linearRampToValueAtTime(0.001, startTime + duration);
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(dest);
                osc.start(startTime);
                osc.stop(startTime + duration + 0.1);
                scheduledNodes.push(osc);
            }
        }

        function playBassTone(ac, dest, f, startTime, duration, volume) {
            const osc1 = ac.createOscillator();
            const osc2 = ac.createOscillator();
            const gain = ac.createGain();
            const filter = ac.createBiquadFilter();
            osc1.type = 'triangle';
            osc1.frequency.value = f;
            osc2.type = 'sine';
            osc2.frequency.value = f;
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            const vol = volume * 0.2;
            gain.gain.setValueAtTime(0.001, startTime);
            gain.gain.linearRampToValueAtTime(vol, startTime + 0.05);
            gain.gain.setValueAtTime(vol, startTime + duration * 0.7);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(gain);
            gain.connect(dest);
            osc1.start(startTime);
            osc1.stop(startTime + duration + 0.1);
            osc2.start(startTime);
            osc2.stop(startTime + duration + 0.1);
            scheduledNodes.push(osc1, osc2);
        }

        function playSleighBells(ac, dest, startTime, totalDuration, bpm) {
            const bl = beatDur(bpm);
            let t = startTime;
            while (t < startTime + totalDuration) {
                const bufferSize = ac.sampleRate * 0.05;
                const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1);
                }
                const noise = ac.createBufferSource();
                noise.buffer = buffer;
                const bandpass = ac.createBiquadFilter();
                bandpass.type = 'bandpass';
                bandpass.frequency.value = 8000 + Math.random() * 2000;
                bandpass.Q.value = 2;
                const hipass = ac.createBiquadFilter();
                hipass.type = 'highpass';
                hipass.frequency.value = 6000;
                const gain = ac.createGain();
                gain.gain.setValueAtTime(0.04, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
                noise.connect(bandpass);
                bandpass.connect(hipass);
                hipass.connect(gain);
                gain.connect(dest);
                noise.start(t);
                noise.stop(t + 0.08);
                scheduledNodes.push(noise);
                t += bl;
            }
        }

        function playGlockenspiel(ac, dest, f, startTime, duration, volume) {
            const osc = ac.createOscillator();
            const osc2 = ac.createOscillator();
            const gain = ac.createGain();
            osc.type = 'sine';
            osc.frequency.value = f * 2;
            osc2.type = 'sine';
            osc2.frequency.value = f * 3;
            const vol = volume * 0.06;
            gain.gain.setValueAtTime(vol, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.8);
            osc.connect(gain);
            osc2.connect(gain);
            gain.connect(dest);
            osc.start(startTime);
            osc.stop(startTime + duration);
            osc2.start(startTime);
            osc2.stop(startTime + duration);
            scheduledNodes.push(osc, osc2);
        }

        // ─── Song duration calculator ───
        function getSongDuration(song) {
            const bt = beatDur(song.bpm);
            let maxDur = 0;
            [song.melody, song.harmony, song.bass].forEach(track => {
                let d = 0;
                track.forEach(note => { d += note.b * bt; });
                if (d > maxDur) maxDur = d;
            });
            return maxDur;
        }

        // ─── Play / Stop / Rotate ───

        function stopAllMusic() {
            scheduledNodes.forEach(node => {
                try { node.stop(); } catch(e) {}
            });
            scheduledNodes = [];
            if (musicTimeout) { clearTimeout(musicTimeout); musicTimeout = null; }
            if (vizInterval) { clearInterval(vizInterval); vizInterval = null; }
            if (noteEmitInterval) { clearInterval(noteEmitInterval); noteEmitInterval = null; }
            musicPlaying = false;
            document.getElementById('musicBtn').classList.remove('active');
            document.getElementById('musicBtn').textContent = '🎵 Play Music';
            document.getElementById('visualizer').classList.remove('active');
            document.getElementById('nowPlaying').textContent = '';
        }

        function highlightSongBtn(index) {
            const btns = document.querySelectorAll('.song-btn');
            btns.forEach(b => b.classList.remove('active'));
            if (btns[index]) btns[index].classList.add('active');
        }

        function selectSong(index, btn) {
            currentSong = index;
            autoRotate = false; // user picked a song, stop auto-rotate
            document.querySelectorAll('.song-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (musicPlaying) {
                stopAllMusic();
                setTimeout(() => toggleMusic(), 100);
            }
        }

        function rotateToNextSong() {
            currentSong = (currentSong + 1) % SONGS.length;
            highlightSongBtn(currentSong);
        }

        function toggleMusic() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (musicPlaying) {
                stopAllMusic();
                autoRotate = true; // reset auto-rotate when stopped
                return;
            }
            musicPlaying = true;
            document.getElementById('musicBtn').classList.add('active');
            document.getElementById('musicBtn').textContent = '⏹️ Stop Music';
            document.getElementById('visualizer').classList.add('active');
            const song = SONGS[currentSong];
            highlightSongBtn(currentSong);
            document.getElementById('nowPlaying').textContent = `♪ Now Playing: ${song.name}`;
            playSong(song);
        }

        function playSong(song) {
            const ac = audioContext;
            const bt = beatDur(song.bpm);

            const masterGain = ac.createGain();
            masterGain.gain.value = 0.8;
            const compressor = ac.createDynamicsCompressor();
            compressor.threshold.value = -20;
            compressor.knee.value = 10;
            compressor.ratio.value = 4;
            const reverb = createReverb(ac, 2.5, 3);
            const reverbGain = ac.createGain();
            reverbGain.gain.value = 0.25;
            const dryGain = ac.createGain();
            dryGain.gain.value = 0.75;
            masterGain.connect(dryGain);
            dryGain.connect(compressor);
            masterGain.connect(reverb);
            reverb.connect(reverbGain);
            reverbGain.connect(compressor);
            compressor.connect(ac.destination);

            let startTime = ac.currentTime + 0.1;
            let totalDuration = 0;

            let t = startTime;
            song.melody.forEach(note => {
                const dur = note.b * bt;
                const f = noteFreq(note.n);
                playBellTone(ac, masterGain, f, t, dur * 1.2, 0.35);
                if (note.b >= 2) {
                    playGlockenspiel(ac, masterGain, f, t, dur, 0.3);
                }
                t += dur;
            });
            totalDuration = Math.max(totalDuration, t - startTime);

            t = startTime;
            song.harmony.forEach(note => {
                const dur = note.b * bt;
                const f = noteFreq(note.n);
                playPadTone(ac, masterGain, f, t, dur, 0.5);
                t += dur;
            });
            totalDuration = Math.max(totalDuration, t - startTime);

            t = startTime;
            song.bass.forEach(note => {
                const dur = note.b * bt;
                const f = noteFreq(note.n);
                playBassTone(ac, masterGain, f, t, dur, 0.5);
                t += dur;
            });
            totalDuration = Math.max(totalDuration, t - startTime);

            playSleighBells(ac, masterGain, startTime, totalDuration, song.bpm);

            noteEmitInterval = setInterval(() => {
                if (!musicPlaying) { clearInterval(noteEmitInterval); noteEmitInterval = null; return; }
                const noteEl = document.createElement('div');
                noteEl.classList.add('music-note');
                noteEl.innerHTML = ['🎵','🎶','♪','♫','✨'][Math.floor(Math.random()*5)];
                noteEl.style.left = (Math.random() * 80 + 10) + '%';
                noteEl.style.top = (40 + Math.random() * 30) + '%';
                document.body.appendChild(noteEl);
                setTimeout(() => noteEl.remove(), 3000);
            }, 600);

            vizInterval = setInterval(updateVisualizer, 100);

            musicTimeout = setTimeout(() => {
                if (noteEmitInterval) { clearInterval(noteEmitInterval); noteEmitInterval = null; }
                if (vizInterval) { clearInterval(vizInterval); vizInterval = null; }
                scheduledNodes = [];

                if (musicPlaying) {
                    // Rotate to next song
                    if (autoRotate) {
                        rotateToNextSong();
                    }
                    const nextSong = SONGS[currentSong];
                    document.getElementById('nowPlaying').textContent = `♪ Now Playing: ${nextSong.name}`;
                    playSong(nextSong);
                }
            }, totalDuration * 1000 + 300);
        }

        // Initial snowflakes
        window.addEventListener('load', () => {
            for (let i = 0; i < 30; i++) {
                setTimeout(createSnowflake, i * 100);
            }
        });
    </script>
