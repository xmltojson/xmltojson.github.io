<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 11 Web</title>
<meta name="description" content="A fully functional Windows 11-style web desktop environment featuring Notepad, Calculator, Web Browser, and File Explorer. Supports resizable windows, file open/save, and adapts to small screens.">
<meta name="keywords" content="Windows 11, web desktop, browser OS, notepad, calculator, file explorer, HTML JS CSS app">
<meta name="author" content="Windows 11 Web">
<meta name="theme-color" content="#0078d4">
<meta property="og:title" content="Windows 11 Web">
<meta property="og:description" content="A fully functional Windows 11-style web desktop with Notepad, Calculator, Browser, and File Explorer.">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230078d4'/%3E%3Crect x='6' y='6' width='9' height='9' rx='1' fill='white'/%3E%3Crect x='17' y='6' width='9' height='9' rx='1' fill='white'/%3E%3Crect x='6' y='17' width='9' height='9' rx='1' fill='white'/%3E%3Crect x='17' y='17' width='9' height='9' rx='1' fill='white'/%3E%3C/svg%3E">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
body { overflow: hidden; user-select: none; }

/* Desktop */
#desktop {
  width: 100vw; height: 100vh;
  background: linear-gradient(135deg, #0078d4 0%, #005a9e 50%, #003d6b 100%);
  position: relative; overflow: hidden;
}
#desktop::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(0,120,212,0.3) 0%, transparent 50%);
}

/* Desktop Icons */
#desktop-icons {
  position: absolute; top: 10px; left: 10px;
  display: flex; flex-direction: column; gap: 8px; z-index: 1;
}
.desktop-icon {
  width: 80px; padding: 8px; border-radius: 6px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; text-align: center;
}
.desktop-icon:hover { background: rgba(255,255,255,0.15); }
.desktop-icon .icon { font-size: 32px; }
.desktop-icon .label { color: #fff; font-size: 12px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

/* Windows */
.window {
  position: absolute; background: #f3f3f3;
  border-radius: 8px; overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  display: flex; flex-direction: column;
  min-width: 300px; min-height: 200px;
  border: 1px solid rgba(255,255,255,0.2);
}
.window.active { box-shadow: 0 16px 50px rgba(0,0,0,0.5); }
.titlebar {
  height: 36px; background: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding-left: 12px; cursor: move; flex-shrink: 0;
  border-bottom: 1px solid #e5e5e5;
}
.titlebar .title { font-size: 13px; display: flex; align-items: center; gap: 8px; }
.titlebar .controls { display: flex; height: 100%; }
.titlebar .controls button {
  width: 46px; height: 100%; border: none; background: none;
  cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
}
.titlebar .controls .min:hover { background: #e5e5e5; }
.titlebar .controls .max:hover { background: #e5e5e5; }
.titlebar .controls .close:hover { background: #e81123; color: #fff; }
.window-content { flex: 1; overflow: hidden; position: relative; }

/* Resize handles */
.resize-handle { position: absolute; z-index: 10; }
.rh-r { right: 0; top: 0; width: 6px; height: 100%; cursor: e-resize; }
.rh-b { bottom: 0; left: 0; height: 6px; width: 100%; cursor: s-resize; }
.rh-br { right: 0; bottom: 0; width: 12px; height: 12px; cursor: se-resize; }
.rh-l { left: 0; top: 0; width: 6px; height: 100%; cursor: w-resize; }
.rh-t { top: 0; left: 0; height: 6px; width: 100%; cursor: n-resize; }

/* Taskbar */
#taskbar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 48px;
  background: rgba(243,243,243,0.85); backdrop-filter: blur(20px);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  z-index: 9999; border-top: 1px solid rgba(255,255,255,0.3);
}
.taskbar-btn {
  width: 40px; height: 40px; border-radius: 6px; border: none;
  background: none; cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center; position: relative;
  transition: background 0.15s;
}
.taskbar-btn:hover { background: rgba(0,0,0,0.08); }
.taskbar-btn.active::after {
  content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 3px; background: #0078d4; border-radius: 2px;
}
#clock { position: absolute; right: 12px; font-size: 12px; text-align: center; line-height: 1.3; }

/* Start Menu */
#start-menu {
  position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
  width: 90%; max-width: 540px; background: rgba(243,243,243,0.95);
  backdrop-filter: blur(30px); border-radius: 10px; padding: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4); z-index: 9998; display: none;
  border: 1px solid rgba(255,255,255,0.3);
}
#start-menu.open { display: block; }
#start-menu input {
  width: 100%; padding: 10px 16px; border-radius: 20px; border: 1px solid #ccc;
  margin-bottom: 16px; font-size: 14px; outline: none;
}
.start-apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
.start-app {
  padding: 12px 4px; border-radius: 8px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center;
}
.start-app:hover { background: rgba(0,0,0,0.08); }
.start-app .icon { font-size: 28px; }
.start-app .label { font-size: 11px; }

/* Notepad */
.notepad-app { display: flex; flex-direction: column; height: 100%; background: #fff; }
.notepad-menu { display: flex; gap: 4px; padding: 4px 8px; background: #f9f9f9; border-bottom: 1px solid #eee; }
.notepad-menu button { border: none; background: none; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 13px; }
.notepad-menu button:hover { background: #e5e5e5; }
.notepad-app textarea { flex: 1; border: none; outline: none; resize: none; padding: 12px; font-family: 'Consolas', monospace; font-size: 14px; }

/* Calculator */
.calc-app { display: flex; flex-direction: column; height: 100%; background: #f3f3f3; padding: 8px; }
.calc-display { background: #fff; text-align: right; padding: 16px; font-size: 32px; border-radius: 6px; margin-bottom: 8px; overflow: hidden; min-height: 60px; word-break: break-all; }
.calc-history { font-size: 13px; color: #888; min-height: 18px; }
.calc-grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.calc-grid button { border: none; border-radius: 6px; background: #fff; cursor: pointer; font-size: 18px; transition: background 0.1s; }
.calc-grid button:hover { background: #e8e8e8; }
.calc-grid button.op { background: #f0f0f0; }
.calc-grid button.eq { background: #0078d4; color: #fff; }
.calc-grid button.eq:hover { background: #0068c0; }

/* Browser */
.browser-app { display: flex; flex-direction: column; height: 100%; background: #fff; }
.browser-bar { display: flex; gap: 6px; padding: 8px; background: #f3f3f3; align-items: center; }
.browser-bar button { border: none; background: none; cursor: pointer; font-size: 16px; padding: 6px 10px; border-radius: 4px; }
.browser-bar button:hover { background: #e0e0e0; }
.browser-bar input { flex: 1; padding: 8px 14px; border-radius: 18px; border: 1px solid #ccc; outline: none; font-size: 13px; }
.browser-app iframe { flex: 1; border: none; width: 100%; }

/* File Explorer */
.fe-app { display: flex; height: 100%; background: #fff; }
.fe-sidebar { width: 180px; background: #f9f9f9; border-right: 1px solid #eee; padding: 8px; overflow-y: auto; flex-shrink: 0; }
.fe-sidebar .item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; }
.fe-sidebar .item:hover, .fe-sidebar .item.active { background: #e5e5e5; }
.fe-main { flex: 1; display: flex; flex-direction: column; }
.fe-toolbar { padding: 8px; border-bottom: 1px solid #eee; display: flex; gap: 8px; align-items: center; }
.fe-toolbar button { border: none; background: none; cursor: pointer; padding: 6px 10px; border-radius: 4px; font-size: 14px; }
.fe-toolbar button:hover { background: #e5e5e5; }
.fe-path { flex: 1; font-size: 13px; padding: 6px 10px; background: #f3f3f3; border-radius: 4px; }
.fe-files { flex: 1; padding: 12px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; align-content: start; }
.fe-file { padding: 10px 4px; border-radius: 6px; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.fe-file:hover { background: #e8f0fe; }
.fe-file .icon { font-size: 36px; }
.fe-file .name { font-size: 11px; word-break: break-word; }

/* ===== Custom Modal Popups ===== */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  backdrop-filter: blur(2px); z-index: 100000;
  display: none; align-items: center; justify-content: center;
  animation: fadeIn 0.15s ease;
}
#modal-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-box {
  background: #fff; border-radius: 10px; min-width: 300px; max-width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden;
  animation: popIn 0.2s ease;
}
.modal-header {
  padding: 14px 20px; font-size: 15px; font-weight: 600;
  display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee;
}
.modal-body { padding: 20px; font-size: 14px; color: #333; line-height: 1.5; }
.modal-body input {
  width: 100%; padding: 8px 12px; border: 1px solid #ccc;
  border-radius: 6px; font-size: 14px; outline: none; margin-top: 12px;
}
.modal-body input:focus { border-color: #0078d4; }
.modal-footer { padding: 12px 20px; display: flex; justify-content: flex-end; gap: 8px; background: #f9f9f9; }
.modal-footer button {
  padding: 8px 20px; border-radius: 6px; border: 1px solid #ccc;
  background: #fff; cursor: pointer; font-size: 13px; transition: background 0.1s;
}
.modal-footer button:hover { background: #f0f0f0; }
.modal-footer button.primary { background: #0078d4; color: #fff; border-color: #0078d4; }
.modal-footer button.primary:hover { background: #0068c0; }

/* Small screen */
@media (max-width: 700px) {
  .fe-sidebar { width: 120px; }
  .desktop-icon { width: 64px; }
  .window { min-width: 260px; }
}
input[type="file"] { display: none; }
</style>
</head>
<body>
<div id="desktop">
  <div id="desktop-icons"></div>
  <div id="taskbar">
    <button class="taskbar-btn" id="start-btn" title="Start">⊞</button>
    <button class="taskbar-btn" onclick="openApp('explorer')" title="Files">📁</button>
    <button class="taskbar-btn" onclick="openApp('browser')" title="Browser">🌐</button>
    <button class="taskbar-btn" onclick="openApp('notepad')" title="Notepad">📝</button>
    <button class="taskbar-btn" onclick="openApp('calculator')" title="Calculator">🧮</button>
    <div id="clock"></div>
  </div>
  <div id="start-menu">
    <input type="text" placeholder="🔍 Search apps..." id="start-search">
    <div class="start-apps" id="start-apps"></div>
  </div>
</div>

<!-- Custom Modal -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<input type="file" id="fileInput">

<script>
// ============ Custom Modal System ============
const modalOverlay = document.getElementById('modal-overlay');
const modalHeader = document.getElementById('modal-header');
const modalBody = document.getElementById('modal-body');
const modalFooter = document.getElementById('modal-footer');

function closeModal() { modalOverlay.classList.remove('open'); modalBody.innerHTML = ''; modalFooter.innerHTML = ''; }

// Custom alert -> returns Promise
function showAlert(message, title='Message', icon='ℹ️') {
  return new Promise(resolve => {
    modalHeader.innerHTML = `${icon} ${title}`;
    modalBody.textContent = message;
    modalFooter.innerHTML = '';
    const ok = document.createElement('button');
    ok.className = 'primary'; ok.textContent = 'OK';
    ok.onclick = () => { closeModal(); resolve(true); };
    modalFooter.appendChild(ok);
    modalOverlay.classList.add('open');
    ok.focus();
  });
}

// Custom confirm -> returns Promise<boolean>
function showConfirm(message, title='Confirm', icon='❓') {
  return new Promise(resolve => {
    modalHeader.innerHTML = `${icon} ${title}`;
    modalBody.textContent = message;
    modalFooter.innerHTML = '';
    const cancel = document.createElement('button');
    cancel.textContent = 'Cancel';
    cancel.onclick = () => { closeModal(); resolve(false); };
    const ok = document.createElement('button');
    ok.className = 'primary'; ok.textContent = 'OK';
    ok.onclick = () => { closeModal(); resolve(true); };
    modalFooter.appendChild(cancel); modalFooter.appendChild(ok);
    modalOverlay.classList.add('open');
    ok.focus();
  });
}

// Custom prompt -> returns Promise<string|null>
function showPrompt(message, defaultVal='', title='Input', icon='✏️') {
  return new Promise(resolve => {
    modalHeader.innerHTML = `${icon} ${title}`;
    modalBody.innerHTML = `<div>${message}</div>`;
    const input = document.createElement('input');
    input.type = 'text'; input.value = defaultVal;
    modalBody.appendChild(input);
    modalFooter.innerHTML = '';
    const cancel = document.createElement('button');
    cancel.textContent = 'Cancel';
    cancel.onclick = () => { closeModal(); resolve(null); };
    const ok = document.createElement('button');
    ok.className = 'primary'; ok.textContent = 'OK';
    ok.onclick = () => { const v = input.value; closeModal(); resolve(v); };
    input.onkeydown = e => {
      if (e.key === 'Enter') { const v = input.value; closeModal(); resolve(v); }
      if (e.key === 'Escape') { closeModal(); resolve(null); }
    };
    modalFooter.appendChild(cancel); modalFooter.appendChild(ok);
    modalOverlay.classList.add('open');
    input.focus(); input.select();
  });
}
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

// ============ Virtual File System ============
const FS = JSON.parse(localStorage.getItem('winfs') || 'null') || {
  'Documents': { type: 'folder', children: {
    'readme.txt': { type: 'file', content: 'Welcome to Windows 11 Web!\n\nThis is a fully functional desktop environment.' },
    'notes.txt': { type: 'file', content: 'My notes...' }
  }},
  'Pictures': { type: 'folder', children: {} },
  'Downloads': { type: 'folder', children: {} },
  'Desktop': { type: 'folder', children: {} }
};
function saveFS() { localStorage.setItem('winfs', JSON.stringify(FS)); }

function getFolder(path) {
  if (path === '' || path === 'This PC') return FS;
  const parts = path.split('/');
  let node = FS;
  for (const p of parts) {
    if (!p) continue;
    node = node[p] ? node[p].children : (node.children ? node.children[p]?.children : node[p]?.children);
  }
  return node;
}

// ============ Session (window state) persistence ============
// Each window registers a state descriptor so it can be restored on reload.
const sessionWindows = {}; // uid -> {app, geo, extra}
let restoring = false;

function saveSession() {
  if (restoring) return;
  const data = [];
  Object.entries(sessionWindows).forEach(([uid, meta]) => {
    const win = windows[uid];
    if (!win) return;
    data.push({
      uid,
      app: meta.app,
      extra: typeof meta.getExtra === 'function' ? meta.getExtra() : (meta.extra || {}),
      geo: {
        left: win.style.left, top: win.style.top,
        width: win.style.width, height: win.style.height,
        z: win.style.zIndex, hidden: win.style.display === 'none',
        maximized: win.dataset.maximized === '1'
      }
    });
  });
  localStorage.setItem('winsession', JSON.stringify(data));
}

function restoreSession() {
  const raw = localStorage.getItem('winsession');
  if (!raw) return;
  let data; try { data = JSON.parse(raw); } catch { return; }
  if (!Array.isArray(data) || !data.length) return;
  restoring = true;
  data.forEach(item => {
    try {
      const opener = SESSION_OPENERS[item.app];
      if (opener) opener(item.extra || {}, item.geo);
    } catch(e){ console.warn(e); }
  });
  restoring = false;
  saveSession();
}

// ============ Window Manager ============
let zIndex = 100, windowCount = 0, activeWindow = null;
const windows = {};

function createWindow(id, title, icon, contentHTML, w=500, h=400, geo=null) {
  if (windows[id]) { focusWindow(id); return windows[id]; }
  const win = document.createElement('div');
  win.className = 'window active';
  win.id = 'win-' + id;
  const isSmall = window.innerWidth < 700;
  let width = isSmall ? Math.min(w, window.innerWidth - 20) : w;
  let height = isSmall ? Math.min(h, window.innerHeight - 80) : h;
  let left = isSmall ? 10 : Math.min(80 + windowCount * 30, window.innerWidth - width - 20);
  let top = isSmall ? 10 : Math.min(40 + windowCount * 30, window.innerHeight - height - 60);
  win.style.cssText = `width:${width}px;height:${height}px;left:${left}px;top:${top}px;z-index:${++zIndex}`;
  win.innerHTML = `
    <div class="titlebar">
      <span class="title">${icon} ${title}</span>
      <div class="controls">
        <button class="min">─</button>
        <button class="max">▢</button>
        <button class="close">✕</button>
      </div>
    </div>
    <div class="window-content">${contentHTML}</div>
    <div class="resize-handle rh-r"></div><div class="resize-handle rh-b"></div>
    <div class="resize-handle rh-br"></div><div class="resize-handle rh-l"></div>
    <div class="resize-handle rh-t"></div>`;
  document.getElementById('desktop').appendChild(win);
  windows[id] = win; windowCount++;

  win.addEventListener('mousedown', () => focusWindow(id));
  const titlebar = win.querySelector('.titlebar');
  makeDraggable(win, titlebar);
  makeResizable(win);

  win.querySelector('.close').onclick = (e) => { e.stopPropagation(); closeWindow(id); };
  win.querySelector('.min').onclick = (e) => { e.stopPropagation(); win.style.display = 'none'; saveSession(); };
  let prevState = {};
  const doMax = () => {
    const maximized = win.dataset.maximized === '1';
    if (!maximized) {
      prevState = { w: win.style.width, h: win.style.height, l: win.style.left, t: win.style.top };
      win.dataset.prev = JSON.stringify(prevState);
      win.style.cssText += `;left:0;top:0;width:100vw;height:calc(100vh - 48px)`;
      win.dataset.maximized = '1';
    } else {
      const p = win.dataset.prev ? JSON.parse(win.dataset.prev) : prevState;
      win.style.width = p.w; win.style.height = p.h; win.style.left = p.l; win.style.top = p.t;
      win.dataset.maximized = '0';
    }
    saveSession();
  };
  win.querySelector('.max').onclick = (e) => { e.stopPropagation(); doMax(); };
  titlebar.ondblclick = () => doMax();

  // Apply restored geometry
  if (geo) {
    if (geo.width) win.style.width = geo.width;
    if (geo.height) win.style.height = geo.height;
    if (geo.left) win.style.left = geo.left;
    if (geo.top) win.style.top = geo.top;
    if (geo.z) win.style.zIndex = geo.z;
    if (geo.hidden) win.style.display = 'none';
    if (geo.maximized) { win.dataset.maximized = '1'; }
  }

  focusWindow(id);
  updateTaskbar();
  saveSession();
  return win;
}

function focusWindow(id) {
  Object.values(windows).forEach(w => w.classList.remove('active'));
  const win = windows[id];
  if (win) { win.style.zIndex = ++zIndex; win.style.display = 'flex'; win.classList.add('active'); activeWindow = id; }
  updateTaskbar();
  saveSession();
}
function closeWindow(id) {
  if (windows[id]) { windows[id].remove(); delete windows[id]; delete sessionWindows[id]; updateTaskbar(); saveSession(); }
}

function makeDraggable(win, handle) {
  let sx, sy, sl, st, drag = false;
  const start = (x, y) => { drag = true; sx = x; sy = y; sl = win.offsetLeft; st = win.offsetTop; };
  const move = (x, y) => {
    if (!drag) return;
    let nl = sl + x - sx, nt = st + y - sy;
    nt = Math.max(0, Math.min(nt, window.innerHeight - 48));
    win.style.left = nl + 'px'; win.style.top = nt + 'px';
  };
  const end = () => { if (drag) { drag = false; saveSession(); } };
  handle.addEventListener('mousedown', e => { if(e.target.tagName==='BUTTON')return; start(e.clientX, e.clientY); });
  handle.addEventListener('touchstart', e => { start(e.touches[0].clientX, e.touches[0].clientY); });
  document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  document.addEventListener('touchmove', e => { if(drag){ move(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }}, {passive:false});
  document.addEventListener('mouseup', end);
  document.addEventListener('touchend', end);
}

function makeResizable(win) {
  win.querySelectorAll('.resize-handle').forEach(handle => {
    let sx, sy, sw, sh, sl, st, resize = false;
    const dir = handle.className.split('rh-')[1];
    const start = (x, y) => { resize = true; sx = x; sy = y; sw = win.offsetWidth; sh = win.offsetHeight; sl = win.offsetLeft; st = win.offsetTop; };
    const move = (x, y) => {
      if (!resize) return;
      const dx = x - sx, dy = y - sy;
      if (dir.includes('r')) win.style.width = Math.max(260, sw + dx) + 'px';
      if (dir.includes('b')) win.style.height = Math.max(200, sh + dy) + 'px';
      if (dir.includes('l')) { const nw = Math.max(260, sw - dx); win.style.width = nw + 'px'; win.style.left = sl + (sw - nw) + 'px'; }
      if (dir.includes('t')) { const nh = Math.max(200, sh - dy); win.style.height = nh + 'px'; win.style.top = st + (sh - nh) + 'px'; }
    };
    const end = () => { if (resize) { resize = false; saveSession(); } };
    handle.addEventListener('mousedown', e => { e.stopPropagation(); start(e.clientX, e.clientY); });
    document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
    document.addEventListener('mouseup', end);
  });
}

// ============ Taskbar ============
function updateTaskbar() {
  document.querySelectorAll('.taskbar-btn').forEach(b => b.classList.remove('active'));
}

// ============ Apps ============
const APPS = {
  notepad: { name: 'Notepad', icon: '📝', open: () => openNotepad() },
  calculator: { name: 'Calculator', icon: '🧮', open: () => openCalculator() },
  browser: { name: 'Browser', icon: '🌐', open: () => openBrowser() },
  explorer: { name: 'File Explorer', icon: '📁', open: () => openExplorer() }
};
function openApp(id) { APPS[id].open(); document.getElementById('start-menu').classList.remove('open'); }

// Session openers: (extra, geo) => open the window restoring state
const SESSION_OPENERS = {
  notepad: (extra, geo) => openNotepad(extra.content || '', extra.fname || 'Untitled.txt', extra.path || null, geo),
  calculator: (extra, geo) => openCalculator(geo, extra),
  browser: (extra, geo) => openBrowser(extra.url, geo),
  explorer: (extra, geo) => openExplorer(extra.path || 'Documents', geo)
};

// ---- Notepad ----
function openNotepad(content='', fileName='Untitled.txt', targetPath=null, geo=null) {
  const uid = 'notepad-' + Date.now() + '-' + Math.floor(Math.random()*1000);
  const win = createWindow(uid, fileName + ' - Notepad', '📝', `
    <div class="notepad-app">
      <div class="notepad-menu">
        <button data-act="new">New</button>
        <button data-act="open">Open</button>
        <button data-act="save">Save</button>
        <button data-act="saveas">Save As</button>
      </div>
      <textarea placeholder="Type here..."></textarea>
    </div>`, 550, 450, geo);
  const ta = win.querySelector('textarea');
  ta.value = content;
  win.dataset.path = targetPath || '';
  win.dataset.fname = fileName;

  sessionWindows[uid] = { app: 'notepad', getExtra: () => ({
    content: ta.value, fname: win.dataset.fname, path: win.dataset.path
  })};

  ta.addEventListener('input', () => saveSession());

  win.querySelector('[data-act="new"]').onclick = () => { ta.value = ''; win.dataset.path=''; win.dataset.fname='Untitled.txt'; win.querySelector('.title').innerHTML='📝 Untitled.txt - Notepad'; saveSession(); };
  win.querySelector('[data-act="open"]').onclick = () => {
    const fi = document.getElementById('fileInput');
    fi.onchange = e => {
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = ev => { ta.value = ev.target.result; win.dataset.fname = f.name; win.querySelector('.title').innerHTML='📝 '+f.name+' - Notepad'; saveSession(); };
      r.readAsText(f);
    };
    fi.click();
  };
  win.querySelector('[data-act="save"]').onclick = async () => {
    if (win.dataset.path) {
      const folder = getFolder(win.dataset.path);
      folder[win.dataset.fname] = { type: 'file', content: ta.value };
      saveFS(); refreshExplorers();
      await showAlert('Saved to ' + win.dataset.path + '/' + win.dataset.fname, 'Saved', '💾');
    } else { downloadFile(win.dataset.fname, ta.value); }
  };
  win.querySelector('[data-act="saveas"]').onclick = async () => {
    const name = await showPrompt('Save as filename:', win.dataset.fname, 'Save As', '💾');
    if (name) downloadFile(name, ta.value);
  };
}
function downloadFile(name, content) {
  const blob = new Blob([content], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
}

// ---- Calculator ----
function openCalculator(geo=null, extra={}) {
  const uid = 'calc';
  if (windows[uid]) { focusWindow(uid); return; }
  const buttons = ['C','⌫','%','/','7','8','9','*','4','5','6','-','1','2','3','+','±','0','.','='];
  let grid = buttons.map(b => {
    let cls = ''; if(['/','*','-','+','%'].includes(b)) cls='op'; if(b==='=') cls='eq';
    return `<button class="${cls}" data-v="${b}">${b}</button>`;
  }).join('');
  const win = createWindow(uid, 'Calculator', '🧮', `
    <div class="calc-app">
      <div class="calc-display"><div class="calc-history"></div><div class="calc-value">0</div></div>
      <div class="calc-grid">${grid}</div>
    </div>`, 320, 460, geo);
  let expr = extra.expr || '', display = win.querySelector('.calc-value'), hist = win.querySelector('.calc-history');
  display.textContent = expr || '0';
  if (extra.hist) hist.textContent = extra.hist;

  sessionWindows[uid] = { app: 'calculator', getExtra: () => ({ expr, hist: hist.textContent }) };

  win.querySelectorAll('.calc-grid button').forEach(btn => {
    btn.onclick = () => {
      const v = btn.dataset.v;
      if (v === 'C') { expr=''; display.textContent='0'; hist.textContent=''; }
      else if (v === '⌫') { expr = expr.slice(0,-1); display.textContent = expr || '0'; }
      else if (v === '±') { if(expr && !isNaN(expr)) expr = String(-parseFloat(expr)); display.textContent=expr||'0'; }
      else if (v === '=') {
        try {
          let e = expr.replace(/%/g,'/100');
          let res = Function('"use strict";return('+e+')')();
          res = Math.round(res * 1e10)/1e10;
          hist.textContent = expr + ' =';
          display.textContent = res; expr = String(res);
        } catch { display.textContent = 'Error'; expr=''; }
      }
      else { expr += v; display.textContent = expr; }
      saveSession();
    };
  });
}

// ---- Browser ----
function openBrowser(startUrl='https://www.wikipedia.org', geo=null) {
  const uid = 'browser-' + Date.now() + '-' + Math.floor(Math.random()*1000);
  const win = createWindow(uid, 'Web Browser', '🌐', `
    <div class="browser-app">
      <div class="browser-bar">
        <button data-act="back">←</button>
        <button data-act="fwd">→</button>
        <button data-act="reload">⟳</button>
        <input type="text" placeholder="Search or enter URL">
        <button data-act="go">Go</button>
      </div>
      <iframe></iframe>
    </div>`, 700, 500, geo);
  const inp = win.querySelector('input'), iframe = win.querySelector('iframe');
  inp.value = startUrl; iframe.src = startUrl;

  sessionWindows[uid] = { app: 'browser', getExtra: () => ({ url: inp.value }) };

  const nav = () => {
    let url = inp.value.trim();
    if (!/^https?:\/\//.test(url)) {
      if (url.includes('.') && !url.includes(' ')) url = 'https://' + url;
      else url = 'https://www.bing.com/search?q=' + encodeURIComponent(url);
    }
    inp.value = url; iframe.src = url; saveSession();
  };
  win.querySelector('[data-act="go"]').onclick = nav;
  inp.onkeydown = e => { if(e.key==='Enter') nav(); };
  win.querySelector('[data-act="reload"]').onclick = () => iframe.src = iframe.src;
  win.querySelector('[data-act="back"]').onclick = () => { try{iframe.contentWindow.history.back();}catch{} };
  win.querySelector('[data-act="fwd"]').onclick = () => { try{iframe.contentWindow.history.forward();}catch{} };
}

// ---- File Explorer ----
const explorers = [];
function openExplorer(startPath='Documents', geo=null) {
  const uid = 'explorer-' + Date.now() + '-' + Math.floor(Math.random()*1000);
  const win = createWindow(uid, 'File Explorer', '📁', `
    <div class="fe-app">
      <div class="fe-sidebar">
        <div class="item" data-path="Desktop">🖥️ Desktop</div>
        <div class="item" data-path="Documents">📄 Documents</div>
        <div class="item" data-path="Downloads">⬇️ Downloads</div>
        <div class="item" data-path="Pictures">🖼️ Pictures</div>
        <div class="item" data-path="This PC">💻 This PC</div>
      </div>
      <div class="fe-main">
        <div class="fe-toolbar">
          <button data-act="up">⬆️</button>
          <button data-act="newfile">📄+</button>
          <button data-act="newfolder">📁+</button>
          <div class="fe-path"></div>
        </div>
        <div class="fe-files"></div>
      </div>
    </div>`, 640, 440, geo);
  win.dataset.path = startPath;
  const state = { win, path: startPath, uid };
  explorers.push(state);

  sessionWindows[uid] = { app: 'explorer', getExtra: () => ({ path: state.path }) };

  win.querySelectorAll('.fe-sidebar .item').forEach(it => {
    it.onclick = () => { state.path = it.dataset.path === 'This PC' ? '' : it.dataset.path; renderFE(state); saveSession(); };
  });
  win.querySelector('[data-act="up"]').onclick = () => {
    const parts = state.path.split('/').filter(Boolean); parts.pop();
    state.path = parts.join('/'); renderFE(state); saveSession();
  };
  win.querySelector('[data-act="newfolder"]').onclick = async () => {
    const name = await showPrompt('Folder name:', '', 'New Folder', '📁'); if(!name) return;
    const folder = getFolder(state.path);
    folder[name] = { type: 'folder', children: {} }; saveFS(); renderFE(state);
  };
  win.querySelector('[data-act="newfile"]').onclick = async () => {
    const name = await showPrompt('File name:', 'newfile.txt', 'New File', '📄'); if(!name) return;
    const folder = getFolder(state.path);
    folder[name] = { type: 'file', content: '' }; saveFS(); renderFE(state);
  };
  renderFE(state);
}
function renderFE(state) {
  const { win } = state;
  win.querySelector('.fe-path').textContent = '📁 ' + (state.path || 'This PC');
  const folder = getFolder(state.path) || {};
  const filesDiv = win.querySelector('.fe-files');
  filesDiv.innerHTML = '';
  const entries = Object.entries(folder);
  if (entries.length === 0) filesDiv.innerHTML = '<div style="grid-column:1/-1;color:#999;padding:20px;">This folder is empty</div>';
  entries.forEach(([name, node]) => {
    const el = document.createElement('div');
    el.className = 'fe-file';
    const icon = node.type === 'folder' ? '📁' : (name.endsWith('.txt') ? '📄' : '📄');
    el.innerHTML = `<div class="icon">${icon}</div><div class="name">${name}</div>`;
    el.ondblclick = () => {
      if (node.type === 'folder') { state.path = (state.path?state.path+'/':'') + name; renderFE(state); saveSession(); }
      else { openNotepad(node.content || '', name, state.path); }
    };
    el.oncontextmenu = async (e) => {
      e.preventDefault();
      const ok = await showConfirm('Delete "' + name + '"?', 'Delete', '🗑️');
      if (ok) { delete folder[name]; saveFS(); renderFE(state); }
    };
    filesDiv.appendChild(el);
  });
}
function refreshExplorers() { explorers.forEach(s => { try { renderFE(s); } catch{} }); }

// ============ Desktop Icons & Start Menu ============
function initDesktop() {
  const di = document.getElementById('desktop-icons');
  Object.entries(APPS).forEach(([id, app]) => {
    const el = document.createElement('div');
    el.className = 'desktop-icon';
    el.innerHTML = `<div class="icon">${app.icon}</div><div class="label">${app.name}</div>`;
    el.ondblclick = () => openApp(id);
    di.appendChild(el);
  });
  const sa = document.getElementById('start-apps');
  Object.entries(APPS).forEach(([id, app]) => {
    const el = document.createElement('div');
    el.className = 'start-app';
    el.innerHTML = `<div class="icon">${app.icon}</div><div class="label">${app.name}</div>`;
    el.onclick = () => openApp(id);
    sa.appendChild(el);
  });
}

document.getElementById('start-btn').onclick = (e) => {
  e.stopPropagation();
  document.getElementById('start-menu').classList.toggle('open');
};
document.getElementById('desktop').onclick = () => document.getElementById('start-menu').classList.remove('open');
document.getElementById('start-search').oninput = (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.start-app').forEach(a => {
    a.style.display = a.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
  });
};

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').innerHTML =
    now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + '<br>' +
    now.toLocaleDateString();
}
setInterval(updateClock, 1000); updateClock();

// Save session before unload
window.addEventListener('beforeunload', saveSession);

initDesktop();
restoreSession();
</script>
