<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0c0c1e">
    <meta name="description" content="Happy New Year 2027!">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <title>🎆 Happy New Year 2027! 🎆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: radial-gradient(ellipse at 50% 120%, #1a1a4e 0%, #0c0c1e 45%, #050510 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        /* Stars Background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            will-change: opacity, transform;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* 3D Scene Wrapper */
        .scene {
            width: 100%;
            transition: transform 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        /* Main Container */
        .container {
            text-align: center;
            z-index: 10;
            position: relative;
            padding: 1rem;
            width: 100%;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }

        /* Year Display - always visible, animation only floats */
        .year {
            font-size: clamp(3.5rem, 20vw, 12rem);
            font-weight: 900;
            background: linear-gradient(45deg, #ffe259, #ff6b6b, #ffd700, #ff8e53);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: #ffd700; /* fallback */
            animation: gradientShift 3s ease infinite, floatY 4s ease-in-out infinite;
            line-height: 1.15;
            margin: 0.5rem 0;
            filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.6))
                    drop-shadow(0 6px 14px rgba(0, 0, 0, 0.55));
            padding: 0 0.1em;
            will-change: transform;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatY {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-14px); }
        }

        /* Happy New Year Text - stays fully opaque */
        .greeting {
            font-size: clamp(1.2rem, 5vw, 3.5rem);
            color: #ffffff;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: clamp(0.2em, 2vw, 0.5em);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 4px 12px rgba(0,0,0,0.6);
            opacity: 1;
        }

        /* Subtitle */
        .subtitle {
            font-size: clamp(0.85rem, 3vw, 1.8rem);
            color: rgba(255, 255, 255, 0.9);
            margin-top: 1rem;
            font-style: italic;
            padding: 0 1rem;
            line-height: 1.4;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            opacity: 1;
        }

        /* Wishes Container */
        .wishes {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            max-width: 600px;
            padding: 0 0.5rem;
            opacity: 1;
        }

        .wish {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.25), rgba(255, 107, 107, 0.25));
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: clamp(0.5rem, 2vw, 0.8rem) clamp(0.8rem, 3vw, 1.5rem);
            border-radius: 50px;
            color: #ffffff;
            font-size: clamp(0.7rem, 2.5vw, 1.1rem);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease, background 0.25s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            user-select: none;
            box-shadow: 0 6px 14px rgba(0,0,0,0.35);
            will-change: transform;
        }

        .wish:hover, .wish:active {
            transform: scale(1.12) translateY(-4px);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.5), rgba(255, 107, 107, 0.5));
            box-shadow: 0 12px 30px rgba(255, 215, 0, 0.4);
        }

        /* Fireworks Canvas */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* Confetti Canvas */
        #confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }

        /* Decorative Elements */
        .decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .decoration {
            position: absolute;
            font-size: clamp(1.5rem, 5vw, 3rem);
            animation: floatAround 10s ease-in-out infinite;
            opacity: 0.55;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
            will-change: transform;
        }

        .decoration:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
        .decoration:nth-child(2) { top: 10%; right: 5%; animation-delay: 2s; }
        .decoration:nth-child(3) { bottom: 25%; left: 5%; animation-delay: 4s; }
        .decoration:nth-child(4) { bottom: 20%; right: 5%; animation-delay: 6s; }
        .decoration:nth-child(5) { top: 35%; left: 2%; animation-delay: 1s; }
        .decoration:nth-child(6) { top: 50%; right: 2%; animation-delay: 3s; }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(8px, -14px) rotate(12deg); }
            50% { transform: translate(-8px, 8px) rotate(-8deg); }
            75% { transform: translate(12px, 12px) rotate(8deg); }
        }

        /* Clock */
        .clock {
            margin-top: 1.5rem;
            font-size: clamp(0.9rem, 3vw, 1.5rem);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', monospace;
            animation: pulse 2s ease-in-out infinite;
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .countdown {
            margin-top: 0.6rem;
            font-size: clamp(0.75rem, 2.5vw, 1.2rem);
            color: rgba(255, 215, 0, 0.95);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.05em;
            text-shadow: 0 0 12px rgba(255,215,0,0.4);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.75; }
            50% { opacity: 1; }
        }

        /* Sparkle Effect */
        .sparkle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, white, transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 0.8s ease-out forwards;
            z-index: 100;
            will-change: transform, opacity;
        }

        @keyframes sparkle {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Button - always visible */
        .celebrate-btn {
            margin-top: 1.5rem;
            padding: clamp(0.8rem, 3vw, 1rem) clamp(1.5rem, 6vw, 3rem);
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            border: none;
            border-radius: 50px;
            color: #1a1a3e;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 0 10px 24px rgba(255, 107, 107, 0.4), 0 4px 0 #c99700;
            will-change: transform;
            opacity: 1;
        }

        .celebrate-btn:hover {
            transform: scale(1.08) translateY(-4px);
            box-shadow: 0 18px 40px rgba(255, 215, 0, 0.6), 0 4px 0 #c99700;
        }

        .celebrate-btn:active {
            transform: scale(0.97);
            box-shadow: 0 6px 16px rgba(255, 215, 0, 0.5), 0 2px 0 #c99700;
        }

        /* Entrance animation applied via JS class - safe, settles at opacity:1 */
        .animate-in {
            animation: revealIn 0.9s ease-out both;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.5s; }
        .delay-4 { animation-delay: 0.7s; }

        @keyframes revealIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glow Ring */
        .glow-ring {
            position: absolute;
            width: clamp(200px, 60vw, 400px);
            height: clamp(200px, 60vw, 400px);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            animation: rotateGlow 20s linear infinite;
            z-index: 1;
            pointer-events: none;
            will-change: transform;
        }

        .glow-ring::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border: 2px solid transparent;
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: rotateGlow 3s linear infinite;
        }

        .glow-ring-2 {
            position: absolute;
            width: clamp(260px, 72vw, 520px);
            height: clamp(260px, 72vw, 520px);
            border: 1px solid rgba(255, 107, 107, 0.15);
            border-radius: 50%;
            animation: rotateGlow 16s linear infinite reverse;
            z-index: 1;
            pointer-events: none;
            will-change: transform;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Light Rays */
        .light-rays {
            position: fixed;
            width: 100%;
            height: 100%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 215, 0, 0.025) 10deg,
                transparent 20deg
            );
            animation: rotateRays 30s linear infinite;
            z-index: 0;
            pointer-events: none;
            will-change: transform;
        }

        @keyframes rotateRays {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Mobile Landscape */
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                align-content: center;
                padding: 0.5rem;
            }
            .greeting { width: 100%; font-size: clamp(1rem, 4vh, 2rem); margin-bottom: 0.25rem; }
            .year { font-size: clamp(2.5rem, 15vh, 6rem); margin: 0.25rem 0; }
            .subtitle { width: 100%; font-size: clamp(0.7rem, 2.5vh, 1rem); margin-top: 0.5rem; }
            .wishes { margin-top: 0.5rem; gap: 0.3rem; }
            .wish { padding: 0.3rem 0.6rem; font-size: clamp(0.6rem, 2vh, 0.9rem); }
            .clock { margin-top: 0.5rem; font-size: clamp(0.7rem, 2.5vh, 1rem); }
            .countdown { margin-top: 0.3rem; }
            .celebrate-btn { margin-top: 0.5rem; padding: 0.5rem 1.5rem; font-size: clamp(0.7rem, 2.5vh, 1rem); }
            .glow-ring { width: clamp(150px, 40vh, 250px); height: clamp(150px, 40vh, 250px); }
            .decoration { font-size: clamp(1rem, 4vh, 2rem); }
        }

        @media (max-width: 360px) {
            .greeting { letter-spacing: 0.15em; }
            .wishes { gap: 0.4rem; }
            .wish { padding: 0.4rem 0.7rem; }
        }

        @media (min-width: 768px) and (max-width: 1024px) {
            .year { font-size: clamp(6rem, 18vw, 10rem); }
            .greeting { font-size: clamp(1.8rem, 4vw, 2.5rem); }
        }

        @media (hover: none) {
            .wish:active {
                transform: scale(0.95);
                background: linear-gradient(135deg, rgba(255, 215, 0, 0.5), rgba(255, 107, 107, 0.5));
            }
            .celebrate-btn:active { transform: scale(0.95); }
        }

        @supports (padding: max(0px)) {
            .container {
                padding-left: max(1rem, env(safe-area-inset-left));
                padding-right: max(1rem, env(safe-area-inset-right));
                padding-top: max(1rem, env(safe-area-inset-top));
                padding-bottom: max(1rem, env(safe-area-inset-bottom));
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
            .scene { transition: none !important; }
            .animate-in { opacity: 1 !important; transform: none !important; }
        }
    </style>
</head>
<body>
    <!-- Stars Background -->
    <div class="stars" id="stars"></div>
    
    <!-- Light Rays -->
    <div class="light-rays"></div>
    
    <!-- Fireworks Canvas -->
    <canvas id="fireworks"></canvas>
    
    <!-- Confetti Canvas -->
    <canvas id="confetti"></canvas>
    
    <!-- Decorative Emojis -->
    <div class="decorations" id="decorations">
        <div class="decoration">🎆</div>
        <div class="decoration">✨</div>
        <div class="decoration">🎇</div>
        <div class="decoration">🌟</div>
        <div class="decoration">🎊</div>
        <div class="decoration">🎉</div>
    </div>
    
    <!-- Main Content -->
    <div class="scene" id="scene">
        <div class="container">
            <div class="glow-ring"></div>
            <div class="glow-ring-2"></div>
            
            <h2 class="greeting animate-in delay-1">Happy New Year</h2>
            <h1 class="year animate-in delay-1">2027</h1>
            <p class="subtitle animate-in delay-2">✨ May this year bring you joy, success, and endless possibilities! ✨</p>
            
            <div class="wishes animate-in delay-3">
                <span class="wish">🌟 Health</span>
                <span class="wish">💰 Prosperity</span>
                <span class="wish">❤️ Love</span>
                <span class="wish">😊 Happiness</span>
                <span class="wish">🎯 Success</span>
                <span class="wish">🌈 Peace</span>
                <span class="wish">💪 Strength</span>
                <span class="wish">🍀 Luck</span>
            </div>
            
            <div class="clock" id="clock"></div>
            <div class="countdown" id="countdown"></div>
            
            <button class="celebrate-btn animate-in delay-4" id="celebrateBtn">🎆 Celebrate! 🎆</button>
        </div>
    </div>

    <script>
        // ============ DEVICE DETECTION ============
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isLowPerfDevice = isMobile && (navigator.hardwareConcurrency <= 4 || window.innerWidth < 400);

        const STAR_COUNT = isLowPerfDevice ? 90 : (isMobile ? 120 : 180);
        const CONFETTI_COUNT = isLowPerfDevice ? 60 : (isMobile ? 80 : 120);
        const FIREWORK_PARTICLES = isLowPerfDevice ? 50 : (isMobile ? 70 : 100);

        // ============ 120Hz REFRESH RATE DETECTION ============
        const BASE_FPS = 60;
        let detectedRefreshRate = 60;

        (function detectRefreshRate() {
            let samples = [], last = performance.now(), count = 0;
            function sample(now) {
                const delta = now - last;
                last = now;
                if (delta > 0 && delta < 100) samples.push(1000 / delta);
                if (++count < 30) {
                    requestAnimationFrame(sample);
                } else {
                    samples.sort((a, b) => a - b);
                    const median = samples[Math.floor(samples.length / 2)] || 60;
                    const rates = [60, 75, 90, 120, 144, 165, 240];
                    detectedRefreshRate = rates.reduce((p, c) =>
                        Math.abs(c - median) < Math.abs(p - median) ? c : p);
                }
            }
            requestAnimationFrame(sample);
        })();

        // ============ 3D PARALLAX (applied to inner container, not the animated elements) ============
        const scene = document.getElementById('scene');
        const decorations = document.getElementById('decorations');
        let targetRX = 0, targetRY = 0, curRX = 0, curRY = 0;
        let parallaxActive = false;

        function applyParallax() {
            curRX += (targetRX - curRX) * 0.12;
            curRY += (targetRY - curRY) * 0.12;
            scene.style.transform = `perspective(1400px) rotateX(${curRX}deg) rotateY(${curRY}deg)`;
            decorations.style.transform = `perspective(1400px) rotateX(${curRX * 0.5}deg) rotateY(${curRY * 0.5}deg)`;
            requestAnimationFrame(applyParallax);
        }

        // Start parallax AFTER entrance animations finish, to avoid conflict
        setTimeout(() => {
            parallaxActive = true;
            applyParallax();
        }, 1800);

        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                if (!parallaxActive) return;
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                targetRY = ((e.clientX - cx) / cx) * 6;
                targetRX = -((e.clientY - cy) / cy) * 5;
            });
        } else {
            window.addEventListener('deviceorientation', (e) => {
                if (!parallaxActive) return;
                if (e.gamma != null && e.beta != null) {
                    targetRY = Math.max(-8, Math.min(8, e.gamma * 0.25));
                    targetRX = Math.max(-6, Math.min(6, (e.beta - 45) * 0.15));
                }
            });
        }

        // ============ STARS BACKGROUND ============
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < STAR_COUNT; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const depth = Math.random();
                const size = depth * 2 + 0.8;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.opacity = 0.3 + depth * 0.5;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                fragment.appendChild(star);
            }
            starsContainer.appendChild(fragment);
        }

        // ============ FIREWORKS ============
        const fireworksCanvas = document.getElementById('fireworks');
        const fCtx = fireworksCanvas.getContext('2d');
        let fireworks = [];
        let particles = [];
        let animationId;
        let lastFrameTime = performance.now();

        function resizeFireworksCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            fireworksCanvas.width = window.innerWidth * dpr;
            fireworksCanvas.height = window.innerHeight * dpr;
            fireworksCanvas.style.width = window.innerWidth + 'px';
            fireworksCanvas.style.height = window.innerHeight + 'px';
            fCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        class Firework {
            constructor(x, y, targetY) {
                this.x = x;
                this.y = y;
                this.z = (Math.random() - 0.5) * 200;
                this.targetY = targetY;
                this.speed = 6 + Math.random() * 3;
                this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.2;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.trail = [];
                this.color = `hsl(${Math.random() * 60 + 20}, 100%, 60%)`;
            }
            update(dt) {
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 10) this.trail.shift();
                for (const t of this.trail) t.alpha -= 0.12 * dt;
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vy += 0.12 * dt;
                if (this.vy >= 0 || this.y <= this.targetY) {
                    this.explode();
                    return false;
                }
                return true;
            }
            explode() {
                const particleCount = FIREWORK_PARTICLES + Math.random() * 30;
                const hue = Math.random() * 360;
                const depthScale = 1 + this.z / 400;
                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 / particleCount) * i;
                    const phi = Math.random() * Math.PI;
                    const speed = (1.5 + Math.random() * 4) * depthScale;
                    const sp = Math.sin(phi);
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * speed * sp,
                        Math.sin(angle) * speed * sp,
                        `hsl(${hue + Math.random() * 30}, 100%, ${50 + Math.random() * 30}%)`,
                        false, depthScale
                    ));
                }
                for (let i = 0; i < 18; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 0.5 + Math.random() * 2;
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * speed, Math.sin(angle) * speed,
                        '#ffffff', true, depthScale
                    ));
                }
            }
            draw() {
                for (const t of this.trail) {
                    fCtx.beginPath();
                    fCtx.arc(t.x, t.y, 2, 0, Math.PI * 2);
                    fCtx.fillStyle = `rgba(255, 200, 100, ${Math.max(0, t.alpha)})`;
                    fCtx.fill();
                }
                fCtx.beginPath();
                fCtx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                fCtx.fillStyle = this.color;
                fCtx.shadowBlur = 12;
                fCtx.shadowColor = this.color;
                fCtx.fill();
                fCtx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color, isSparkle = false, depthScale = 1) {
                this.x = x; this.y = y;
                this.vx = vx; this.vy = vy;
                this.color = color;
                this.alpha = 1;
                this.decay = 0.018 + Math.random() * 0.015;
                this.size = (isSparkle ? 1 + Math.random() : 1.5 + Math.random() * 1.5) * depthScale;
                this.isSparkle = isSparkle;
            }
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vy += 0.06 * dt;
                this.vx *= Math.pow(0.98, dt);
                this.vy *= Math.pow(0.98, dt);
                this.alpha -= this.decay * dt;
                return this.alpha > 0;
            }
            draw() {
                fCtx.save();
                fCtx.globalAlpha = Math.max(0, this.alpha);
                fCtx.beginPath();
                fCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                fCtx.fillStyle = this.color;
                if (!this.isSparkle) {
                    fCtx.shadowBlur = 8;
                    fCtx.shadowColor = this.color;
                }
                fCtx.fill();
                fCtx.restore();
            }
        }

        function launchFirework() {
            const x = Math.random() * window.innerWidth;
            const targetY = 80 + Math.random() * (window.innerHeight * 0.35);
            fireworks.push(new Firework(x, window.innerHeight, targetY));
        }

        function animateFireworks(now) {
            let dt = (now - lastFrameTime) / (1000 / BASE_FPS);
            lastFrameTime = now;
            if (dt > 3) dt = 3;
            if (dt <= 0) dt = 1;

            fCtx.globalAlpha = 1;
            fCtx.fillStyle = `rgba(12, 12, 30, ${Math.min(1, 0.15 * dt)})`;
            fCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            fireworks = fireworks.filter(f => f.update(dt));
            for (const f of fireworks) f.draw();

            particles = particles.filter(p => p.update(dt));
            for (const p of particles) p.draw();

            animationId = requestAnimationFrame(animateFireworks);
        }

        // ============ CONFETTI ============
        const confettiCanvas = document.getElementById('confetti');
        const cCtx = confettiCanvas.getContext('2d');
        let confetti = [];
        let confettiAnimationId;
        let lastConfettiTime = performance.now();

        function resizeConfettiCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            confettiCanvas.width = window.innerWidth * dpr;
            confettiCanvas.height = window.innerHeight * dpr;
            confettiCanvas.style.width = window.innerWidth + 'px';
            confettiCanvas.style.height = window.innerHeight + 'px';
            cCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        class Confetti {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * window.innerWidth;
                this.y = -20;
                this.size = 4 + Math.random() * 8;
                this.speed = 1.5 + Math.random() * 2;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.15;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.shape = Math.floor(Math.random() * 3);
                this.wobble = Math.random() * 10;
                this.wobbleSpeed = 0.03 + Math.random() * 0.07;
                this.flip = Math.random() * Math.PI * 2;
                this.flipSpeed = (Math.random() - 0.5) * 0.2;
            }
            update(dt) {
                this.y += this.speed * dt;
                this.x += Math.sin(this.wobble) * 1.5 * dt;
                this.wobble += this.wobbleSpeed * dt;
                this.angle += this.spin * dt;
                this.flip += this.flipSpeed * dt;
                if (this.y > window.innerHeight + 20) this.reset();
            }
            draw() {
                const scaleY = Math.abs(Math.cos(this.flip));
                cCtx.save();
                cCtx.translate(this.x, this.y);
                cCtx.rotate(this.angle);
                cCtx.scale(1, scaleY);
                cCtx.globalAlpha = 0.85 + scaleY * 0.15;
                cCtx.fillStyle = this.color;
                switch (this.shape) {
                    case 0:
                        cCtx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
                        break;
                    case 1:
                        cCtx.beginPath();
                        cCtx.arc(0, 0, this.size / 3, 0, Math.PI * 2);
                        cCtx.fill();
                        break;
                    case 2:
                        cCtx.beginPath();
                        cCtx.moveTo(0, -this.size / 2);
                        cCtx.lineTo(this.size / 2, this.size / 2);
                        cCtx.lineTo(-this.size / 2, this.size / 2);
                        cCtx.closePath();
                        cCtx.fill();
                        break;
                }
                cCtx.restore();
            }
        }

        function createConfetti() {
            for (let i = 0; i < CONFETTI_COUNT; i++) {
                const c = new Confetti();
                c.y = Math.random() * window.innerHeight;
                confetti.push(c);
            }
        }

        function animateConfetti(now) {
            let dt = (now - lastConfettiTime) / (1000 / BASE_FPS);
            lastConfettiTime = now;
            if (dt > 3) dt = 3;
            if (dt <= 0) dt = 1;

            cCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            for (const c of confetti) { c.update(dt); c.draw(); }
            confettiAnimationId = requestAnimationFrame(animateConfetti);
        }

        // ============ CLOCK + COUNTDOWN ============
        function updateClock() {
            const now = new Date();
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            document.getElementById('clock').textContent =
                `🕐 ${now.toLocaleTimeString('en-US', options)} 🕐`;

            const target = new Date('2027-01-01T00:00:00');
            let diff = target - now;
            const cd = document.getElementById('countdown');
            if (diff > 0) {
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                cd.textContent = `⏳ ${d}d ${h}h ${m}m ${s}s until 2027`;
            } else {
                cd.textContent = `🎉 Welcome to 2027! 🎉`;
            }
        }

        // ============ SPARKLE EFFECT ============
        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        }

        // ============ TOUCH/CLICK HANDLERS ============
        let lastTouchTime = 0;
        function handleInteraction(x, y) {
            const now = Date.now();
            if (now - lastTouchTime < 60) return;
            lastTouchTime = now;
            createSparkle(x, y);
        }

        document.addEventListener('touchmove', (e) => {
            if (Math.random() > 0.85) {
                const touch = e.touches[0];
                handleInteraction(touch.clientX, touch.clientY);
            }
        }, { passive: true });

        document.addEventListener('mousemove', (e) => {
            if (!isMobile && Math.random() > 0.92) handleInteraction(e.clientX, e.clientY);
        });

        // ============ CELEBRATE ============
        function celebrate() {
            const count = isMobile ? 6 : 12;
            for (let i = 0; i < count; i++) setTimeout(() => launchFirework(), i * 130);
            const extraConfetti = isMobile ? 30 : 60;
            for (let i = 0; i < extraConfetti; i++) confetti.push(new Confetti());
            playSound();
            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
        }

        function playSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const frequencies = [523.25, 659.25, 783.99, 1046.50];
                frequencies.forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                        osc.start(audioContext.currentTime);
                        osc.stop(audioContext.currentTime + 0.4);
                    }, i * 120);
                });
            } catch (e) {}
        }

        // ============ AUTO FIREWORKS ============
        let autoFireworkInterval;
        function autoFireworks() {
            if (Math.random() > 0.5) launchFirework();
            const delay = isMobile ? 1200 + Math.random() * 2000 : 800 + Math.random() * 1500;
            autoFireworkInterval = setTimeout(autoFireworks, delay);
        }

        // ============ WISH CLICK EFFECT ============
        document.querySelectorAll('.wish').forEach(wish => {
            const handler = (e) => {
                e.preventDefault();
                const rect = wish.getBoundingClientRect();
                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2;
                for (let i = 0; i < 6; i++) {
                    setTimeout(() => createSparkle(
                        x + (Math.random() - 0.5) * 80,
                        y + (Math.random() - 0.5) * 80
                    ), i * 40);
                }
                launchFirework();
                if (navigator.vibrate) navigator.vibrate(30);
            };
            wish.addEventListener('click', handler);
        });

        // ============ CELEBRATE BUTTON ============
        const celebrateBtn = document.getElementById('celebrateBtn');
        celebrateBtn.addEventListener('click', celebrate);

        // ============ VISIBILITY CHANGE ============
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                cancelAnimationFrame(animationId);
                cancelAnimationFrame(confettiAnimationId);
                clearTimeout(autoFireworkInterval);
            } else {
                lastFrameTime = performance.now();
                lastConfettiTime = performance.now();
                animationId = requestAnimationFrame(animateFireworks);
                confettiAnimationId = requestAnimationFrame(animateConfetti);
                autoFireworks();
            }
        });

        // ============ RESIZE HANDLER ============
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                resizeFireworksCanvas();
                resizeConfettiCanvas();
            }, 100);
        });
        window.addEventListener('orientationchange', () => {
            setTimeout(() => { resizeFireworksCanvas(); resizeConfettiCanvas(); }, 200);
        });

        // ============ INITIALIZATION ============
        function init() {
            createStars();
            resizeFireworksCanvas();
            resizeConfettiCanvas();
            createConfetti();
            lastFrameTime = performance.now();
            lastConfettiTime = performance.now();
            animationId = requestAnimationFrame(animateFireworks);
            confettiAnimationId = requestAnimationFrame(animateConfetti);
            updateClock();
            setInterval(updateClock, 1000);
            autoFireworks();
            setTimeout(() => {
                const count = isMobile ? 4 : 6;
                for (let i = 0; i < count; i++) setTimeout(() => launchFirework(), i * 250);
            }, 500);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
