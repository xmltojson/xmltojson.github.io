<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Генератор</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: #333;
}

.container {
    max-width: 1100px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.97);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    overflow: hidden;
}

.header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 30px;
    text-align: center;
    position: relative;
}

.header h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

.header p {
    opacity: 0.95;
    font-size: 1.1em;
}

.lang-switcher {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 5px;
}

.lang-btn {
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid white;
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
}

.lang-btn.active, .lang-btn:hover {
    background: white;
    color: #667eea;
}

.content {
    padding: 30px;
}

.upload-area {
    border: 3px dashed #667eea;
    border-radius: 15px;
    padding: 40px;
    text-align: center;
    background: #f8f9ff;
    transition: all 0.3s;
    cursor: pointer;
    margin-bottom: 25px;
}

.upload-area:hover, .upload-area.drag-over {
    border-color: #764ba2;
    background: #f0e7ff;
    transform: translateY(-2px);
}

.upload-icon {
    font-size: 4em;
    margin-bottom: 15px;
}

.upload-area h3 {
    color: #667eea;
    margin-bottom: 8px;
}

.upload-area p {
    color: #888;
    font-size: 0.95em;
}

#fileInput {
    display: none;
}

.options {
    background: #f8f9ff;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 25px;
}

.options h3 {
    color: #667eea;
    margin-bottom: 15px;
    font-size: 1.3em;
}

.option-row {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    align-items: center;
    margin-bottom: 15px;
}

.option-group {
    flex: 1;
    min-width: 200px;
}

.option-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #555;
}

select, input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 1em;
    transition: border 0.3s;
    background: white;
}

select:focus, input[type="number"]:focus {
    outline: none;
    border-color: #667eea;
}

.checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
}

.checkbox-wrapper input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: #667eea;
}

.size-input-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
}

.size-input-wrapper input {
    flex: 1;
}

.size-input-wrapper span {
    color: #666;
    font-weight: 600;
}

.images-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
    margin-bottom: 25px;
}

.image-item {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    position: relative;
    transition: transform 0.3s;
    cursor: move;
}

.image-item:hover {
    transform: translateY(-3px);
}

.image-item.dragging {
    opacity: 0.5;
}

.image-item img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    display: block;
}

.image-info {
    padding: 10px;
    font-size: 0.85em;
}

.image-info .name {
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 4px;
}

.image-info .size {
    color: #888;
    font-size: 0.85em;
}

.remove-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: rgba(255, 50, 50, 0.9);
    color: white;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2em;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
}

.remove-btn:hover {
    transform: scale(1.1);
    background: rgba(255, 0, 0, 1);
}

.order-badge {
    position: absolute;
    top: 5px;
    left: 5px;
    background: #667eea;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 0.9em;
}

.actions {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.btn {
    padding: 14px 28px;
    border: none;
    border-radius: 10px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    flex: 1;
    min-width: 200px;
}

.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
}

.btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn-secondary {
    background: #f0f0f0;
    color: #555;
}

.btn-secondary:hover {
    background: #e0e0e0;
}

.progress {
    display: none;
    margin-top: 20px;
    background: #f0f0f0;
    border-radius: 10px;
    overflow: hidden;
    height: 30px;
    position: relative;
}

.progress-bar {
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    width: 0%;
    transition: width 0.3s;
}

.progress-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-weight: 600;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
}

.empty-state {
    text-align: center;
    padding: 30px;
    color: #aaa;
}

.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: white;
    padding: 15px 25px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    transform: translateX(400px);
    transition: transform 0.3s;
    z-index: 1000;
    border-left: 4px solid #667eea;
}

.notification.show {
    transform: translateX(0);
}

.notification.success { border-left-color: #4caf50; }
.notification.error { border-left-color: #f44336; }

@media (max-width: 600px) {
    .header h1 { font-size: 1.8em; }
    .lang-switcher { position: static; justify-content: center; margin-top: 15px; }
    .content { padding: 20px; }
    .btn { min-width: 100%; }
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 data-i18n="title">📄 PDF Генератор</h1>
        <p data-i18n="subtitle">Конвертуйте зображення у PDF з оптимізацією розміру</p>
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="uk">🇺🇦 UK</button>
            <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
        </div>
    </div>
    
    <div class="content">
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <h3 data-i18n="uploadTitle">Завантажте зображення</h3>
            <p data-i18n="uploadDesc">Натисніть або перетягніть файли сюди (JPG, PNG, WebP)</p>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>
        
        <div class="options">
            <h3 data-i18n="optionsTitle">⚙️ Налаштування</h3>
            
            <div class="option-row">
                <div class="option-group">
                    <label data-i18n="orientationLabel">Орієнтація сторінки</label>
                    <select id="orientation">
                        <option value="portrait" data-i18n="portrait">Вертикальна</option>
                        <option value="landscape" data-i18n="landscape">Горизонтальна</option>
                    </select>
                </div>
                
                <div class="option-group">
                    <label data-i18n="pageSizeLabel">Розмір сторінки</label>
                    <select id="pageSize">
                        <option value="a4">A4</option>
                        <option value="a3">A3</option>
                        <option value="a5">A5</option>
                        <option value="letter">Letter</option>
                        <option value="legal">Legal</option>
                    </select>
                </div>
            </div>
            
            <div class="option-row">
                <div class="option-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="compressEnabled">
                        <span data-i18n="compressLabel">Стиснути зображення</span>
                    </label>
                </div>
                
                <div class="option-group">
                    <label data-i18n="targetSizeLabel">Цільовий розмір</label>
                    <div class="size-input-wrapper">
                        <input type="number" id="targetSize" value="100" min="10" max="10000">
                        <span>KB</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="imagesList" class="images-list"></div>
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
        
        <div class="actions">
            <button class="btn btn-secondary" id="clearBtn" data-i18n="clearBtn">🗑️ Очистити все</button>
            <button class="btn btn-primary" id="generateBtn" data-i18n="generateBtn">✨ Створити PDF</button>
        </div>
    </div>
</div>

<div class="notification" id="notification"></div>

<script>
const translations = {
    uk: {
        title: "📄 PDF Генератор",
        subtitle: "Конвертуйте зображення у PDF з оптимізацією розміру",
        uploadTitle: "Завантажте зображення",
        uploadDesc: "Натисніть або перетягніть файли сюди (JPG, PNG, WebP)",
        optionsTitle: "⚙️ Налаштування",
        orientationLabel: "Орієнтація сторінки",
        portrait: "Вертикальна",
        landscape: "Горизонтальна",
        pageSizeLabel: "Розмір сторінки",
        compressLabel: "Стиснути зображення",
        targetSizeLabel: "Цільовий розмір",
        clearBtn: "🗑️ Очистити все",
        generateBtn: "✨ Створити PDF",
        emptyState: "Зображень ще не додано",
        added: "Додано зображень: ",
        cleared: "Список очищено",
        pdfCreated: "PDF успішно створено!",
        compressing: "Стиснення зображень...",
        generating: "Створення PDF...",
        noImages: "Спочатку додайте зображення",
        removed: "Зображення видалено",
        invalidFile: "Невірний тип файлу"
    },
    en: {
        title: "📄 PDF Generator",
        subtitle: "Convert images to PDF with size optimization",
        uploadTitle: "Upload Images",
        uploadDesc: "Click or drag files here (JPG, PNG, WebP)",
        optionsTitle: "⚙️ Options",
        orientationLabel: "Page Orientation",
        portrait: "Portrait",
        landscape: "Landscape",
        pageSizeLabel: "Page Size",
        compressLabel: "Compress Images",
        targetSizeLabel: "Target Size",
        clearBtn: "🗑️ Clear All",
        generateBtn: "✨ Generate PDF",
        emptyState: "No images added yet",
        added: "Images added: ",
        cleared: "List cleared",
        pdfCreated: "PDF created successfully!",
        compressing: "Compressing images...",
        generating: "Generating PDF...",
        noImages: "Please add images first",
        removed: "Image removed",
        invalidFile: "Invalid file type"
    }
};

let currentLang = 'uk';
let images = [];
let draggedItem = null;

const STORAGE_KEY = 'pdfGeneratorState';

// DOM elements
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const imagesList = document.getElementById('imagesList');
const orientationSelect = document.getElementById('orientation');
const pageSizeSelect = document.getElementById('pageSize');
const compressCheck = document.getElementById('compressEnabled');
const targetSizeInput = document.getElementById('targetSize');
const generateBtn = document.getElementById('generateBtn');
const clearBtn = document.getElementById('clearBtn');
const progress = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const notification = document.getElementById('notification');

// Language switching
document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        currentLang = btn.dataset.lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyTranslations();
        saveState();
    });
});

function applyTranslations() {
    document.documentElement.lang = currentLang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (translations[currentLang][key]) {
            el.textContent = translations[currentLang][key];
        }
    });
    renderImages();
}

function showNotification(message, type = 'info') {
    notification.textContent = message;
    notification.className = 'notification ' + type;
    notification.classList.add('show');
    setTimeout(() => notification.classList.remove('show'), 3000);
}

// Upload handlers
uploadArea.addEventListener('click', () => fileInput.click());

uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('drag-over');
});

uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('drag-over');
});

uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', (e) => {
    handleFiles(e.target.files);
    fileInput.value = '';
});

async function handleFiles(files) {
    const validFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (validFiles.length === 0) {
        showNotification(translations[currentLang].invalidFile, 'error');
        return;
    }
    
    for (const file of validFiles) {
        const dataUrl = await fileToDataURL(file);
        images.push({
            id: Date.now() + Math.random(),
            name: file.name,
            size: file.size,
            dataUrl: dataUrl
        });
    }
    
    renderImages();
    saveState();
    showNotification(translations[currentLang].added + validFiles.length, 'success');
}

function fileToDataURL(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

function renderImages() {
    if (images.length === 0) {
        imagesList.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;">${translations[currentLang].emptyState}</div>`;
        generateBtn.disabled = true;
        return;
    }
    
    generateBtn.disabled = false;
    imagesList.innerHTML = images.map((img, idx) => `
        <div class="image-item" draggable="true" data-id="${img.id}">
            <div class="order-badge">${idx + 1}</div>
            <button class="remove-btn" data-id="${img.id}">×</button>
            <img src="${img.dataUrl}" alt="${img.name}">
            <div class="image-info">
                <div class="name" title="${img.name}">${img.name}</div>
                <div class="size">${formatSize(img.size)}</div>
            </div>
        </div>
    `).join('');
    
    // Attach drag and remove handlers
    document.querySelectorAll('.image-item').forEach(item => {
        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('drop', handleDrop);
        item.addEventListener('dragend', handleDragEnd);
    });
    
    document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = parseFloat(btn.dataset.id);
            images = images.filter(img => img.id !== id);
            renderImages();
            saveState();
            showNotification(translations[currentLang].removed);
        });
    });
}

function handleDragStart(e) {
    draggedItem = this;
    this.classList.add('dragging');
}

function handleDragOver(e) {
    e.preventDefault();
}

function handleDrop(e) {
    e.preventDefault();
    if (this === draggedItem) return;
    
    const draggedId = parseFloat(draggedItem.dataset.id);
    const targetId = parseFloat(this.dataset.id);
    
    const draggedIndex = images.findIndex(i => i.id === draggedId);
    const targetIndex = images.findIndex(i => i.id === targetId);
    
    const [removed] = images.splice(draggedIndex, 1);
    images.splice(targetIndex, 0, removed);
    
    renderImages();
    saveState();
}

function handleDragEnd() {
    this.classList.remove('dragging');
}

// Image compression
async function compressImage(dataUrl, targetSizeKB) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            let width = img.width;
            let height = img.height;
            let quality = 0.92;
            let scale = 1;
            
            const targetBytes = targetSizeKB * 1024;
            
            const tryCompress = () => {
                canvas.width = width * scale;
                canvas.height = height * scale;
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                return canvas.toDataURL('image/jpeg', quality);
            };
            
            let result = tryCompress();
            let resultSize = Math.ceil((result.length - 'data:image/jpeg;base64,'.length) * 3 / 4);
            
            // Iterative compression
            let iterations = 0;
            while (resultSize > targetBytes && iterations < 20) {
                if (quality > 0.3) {
                    quality -= 0.08;
                } else {
                    scale *= 0.9;
                    quality = 0.7;
                }
                result = tryCompress();
                resultSize = Math.ceil((result.length - 'data:image/jpeg;base64,'.length) * 3 / 4);
                iterations++;
            }
            
            resolve({ dataUrl: result, width: canvas.width, height: canvas.height });
        };
        img.src = dataUrl;
    });
}

function getImageDimensions(dataUrl) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve({ width: img.width, height: img.height });
        img.src = dataUrl;
    });
}

// PDF generation
generateBtn.addEventListener('click', async () => {
    if (images.length === 0) {
        showNotification(translations[currentLang].noImages, 'error');
        return;
    }
    
    progress.style.display = 'block';
    generateBtn.disabled = true;
    
    try {
        const { jsPDF } = window.jspdf;
        const orientation = orientationSelect.value;
        const pageSize = pageSizeSelect.value;
        const compress = compressCheck.checked;
        const targetKB = parseInt(targetSizeInput.value) || 100;
        
        const pdf = new jsPDF({
            orientation: orientation,
            unit: 'mm',
            format: pageSize
        });
        
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const margin = 10;
        
        for (let i = 0; i < images.length; i++) {
            const img = images[i];
            
            progressText.textContent = `${compress ? translations[currentLang].compressing : translations[currentLang].generating} ${i + 1}/${images.length}`;
            progressBar.style.width = ((i / images.length) * 100) + '%';
            
            let imgData = img.dataUrl;
            let dimensions;
            
            if (compress) {
                const compressed = await compressImage(img.dataUrl, targetKB);
                imgData = compressed.dataUrl;
                dimensions = { width: compressed.width, height: compressed.height };
            } else {
                dimensions = await getImageDimensions(img.dataUrl);
            }
            
            // Calculate fit
            const maxWidth = pageWidth - margin * 2;
            const maxHeight = pageHeight - margin * 2;
            const ratio = Math.min(maxWidth / dimensions.width, maxHeight / dimensions.height);
            const finalWidth = dimensions.width * ratio;
            const finalHeight = dimensions.height * ratio;
            const x = (pageWidth - finalWidth) / 2;
            const y = (pageHeight - finalHeight) / 2;
            
            if (i > 0) pdf.addPage(pageSize, orientation);
            pdf.addImage(imgData, 'JPEG', x, y, finalWidth, finalHeight);
            
            await new Promise(r => setTimeout(r, 10));
        }
        
        progressBar.style.width = '100%';
        progressText.textContent = '100%';
        
        pdf.save('generated_' + Date.now() + '.pdf');
        
        showNotification(translations[currentLang].pdfCreated, 'success');
        
        setTimeout(() => {
            progress.style.display = 'none';
            progressBar.style.width = '0%';
            progressText.textContent = '0%';
        }, 1000);
    } catch (error) {
        console.error(error);
        showNotification('Error: ' + error.message, 'error');
        progress.style.display = 'none';
    } finally {
        generateBtn.disabled = false;
    }
});

clearBtn.addEventListener('click', () => {
    if (images.length === 0) return;
    if (confirm(currentLang === 'uk' ? 'Очистити всі зображення?' : 'Clear all images?')) {
        images = [];
        renderImages();
        saveState();
        showNotification(translations[currentLang].cleared);
    }
});

// Save settings on change
[orientationSelect, pageSizeSelect, compressCheck, targetSizeInput].forEach(el => {
    el.addEventListener('change', saveState);
});

// State management
function saveState() {
    const state = {
        lang: currentLang,
        images: images,
        orientation: orientationSelect.value,
        pageSize: pageSizeSelect.value,
        compress: compressCheck.checked,
        targetSize: targetSizeInput.value
    };
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch(e) {
        console.warn('Failed to save state (storage may be full)');
    }
}

function loadState() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        
        const state = JSON.parse(saved);
        currentLang = state.lang || 'uk';
        images = state.images || [];
        orientationSelect.value = state.orientation || 'portrait';
        pageSizeSelect.value = state.pageSize || 'a4';
        compressCheck.checked = state.compress || false;
        targetSizeInput.value = state.targetSize || 100;
        
        document.querySelectorAll('.lang-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.lang === currentLang);
        });
    } catch (e) {
        console.warn('Failed to load state');
    }
}

// Initialize
loadState();
applyTranslations();
renderImages();
</script>
</body>
</html>
