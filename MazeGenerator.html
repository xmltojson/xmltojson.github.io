<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Maze Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0c0c1d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e0e0ff;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            margin-top: 15px;
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff2d95);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 12px 0;
            justify-content: center;
            align-items: center;
            padding: 0 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            padding: 7px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        label {
            font-size: 0.82rem;
            color: #a0a0cc;
            white-space: nowrap;
        }

        select, input[type="range"] {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #e0e0ff;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.82rem;
            outline: none;
        }

        select:focus, input[type="range"]:focus {
            border-color: #7b2ff7;
        }

        select option {
            background: #1a1a3e;
            color: #e0e0ff;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 90px;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            padding: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(123, 47, 247, 0.6);
        }

        button {
            padding: 7px 16px;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn-generate {
            background: linear-gradient(135deg, #00d4ff, #0088cc);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5); }

        .btn-solve {
            background: linear-gradient(135deg, #7b2ff7, #5a1fd0);
            color: #fff;
            box-shadow: 0 4px 15px rgba(123, 47, 247, 0.3);
        }
        .btn-solve:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(123, 47, 247, 0.5); }

        .btn-auto {
            background: linear-gradient(135deg, #ff9500, #cc7700);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.3);
        }
        .btn-auto:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 149, 0, 0.5); }
        .btn-auto.active {
            background: linear-gradient(135deg, #ff4444, #cc2222);
            animation: pulse-auto 1.5s infinite;
        }

        @keyframes pulse-auto {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 68, 68, 0.5); }
            50% { box-shadow: 0 4px 25px rgba(255, 68, 68, 0.8); }
        }

        .btn-manual {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #0a0a1a;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }
        .btn-manual:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5); }
        .btn-manual.active {
            background: linear-gradient(135deg, #ff9500, #cc7700);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.5);
            animation: pulse-manual 1.5s infinite;
        }

        @keyframes pulse-manual {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 149, 0, 0.5); }
            50% { box-shadow: 0 4px 25px rgba(255, 149, 0, 0.8); }
        }

        .btn-reset {
            background: linear-gradient(135deg, #ff2d95, #cc1a70);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 45, 149, 0.3);
        }
        .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 45, 149, 0.5); }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .canvas-wrapper {
            position: relative;
            margin: 8px;
            width: calc(100vw - 30px);
            max-width: 700px;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(123, 47, 247, 0.1);
            border: 2px solid rgba(255,255,255,0.1);
            touch-action: none;
            cursor: grab;
        }

        .canvas-wrapper:active {
            cursor: grabbing;
        }

        .canvas-inner {
            transform-origin: 0 0;
            transition: none;
        }

        canvas#mazeCanvas {
            display: block;
            background: #0a0a1a;
        }

        .zoom-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .zoom-controls button {
            padding: 5px 10px;
            font-size: 1rem;
            min-width: 34px;
            background: rgba(255,255,255,0.1);
            color: #e0e0ff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
        }

        .zoom-controls button:hover {
            background: rgba(255,255,255,0.2);
        }

        .zoom-level {
            font-size: 0.78rem;
            color: #7b2ff7;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        .status-bar {
            display: flex;
            gap: 15px;
            margin: 8px 0 15px;
            font-size: 0.8rem;
            color: #a0a0cc;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 10px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-start { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .dot-end { background: #ff2d95; box-shadow: 0 0 8px #ff2d95; }
        .dot-visited { background: rgba(123, 47, 247, 0.6); }
        .dot-path { background: #ffd700; box-shadow: 0 0 8px #ffd700; }
        .dot-current { background: #00d4ff; box-shadow: 0 0 8px #00d4ff; }
        .dot-player { background: #00ff88; box-shadow: 0 0 10px #00ff88; }

        .speed-value {
            min-width: 26px;
            text-align: center;
            font-weight: 600;
            color: #7b2ff7;
        }

        .manual-hint {
            font-size: 0.78rem;
            color: #ff9500;
            text-align: center;
            margin-top: -4px;
            margin-bottom: 4px;
            min-height: 1.2em;
        }

        .timer-display {
            font-size: 0.85rem;
            color: #00d4ff;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: linear-gradient(145deg, #1a1a3e, #0c0c2d);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 40px 50px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 80px rgba(123, 47, 247, 0.2);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.7) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-emoji {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal h2 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #ffd700, #ff9500, #ff2d95);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .modal-stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .modal-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .modal-stat-label {
            font-size: 0.9rem;
            color: #a0a0cc;
        }

        .modal-stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffd700;
            font-variant-numeric: tabular-nums;
        }

        .modal-stat-value.time-val { color: #00d4ff; }
        .modal-stat-value.steps-val { color: #00ff88; }
        .modal-stat-value.size-val { color: #7b2ff7; }

        .btn-modal-close {
            padding: 12px 40px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #ffd700, #ff9500);
            color: #0a0a1a;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-modal-close:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6);
        }

        #confettiCanvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 1001;
        }

        .auto-progress {
            width: 100%;
            max-width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 0 auto 4px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .auto-progress.visible {
            opacity: 1;
        }

        .auto-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff9500, #ff2d95);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.3rem; margin-top: 10px; }
            .controls { gap: 6px; }
            .control-group { padding: 5px 8px; }
            button { padding: 6px 11px; font-size: 0.78rem; }
            .modal { padding: 30px 25px; }
            .modal h2 { font-size: 1.4rem; }
            .modal-emoji { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <h1>🏰 The Maze Generator</h1>

    <div class="controls">
        <div class="control-group">
            <label for="sizeSelect">Size:</label>
            <select id="sizeSelect">
                <option value="10">10×10</option>
                <option value="15">15×15</option>
                <option value="20" selected>20×20</option>
                <option value="30">30×30</option>
                <option value="40">40×40</option>
                <option value="50">50×50</option>
            </select>
        </div>

        <div class="control-group">
            <label for="algoSelect">AI Solver:</label>
            <select id="algoSelect">
                <option value="dfs">DFS</option>
                <option value="bfs">BFS</option>
                <option value="astar">A*</option>
            </select>
        </div>

        <div class="control-group">
            <label for="speedRange">Speed:</label>
            <input type="range" id="speedRange" min="1" max="100" value="50">
            <span class="speed-value" id="speedValue">50</span>
        </div>

        <div class="control-group zoom-controls">
            <label>Zoom:</label>
            <button id="btnZoomOut">−</button>
            <span class="zoom-level" id="zoomLevel">100%</span>
            <button id="btnZoomIn">+</button>
            <button id="btnZoomFit">Fit</button>
        </div>

        <button class="btn-generate" id="btnGenerate">🔄 Generate</button>
        <button class="btn-solve" id="btnSolve">🤖 AI Solve</button>
        <button class="btn-auto" id="btnAuto">🔁 Auto Demo</button>
        <button class="btn-manual" id="btnManual">🎮 Play</button>
        <button class="btn-reset" id="btnReset">🗑️ Clear</button>
    </div>

    <div class="manual-hint" id="manualHint"></div>
    <div class="auto-progress" id="autoProgress"><div class="auto-progress-bar" id="autoProgressBar"></div></div>

    <div class="canvas-wrapper" id="canvasWrapper">
        <div class="canvas-inner" id="canvasInner">
            <canvas id="mazeCanvas"></canvas>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-item"><div class="status-dot dot-start"></div> Start</div>
        <div class="status-item"><div class="status-dot dot-end"></div> End</div>
        <div class="status-item"><div class="status-dot dot-player"></div> Player</div>
        <div class="status-item"><div class="status-dot dot-visited"></div> Visited</div>
        <div class="status-item"><div class="status-dot dot-current"></div> AI Current</div>
        <div class="status-item"><div class="status-dot dot-path"></div> Solution</div>
        <div class="status-item timer-display" id="timerDisplay"></div>
        <div class="status-item" id="statusText">Ready</div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-emoji">🎉🏆🎉</div>
            <h2>Congratulations!</h2>
            <div class="modal-stats">
                <div class="modal-stat">
                    <span class="modal-stat-label">⏱️ Time</span>
                    <span class="modal-stat-value time-val" id="modalTime">--</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-label">👣 Steps</span>
                    <span class="modal-stat-value steps-val" id="modalSteps">--</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-label">📐 Path Length</span>
                    <span class="modal-stat-value" id="modalPathLen">--</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-label">📏 Maze Size</span>
                    <span class="modal-stat-value size-val" id="modalSize">--</span>
                </div>
            </div>
            <button class="btn-modal-close" id="btnModalClose">🎮 Play Again</button>
        </div>
    </div>

    <canvas id="confettiCanvas"></canvas>

    <script>
    (() => {
        "use strict";

        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const canvasInner = document.getElementById('canvasInner');
        const sizeSelect = document.getElementById('sizeSelect');
        const algoSelect = document.getElementById('algoSelect');
        const speedRange = document.getElementById('speedRange');
        const speedValueEl = document.getElementById('speedValue');
        const btnGenerate = document.getElementById('btnGenerate');
        const btnSolve = document.getElementById('btnSolve');
        const btnAuto = document.getElementById('btnAuto');
        const btnManual = document.getElementById('btnManual');
        const btnReset = document.getElementById('btnReset');
        const btnZoomIn = document.getElementById('btnZoomIn');
        const btnZoomOut = document.getElementById('btnZoomOut');
        const btnZoomFit = document.getElementById('btnZoomFit');
        const zoomLevelEl = document.getElementById('zoomLevel');
        const statusText = document.getElementById('statusText');
        const manualHint = document.getElementById('manualHint');
        const timerDisplay = document.getElementById('timerDisplay');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTime = document.getElementById('modalTime');
        const modalSteps = document.getElementById('modalSteps');
        const modalPathLen = document.getElementById('modalPathLen');
        const modalSize = document.getElementById('modalSize');
        const btnModalClose = document.getElementById('btnModalClose');
        const confettiCanvas = document.getElementById('confettiCanvas');
        const confettiCtx = confettiCanvas.getContext('2d');
        const autoProgress = document.getElementById('autoProgress');
        const autoProgressBar = document.getElementById('autoProgressBar');

        let maze = null;
        let rows = 20, cols = 20;
        let cellSize = 20, wallWidth = 2;
        let animating = false;
        let solveTimeoutId = null;

        // Zoom & Pan
        let zoomScale = 1;
        let panX = 0, panY = 0;
        let isPanning = false;
        let panStartX = 0, panStartY = 0;
        let panStartPanX = 0, panStartPanY = 0;
        let pinchStartDist = 0;
        let pinchStartZoom = 1;

        // Manual
        let manualMode = false;
        let playerRow = 0, playerCol = 0;
        let playerPath = [];
        let playerSteps = 0;
        let manualStartTime = null;
        let timerIntervalId = null;
        let manualFinished = false;

        // Touch
        let touchStartX = 0, touchStartY = 0, touchStartTimeMs = 0;
        let lastTouchCount = 0;

        // Confetti
        let confettiPieces = [];
        let confettiAnimId = null;

        // Auto demo
        let autoMode = false;
        const autoSizes = [10, 15, 20, 30, 40, 50];
        let autoSizeIndex = 0;
        let autoDelayId = null;
        let autoProgressId = null;

        const createCell = () => ({
            top: true, right: true, bottom: true, left: true,
            visited: false, solveVisited: false, onPath: false,
            current: false, playerVisited: false, playerPath: false
        });

        const createGrid = (r, c) => {
            const grid = [];
            for (let i = 0; i < r; i++) {
                grid[i] = [];
                for (let j = 0; j < c; j++) grid[i][j] = createCell();
            }
            return grid;
        };

        const generateMazeGrid = (r, c) => {
            const grid = createGrid(r, c);
            const stack = [[0, 0]];
            grid[0][0].visited = true;
            while (stack.length > 0) {
                const [cr, cc] = stack[stack.length - 1];
                const neighbors = [];
                if (cr > 0 && !grid[cr-1][cc].visited) neighbors.push([cr-1, cc, 'top']);
                if (cc < c-1 && !grid[cr][cc+1].visited) neighbors.push([cr, cc+1, 'right']);
                if (cr < r-1 && !grid[cr+1][cc].visited) neighbors.push([cr+1, cc, 'bottom']);
                if (cc > 0 && !grid[cr][cc-1].visited) neighbors.push([cr, cc-1, 'left']);
                if (neighbors.length > 0) {
                    const [nr, nc, dir] = neighbors[Math.floor(Math.random() * neighbors.length)];
                    if (dir === 'top')    { grid[cr][cc].top = false; grid[nr][nc].bottom = false; }
                    if (dir === 'right')  { grid[cr][cc].right = false; grid[nr][nc].left = false; }
                    if (dir === 'bottom') { grid[cr][cc].bottom = false; grid[nr][nc].top = false; }
                    if (dir === 'left')   { grid[cr][cc].left = false; grid[nr][nc].right = false; }
                    grid[nr][nc].visited = true;
                    stack.push([nr, nc]);
                } else stack.pop();
            }
            for (let i = 0; i < r; i++)
                for (let j = 0; j < c; j++) grid[i][j].visited = false;
            return grid;
        };

        const calculateDimensions = () => {
            const maxW = 2000;
            const maxH = 2000;
            cellSize = Math.floor(Math.min(maxW / cols, maxH / rows));
            cellSize = Math.max(8, Math.min(50, cellSize));
            wallWidth = cellSize > 15 ? 2 : 1;
            canvas.width = cols * cellSize + wallWidth;
            canvas.height = rows * cellSize + wallWidth;
        };

        // ---- ZOOM & PAN ----
        const applyTransform = () => {
            canvasInner.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale})`;
            zoomLevelEl.textContent = `${Math.round(zoomScale * 100)}%`;
        };

        const clampPan = () => {
            const wrapRect = canvasWrapper.getBoundingClientRect();
            const cw = canvas.width * zoomScale;
            const ch = canvas.height * zoomScale;
            if (cw <= wrapRect.width) panX = (wrapRect.width - cw) / 2;
            else panX = Math.min(0, Math.max(wrapRect.width - cw, panX));
            if (ch <= wrapRect.height) panY = (wrapRect.height - ch) / 2;
            else panY = Math.min(0, Math.max(wrapRect.height - ch, panY));
        };

        const setZoom = (newZoom, centerX, centerY) => {
            const oldZoom = zoomScale;
            zoomScale = Math.max(0.2, Math.min(5, newZoom));
            if (centerX !== undefined && centerY !== undefined) {
                panX = centerX - (centerX - panX) * (zoomScale / oldZoom);
                panY = centerY - (centerY - panY) * (zoomScale / oldZoom);
            }
            clampPan();
            applyTransform();
        };

        const zoomToFit = () => {
            const wrapRect = canvasWrapper.getBoundingClientRect();
            const fitZoom = Math.min(wrapRect.width / canvas.width, wrapRect.height / canvas.height, 1);
            zoomScale = fitZoom;
            panX = 0; panY = 0;
            clampPan();
            applyTransform();
        };

        btnZoomIn.addEventListener('click', () => {
            const wr = canvasWrapper.getBoundingClientRect();
            setZoom(zoomScale * 1.25, wr.width / 2, wr.height / 2);
        });
        btnZoomOut.addEventListener('click', () => {
            const wr = canvasWrapper.getBoundingClientRect();
            setZoom(zoomScale / 1.25, wr.width / 2, wr.height / 2);
        });
        btnZoomFit.addEventListener('click', zoomToFit);

        // Mouse wheel zoom
        canvasWrapper.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvasWrapper.getBoundingClientRect();
            const cx = e.clientX - rect.left;
            const cy = e.clientY - rect.top;
            const factor = e.deltaY < 0 ? 1.1 : 0.9;
            setZoom(zoomScale * factor, cx, cy);
        }, { passive: false });

        // Mouse pan
        canvasWrapper.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            if (manualMode && !manualFinished) return; // let click handle player move
            isPanning = true;
            panStartX = e.clientX;
            panStartY = e.clientY;
            panStartPanX = panX;
            panStartPanY = panY;
        });
        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            panX = panStartPanX + (e.clientX - panStartX);
            panY = panStartPanY + (e.clientY - panStartY);
            clampPan();
            applyTransform();
        });
        window.addEventListener('mouseup', () => { isPanning = false; });

        // Touch pan & pinch zoom
        canvasWrapper.addEventListener('touchstart', (e) => {
            lastTouchCount = e.touches.length;
            if (e.touches.length === 2) {
                e.preventDefault();
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                pinchStartDist = Math.sqrt(dx * dx + dy * dy);
                pinchStartZoom = zoomScale;
                panStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                panStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                panStartPanX = panX;
                panStartPanY = panY;
            } else if (e.touches.length === 1) {
                if (manualMode && !manualFinished) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    touchStartTimeMs = Date.now();
                } else {
                    isPanning = true;
                    panStartX = e.touches[0].clientX;
                    panStartY = e.touches[0].clientY;
                    panStartPanX = panX;
                    panStartPanY = panY;
                    e.preventDefault();
                }
            }
        }, { passive: false });

        canvasWrapper.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const rect = canvasWrapper.getBoundingClientRect();
                const cx = midX - rect.left;
                const cy = midY - rect.top;
                const newZoom = pinchStartZoom * (dist / pinchStartDist);
                setZoom(newZoom, cx, cy);
                panX += (midX - panStartX);
                panY += (midY - panStartY);
                panStartX = midX;
                panStartY = midY;
                clampPan();
                applyTransform();
            } else if (e.touches.length === 1 && isPanning && !manualMode) {
                e.preventDefault();
                panX = panStartPanX + (e.touches[0].clientX - panStartX);
                panY = panStartPanY + (e.touches[0].clientY - panStartY);
                clampPan();
                applyTransform();
            }
        }, { passive: false });

        canvasWrapper.addEventListener('touchend', (e) => {
            isPanning = false;
            if (manualMode && !manualFinished && lastTouchCount === 1 && e.changedTouches.length === 1) {
                const touch = e.changedTouches[0];
                let dx = touch.clientX - touchStartX;
                let dy = touch.clientY - touchStartY;
                let dist = Math.sqrt(dx * dx + dy * dy);
                const elapsed = Date.now() - touchStartTimeMs;

                if (dist < 15 && elapsed < 300) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const tapX = (touch.clientX - rect.left) * scaleX;
                    const tapY = (touch.clientY - rect.top) * scaleY;
                    const tapRow = Math.floor(tapY / cellSize);
                    const tapCol = Math.floor(tapX / cellSize);
                    const tdr = tapRow - playerRow;
                    const tdc = tapCol - playerCol;
                    if (Math.abs(tdr) + Math.abs(tdc) === 1) {
                        movePlayer(tdr, tdc);
                        return;
                    }
                    dx = tapX - (playerCol * cellSize + cellSize / 2);
                    dy = tapY - (playerRow * cellSize + cellSize / 2);
                    dist = Math.sqrt(dx * dx + dy * dy);
                }

                if (dist >= 20) {
                    if (Math.abs(dx) > Math.abs(dy)) movePlayer(0, dx > 0 ? 1 : -1);
                    else movePlayer(dy > 0 ? 1 : -1, 0);
                }
            }
            lastTouchCount = e.touches.length;
        }, { passive: false });

        // ---- DRAWING ----
        const drawMaze = () => {
            if (!maze || maze.length !== rows || !maze[0] || maze[0].length !== cols) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const endR = rows - 1, endC = cols - 1;

            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const x = j * cellSize, y = i * cellSize;
                    const cell = maze[i][j];
                    const isStart = (i === 0 && j === 0);
                    const isEnd = (i === endR && j === endC);
                    const isPlayer = (manualMode && !manualFinished && i === playerRow && j === playerCol);

                    if (isPlayer && !isEnd) {
                        const grd = ctx.createRadialGradient(x+cellSize/2, y+cellSize/2, 0, x+cellSize/2, y+cellSize/2, cellSize*0.7);
                        grd.addColorStop(0, 'rgba(0,255,136,0.6)');
                        grd.addColorStop(1, 'rgba(0,255,136,0)');
                        ctx.fillStyle = grd;
                        ctx.fillRect(x, y, cellSize, cellSize);
                    } else if (isStart && !isPlayer) {
                        ctx.fillStyle = 'rgba(0,255,136,0.2)';
                        ctx.fillRect(x+wallWidth, y+wallWidth, cellSize-wallWidth, cellSize-wallWidth);
                        const grd = ctx.createRadialGradient(x+cellSize/2, y+cellSize/2, 0, x+cellSize/2, y+cellSize/2, cellSize/2);
                        grd.addColorStop(0, 'rgba(0,255,136,0.4)');
                        grd.addColorStop(1, 'rgba(0,255,136,0)');
                        ctx.fillStyle = grd;
                        ctx.fillRect(x, y, cellSize, cellSize);
                    }

                    if (isEnd) {
                        ctx.fillStyle = 'rgba(255,45,149,0.25)';
                        ctx.fillRect(x+wallWidth, y+wallWidth, cellSize-wallWidth, cellSize-wallWidth);
                        const grd = ctx.createRadialGradient(x+cellSize/2, y+cellSize/2, 0, x+cellSize/2, y+cellSize/2, cellSize/2);
                        grd.addColorStop(0, 'rgba(255,45,149,0.45)');
                        grd.addColorStop(1, 'rgba(255,45,149,0)');
                        ctx.fillStyle = grd;
                        ctx.fillRect(x, y, cellSize, cellSize);
                    }

                    if (!isPlayer && !isStart && !isEnd) {
                        if (cell.playerPath) {
                            ctx.fillStyle = 'rgba(0,255,136,0.12)';
                            ctx.fillRect(x+wallWidth, y+wallWidth, cellSize-wallWidth, cellSize-wallWidth);
                        } else if (cell.onPath) {
                            ctx.fillStyle = 'rgba(255,215,0,0.3)';
                            ctx.fillRect(x+wallWidth, y+wallWidth, cellSize-wallWidth, cellSize-wallWidth);
                        } else if (cell.current) {
                            ctx.fillStyle = 'rgba(0,212,255,0.35)';
                            ctx.fillRect(x+wallWidth, y+wallWidth, cellSize-wallWidth, cellSize-wallWidth);
                        } else if (cell.solveVisited) {
                            ctx.fillStyle = 'rgba(123,47,247,0.12)';
                            ctx.fillRect(x+wallWidth, y+wallWidth, cellSize-wallWidth, cellSize-wallWidth);
                        }
                    }

                    if (cell.playerPath && cellSize > 6 && !isPlayer) {
                        ctx.fillStyle = 'rgba(0,255,136,0.5)';
                        ctx.beginPath();
                        ctx.arc(x+cellSize/2, y+cellSize/2, Math.max(cellSize*0.12,1.5), 0, Math.PI*2);
                        ctx.fill();
                    }
                    if (cell.onPath && !cell.playerPath && cellSize > 8) {
                        ctx.fillStyle = 'rgba(255,215,0,0.8)';
                        ctx.beginPath();
                        ctx.arc(x+cellSize/2, y+cellSize/2, Math.max(cellSize*0.2,2), 0, Math.PI*2);
                        ctx.fill();
                    }
                    if (cell.current && cellSize > 8) {
                        ctx.fillStyle = 'rgba(0,212,255,0.9)';
                        ctx.beginPath();
                        ctx.arc(x+cellSize/2, y+cellSize/2, Math.max(cellSize*0.25,2), 0, Math.PI*2);
                        ctx.fill();
                    }

                    ctx.strokeStyle = '#2a2a5a';
                    ctx.lineWidth = wallWidth;
                    ctx.lineCap = 'round';
                    if (cell.top)    { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+cellSize,y); ctx.stroke(); }
                    if (cell.right)  { ctx.beginPath(); ctx.moveTo(x+cellSize,y); ctx.lineTo(x+cellSize,y+cellSize); ctx.stroke(); }
                    if (cell.bottom) { ctx.beginPath(); ctx.moveTo(x,y+cellSize); ctx.lineTo(x+cellSize,y+cellSize); ctx.stroke(); }
                    if (cell.left)   { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+cellSize); ctx.stroke(); }
                }
            }

            if (manualMode && playerPath.length > 1 && cellSize > 6) {
                ctx.strokeStyle = 'rgba(0,255,136,0.35)';
                ctx.lineWidth = Math.max(cellSize*0.15,1.5);
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(playerPath[0].c*cellSize+cellSize/2, playerPath[0].r*cellSize+cellSize/2);
                for (let k = 1; k < playerPath.length; k++)
                    ctx.lineTo(playerPath[k].c*cellSize+cellSize/2, playerPath[k].r*cellSize+cellSize/2);
                ctx.stroke();
            }

            if (cellSize >= 10 && !(manualMode && !manualFinished && playerRow === 0 && playerCol === 0)) {
                ctx.fillStyle = '#00ff88';
                ctx.beginPath();
                ctx.moveTo(cellSize*0.3, cellSize*0.25);
                ctx.lineTo(cellSize*0.75, cellSize*0.5);
                ctx.lineTo(cellSize*0.3, cellSize*0.75);
                ctx.closePath();
                ctx.fill();
            }

            if (cellSize >= 10) {
                const ex = (cols-1)*cellSize+cellSize*0.5, ey = (rows-1)*cellSize+cellSize*0.5;
                ctx.fillStyle = '#ff2d95';
                ctx.beginPath();
                for (let s = 0; s < 10; s++) {
                    const rad = (s%2===0) ? cellSize*0.32 : cellSize*0.14;
                    const angle = (s*Math.PI/5) - Math.PI/2;
                    if (s===0) ctx.moveTo(ex+rad*Math.cos(angle), ey+rad*Math.sin(angle));
                    else ctx.lineTo(ex+rad*Math.cos(angle), ey+rad*Math.sin(angle));
                }
                ctx.closePath();
                ctx.fill();
            }

            if (manualMode && !manualFinished) {
                const pcx = playerCol*cellSize+cellSize/2, pcy = playerRow*cellSize+cellSize/2, pr = cellSize*0.32;
                const grd = ctx.createRadialGradient(pcx,pcy,pr*0.3,pcx,pcy,pr*2);
                grd.addColorStop(0,'rgba(0,255,136,0.4)');
                grd.addColorStop(1,'rgba(0,255,136,0)');
                ctx.fillStyle = grd;
                ctx.beginPath(); ctx.arc(pcx,pcy,pr*2,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = '#00ff88';
                ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 12;
                ctx.beginPath(); ctx.arc(pcx,pcy,pr,0,Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                if (cellSize > 12) {
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath(); ctx.arc(pcx-pr*0.2,pcy-pr*0.2,pr*0.35,0,Math.PI*2); ctx.fill();
                }
            }
        };

        // ---- HELPERS ----
        const getNeighbors = (r, c) => {
            const n = [], cell = maze[r][c];
            if (!cell.top && r > 0) n.push([r-1,c]);
            if (!cell.right && c < cols-1) n.push([r,c+1]);
            if (!cell.bottom && r < rows-1) n.push([r+1,c]);
            if (!cell.left && c > 0) n.push([r,c-1]);
            return n;
        };

        const getSpeed = () => Math.max(1, Math.floor(201 - parseInt(speedRange.value,10) * 2));

        const formatTime = (ms) => {
            const totalSec = Math.floor(ms/1000), min = Math.floor(totalSec/60);
            const sec = totalSec%60, tenths = Math.floor((ms%1000)/100);
            return min > 0 ? `${min}:${sec.toString().padStart(2,'0')}.${tenths}` : `${sec}.${tenths}s`;
        };

        const clearSolveState = () => {
            if (!maze) return;
            for (let i=0;i<rows;i++) for (let j=0;j<cols;j++) {
                maze[i][j].solveVisited=false; maze[i][j].onPath=false; maze[i][j].current=false;
            }
        };

        const clearPlayerState = () => {
            if (maze) for (let i=0;i<rows;i++) for (let j=0;j<cols;j++) {
                maze[i][j].playerVisited=false; maze[i][j].playerPath=false;
            }
            playerPath=[]; playerSteps=0; playerRow=0; playerCol=0;
            manualStartTime=null; manualFinished=false;
            if (timerIntervalId!==null) { clearInterval(timerIntervalId); timerIntervalId=null; }
            timerDisplay.textContent='';
        };

        const clearAllCurrentFlags = () => {
            if (!maze) return;
            for (let i=0;i<rows;i++) for (let j=0;j<cols;j++) maze[i][j].current=false;
        };

        const updateButtons = () => {
            btnGenerate.disabled = animating || autoMode;
            btnSolve.disabled = animating || !maze || manualMode || autoMode;
            btnManual.disabled = animating || !maze || autoMode;
            btnReset.disabled = false;
            btnAuto.disabled = manualMode;
        };

        // ---- MANUAL ----
        const startTimer = () => {
            if (timerIntervalId!==null) clearInterval(timerIntervalId);
            timerIntervalId = setInterval(() => {
                if (manualStartTime && manualMode && !manualFinished)
                    timerDisplay.textContent = '⏱️ ' + formatTime(Date.now() - manualStartTime);
            }, 100);
        };

        const startManualMode = () => {
            if (!maze || animating) return;
            clearSolveState(); clearPlayerState();
            manualMode=true; manualFinished=false;
            playerRow=0; playerCol=0;
            playerPath=[{r:0,c:0}]; playerSteps=0;
            maze[0][0].playerVisited=true; maze[0][0].playerPath=true;
            manualStartTime=Date.now();
            btnManual.classList.add('active');
            btnManual.textContent='🎮 Playing...';
            manualHint.textContent='⌨️ Arrow keys / WASD / Swipe to move • Reach the ⭐ star!';
            statusText.textContent='🎮 Manual mode — Go!';
            startTimer(); drawMaze(); saveState(); updateButtons();
        };

        const stopManualMode = () => {
            manualMode=false; manualFinished=false;
            if (timerIntervalId!==null) { clearInterval(timerIntervalId); timerIntervalId=null; }
            btnManual.classList.remove('active');
            btnManual.textContent='🎮 Play';
            manualHint.textContent=''; timerDisplay.textContent='';
            updateButtons();
        };

        const movePlayer = (dr, dc) => {
            if (!manualMode || manualFinished || !maze) return;
            const nr = playerRow+dr, nc = playerCol+dc;
            if (nr<0||nr>=rows||nc<0||nc>=cols) return;
            const cell = maze[playerRow][playerCol];
            if (dr===-1 && cell.top) return;
            if (dr===1 && cell.bottom) return;
            if (dc===-1 && cell.left) return;
            if (dc===1 && cell.right) return;
            playerRow=nr; playerCol=nc; playerSteps++;
            if (playerPath.length>=2) {
                const prev = playerPath[playerPath.length-2];
                if (prev.r===nr && prev.c===nc) {
                    const removed = playerPath.pop();
                    maze[removed.r][removed.c].playerPath=false;
                } else {
                    playerPath.push({r:nr,c:nc});
                    maze[nr][nc].playerPath=true;
                }
            } else { playerPath.push({r:nr,c:nc}); maze[nr][nc].playerPath=true; }
            maze[nr][nc].playerVisited=true;
            drawMaze(); saveState();
            if (nr===rows-1 && nc===cols-1) {
                manualFinished=true;
                if (timerIntervalId!==null) { clearInterval(timerIntervalId); timerIntervalId=null; }
                const elapsed = Date.now()-manualStartTime;
                timerDisplay.textContent='⏱️ '+formatTime(elapsed);
                statusText.textContent='🏆 You solved it!';
                setTimeout(()=>showCongratulations(elapsed,playerSteps,playerPath.length),350);
            }
        };

        // ---- CONGRATULATIONS ----
        const showCongratulations = (timeMs, steps, pathLength) => {
            modalTime.textContent=formatTime(timeMs);
            modalSteps.textContent=String(steps);
            modalPathLen.textContent=pathLength+' cells';
            modalSize.textContent=`${rows}×${cols}`;
            modalOverlay.classList.add('show');
            launchConfetti();
        };

        btnModalClose.addEventListener('click', () => {
            modalOverlay.classList.remove('show'); stopConfetti();
            stopManualMode(); clearPlayerState(); clearSolveState();
            rows=parseInt(sizeSelect.value,10); cols=rows;
            calculateDimensions(); maze=generateMazeGrid(rows,cols);
            drawMaze(); zoomToFit(); saveState();
            statusText.textContent=`✅ New ${rows}×${cols} maze generated`;
            updateButtons();
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target===modalOverlay) { modalOverlay.classList.remove('show'); stopConfetti(); }
        });

        // ---- CONFETTI ----
        const resizeConfetti = () => {
            confettiCanvas.width=window.innerWidth; confettiCanvas.height=window.innerHeight;
        };

        const launchConfetti = () => {
            resizeConfetti(); confettiPieces=[];
            const colors=['#ffd700','#ff2d95','#00d4ff','#7b2ff7','#00ff88','#ff9500','#ff4444','#44ff44'];
            for (let i=0;i<150;i++) confettiPieces.push({
                x:Math.random()*confettiCanvas.width,
                y:Math.random()*confettiCanvas.height-confettiCanvas.height,
                w:Math.random()*10+5, h:Math.random()*6+3,
                color:colors[Math.floor(Math.random()*colors.length)],
                vx:(Math.random()-0.5)*4, vy:Math.random()*3+2,
                rot:Math.random()*360, rotSpeed:(Math.random()-0.5)*10, opacity:1
            });
            animateConfetti();
        };

        const animateConfetti = () => {
            confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
            let alive=false;
            for (const p of confettiPieces) {
                p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.rot+=p.rotSpeed;
                if (p.y>confettiCanvas.height+50) p.opacity-=0.02;
                if (p.opacity<=0) continue;
                alive=true;
                confettiCtx.save();
                confettiCtx.translate(p.x,p.y);
                confettiCtx.rotate(p.rot*Math.PI/180);
                confettiCtx.globalAlpha=Math.max(0,p.opacity);
                confettiCtx.fillStyle=p.color;
                confettiCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
                confettiCtx.restore();
            }
            if (alive) confettiAnimId=requestAnimationFrame(animateConfetti);
        };

        const stopConfetti = () => {
            if (confettiAnimId!==null) { cancelAnimationFrame(confettiAnimId); confettiAnimId=null; }
            confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
            confettiPieces=[];
        };

        // ---- KEYBOARD ----
        document.addEventListener('keydown', (e) => {
            if (!manualMode || manualFinished) return;
            let dr=0, dc=0;
            const key=e.key.toLowerCase();
            if (key==='arrowup'||key==='w') dr=-1;
            else if (key==='arrowdown'||key==='s') dr=1;
            else if (key==='arrowleft'||key==='a') dc=-1;
            else if (key==='arrowright'||key==='d') dc=1;
            else return;
            e.preventDefault(); movePlayer(dr,dc);
        });

        // ---- MOUSE CLICK (manual mode) ----
        canvas.addEventListener('click', (e) => {
            if (!manualMode || manualFinished) return;
            const rect=canvas.getBoundingClientRect();
            const clickX=(e.clientX-rect.left)*(canvas.width/rect.width);
            const clickY=(e.clientY-rect.top)*(canvas.height/rect.height);
            const cr=Math.floor(clickY/cellSize), cc=Math.floor(clickX/cellSize);
            const dr=cr-playerRow, dc=cc-playerCol;
            if (Math.abs(dr)+Math.abs(dc)===1) movePlayer(dr,dc);
        });

        // ---- SOLVE ----
        const tracePath = (parentMap, endR, endC) => new Promise((resolve) => {
            const path=[];
            let key=`${endR},${endC}`;
            while (key!=null) {
                const p=key.split(',');
                path.unshift([parseInt(p[0],10),parseInt(p[1],10)]);
                key=parentMap[key];
            }
            let idx=0;
            const step = () => {
                if (idx>=path.length||!animating) { resolve(); return; }
                maze[path[idx][0]][path[idx][1]].onPath=true;
                drawMaze(); idx++;
                solveTimeoutId=setTimeout(step, Math.max(getSpeed()/2,5));
            };
            step();
        });

        const finishSolve = (found) => {
            if (found) statusText.textContent='✅ Path found!';
            else if (animating) statusText.textContent='❌ No path found';
            clearAllCurrentFlags(); drawMaze();
            animating=false; updateButtons(); saveState();
            if (autoMode) scheduleNextAuto();
        };

        const solveDFS = () => {
            animating=true; updateButtons();
            statusText.textContent='🔍 Solving with DFS...';
            const stack=[[0,0]], parentMap={'0,0':null};
            const endR=rows-1, endC=cols-1;
            maze[0][0].solveVisited=true;
            const step = () => {
                if (!animating||stack.length===0) { finishSolve(false); return; }
                const [cr,cc]=stack.pop();
                clearAllCurrentFlags();
                maze[cr][cc].current=true; maze[cr][cc].solveVisited=true;
                drawMaze();
                if (cr===endR&&cc===endC) { tracePath(parentMap,endR,endC).then(()=>finishSolve(true)); return; }
                const neighbors=getNeighbors(cr,cc);
                for (let i=neighbors.length-1;i>0;i--) {
                    const j=Math.floor(Math.random()*(i+1));
                    [neighbors[i],neighbors[j]]=[neighbors[j],neighbors[i]];
                }
                for (const [nr,nc] of neighbors) {
                    if (!maze[nr][nc].solveVisited) {
                        maze[nr][nc].solveVisited=true;
                        parentMap[`${nr},${nc}`]=`${cr},${cc}`;
                        stack.push([nr,nc]);
                    }
                }
                solveTimeoutId=setTimeout(step,getSpeed());
            };
            step();
        };

        const solveBFS = () => {
            animating=true; updateButtons();
            statusText.textContent='🔍 Solving with BFS...';
            const queue=[[0,0]]; let qIdx=0;
            const parentMap={'0,0':null};
            const endR=rows-1, endC=cols-1;
            maze[0][0].solveVisited=true;
            const step = () => {
                if (!animating||qIdx>=queue.length) { finishSolve(false); return; }
                const [cr,cc]=queue[qIdx++];
                clearAllCurrentFlags(); maze[cr][cc].current=true; drawMaze();
                if (cr===endR&&cc===endC) { tracePath(parentMap,endR,endC).then(()=>finishSolve(true)); return; }
                for (const [nr,nc] of getNeighbors(cr,cc)) {
                    if (!maze[nr][nc].solveVisited) {
                        maze[nr][nc].solveVisited=true;
                        parentMap[`${nr},${nc}`]=`${cr},${cc}`;
                        queue.push([nr,nc]);
                    }
                }
                solveTimeoutId=setTimeout(step,getSpeed());
            };
            step();
        };

        const solveAStar = () => {
            animating=true; updateButtons();
            statusText.textContent='🔍 Solving with A*...';
            const endR=rows-1, endC=cols-1;
            const h=(r,c)=>Math.abs(r-endR)+Math.abs(c-endC);
            const openSet=[{r:0,c:0,g:0,f:h(0,0)}];
            const gScore={'0,0':0}, parentMap={'0,0':null}, closedSet={};
            maze[0][0].solveVisited=true;
            const step = () => {
                if (!animating||openSet.length===0) { finishSolve(false); return; }
                let bi=0;
                for (let i=1;i<openSet.length;i++) if (openSet[i].f<openSet[bi].f) bi=i;
                const cur=openSet.splice(bi,1)[0];
                const {r:cr,c:cc}=cur, key=`${cr},${cc}`;
                if (closedSet[key]) { step(); return; }
                closedSet[key]=true;
                clearAllCurrentFlags();
                maze[cr][cc].current=true; maze[cr][cc].solveVisited=true; drawMaze();
                if (cr===endR&&cc===endC) { tracePath(parentMap,endR,endC).then(()=>finishSolve(true)); return; }
                for (const [nr,nc] of getNeighbors(cr,cc)) {
                    const nk=`${nr},${nc}`;
                    if (closedSet[nk]) continue;
                    const tg=(gScore[key]??Infinity)+1;
                    if (tg<(gScore[nk]??Infinity)) {
                        gScore[nk]=tg; parentMap[nk]=key;
                        openSet.push({r:nr,c:nc,g:tg,f:tg+h(nr,nc)});
                        maze[nr][nc].solveVisited=true;
                    }
                }
                solveTimeoutId=setTimeout(step,getSpeed());
            };
            step();
        };

        const runSolve = () => {
            const algo=algoSelect.value;
            if (algo==='dfs') solveDFS();
            else if (algo==='bfs') solveBFS();
            else solveAStar();
        };

        // ---- AUTO DEMO ----
        const stopAutoMode = () => {
            autoMode=false;
            if (autoDelayId!==null) { clearTimeout(autoDelayId); autoDelayId=null; }
            if (autoProgressId!==null) { clearInterval(autoProgressId); autoProgressId=null; }
            autoProgress.classList.remove('visible');
            autoProgressBar.style.width='0%';
            btnAuto.classList.remove('active');
            btnAuto.textContent='🔁 Auto Demo';
            updateButtons();
        };

        const scheduleNextAuto = () => {
            if (!autoMode) return;
            autoSizeIndex++;
            if (autoSizeIndex >= autoSizes.length) autoSizeIndex = 0;

            const DELAY = 2000;
            const nextSize = autoSizes[autoSizeIndex];
            statusText.textContent = `⏳ Next: ${nextSize}×${nextSize} in 2s...`;

            autoProgress.classList.add('visible');
            autoProgressBar.style.width = '0%';
            const startTime = Date.now();

            if (autoProgressId !== null) clearInterval(autoProgressId);
            autoProgressId = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const pct = Math.min(100, (elapsed / DELAY) * 100);
                autoProgressBar.style.width = pct + '%';
                if (elapsed >= DELAY) {
                    clearInterval(autoProgressId);
                    autoProgressId = null;
                }
            }, 30);

            autoDelayId = setTimeout(() => {
                autoDelayId = null;
                autoProgress.classList.remove('visible');
                autoProgressBar.style.width = '0%';
                if (!autoMode) return;

                const size = autoSizes[autoSizeIndex];
                rows = size; cols = size;
                sizeSelect.value = String(size);
                calculateDimensions();
                maze = generateMazeGrid(rows, cols);
                drawMaze();
                zoomToFit();
                saveState();
                statusText.textContent = `🔁 Auto: ${rows}×${cols}`;

                // Small delay then solve
                autoDelayId = setTimeout(() => {
                    if (!autoMode) return;
                    clearSolveState();
                    drawMaze();
                    runSolve();
                }, 300);
            }, DELAY);
        };

        const startAutoMode = () => {
            if (animating) return;
            stopManualMode(); clearPlayerState();
            autoMode = true;
            autoSizeIndex = -1; // will increment to 0
            btnAuto.classList.add('active');
            btnAuto.textContent = '⏹️ Stop Demo';
            updateButtons();
            scheduleNextAuto();
        };

        // ---- SAVE / LOAD ----
        const STORAGE_KEY = 'theMazeGenState_v3';

        const saveState = () => {
            if (!maze) return;
            try {
                const md=[];
                for (let i=0;i<rows;i++) {
                    md[i]=[];
                    for (let j=0;j<cols;j++) {
                        const c=maze[i][j];
                        md[i][j]=[c.top?1:0,c.right?1:0,c.bottom?1:0,c.left?1:0,
                            c.solveVisited?1:0,c.onPath?1:0,c.current?1:0,
                            c.playerVisited?1:0,c.playerPath?1:0];
                    }
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    v:3,rows,cols,algo:algoSelect.value,speed:speedRange.value,size:sizeSelect.value,
                    mm:manualMode,mf:manualFinished,pr:playerRow,pc:playerCol,
                    pp:playerPath,ps:playerSteps,mst:manualStartTime,
                    zs:zoomScale,px:panX,py:panY,m:md
                }));
            } catch(e){}
        };

        const loadState = () => {
            try {
                const raw=localStorage.getItem(STORAGE_KEY);
                if (!raw) return false;
                const s=JSON.parse(raw);
                if (!s||s.v!==3||!s.m||!Array.isArray(s.m)) return false;
                if (s.m.length!==s.rows||!s.m[0]||s.m[0].length!==s.cols) return false;
                rows=s.rows; cols=s.cols;
                sizeSelect.value=s.size||String(rows);
                algoSelect.value=s.algo||'dfs';
                speedRange.value=s.speed||'50';
                speedValueEl.textContent=speedRange.value;
                maze=[];
                for (let i=0;i<rows;i++) {
                    maze[i]=[];
                    for (let j=0;j<cols;j++) {
                        const cell=createCell(), d=s.m[i][j];
                        cell.top=d[0]===1; cell.right=d[1]===1; cell.bottom=d[2]===1; cell.left=d[3]===1;
                        cell.solveVisited=d[4]===1; cell.onPath=d[5]===1; cell.current=d[6]===1;
                        cell.playerVisited=d[7]===1; cell.playerPath=d[8]===1;
                        maze[i][j]=cell;
                    }
                }
                if (s.mm && !s.mf) {
                    manualMode=true; manualFinished=false;
                    playerRow=s.pr||0; playerCol=s.pc||0;
                    playerSteps=s.ps||0; manualStartTime=s.mst||Date.now();
                    playerPath=Array.isArray(s.pp)&&s.pp.length>0 ? s.pp.map(p=>({r:p.r,c:p.c})) : [{r:0,c:0}];
                    btnManual.classList.add('active');
                    btnManual.textContent='🎮 Playing...';
                    manualHint.textContent='⌨️ Arrow keys / WASD / Swipe to move • Reach the ⭐ star!';
                    statusText.textContent='🎮 Manual mode — Continue!';
                    startTimer();
                } else { manualMode=false; manualFinished=false; playerPath=[]; }
                calculateDimensions();
                zoomScale=s.zs||1; panX=s.px||0; panY=s.py||0;
                clampPan(); applyTransform();
                drawMaze(); updateButtons();
                if (!manualMode) statusText.textContent='🔄 Restored from save';
                return true;
            } catch(e) { console.warn('Load failed:',e); return false; }
        };

        // ---- EVENTS ----
        btnGenerate.addEventListener('click', () => {
            if (animating||autoMode) return;
            if (solveTimeoutId!==null) { clearTimeout(solveTimeoutId); solveTimeoutId=null; }
            stopManualMode(); clearPlayerState();
            rows=parseInt(sizeSelect.value,10); cols=rows;
            calculateDimensions(); maze=generateMazeGrid(rows,cols);
            drawMaze(); zoomToFit(); saveState();
            statusText.textContent=`✅ Generated ${rows}×${cols} maze`;
            updateButtons();
        });

        btnSolve.addEventListener('click', () => {
            if (animating||!maze||manualMode||autoMode) return;
            clearSolveState(); clearPlayerState(); drawMaze();
            runSolve();
        });

        btnAuto.addEventListener('click', () => {
            if (autoMode) {
                if (animating) { animating=false; if (solveTimeoutId!==null) { clearTimeout(solveTimeoutId); solveTimeoutId=null; } }
                stopAutoMode();
                statusText.textContent='Ready';
            } else {
                startAutoMode();
            }
        });

        btnManual.addEventListener('click', () => {
            if (animating||!maze||autoMode) return;
            if (manualMode) {
                stopManualMode(); clearPlayerState(); clearSolveState();
                drawMaze(); saveState(); statusText.textContent='Ready';
            } else { clearSolveState(); startManualMode(); }
        });

        btnReset.addEventListener('click', () => {
            if (autoMode) { animating=false; if (solveTimeoutId!==null){clearTimeout(solveTimeoutId);solveTimeoutId=null;} stopAutoMode(); }
            if (animating) { animating=false; if (solveTimeoutId!==null){clearTimeout(solveTimeoutId);solveTimeoutId=null;} }
            stopManualMode();
            if (maze) { clearSolveState(); clearPlayerState(); drawMaze(); saveState(); }
            statusText.textContent='Ready'; updateButtons();
        });

        speedRange.addEventListener('input', () => { speedValueEl.textContent=speedRange.value; saveState(); });
        sizeSelect.addEventListener('change', () => saveState());
        algoSelect.addEventListener('change', () => saveState());

        const handleResize = () => {
            resizeConfetti();
            if (maze) { calculateDimensions(); drawMaze(); clampPan(); applyTransform(); }
        };
        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', () => setTimeout(handleResize, 200));

        // ---- INIT ----
        const init = () => {
            resizeConfetti();
            const loaded = loadState();
            if (!loaded) {
                rows=parseInt(sizeSelect.value,10); cols=rows;
                calculateDimensions(); maze=generateMazeGrid(rows,cols);
                drawMaze(); saveState();
                statusText.textContent=`✅ Generated ${rows}×${cols} maze`;
            }
            // Always fit on first load
            requestAnimationFrame(() => { zoomToFit(); updateButtons(); });
        };

        if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
        else requestAnimationFrame(()=>requestAnimationFrame(init));
    })();
    </script>
</body>
</html>
