<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  
  <!-- Black border rectangle -->
  <rect x="120" y="40" width="430" height="320" rx="3" ry="3" fill="black"/>
  
  <!-- Light blue inner rectangle -->
  <rect x="128" y="48" width="414" height="304" fill="#87CEFA"/>
  
  <!-- "EW" text centered inside the rectangle -->
  <text x="335" y="215" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="72" 
        fill="black" 
        text-anchor="middle" 
        dominant-baseline="middle">EW</text>
  
  <!-- "БЛАСТЕР (ДАМБА)" text on the left side, rotated vertically -->
  <text x="55" y="200" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="18" 
        fill="black" 
        text-anchor="middle" 
        dominant-baseline="middle"
        transform="rotate(-90, 55, 200)">БЛАСТЕР (ДАМБА)</text>
  
</svg>