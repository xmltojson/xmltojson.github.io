<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 ⚽</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --primary:#1a5c3a; --accent:#00d97e; --gold:#ffd700;
    --dark:#0a1f14; --card:#12352380; --text:#e8f5ee;
    --danger:#ff4d6d; --blue:#4d94ff;
  }
  body {
    font-family:'Segoe UI',system-ui,sans-serif;
    background:linear-gradient(135deg,#0a1f14 0%,#0d2818 50%,#08150d 100%);
    color:var(--text); min-height:100vh; padding-bottom:70px; background-attachment:fixed;
  }
  header {
    background:linear-gradient(120deg,var(--primary),#0d3320);
    padding:16px; text-align:center; position:sticky; top:0; z-index:100;
    box-shadow:0 4px 20px rgba(0,0,0,.5); border-bottom:2px solid var(--accent);
  }
  header h1 { font-size:1.4rem; display:flex; align-items:center; justify-content:center; gap:8px; }
  .trophy { animation:spin 4s linear infinite; display:inline-block; }
  @keyframes spin { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
  .subtitle { font-size:.6rem; color:#8fae9d; margin-top:3px; }
  .live-badge { background:var(--danger); font-size:.65rem; padding:3px 8px; border-radius:12px; margin-left:6px; animation:pulse 1.5s infinite; font-weight:bold; }
  @keyframes pulse { 50%{opacity:.5} }
  .container { max-width:600px; margin:0 auto; padding:12px; }

  .nav { position:fixed; bottom:0; left:0; right:0; display:flex; background:#0a1f14ee; backdrop-filter:blur(10px); z-index:100; border-top:1px solid #ffffff22; justify-content:space-around; }
  .nav button { flex:1; background:none; border:none; color:#8fae9d; padding:10px 4px; font-size:.62rem; cursor:pointer; transition:.2s; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .nav button .ic { font-size:1.3rem; }
  .nav button.active { color:var(--accent); }

  .tab { display:none; animation:fade .4s; }
  .tab.active { display:block; }
  @keyframes fade { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

  .card { background:var(--card); backdrop-filter:blur(6px); border-radius:16px; padding:14px; margin-bottom:12px; border:1px solid #ffffff11; box-shadow:0 4px 16px rgba(0,0,0,.3); }
  .section-title { font-size:.9rem; text-transform:uppercase; letter-spacing:1px; color:var(--accent); margin:16px 0 10px; display:flex; align-items:center; gap:6px; }

  .match { display:flex; align-items:center; justify-content:space-between; padding:12px; border-radius:12px; margin-bottom:8px; background:linear-gradient(90deg,#ffffff08,#ffffff03); border:1px solid #ffffff0d; transition:.2s; cursor:pointer; }
  .match:active { transform:scale(.98); }
  .team { display:flex; flex-direction:column; align-items:center; flex:1; gap:4px; }
  .flag { font-size:1.9rem; }
  .team-name { font-size:.72rem; font-weight:600; text-align:center; }
  .score-box { text-align:center; min-width:72px; }
  .score { font-size:1.5rem; font-weight:bold; }
  .status { font-size:.6rem; color:#8fae9d; margin-top:2px; }
  .status.live { color:var(--danger); font-weight:bold; }
  .league-tag { font-size:.55rem; color:#5a7a68; text-align:center; margin-bottom:4px; }
  .filter-bar { display:flex; gap:6px; overflow-x:auto; padding:6px 0 10px; }
  .filter-bar button { white-space:nowrap; padding:6px 14px; border-radius:20px; border:1px solid #ffffff22; background:#ffffff08; color:var(--text); font-size:.72rem; }
  .filter-bar button.active { background:var(--accent); color:#000; border-color:var(--accent); }

  .stat-row { margin-bottom:12px; }
  .stat-labels { display:flex; justify-content:space-between; font-size:.7rem; margin-bottom:4px; }
  .stat-bar { display:flex; height:8px; border-radius:4px; overflow:hidden; background:#ffffff11; }
  .stat-bar .home { background:var(--accent); }
  .stat-bar .away { background:var(--blue); }
  .events-list { margin-top:12px; }
  .event { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:.72rem; border-bottom:1px solid #ffffff08; }
  .event .min { color:var(--accent); font-weight:bold; width:36px; }
  .event .ev-ic { font-size:.9rem; }

  table { width:100%; border-collapse:collapse; font-size:.72rem; }
  th,td { padding:7px 5px; text-align:left; }
  th { color:var(--accent); font-size:.6rem; text-transform:uppercase; border-bottom:1px solid #ffffff22; }
  tr:not(:last-child) td { border-bottom:1px solid #ffffff08; }
  .rank { font-weight:bold; color:var(--gold); }
  .qualify { border-left:3px solid var(--accent); }
  td.c,th.c { text-align:center; }

  .odds { display:flex; gap:8px; margin-top:10px; }
  .odd { flex:1; text-align:center; padding:10px 4px; border-radius:10px; background:#ffffff0a; border:1px solid #ffffff15; cursor:pointer; transition:.2s; }
  .odd:active { background:var(--accent); color:#000; }
  .odd .lbl { font-size:.6rem; color:#8fae9d; }
  .odd .val { font-size:1rem; font-weight:bold; margin-top:3px; }
  .prob-bar { height:6px; border-radius:3px; margin-top:8px; overflow:hidden; display:flex; }

  .rank-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #ffffff0a; }
  .rank-num { font-weight:bold; width:26px; text-align:center; font-size:1rem; }
  .top3 { color:var(--gold); }
  .rank-pts { margin-left:auto; font-weight:bold; color:var(--accent); }
  .rank-flag { font-size:1.5rem; }
  .rank-sub { font-size:.6rem; color:#8fae9d; }

  .player-card { display:flex; align-items:center; gap:10px; padding:10px; background:#ffffff06; border-radius:12px; margin-bottom:8px; }
  .player-pos { font-size:.55rem; background:var(--primary); padding:2px 8px; border-radius:10px; }
  .player-stats { margin-left:auto; text-align:right; }

  .status-bar { font-size:.6rem; text-align:center; margin-top:8px; padding:6px; border-radius:8px; background:#ffffff08; color:var(--accent); }
  .data-source { font-size:.55rem; color:#4a6a58; text-align:center; margin:12px 0; }
  .btn-refresh { display:block; margin:8px auto; padding:8px 18px; border-radius:20px; background:var(--accent); color:#000; border:none; font-weight:bold; font-size:.75rem; }
  .back-btn { background:#ffffff11; border:none; color:var(--accent); padding:6px 12px; border-radius:8px; font-size:.7rem; margin-bottom:10px; }
</style>
</head>

</div>

  const el = document.getElementById('matchList');
  let list = MATCHES;
  if(currentFilter==='live') list = MATCHES.filter(m=>m.status==='LIVE');
  else if(currentFilter==='ft') list = MATCHES.filter(m=>m.status==='FT');
  else if(currentFilter==='sched') list = MATCHES.filter(m=>m.status==='SCHED');
  const order={LIVE:0,FT:1,SCHED:2};
  list=[...list].sort((a,b)=>order[a.status]-order[b.status]);
  el.innerHTML = list.map(m=>{
    const live = m.status==='LIVE';
    return `<div class="league-tag">${m.league}</div>
    <div class="match" onclick="showStat(${m.id})">
      <div class="team"><div class="flag">${flag(m.home)}</div><div class="team-name">${m.home}</div></div>
      <div class="score-box"><div class="score">${m.hs} <span style="color:#5a7a68">-</span> ${m.as}</div>
        <div class="status ${live?'live':''}">${live?'🔴 '+m.minute:m.minute}</div></div>
      <div class="team"><div class="flag">${flag(m.away)}</div><div class="team-name">${m.away}</div></div>
    </div>`;
  }).join('');
}
function renderFilter(){
  const opts=[['all','All'],['live','🔴 Live'],['ft','Finished'],['sched','Upcoming']];
  document.getElementById('matchFilter').innerHTML=opts.map(([k,l])=>
    `<button class="${currentFilter===k?'active':''}" onclick="currentFilter='${k}';renderFilter();renderMatches()">${l}</button>`).join('');
}

function evIcon(t){return t==='g'?'⚽':t==='y'?'🟨':t==='r'?'🟥':'🔄';}
function showStat(id){
  const m = MATCHES.find(x=>x.id===id) || MATCHES[0];
  const el = document.getElementById('statMatch');
  if(!m.stats){
    el.innerHTML=`<button class="back-btn" onclick="switchTab('scores')">← Back</button>
      <div class="league-tag">${m.league}</div>
      <div class="match"><div class="team"><div class="flag">${flag(m.home)}</div><div class="team-name">${m.home}</div></div>
      <div class="score-box"><div class="score" style="font-size:1rem">${m.minute}</div></div>
      <div class="team"><div class="flag">${flag(m.away)}</div><div class="team-name">${m.away}</div></div></div>
      <p style="text-align:center;color:#8fae9d;font-size:.75rem;margin-top:12px">Match not started — stats available after kickoff</p>`;
    switchTab('stats'); return;
  }
  const s=m.stats;
  const bar=(a,b,ca,cb)=>{const t=a+b||1;return `<div class="stat-bar"><div class="${ca}" style="width:${a/t*100}%"></div><div class="${cb}" style="width:${b/t*100}%"></div></div>`};
  const row=(la,lbl,lb,ca='home',cb='away')=>`<div class="stat-row"><div class="stat-labels"><span>${la}</span><span>${lbl}</span><span>${lb}</span></div>${bar(la,lb,ca,cb)}</div>`;
  el.innerHTML=`<button class="back-btn" onclick="switchTab('scores')">← Back</button>
    <div class="league-tag">${m.league}</div>
    <div class="match" style="margin-bottom:14px">
      <div class="team"><div class="flag">${flag(m.home)}</div><div class="team-name">${m.home}</div></div>
      <div class="score-box"><div class="score">${m.hs} - ${m.as}</div><div class="status ${m.status==='LIVE'?'live':''}">${m.status==='LIVE'?'🔴 '+m.minute:m.minute}</div></div>
      <div class="team"><div class="flag">${flag(m.away)}</div><div class="team-name">${m.away}</div></div>
    </div>
    ${row(s.poss[0]+'%','Possession',s.poss[1]+'%')}
    ${row(s.shots[0],'Shots',s.shots[1])}
    ${row(s.sot[0],'On Target',s.sot[1])}
    ${row(s.corn[0],'Corners',s.corn[1])}
    ${row(s.foul[0],'Fouls',s.foul[1])}
    ${row(s.pass[0],'Passes',s.pass[1])}
    <div class="section-title" style="margin:14px 0 6px">⚡ Match Events</div>
    <div class="events-list">
      ${(m.events||[]).sort((a,b)=>a.m-b.m).map(e=>`<div class="event">
        <span class="min">${e.m}'</span><span class="ev-ic">${evIcon(e.t)}</span>
        <span>${e.p}</span><span style="margin-left:auto;font-size:.85rem">${flag(e.team==='h'?m.home:m.away)}</span>
      </div>`).join('')}
    </div>`;
  switchTab('stats');
}

function renderPlayers(){
  document.getElementById('topScorers').innerHTML = SCORERS.map((s,i)=>`
    <div class="player-card">
      <div class="rank-num ${i<3?'top3':''}">${i+1}</div>
      <div class="rank-flag">${flag(s.team)}</div>
      <div><div style="font-weight:600">${s.name}</div><div class="rank-sub">${s.team} · ${s.games} games</div></div>
      <div class="player-stats"><div style="font-weight:bold;color:var(--accent)">⚽ ${s.goals}</div><div class="rank-sub">${(s.goals/s.games).toFixed(1)}/game</div></div>
    </div>`).join('');
  document.getElementById('topAssists').innerHTML = ASSISTS.map((s,i)=>`
    <div class="player-card">
      <div class="rank-num ${i<3?'top3':''}">${i+1}</div>
      <div class="rank-flag">${flag(s.team)}</div>
      <div><div style="font-weight:600">${s.name}</div><div class="rank-sub">${s.team} · ${s.games} games</div></div>
      <div class="player-stats"><div style="font-weight:bold;color:var(--blue)">🅰️ ${s.assists}</div></div>
    </div>`).join('');
}

function renderGroups(g='A'){
  const rows=[...GROUPS[g]].sort((a,b)=>b.p-a.p||(b.gf-b.ga)-(a.gf-a.ga));
  document.getElementById('groupSelect').innerHTML=Object.keys(GROUPS).map(k=>
    `<button class="${k===g?'active':''}" onclick="renderGroups('${k}')">Grp ${k}</button>`).join('');
  document.getElementById('groupTable').innerHTML=`
    <table><tr><th>#</th><th>Team</th><th class="c">Pl</th><th class="c">W</th><th class="c">D</th><th class="c">L</th><th class="c">GD</th><th class="c">Pts</th></tr>
    ${rows.map((r,i)=>{const gd=r.gf-r.ga;return `<tr class="${i<2?'qualify':''}">
      <td class="rank">${i+1}</td><td>${flag(r.t)} ${r.t}</td>
      <td class="c">${r.pl}</td><td class="c">${r.w}</td><td class="c">${r.d}</td><td class="c">${r.l}</td>
      <td class="c">${gd>0?'+':''}${gd}</td><td class="c" style="font-weight:bold;color:var(--accent)">${r.p}</td>
    </tr>`}).join('')}</table>
    <div style="font-size:.6rem;color:#8fae9d;margin-top:8px">🟢 Top 2 + best 8 third-placed teams advance (32 to knockouts)</div>`;
}

function renderForecast(){
  document.getElementById('forecastList').innerHTML=ODDS.map(o=>{
    const tot=1/o.h+1/o.d+1/o.a;
    const ph=(1/o.h/tot*100).toFixed(0),pd=(1/o.d/tot*100).toFixed(0),pa=(1/o.a/tot*100).toFixed(0);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:.82rem;font-weight:600">
        <span>${flag(o.home)} ${o.home}</span><span style="color:#8fae9d">vs</span><span>${o.away} ${flag(o.away)}</span></div>
      <div class="odds">
        <div class="odd"><div class="lbl">1</div><div class="val">${o.h}</div></div>
        <div class="odd"><div class="lbl">X</div><div class="val">${o.d}</div></div>
        <div class="odd"><div class="lbl">2</div><div class="val">${o.a}</div></div></div>
      <div class="prob-bar"><div style="width:${ph}%;background:var(--accent)"></div><div style="width:${pd}%;background:#8fae9d"></div><div style="width:${pa}%;background:var(--blue)"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:.6rem;margin-top:4px;color:#8fae9d"><span>${ph}%</span><span>${pd}%</span><span>${pa}%</span></div>
    </div>`;
  }).join('');
  document.getElementById('winnerOdds').innerHTML=WINNER.map((w,i)=>`
    <div class="rank-item"><div class="rank-num ${i<3?'top3':''}">${i+1}</div>
      <div class="rank-flag">${flag(w.t)}</div><div style="font-weight:600">${w.t}</div>
      <div class="rank-pts">${w.odds}x</div></div>`).join('');
}

function renderFifa(){
  document.getElementById('fifaRanking').innerHTML=FIFA.map((f,i)=>{
    const mv=f.mv==='0'?'—':(f.mv[0]==='+'?'<span style="color:var(--accent)">▲'+f.mv.slice(1)+'</span>':'<span style="color:var(--danger)">▼'+f.mv.slice(1)+'</span>');
    return `<div class="rank-item"><div class="rank-num ${i<3?'top3':''}">${i+1}</div>
      <div class="rank-flag">${flag(f.t)}</div>
      <div><div style="font-weight:600">${f.t}</div><div class="rank-sub">${mv}</div></div>
      <div class="rank-pts">${f.pts}</div></div>`;
  }).join('');
}

/* ============ NAV ============ */
function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.id===id));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  window.scrollTo(0,0);
}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

/* ============ LIVE SIMULATION ============ */
function tickLive(){
  MATCHES.forEach(m=>{
    if(m.status==='LIVE'){
      let min=parseInt(m.minute)+1;
      if(min>90){m.status='FT';m.minute='Full Time';}
      else{ m.minute=min+"'";
        if(Math.random()<0.04){
          const side=Math.random()<.5?'h':'a';
          side==='h'?m.hs++:m.as++;
          if(m.events) m.events.push({m:min,t:'g',team:side,p:'Goal!'});
        }
      }
    }
  });
  const anyLive=MATCHES.some(m=>m.status==='LIVE');
  document.getElementById('liveBadge').style.display=anyLive?'inline':'none';
  renderMatches();
}

function loadAll(){
  renderFilter(); renderMatches();
  const live=MATCHES.filter(m=>m.status==='LIVE').length;
  document.getElementById('statusBar').textContent=`✅ ${MATCHES.length} matches · ${live} live · 48 nations · Updated ${new Date().toLocaleTimeString()}`;
}

/* Init */
loadAll();
renderPlayers();
renderGroups('A');
renderForecast();
renderFifa();
setInterval(tickLive,5000);
</script>
</body>
</html>
