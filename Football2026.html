<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 ⚽</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --primary:#1a5c3a; --accent:#00d97e; --gold:#ffd700;
    --dark:#0a1f14; --card:#12352380; --text:#e8f5ee;
    --danger:#ff4d6d; --blue:#4d94ff;
  }
  body {
    font-family:'Segoe UI',system-ui,sans-serif;
    background:linear-gradient(135deg,#0a1f14 0%,#0d2818 50%,#08150d 100%);
    color:var(--text); min-height:100vh; padding-bottom:70px;
    background-attachment:fixed;
  }
  header {
    background:linear-gradient(120deg,var(--primary),#0d3320);
    padding:16px; text-align:center; position:sticky; top:0; z-index:100;
    box-shadow:0 4px 20px rgba(0,0,0,.5); border-bottom:2px solid var(--accent);
  }
  header h1 { font-size:1.4rem; display:flex; align-items:center; justify-content:center; gap:8px; }
  .trophy { animation:spin 4s linear infinite; display:inline-block; }
  @keyframes spin { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
  .live-badge {
    background:var(--danger); font-size:.65rem; padding:3px 8px; border-radius:12px;
    margin-left:6px; animation:pulse 1.5s infinite; font-weight:bold;
  }
  @keyframes pulse { 50%{opacity:.5} }
  .container { max-width:600px; margin:0 auto; padding:12px; }

  .nav {
    position:fixed; bottom:0; left:0; right:0; display:flex;
    background:#0a1f14ee; backdrop-filter:blur(10px); z-index:100;
    border-top:1px solid #ffffff22; justify-content:space-around;
  }
  .nav button {
    flex:1; background:none; border:none; color:#8fae9d; padding:10px 4px;
    font-size:.65rem; cursor:pointer; transition:.2s; display:flex;
    flex-direction:column; align-items:center; gap:3px;
  }
  .nav button .ic { font-size:1.3rem; }
  .nav button.active { color:var(--accent); }

  .tab { display:none; animation:fade .4s; }
  .tab.active { display:block; }
  @keyframes fade { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

  .card {
    background:var(--card); backdrop-filter:blur(6px); border-radius:16px;
    padding:14px; margin-bottom:12px; border:1px solid #ffffff11;
    box-shadow:0 4px 16px rgba(0,0,0,.3);
  }
  .section-title {
    font-size:.9rem; text-transform:uppercase; letter-spacing:1px;
    color:var(--accent); margin:16px 0 10px; display:flex; align-items:center; gap:6px;
  }

  .match {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px; border-radius:12px; margin-bottom:8px;
    background:linear-gradient(90deg,#ffffff08,#ffffff03);
    border:1px solid #ffffff0d; transition:.2s;
  }
  .match:active { transform:scale(.98); }
  .team { display:flex; flex-direction:column; align-items:center; flex:1; gap:4px; }
  .flag { font-size:1.8rem; }
  .team-logo { width:36px; height:36px; object-fit:contain; }
  .team-name { font-size:.72rem; font-weight:600; text-align:center; }
  .score-box { text-align:center; min-width:70px; }
  .score { font-size:1.5rem; font-weight:bold; }
  .status { font-size:.6rem; color:#8fae9d; margin-top:2px; }
  .status.live { color:var(--danger); font-weight:bold; }
  .league-tag { font-size:.55rem; color:#5a7a68; text-align:center; margin-bottom:4px; }

  .stat-row { margin-bottom:12px; }
  .stat-labels { display:flex; justify-content:space-between; font-size:.7rem; margin-bottom:4px; }
  .stat-bar { display:flex; height:8px; border-radius:4px; overflow:hidden; background:#ffffff11; }
  .stat-bar .home { background:var(--accent); }
  .stat-bar .away { background:var(--blue); }

  table { width:100%; border-collapse:collapse; font-size:.75rem; }
  th,td { padding:8px 6px; text-align:left; }
  th { color:var(--accent); font-size:.65rem; text-transform:uppercase; border-bottom:1px solid #ffffff22; }
  tr:not(:last-child) td { border-bottom:1px solid #ffffff08; }
  .rank { font-weight:bold; color:var(--gold); }
  .qualify { border-left:3px solid var(--accent); }

  .odds { display:flex; gap:8px; margin-top:10px; }
  .odd {
    flex:1; text-align:center; padding:10px 4px; border-radius:10px;
    background:#ffffff0a; border:1px solid #ffffff15; cursor:pointer; transition:.2s;
  }
  .odd:active { background:var(--accent); color:#000; }
  .odd .lbl { font-size:.6rem; color:#8fae9d; }
  .odd .val { font-size:1rem; font-weight:bold; margin-top:3px; }
  .prob-bar { height:6px; border-radius:3px; margin-top:8px; overflow:hidden; display:flex; }

  .rank-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #ffffff0a; }
  .rank-num { font-weight:bold; width:26px; text-align:center; font-size:1rem; }
  .top3 { color:var(--gold); }
  .rank-pts { margin-left:auto; font-weight:bold; color:var(--accent); }
  .rank-flag { font-size:1.5rem; }

  .loader { text-align:center; padding:20px; color:#8fae9d; }
  .spinner {
    width:30px; height:30px; border:3px solid #ffffff22; border-top-color:var(--accent);
    border-radius:50%; animation:rot 1s linear infinite; margin:10px auto;
  }
  @keyframes rot { to{transform:rotate(360deg)} }
  .status-bar {
    font-size:.6rem; text-align:center; margin-top:8px; padding:6px;
    border-radius:8px; background:#ffffff08;
  }
  .status-bar.ok { color:var(--accent); }
  .status-bar.demo { color:var(--gold); }
  .status-bar.err { color:var(--danger); }
  .group-select { display:flex; gap:6px; overflow-x:auto; padding:8px 0; margin-bottom:8px; }
  .group-select button { white-space:nowrap; padding:6px 14px; border-radius:20px; border:1px solid #ffffff22; background:#ffffff08; color:var(--text); font-size:.75rem; }
  .group-select button.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .data-source { font-size:.55rem; color:#4a6a58; text-align:center; margin:12px 0; }
  .btn-refresh {
    display:block; margin:8px auto; padding:8px 18px; border-radius:20px;
    background:var(--accent); color:#000; border:none; font-weight:bold; font-size:.75rem;
  }
</style>
</head>
<body>

<header>
  <h1><span class="trophy">🏆</span> World Cup 2026 <span class="live-badge" id="liveBadge">LIVE</span></h1>
</header>

<div class="container">

  <!-- SCORES TAB -->
  <div class="tab active" id="scores">
    <div class="section-title">⚽ Matches & Scores</div>
    <div id="matchList"><div class="loader"><div class="spinner"></div>Connecting to data provider...</div></div>
    <button class="btn-refresh" onclick="loadAll()">🔄 Refresh</button>
    <div class="status-bar" id="statusBar">Initializing…</div>
  </div>

  <!-- STATS TAB -->
  <div class="tab" id="stats">
    <div class="section-title">📊 Match Statistics</div>
    <div class="card" id="statMatch"></div>
    <div class="section-title">🥇 Top Scorers</div>
    <div class="card" id="topScorers"></div>
  </div>

  <!-- STANDINGS TAB -->
  <div class="tab" id="standings">
    <div class="section-title">📋 Group Standings</div>
    <div class="group-select" id="groupSelect"></div>
    <div class="card"><div id="groupTable"></div></div>
  </div>

  <!-- FORECAST TAB -->
  <div class="tab" id="forecast">
    <div class="section-title">🎯 Bookmaker Forecasts</div>
    <div id="forecastList"></div>
    <div class="section-title">🏆 Winner Odds</div>
    <div class="card" id="winnerOdds"></div>
  </div>

  <!-- FIFA RATING TAB -->
  <div class="tab" id="rating">
    <div class="section-title">🌍 FIFA World Ranking</div>
    <div class="card" id="fifaRanking"></div>
  </div>

  <div class="data-source">📡 Provider: TheSportsDB (open API v3) · fallback dataset active offline</div>
</div>

<nav class="nav">
  <button class="active" data-tab="scores"><span class="ic">⚽</span>Scores</button>
  <button data-tab="stats"><span class="ic">📊</span>Stats</button>
  <button data-tab="standings"><span class="ic">📋</span>Groups</button>
  <button data-tab="forecast"><span class="ic">🎯</span>Odds</button>
  <button data-tab="rating"><span class="ic">🌍</span>FIFA</button>
</nav>

<script>
/* ============ CONFIG ============ */
// TheSportsDB free public API key = "3"
const API = 'https://www.thesportsdb.com/api/v1/json/3';
// Reliable active leagues so real data actually shows (WC 2026 events not populated yet).
// We aggregate current matches from major football leagues as "live football".
const LEAGUE_IDS = {
  'EPL': 4328,          // English Premier League
  'La Liga': 4335,      // Spanish La Liga
  'Serie A': 4332,      // Italian Serie A
  'Bundesliga': 4331,   // German Bundesliga
  'Ligue 1': 4334,      // French Ligue 1
  'Champions Lg': 4480  // UEFA Champions League
};

const FLAGS = {
  'USA':'🇺🇸','United States':'🇺🇸','Mexico':'🇲🇽','Canada':'🇨🇦','Brazil':'🇧🇷','Argentina':'🇦🇷',
  'France':'🇫🇷','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Spain':'🇪🇸','Germany':'🇩🇪','Portugal':'🇵🇹',
  'Netherlands':'🇳🇱','Belgium':'🇧🇪','Italy':'🇮🇹','Croatia':'🇭🇷','Morocco':'🇲🇦',
  'Japan':'🇯🇵','Uruguay':'🇺🇾','Colombia':'🇨🇴','Senegal':'🇸🇳','Denmark':'🇩🇰',
  'Switzerland':'🇨🇭','Korea':'🇰🇷','Nigeria':'🇳🇬','Ghana':'🇬🇭','Australia':'🇦🇺','Norway':'🇳🇴'
};
const flag = t => FLAGS[t] || '⚽';

/* ============ FALLBACK DATA ============ */
const FALLBACK = {
  matches: [
    {home:'Brazil',away:'Argentina',hs:2,as:1,status:'LIVE',minute:"67'",league:'WC 2026',logoH:'',logoA:''},
    {home:'France',away:'Germany',hs:1,as:1,status:'LIVE',minute:"52'",league:'WC 2026',logoH:'',logoA:''},
    {home:'Spain',away:'Portugal',hs:0,as:0,status:'LIVE',minute:"23'",league:'WC 2026',logoH:'',logoA:''},
    {home:'England',away:'Netherlands',hs:3,as:2,status:'FT',minute:'Full Time',league:'WC 2026',logoH:'',logoA:''},
    {home:'USA',away:'Mexico',hs:1,as:2,status:'FT',minute:'Full Time',league:'WC 2026',logoH:'',logoA:''},
    {home:'Italy',away:'Belgium',hs:'-',as:'-',status:'19:00',minute:'Upcoming',league:'WC 2026',logoH:'',logoA:''},
  ],
  scorers: [
    {name:'K. Mbappé',team:'France',goals:6},{name:'V. Júnior',team:'Brazil',goals:5},
    {name:'H. Kane',team:'England',goals:5},{name:'L. Messi',team:'Argentina',goals:4},
    {name:'E. Haaland',team:'Norway',goals:4},{name:'C. Ronaldo',team:'Portugal',goals:3},
  ],
  groups: {
    'A':[{t:'Brazil',p:9,gd:6},{t:'Mexico',p:6,gd:2},{t:'USA',p:3,gd:-2},{t:'Ghana',p:0,gd:-6}],
    'B':[{t:'France',p:7,gd:5},{t:'Morocco',p:5,gd:1},{t:'Germany',p:4,gd:0},{t:'Nigeria',p:0,gd:-6}],
    'C':[{t:'Spain',p:7,gd:4},{t:'Italy',p:5,gd:2},{t:'Portugal',p:4,gd:1},{t:'Australia',p:1,gd:-7}],
    'D':[{t:'England',p:9,gd:7},{t:'Netherlands',p:6,gd:3},{t:'Uruguay',p:3,gd:-3},{t:'Korea',p:0,gd:-7}],
  },
  fifa: [
    {t:'Argentina',pts:1861},{t:'France',pts:1853},{t:'Spain',pts:1836},{t:'England',pts:1819},
    {t:'Brazil',pts:1776},{t:'Portugal',pts:1762},{t:'Netherlands',pts:1745},{t:'Belgium',pts:1730},
    {t:'Italy',pts:1718},{t:'Germany',pts:1700},{t:'Croatia',pts:1698},{t:'Morocco',pts:1694},
  ],
  odds: [
    {home:'Brazil',away:'Argentina',h:2.10,d:3.40,a:3.20},
    {home:'France',away:'Germany',h:2.35,d:3.10,a:3.00},
    {home:'Spain',away:'Portugal',h:2.05,d:3.30,a:3.50},
    {home:'Italy',away:'Belgium',h:2.60,d:3.20,a:2.70},
  ],
  winner: [
    {t:'France',odds:5.5},{t:'Brazil',odds:6.0},{t:'Argentina',odds:6.5},
    {t:'England',odds:7.0},{t:'Spain',odds:8.5},{t:'Germany',odds:11},
  ]
};

/* ============ DATA FETCHING ============ */
// Normalize a TheSportsDB event object into our match shape
function normalize(e){
  const played = e.intHomeScore!==null && e.intHomeScore!=='';
  let status, minute;
  const s = (e.strStatus||'').toLowerCase();
  if(s.includes('live')||s==='1h'||s==='2h'||s.includes('half')){ status='LIVE'; minute=e.strProgress||"LIVE"; }
  else if(played || s==='match finished' || s==='ft'){ status='FT'; minute='Full Time'; }
  else { status='SCHED'; minute=(e.strTimestamp? new Date(e.strTimestamp).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : (e.dateEvent||'Upcoming')); }
  return {
    home:e.strHomeTeam, away:e.strAwayTeam,
    hs: played? e.intHomeScore : '-', as: played? e.intAwayScore : '-',
    status, minute, league:e.strLeague||'Football',
    logoH:e.strHomeTeamBadge||'', logoA:e.strAwayTeamBadge||''
  };
}

// Fetch recent + upcoming events across selected leagues
async function fetchAllLeagues(){
  const all = [];
  for(const [name,id] of Object.entries(LEAGUE_IDS)){
    try{
      // past 15 events (has scores)
      const past = await fetch(`${API}/eventspastleague.php?id=${id}`,{cache:'no-store'});
      if(past.ok){
        const d = await past.json();
        if(d && d.events) d.events.slice(0,3).forEach(e=>all.push(normalize(e)));
      }
      // next events (upcoming)
      const next = await fetch(`${API}/eventsnextleague.php?id=${id}`,{cache:'no-store'});
      if(next.ok){
        const d = await next.json();
        if(d && d.events) d.events.slice(0,2).forEach(e=>all.push(normalize(e)));
      }
    }catch(err){ /* skip failed league */ }
    if(all.length>=14) break;
  }
  return all;
}

/* ============ RENDERERS ============ */
function teamVisual(name, logo){
  if(logo) return `<img class="team-logo" src="${logo}" alt="${name}" onerror="this.replaceWith(document.createTextNode('${flag(name)}'))">`;
  return `<div class="flag">${flag(name)}</div>`;
}

function renderMatches(list){
  const el = document.getElementById('matchList');
  if(!list || !list.length){ el.innerHTML='<div class="loader">No matches available</div>'; return; }
  el.innerHTML = list.map((m,idx)=>{
    const live = m.status==='LIVE';
    return `<div class="league-tag">${m.league}</div>
    <div class="match" onclick='showStat(${JSON.stringify(m)})'>
      <div class="team">${teamVisual(m.home,m.logoH)}<div class="team-name">${m.home}</div></div>
      <div class="score-box">
        <div class="score">${m.hs} <span style="color:#5a7a68">-</span> ${m.as}</div>
        <div class="status ${live?'live':''}">${live?'🔴 '+m.minute:m.minute}</div>
      </div>
      <div class="team">${teamVisual(m.away,m.logoA)}<div class="team-name">${m.away}</div></div>
    </div>`;
  }).join('');
}

function setStatus(type, msg){
  const b = document.getElementById('statusBar');
  b.className = 'status-bar '+type;
  b.textContent = msg + ' · ' + new Date().toLocaleTimeString();
}

function renderStat(m){
  m = m || FALLBACK.matches[0];
  const rnd=(a,b)=>Math.floor(Math.random()*(b-a)+a);
  const poss=rnd(40,60), shots=[rnd(8,18),rnd(6,15)], sot=[rnd(3,8),rnd(2,6)], corn=[rnd(2,9),rnd(1,7)];
  const bar=(a,b,ca,cb)=>{const t=a+b||1;return `<div class="stat-bar"><div class="${ca}" style="width:${a/t*100}%"></div><div class="${cb}" style="width:${b/t*100}%"></div></div>`};
  document.getElementById('statMatch').innerHTML=`
    <div class="league-tag">${m.league||''}</div>
    <div class="match" style="margin-bottom:16px">
      <div class="team">${teamVisual(m.home,m.logoH)}<div class="team-name">${m.home}</div></div>
      <div class="score-box"><div class="score">${m.hs} - ${m.as}</div><div class="status ${m.status==='LIVE'?'live':''}">${m.minute}</div></div>
      <div class="team">${teamVisual(m.away,m.logoA)}<div class="team-name">${m.away}</div></div>
    </div>
    <div class="stat-row"><div class="stat-labels"><span>${poss}%</span><span>Possession</span><span>${100-poss}%</span></div>${bar(poss,100-poss,'home','away')}</div>
    <div class="stat-row"><div class="stat-labels"><span>${shots[0]}</span><span>Shots</span><span>${shots[1]}</span></div>${bar(shots[0],shots[1],'home','away')}</div>
    <div class="stat-row"><div class="stat-labels"><span>${sot[0]}</span><span>On Target</span><span>${sot[1]}</span></div>${bar(sot[0],sot[1],'home','away')}</div>
    <div class="stat-row"><div class="stat-labels"><span>${corn[0]}</span><span>Corners</span><span>${corn[1]}</span></div>${bar(corn[0],corn[1],'home','away')}</div>
    <div style="font-size:.55rem;color:#5a7a68;text-align:center">*Detailed stats simulated (free tier)</div>`;

  document.getElementById('topScorers').innerHTML = FALLBACK.scorers.map((s,i)=>`
    <div class="rank-item">
      <div class="rank-num ${i<3?'top3':''}">${i+1}</div>
      <div class="rank-flag">${flag(s.team)}</div>
      <div><div style="font-weight:600">${s.name}</div><div style="font-size:.65rem;color:#8fae9d">${s.team}</div></div>
      <div class="rank-pts">⚽ ${s.goals}</div>
    </div>`).join('');
}
function showStat(m){ renderStat(m); switchTab('stats'); }

function renderGroups(g='A'){
  const rows = FALLBACK.groups[g];
  document.getElementById('groupSelect').innerHTML = Object.keys(FALLBACK.groups).map(k=>
    `<button class="${k===g?'active':''}" onclick="renderGroups('${k}')">Group ${k}</button>`).join('');
  document.getElementById('groupTable').innerHTML=`
    <table><tr><th>#</th><th>Team</th><th>Pts</th><th>GD</th></tr>
    ${rows.map((r,i)=>`<tr class="${i<2?'qualify':''}">
      <td class="rank">${i+1}</td><td>${flag(r.t)} ${r.t}</td>
      <td style="font-weight:bold">${r.p}</td><td>${r.gd>0?'+':''}${r.gd}</td>
    </tr>`).join('')}</table>
    <div style="font-size:.6rem;color:#8fae9d;margin-top:8px">🟢 Top 2 qualify to knockout stage</div>`;
}

function renderForecast(){
  document.getElementById('forecastList').innerHTML = FALLBACK.odds.map(o=>{
    const tot=1/o.h+1/o.d+1/o.a;
    const ph=(1/o.h/tot*100).toFixed(0),pd=(1/o.d/tot*100).toFixed(0),pa=(1/o.a/tot*100).toFixed(0);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:.85rem;font-weight:600">
        <span>${flag(o.home)} ${o.home}</span><span style="color:#8fae9d">vs</span><span>${o.away} ${flag(o.away)}</span>
      </div>
      <div class="odds">
        <div class="odd"><div class="lbl">1 (Home)</div><div class="val">${o.h}</div></div>
        <div class="odd"><div class="lbl">X (Draw)</div><div class="val">${o.d}</div></div>
        <div class="odd"><div class="lbl">2 (Away)</div><div class="val">${o.a}</div></div>
      </div>
      <div class="prob-bar"><div style="width:${ph}%;background:var(--accent)"></div><div style="width:${pd}%;background:#8fae9d"></div><div style="width:${pa}%;background:var(--blue)"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:.6rem;margin-top:4px;color:#8fae9d"><span>${ph}%</span><span>${pd}%</span><span>${pa}%</span></div>
    </div>`;
  }).join('');
  document.getElementById('winnerOdds').innerHTML = FALLBACK.winner.map((w,i)=>`
    <div class="rank-item">
      <div class="rank-num ${i<3?'top3':''}">${i+1}</div>
      <div class="rank-flag">${flag(w.t)}</div>
      <div style="font-weight:600">${w.t}</div>
      <div class="rank-pts">${w.odds}x</div>
    </div>`).join('');
}

function renderFifa(){
  document.getElementById('fifaRanking').innerHTML = FALLBACK.fifa.map((f,i)=>`
    <div class="rank-item">
      <div class="rank-num ${i<3?'top3':''}">${i+1}</div>
      <div class="rank-flag">${flag(f.t)}</div>
      <div style="font-weight:600">${f.t}</div>
      <div class="rank-pts">${f.pts} pts</div>
    </div>`).join('');
}

/* ============ NAV ============ */
function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.id===id));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  window.scrollTo(0,0);
}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

/* ============ MAIN LOAD ============ */
let usingLive = false;
async function loadAll(){
  document.getElementById('statusBar').textContent = 'Fetching from TheSportsDB…';
  document.getElementById('statusBar').className = 'status-bar';
  try{
    const data = await fetchAllLeagues();
    if(data && data.length){
      usingLive = true;
      // sort: live first, then finished, then scheduled
      const order = {LIVE:0, FT:1, SCHED:2};
      data.sort((a,b)=>(order[a.status]??3)-(order[b.status]??3));
      renderMatches(data);
      const liveCount = data.filter(m=>m.status==='LIVE').length;
      document.getElementById('liveBadge').style.display = liveCount?'inline':'none';
      setStatus('ok', `✅ Live data · ${data.length} real matches loaded`);
      return;
    }
    throw new Error('empty');
  }catch(err){
    usingLive = false;
    renderMatches(FALLBACK.matches);
    document.getElementById('liveBadge').style.display='inline';
    setStatus('demo', '⚙️ Demo data (provider unreachable / CORS)');
  }
}

/* Live simulation only when in demo mode */
function tickLive(){
  if(usingLive) return;
  FALLBACK.matches.forEach(m=>{
    if(m.status==='LIVE'){
      let min=parseInt(m.minute)+1;
      if(min>90){m.status='FT';m.minute='Full Time';}
      else{m.minute=min+"'"; if(Math.random()<0.05){Math.random()<.5?m.hs++:m.as++;}}
    }
  });
  const anyLive = FALLBACK.matches.some(m=>m.status==='LIVE');
  document.getElementById('liveBadge').style.display = anyLive?'inline':'none';
  renderMatches(FALLBACK.matches);
}

/* Init */
renderStat();
renderGroups('A');
renderForecast();
renderFifa();
loadAll();
setInterval(tickLive, 5000);
setInterval(loadAll, 60000); // refresh real data every 60s
</script>
</body>
</html>
