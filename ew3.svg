<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="850" height="400" viewBox="0 0 850 400">
  
  <!-- Black border rectangle -->
  <rect x="40" y="40" width="430" height="320" rx="3" ry="3" fill="black"/>
  
  <!-- Light blue inner rectangle -->
  <rect x="48" y="48" width="414" height="304" fill="#87CEFA"/>
  
  <!-- "EW" text centered inside the rectangle -->
  <text x="255" y="215" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="140" 
        fill="black" 
        text-anchor="middle" 
        dominant-baseline="middle">EW</text>
  
  <!-- "БЛАСТЕР" text on the right, aligned with top of figure -->
  <text x="510" y="80" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="42" 
        fill="black" 
        text-anchor="start" 
        dominant-baseline="middle">БЛАСТЕР</text>
  
  <!-- "(ДАМБА)" text below -->
  <text x="510" y="130" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="42" 
        fill="black" 
        text-anchor="start" 
        dominant-baseline="middle">(ДАМБА)</text>
  
</svg>