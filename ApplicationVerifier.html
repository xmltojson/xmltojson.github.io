<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Verifier - BDD Scenario Tester</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
:root {
  --bg-primary: #0f0f1e;
  --bg-secondary: #1a1a2e;
  --bg-tertiary: #252542;
  --accent: #7c3aed;
  --accent-hover: #9333ea;
  --success: #10b981;
  --error: #ef4444;
  --warning: #f59e0b;
  --info: #3b82f6;
  --text-primary: #e5e7eb;
  --text-secondary: #9ca3af;
  --border: #2d2d4e;
  --gradient: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
}

.app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

.header {
  background: linear-gradient(90deg, var(--bg-secondary), var(--bg-tertiary));
  padding: 12px 20px;
  border-bottom: 2px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.2);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 20px;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--gradient);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: white;
  -webkit-text-fill-color: white;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.7); }
  50% { box-shadow: 0 0 0 8px rgba(124, 58, 237, 0); }
}

.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.btn {
  padding: 8px 14px;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-primary {
  background: var(--gradient);
  border: none;
}

.btn-success { background: var(--success); border-color: var(--success); }
.btn-danger { background: var(--error); border-color: var(--error); }
.btn-warning { background: var(--warning); border-color: var(--warning); }

.btn-icon {
  padding: 6px 10px;
  font-size: 14px;
}

.btn-small {
  padding: 4px 8px;
  font-size: 12px;
}

select, input[type="text"], input[type="url"], input[type="number"], textarea {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
}

select:focus, input:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
}

.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  overflow: hidden;
}

.main.vertical {
  grid-template-columns: 1fr;
  grid-template-rows: 1fr 1fr;
}

.panel {
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  background: var(--bg-secondary);
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  font-size: 14px;
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.panel-content::-webkit-scrollbar { width: 8px; }
.panel-content::-webkit-scrollbar-track { background: var(--bg-secondary); }
.panel-content::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

.scenario-group {
  background: var(--bg-secondary);
  border-radius: 10px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: all 0.2s;
}

.scenario-group:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.15);
}

.scenario-group.disabled {
  opacity: 0.5;
}

.scenario-group.disabled .group-content {
  filter: grayscale(0.5);
}

.group-header {
  padding: 12px 16px;
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
  flex-wrap: wrap;
}

.group-title {
  flex: 1;
  min-width: 200px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.group-title input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-weight: 600;
  padding: 4px;
}

.group-title input:focus {
  background: var(--bg-primary);
  border-radius: 4px;
}

.expand-icon {
  transition: transform 0.2s;
}

.scenario-group.collapsed .expand-icon {
  transform: rotate(-90deg);
}

.scenario-group.collapsed .group-content {
  display: none;
}

.group-content {
  padding: 12px;
}

.group-actions {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.step {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: var(--bg-primary);
  border-radius: 8px;
  margin-bottom: 8px;
  border-left: 3px solid var(--border);
  transition: all 0.2s;
  position: relative;
  flex-wrap: wrap;
}

.step:hover {
  transform: translateX(4px);
}

.step.given { border-left-color: var(--info); }
.step.when { border-left-color: var(--warning); }
.step.then { border-left-color: var(--success); }
.step.and { border-left-color: var(--text-secondary); }

.step.disabled {
  opacity: 0.4;
  background: var(--bg-secondary);
}

.step.disabled .step-text,
.step.disabled select {
  text-decoration: line-through;
}

.step.running {
  animation: running 1s infinite;
  border-left-color: var(--accent);
}

@keyframes running {
  0%, 100% { background: var(--bg-primary); }
  50% { background: rgba(124, 58, 237, 0.15); }
}

.step.passed { background: rgba(16, 185, 129, 0.1); border-left-color: var(--success); }
.step.failed { background: rgba(239, 68, 68, 0.1); border-left-color: var(--error); }
.step.skipped { opacity: 0.5; }

.step-keyword {
  font-weight: 700;
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 4px;
  min-width: 60px;
  text-align: center;
  text-transform: uppercase;
}

.step-text {
  flex: 1;
  min-width: 150px;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 13px;
  padding: 4px;
}

.step-text:focus {
  background: var(--bg-tertiary);
  border-radius: 4px;
}

.step-status {
  font-size: 14px;
}

.step-actions {
  display: flex;
  gap: 4px;
}

.move-btns {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.move-btns button {
  padding: 2px 6px;
  font-size: 10px;
  line-height: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}

.move-btns button:hover:not(:disabled) {
  background: var(--accent);
  color: white;
}

.move-btns button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.checkbox {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: var(--accent);
}

.toggle-switch {
  position: relative;
  display: inline-block;
  width: 36px;
  height: 20px;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 20px;
  transition: 0.3s;
}

.toggle-slider:before {
  position: absolute;
  content: "";
  height: 14px;
  width: 14px;
  left: 2px;
  bottom: 2px;
  background: var(--text-secondary);
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .toggle-slider {
  background: var(--success);
  border-color: var(--success);
}

input:checked + .toggle-slider:before {
  transform: translateX(16px);
  background: white;
}

.log-entry {
  padding: 8px 12px;
  margin-bottom: 6px;
  border-radius: 6px;
  font-family: 'Consolas', monospace;
  font-size: 12px;
  border-left: 3px solid var(--border);
  background: var(--bg-secondary);
  animation: slideIn 0.3s;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.log-entry.info { border-left-color: var(--info); }
.log-entry.success { border-left-color: var(--success); color: #6ee7b7; }
.log-entry.error { border-left-color: var(--error); color: #fca5a5; }
.log-entry.warning { border-left-color: var(--warning); color: #fcd34d; }

.log-time {
  color: var(--text-secondary);
  margin-right: 8px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 12px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}

.stat-card {
  background: var(--bg-tertiary);
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  border: 1px solid var(--border);
}

.stat-value {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 2px;
}

.stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
}

.stat-value.success { color: var(--success); }
.stat-value.error { color: var(--error); }
.stat-value.warning { color: var(--warning); }
.stat-value.info { color: var(--info); }
.stat-value.muted { color: var(--text-secondary); }

.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
}

.modal.active { display: flex; }

.modal-content {
  background: var(--bg-secondary);
  border-radius: 12px;
  padding: 24px;
  min-width: 400px;
  max-width: 600px;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
}

.form-group {
  margin-bottom: 12px;
}

.form-group label {
  display: block;
  margin-bottom: 6px;
  font-size: 13px;
  color: var(--text-secondary);
}

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
}

.form-group textarea {
  min-height: 100px;
  resize: vertical;
  font-family: 'Consolas', monospace;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
}

.iframe-container {
  flex: 1;
  background: white;
  position: relative;
}

.iframe-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.iframe-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(15, 15, 30, 0.9);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: var(--text-primary);
  z-index: 10;
}

.iframe-overlay.hidden { display: none; }

.url-bar {
  display: flex;
  gap: 8px;
  padding: 8px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
}

.url-bar input { flex: 1; }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}

.empty-state-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.5;
}

.tab-buttons {
  display: flex;
  gap: 4px;
  padding: 8px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  padding: 6px 12px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}

.tab-btn.active {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-color: var(--border);
}

.tab-content { display: none; height: 100%; flex-direction: column; }
.tab-content.active { display: flex; }

.progress-bar {
  height: 4px;
  background: var(--bg-tertiary);
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: var(--gradient);
  width: 0%;
  transition: width 0.3s;
}

.schedule-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  background: var(--info);
  color: white;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  animation: pulse 2s infinite;
}

.schedule-badge.active {
  background: var(--success);
}

@media (max-width: 768px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .header { padding: 8px; }
  .logo { font-size: 16px; }
}

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--bg-tertiary);
  padding: 12px 20px;
  border-radius: 8px;
  border-left: 4px solid var(--accent);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  z-index: 2000;
  animation: slideInRight 0.3s;
}

@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.toast.success { border-left-color: var(--success); }
.toast.error { border-left-color: var(--error); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">✓</div>
      <span data-i18n="appTitle">Application Verifier</span>
      <span id="scheduleBadge" style="display:none;" class="schedule-badge">
        <span>⏱</span> <span id="scheduleBadgeText">—</span>
      </span>
    </div>
    <div class="toolbar">
      <button class="btn" onclick="addGroup()"><span>➕</span> <span data-i18n="newGroup">Нова група</span></button>
      <button class="btn btn-primary" onclick="runAll()"><span>▶</span> <span data-i18n="runAll">Запустити все</span></button>
      <button class="btn btn-success" onclick="runSelected()"><span>✓</span> <span data-i18n="runSelected">Запустити вибрані</span></button>
      <button class="btn btn-danger" onclick="stopRun()"><span>■</span> <span data-i18n="stop">Стоп</span></button>
      <button class="btn" onclick="openImport()"><span>📥</span> <span data-i18n="import">Імпорт</span></button>
      <button class="btn" onclick="exportScenarios()"><span>📤</span> <span data-i18n="export">Експорт</span></button>
      <button class="btn" onclick="openSchedule()"><span>⏱</span> <span data-i18n="schedule">Розклад</span></button>
      <button class="btn" onclick="clearAll()"><span>🗑</span> <span data-i18n="clear">Очистити</span></button>
      <button class="btn" onclick="toggleOrientation()" id="orientBtn"><span>⇅</span> <span data-i18n="orientation">Орієнтація</span></button>
      <select id="langSelect" onchange="changeLang(this.value)">
        <option value="uk">🇺🇦 Українська</option>
        <option value="en">🇬🇧 English</option>
      </select>
    </div>
  </div>

  <div class="main" id="main">
    <div class="panel">
      <div class="stats">
        <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label" data-i18n="total">Всього</div></div>
        <div class="stat-card"><div class="stat-value success" id="statPassed">0</div><div class="stat-label" data-i18n="passed">Успішно</div></div>
        <div class="stat-card"><div class="stat-value error" id="statFailed">0</div><div class="stat-label" data-i18n="failed">Помилка</div></div>
        <div class="stat-card"><div class="stat-value warning" id="statPending">0</div><div class="stat-label" data-i18n="pending">Очікує</div></div>
        <div class="stat-card"><div class="stat-value muted" id="statDisabled">0</div><div class="stat-label" data-i18n="disabled">Вимкнено</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="panel-content" id="scenarios"></div>
    </div>

    <div class="panel">
      <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('preview', event)" data-i18n="preview">Перегляд</button>
        <button class="tab-btn" onclick="switchTab('logs', event)" data-i18n="logs">Журнал</button>
        <button class="tab-btn" onclick="switchTab('report', event)" data-i18n="report">Звіт</button>
      </div>
      
      <div class="tab-content active" id="tab-preview">
        <div class="url-bar">
          <input type="url" id="targetUrl" placeholder="https://example.com" value="https://example.com">
          <button class="btn btn-primary" onclick="loadTarget()" data-i18n="load">Завантажити</button>
        </div>
        <div class="iframe-container">
          <iframe id="targetFrame" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
          <div class="iframe-overlay" id="iframeOverlay">
            <div style="font-size:48px;margin-bottom:12px;">🌐</div>
            <div data-i18n="loadTargetHint">Введіть URL веб-додатку для тестування</div>
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-logs">
        <div style="padding:8px;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;gap:8px;">
          <button class="btn btn-icon" onclick="clearLogs()">🗑 <span data-i18n="clearLogs">Очистити журнал</span></button>
        </div>
        <div class="panel-content" id="logs"></div>
      </div>

      <div class="tab-content" id="tab-report">
        <div class="panel-content" id="report"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="importModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" data-i18n="importTitle">Імпорт сценаріїв</div>
      <button class="btn btn-icon" onclick="closeModal('importModal')">✕</button>
    </div>
    <div class="form-group">
      <label data-i18n="importFormat">Формат</label>
      <select id="importFormat">
        <option value="json">JSON</option>
        <option value="yaml">YAML</option>
        <option value="gherkin">Gherkin (.feature)</option>
      </select>
    </div>
    <div class="form-group">
      <label data-i18n="importFile">Файл</label>
      <input type="file" id="importFile" accept=".json,.yaml,.yml,.feature,.txt">
    </div>
    <div class="form-group">
      <label data-i18n="orPaste">Або вставити текст</label>
      <textarea id="importText" placeholder="Feature: Login&#10;  Scenario: Successful login&#10;    Given I open the homepage&#10;    When I click login&#10;    Then I see dashboard"></textarea>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="autoRunAfterImport" class="checkbox">
      <label for="autoRunAfterImport" data-i18n="autoRunAfterImport">Запустити автоматично після імпорту</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="replaceExisting" class="checkbox">
      <label for="replaceExisting" data-i18n="replaceExisting">Замінити існуючі сценарії</label>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn" onclick="closeModal('importModal')" data-i18n="cancel">Скасувати</button>
      <button class="btn btn-primary" onclick="performImport()" data-i18n="doImport">Імпортувати</button>
    </div>
  </div>
</div>

<div class="modal" id="scheduleModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" data-i18n="scheduleTitle">Періодичний запуск</div>
      <button class="btn btn-icon" onclick="closeModal('scheduleModal')">✕</button>
    </div>
    <div class="form-group">
      <label data-i18n="scheduleInterval">Інтервал (секунди)</label>
      <input type="number" id="scheduleInterval" min="5" value="60">
    </div>
    <div class="form-group">
      <label data-i18n="scheduleTarget">Що запускати</label>

// ============ State ============
let state = {
  lang: 'uk',
  orientation: 'horizontal',
  targetUrl: 'https://example.com',
  groups: [],
  logs: [],
  activeTab: 'preview',
  running: false,
  schedule: {
    active: false,
    intervalSec: 60,
    target: 'all',
    lastRun: null,
    nextRunAt: null
  }
};

let runningController = null;
let scheduleTimer = null;
let scheduleTicker = null;

// ============ Storage ============
function saveState() {
  const cloned = { ...state };
  // Do not persist runtime fields separately - they are already stored
  localStorage.setItem('appVerifier', JSON.stringify(cloned));
}

function loadState() {
  const saved = localStorage.getItem('appVerifier');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
      if (!state.schedule) state.schedule = { active: false, intervalSec: 60, target: 'all', lastRun: null, nextRunAt: null };
      // Ensure step & group have new fields
      state.groups.forEach(g => {
        if (typeof g.disabled === 'undefined') g.disabled = false;
        g.steps.forEach(s => {
          if (typeof s.disabled === 'undefined') s.disabled = false;
        });
      });
    } catch(e) { console.error(e); }
  }
}

// ============ i18n ============
function t(key) {
  return translations[state.lang]?.[key] || translations.en[key] || key;
}

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.documentElement.lang = state.lang;
  document.getElementById('langSelect').value = state.lang;
}

function changeLang(lang) {
  state.lang = lang;
  applyLang();
  render();
  saveState();
}

  renderScenarios();

  renderStats();
  renderScheduleBadge();
  document.getElementById('targetUrl').value = state.targetUrl || '';

  main.classList.toggle('vertical', state.orientation === 'vertical');
}

          <div class="step ${s.type} ${s.status||''} ${s.disabled?'disabled':''}" data-gi="${gi}" data-si="${si}">

function getStatusIcon(status, disabled) {
  if (disabled) return '🚫';
  switch(status) {
    case 'passed': return '✅';
    case 'failed': return '❌';
    case 'running': return '⏳';
    case 'skipped': return '⏭';
    default: return '⚪';
  }
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

    <div class="log-entry ${l.type}">

  `).join('');
  container.scrollTop = container.scrollHeight;
}

function renderStats() {
  let total=0, passed=0, failed=0, pending=0, disabled=0;
  state.groups.forEach(g => g.steps.forEach(s => {
    total++;
    if (s.disabled || g.disabled) disabled++;
    else if (s.status==='passed') passed++;
    else if (s.status==='failed') failed++;
    else pending++;
  }));
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPassed').textContent = passed;
  document.getElementById('statFailed').textContent = failed;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statDisabled').textContent = disabled;
  const active = total - disabled;
  const progress = active ? ((passed+failed)/active*100) : 0;
  document.getElementById('progressFill').style.width = progress + '%';
}

  const badge = document.getElementById('scheduleBadge');

    const remain = Math.max(0, Math.ceil((state.schedule.nextRunAt - Date.now())/1000));
    text.textContent = `${state.schedule.intervalSec}${t('seconds')} · ${remain}${t('seconds')}`;
  } else {
    badge.style.display = 'none';
  }

    if (s.disabled || g.disabled) return;

    if (s.status==='passed') passed++;
    else if (s.status==='failed') failed++;

    <h2 style="margin-bottom:16px;">${t('reportTitle')}</h2>
    <div class="stats" style="grid-template-columns:repeat(3,1fr);border:none;padding:0;background:transparent;">

  [state.groups[gi], state.groups[ni]] = [state.groups[ni], state.groups[gi]];

  render();

    selected: false,

  saveState();
  render();

  state.groups[gi].steps.splice(si, 1);
  saveState();
  render();

  state.groups[gi].steps[si].type = type;

  render();

  state.groups[gi].steps[si].text = text;

function toggleStepSelect(gi, si) {
  state.groups[gi].steps[si].selected = !state.groups[gi].steps[si].selected;

function toggleStepDisabled(gi, si) {
  state.groups[gi].steps[si].disabled = !state.groups[gi].steps[si].disabled;

// ============ Test Runner (BDD/Selenium-like) ============
class TestDriver {
  constructor(iframeId) {
    this.iframe = document.getElementById(iframeId);
    this.overlay = document.getElementById('iframeOverlay');
  }

  async wait(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  getDoc() {
    try {
      return this.iframe.contentDocument || this.iframe.contentWindow.document;
    } catch(e) {
      throw new Error('Cannot access iframe (CORS)');
    }
  }

  async navigate(url) {
    log(`🌐 Navigate to ${url}`, 'info');
    this.iframe.src = url;
    this.overlay.classList.add('hidden');
    await this.wait(1500);
  }

  async findElement(selector) {
    const doc = this.getDoc();
    const el = doc.querySelector(selector);
    if (!el) throw new Error(`Element not found: ${selector}`);
    return el;
  }

  async click(selector) {
    log(`🖱 Click ${selector}`, 'info');
    const el = await this.findElement(selector);
    el.click();
    await this.wait(300);
  }

  async type(selector, text) {
    log(`⌨ Type "${text}" into ${selector}`, 'info');
    const el = await this.findElement(selector);
    el.value = text;
    el.dispatchEvent(new Event('input', { bubbles: true }));
    el.dispatchEvent(new Event('change', { bubbles: true }));
    await this.wait(200);
  }

  async assertText(text) {
    const doc = this.getDoc();
    if (!doc.body.textContent.includes(text)) {
      throw new Error(`Text "${text}" not found on page`);
    }
    log(`✓ Text "${text}" found`, 'success');
  }

  async assertUrl(part) {
    const url = this.iframe.contentWindow.location.href;
    if (!url.includes(part)) {
      throw new Error(`URL does not contain "${part}", got "${url}"`);
    }
  }
}

async function executeStep(step, driver) {
  const text = step.text.trim();
  if (!text) throw new Error('Empty step');

  const patterns = [
    { re: /^(?:I )?(?:open|visit|go to|navigate to|відкрити|перейти на|відкриваю)\s+(.+)$/i, 
      fn: async (m) => { 
        let url = m[1].replace(/^["']|["']$/g,'').trim();
        if (!url.startsWith('http')) url = 'https://' + url;
        await driver.navigate(url); 
      }},
    { re: /^(?:I )?(?:click|натиснути|клацнути|клікаю)(?: on)?\s+["']?(.+?)["']?$/i, 
      fn: async (m) => await driver.click(m[1]) },
    { re: /^(?:I )?(?:type|enter|fill|ввести|заповнити|вводжу)\s+["'](.+?)["']\s+(?:in|into|у|в)\s+["']?(.+?)["']?$/i, 
      fn: async (m) => await driver.type(m[2], m[1]) },
    { re: /^(?:I )?(?:see|should see|бачу|повинен бачити)\s+["']?(.+?)["']?$/i, 
      fn: async (m) => await driver.assertText(m[1]) },
    { re: /^(?:wait|чекати|зачекати)\s+(\d+)\s*(?:ms|мс|s|с)?$/i,
      fn: async (m) => { const n = parseInt(m[1]); await driver.wait(n < 100 ? n*1000 : n); }},
    { re: /^(?:URL contains|URL містить)\s+["']?(.+?)["']?$/i,
      fn: async (m) => await driver.assertUrl(m[1]) }
  ];

  for (const p of patterns) {
    const m = text.match(p.re);
    if (m) {
      await p.fn(m);
      return;
    }
  }

  log(`ℹ Simulating step: ${text}`, 'warning');
  await driver.wait(400 + Math.random() * 600);
  if (/fail|провал/i.test(text)) throw new Error('Step marked as fail');
}

async function runStepsInternal(steps) {
  const driver = new TestDriver('targetFrame');
  const overlay = document.getElementById('iframeOverlay');
  overlay.classList.add('hidden');
  
  state.running = true;
  runningController = { stop: false };
  
  const startTime = Date.now();
  let passed = 0, failed = 0, skipped = 0;

  for (const ref of steps) {
    if (runningController.stop) {
      log(t('stopped'), 'warning');
      break;
    }
    const group = state.groups[ref.gi];
    const step = group.steps[ref.si];
    
    // Skip disabled steps or steps in disabled groups
    if (step.disabled || group.disabled) {
      step.status = 'skipped';
      skipped++;
      log(`⏭ ${t('step_skipped')}: ${step.text}`, 'warning');
      render();
      saveState();
      continue;
    }
    
    step.status = 'running';
    render();
    log(`▶ ${step.type.toUpperCase()}: ${step.text}`, 'info');
    
    try {
      await executeStep(step, driver);
      step.status = 'passed';
      passed++;
      log(`✅ ${t('step_passed')}`, 'success');
    } catch(e) {
      step.status = 'failed';
      failed++;
      log(`❌ ${t('step_failed')}: ${e.message}`, 'error');
    }
    render();
    saveState();
  }
  
  const duration = ((Date.now()-startTime)/1000).toFixed(1);
  log(`🏁 ${t('all_done')} (${duration}s) - ✅ ${passed} / ❌ ${failed} / ⏭ ${skipped}`, 'success');
  state.running = false;
  runningController = null;
  renderReport();
}

function collectSteps(filter) {
  const steps = [];
  state.groups.forEach((g, gi) => {
    g.steps.forEach((s, si) => {
      if (filter(g, s, gi, si)) steps.push({ gi, si });
    });
  });
  return steps;
}

function resetStatuses(steps) {
  steps.forEach(r => {
    const s = state.groups[r.gi].steps[r.si];
    if (!s.disabled && !state.groups[r.gi].disabled) s.status = null;
  });
}

async function runAll() {
  if (state.running) return;
  const steps = collectSteps(() => true);
  if (!steps.length) return toast('No steps', 'error');
  resetStatuses(steps);
  render();
  await runStepsInternal(steps);
}

async function runSelected() {
  if (state.running) return;
  const steps = collectSteps((g, s) => s.selected || g.selected);
  if (!steps.length) return toast('Select steps first', 'error');
  resetStatuses(steps);
  render();
  await runStepsInternal(steps);
}

async function runGroup(gi) {
  if (state.running) return;
  const steps = collectSteps((g, s, gIdx) => gIdx === gi);
  if (!steps.length) return;
  resetStatuses(steps);
  render();
  await runStepsInternal(steps);
}

async function runStep(gi, si) {
  if (state.running) return;
  const step = state.groups[gi].steps[si];
  if (step.disabled || state.groups[gi].disabled) {
    toast('Step is disabled', 'error');
    return;
  }
  const steps = [{ gi, si }];
  resetStatuses(steps);
  render();
  await runStepsInternal(steps);
}

function stopRun() {
  if (runningController) runningController.stop = true;
}

// ============ Import/Export ============
function openImport() {
  document.getElementById('importModal').classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

async function performImport() {
  const format = document.getElementById('importFormat').value;
  const file = document.getElementById('importFile').files[0];
  const text = document.getElementById('importText').value;
  const autoRun = document.getElementById('autoRunAfterImport').checked;
  const replace = document.getElementById('replaceExisting').checked;
  
  const doImport = async (content) => {
    try {
      let groups = [];
      if (format === 'json') groups = JSON.parse(content);
      else if (format === 'yaml') groups = jsyaml.load(content);
      else if (format === 'gherkin') groups = parseGherkin(content);
      
      if (!Array.isArray(groups)) throw new Error('Expected array of groups');
      
      if (replace) state.groups = [];
      
      const importedIndices = [];
      groups.forEach(g => {
        importedIndices.push(state.groups.length);
        state.groups.push({
          id: Date.now() + Math.random(),
          name: g.name || 'Imported',
          collapsed: false,
          selected: false,
          disabled: g.disabled || false,
          steps: (g.steps||[]).map(s => ({
            id: Date.now()+Math.random(),
            type: s.type || 'given',
            text: s.text || '',
            status: null,
            selected: false,
            disabled: s.disabled || false
          }))
        });
      });
      
      saveState();
      render();
      closeModal('importModal');
      toast(t('imported'), 'success');
      log(`📥 ${t('imported')}: ${groups.length} scenarios`, 'success');
      
      if (autoRun) {
        log(`🚀 Auto-run after import`, 'info');
        const steps = [];
        importedIndices.forEach(gi => {
          state.groups[gi].steps.forEach((s, si) => {
            steps.push({ gi, si });
          });
        });
        if (steps.length) {
          resetStatuses(steps);
          render();
          await runStepsInternal(steps);
        }
      }
    } catch(e) {
      toast('Import error: ' + e.message, 'error');
    }
  };
  
  if (file) {
    const reader = new FileReader();
    reader.onload = async e => await doImport(e.target.result);
    reader.readAsText(file);
  } else if (text.trim()) {
    await doImport(text);
  } else {
    toast('Provide file or text', 'error');
  }
}

function parseGherkin(text) {
  const groups = [];
  let currentGroup = null;
  
  text.split('\n').forEach(line => {
    line = line.trim();
    if (!line || line.startsWith('#')) return;
    
    if (/^(Feature|Функція):/i.test(line)) {
      // Skip
    } else if (/^(Scenario|Сценарій):/i.test(line)) {
      currentGroup = { name: line.replace(/^(Scenario|Сценарій):\s*/i,''), steps: [] };
      groups.push(currentGroup);
    } else {
      const m = line.match(/^(Given|When|Then|And|But|Дано|Коли|Тоді|І|Але)\s+(.+)$/i);
      if (m && currentGroup) {
        const kw = m[1].toLowerCase();
        let type = 'and';
        if (/given|дано/i.test(kw)) type = 'given';
        else if (/when|коли/i.test(kw)) type = 'when';
        else if (/then|тоді/i.test(kw)) type = 'then';
        currentGroup.steps.push({ type, text: m[2] });
      }
    }
  });
  
  return groups;
}

function exportScenarios() {
  const format = prompt('Format: json / yaml / gherkin', 'json');
  if (!format) return;
  
  let content = '';
  let filename = 'scenarios';
  
  const data = state.groups.map(g => ({
    name: g.name,
    disabled: g.disabled,
    steps: g.steps.map(s => ({ type: s.type, text: s.text, disabled: s.disabled }))
  }));
  
  if (format === 'json') {
    content = JSON.stringify(data, null, 2);
    filename += '.json';
  } else if (format === 'yaml') {
    content = jsyaml.dump(data);
    filename += '.yaml';
  } else if (format === 'gherkin') {
    content = data.map(g => 
      `Feature: ${g.name}${g.disabled?' [disabled]':''}\n  Scenario: ${g.name}\n` +
      g.steps.map(s => `    ${s.disabled?'# ':''}${s.type.charAt(0).toUpperCase()+s.type.slice(1)} ${s.text}`).join('\n')
    ).join('\n\n');
    filename += '.feature';
  }
  
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  toast(t('exported'), 'success');
}

// ============ Schedule ============
function openSchedule() {
  document.getElementById('scheduleInterval').value = state.schedule.intervalSec;
  document.getElementById('scheduleTarget').value = state.schedule.target;
  updateScheduleStatus();
  document.getElementById('scheduleModal').classList.add('active');
}

function updateScheduleStatus() {
  const status = document.getElementById('scheduleStatus');
  if (state.schedule.active) {
    const remain = Math.max(0, Math.ceil((state.schedule.nextRunAt - Date.now())/1000));
    status.innerHTML = `
      <div style="color:var(--success);"><strong>✓ ${t('scheduleActive')}</strong></div>
      <div style="margin-top:6px;">${t('scheduleInterval')}: ${state.schedule.intervalSec}${t('seconds')}</div>
      <div>${t('nextRun')}: ${remain}${t('seconds')}</div>
      ${state.schedule.lastRun ? `<div>${t('lastRun')}: ${new Date(state.schedule.lastRun).toLocaleTimeString()}</div>` : ''}
    `;
  } else {
    status.innerHTML = `<div style="color:var(--text-secondary);">○ ${t('scheduleInactive')}</div>`;
  }
}

function startSchedule() {
  const interval = parseInt(document.getElementById('scheduleInterval').value);
  const target = document.getElementById('scheduleTarget').value;
  const runNow = document.getElementById('scheduleRunNow').checked;
  
  if (!interval || interval < 5) {
    toast('Interval must be at least 5 seconds', 'error');
    return;
  }
  
  stopScheduleTimers();
  
  state.schedule.active = true;
  state.schedule.intervalSec = interval;
  state.schedule.target = target;
  state.schedule.nextRunAt = Date.now() + (runNow ? 0 : interval*1000);
  saveState();
  
  const scheduledRunner = async () => {
    if (!state.schedule.active) return;
    if (!state.running) {
      state.schedule.lastRun = Date.now();
      log(`⏱ Scheduled run started`, 'info');
      if (target === 'all') await runAll();
      else await runSelected();
    } else {
      log(`⏱ Scheduled run skipped (already running)`, 'warning');
    }
    state.schedule.nextRunAt = Date.now() + state.schedule.intervalSec*1000;
    saveState();
  };
  
  scheduleTimer = setInterval(scheduledRunner, interval*1000);
  
  scheduleTicker = setInterval(() => {
    renderScheduleBadge();
    if (document.getElementById('scheduleModal').classList.contains('active')) {
      updateScheduleStatus();
    }
  }, 1000);
  
  if (runNow) {
    setTimeout(scheduledRunner, 100);
  }
  
  log(`⏱ ${t('scheduleStarted')} (${interval}${t('seconds')})`, 'success');
  toast(t('scheduleStarted'), 'success');
  renderScheduleBadge();
  updateScheduleStatus();
}

function stopSchedule() {
  stopScheduleTimers();
  state.schedule.active = false;
  state.schedule.nextRunAt = null;
  saveState();
  log(`⏱ ${t('scheduleStopped')}`, 'warning');
  toast(t('scheduleStopped'), 'success');
  renderScheduleBadge();
  updateScheduleStatus();
}

function stopScheduleTimers() {
  if (scheduleTimer) { clearInterval(scheduleTimer); scheduleTimer = null; }
  if (scheduleTicker) { clearInterval(scheduleTicker); scheduleTicker = null; }
}

function restoreSchedule() {
  if (state.schedule.active) {
    // Resume schedule
    const interval = state.schedule.intervalSec;
    const target = state.schedule.target;
    
    const scheduledRunner = async () => {
      if (!state.schedule.active) return;
      if (!state.running) {
        state.schedule.lastRun = Date.now();
        log(`⏱ Scheduled run started`, 'info');
        if (target === 'all') await runAll();
        else await runSelected();
      }
      state.schedule.nextRunAt = Date.now() + state.schedule.intervalSec*1000;
      saveState();
    };
    
    // Recalculate next run
    if (!state.schedule.nextRunAt || state.schedule.nextRunAt < Date.now()) {
      state.schedule.nextRunAt = Date.now() + interval*1000;
    }
    
    scheduleTimer = setInterval(scheduledRunner, interval*1000);
    scheduleTicker = setInterval(() => {
      renderScheduleBadge();
      if (document.getElementById('scheduleModal').classList.contains('active')) {
        updateScheduleStatus();
      }
    }, 1000);
    
    log(`⏱ Schedule restored (${interval}${t('seconds')})`, 'info');
  }
}

// ============ UI Actions ============
function toggleOrientation() {
  state.orientation = state.orientation === 'horizontal' ? 'vertical' : 'horizontal';
  saveState();
  render();
}

function switchTab(tab, ev) {
  state.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if (ev && ev.target) ev.target.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'report') renderReport();
}

function loadTarget() {
  const url = document.getElementById('targetUrl').value;
  state.targetUrl = url;
  saveState();
  document.getElementById('targetFrame').src = url;
  document.getElementById('iframeOverlay').classList.add('hidden');
}

function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ============ Init ============
function loadDefaultScenarios() {
  if (state.groups.length === 0) {
    state.groups = [{
      id: Date.now(),
      name: 'Приклад: Тест домашньої сторінки',
      collapsed: false,
      selected: false,
      disabled: false,
      steps: [
        { id: 1, type: 'given', text: 'I open https://example.com', status: null, selected: false, disabled: false },
        { id: 2, type: 'when', text: 'wait 1000', status: null, selected: false, disabled: false },
        { id: 3, type: 'then', text: 'I see "Example Domain"', status: null, selected: false, disabled: false }
      ]
    }];
  }
}

window.addEventListener('DOMContentLoaded', () => {
  loadState();
  loadDefaultScenarios();
  applyLang();
  render();
  restoreSchedule();
});

window.addEventListener('beforeunload', saveState);
</script>
