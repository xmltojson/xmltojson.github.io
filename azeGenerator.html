<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Generator & Solver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0c0c1d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e0e0ff;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 20px;
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff2d95);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 2px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0;
            justify-content: center;
            align-items: center;
            padding: 0 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        label {
            font-size: 0.85rem;
            color: #a0a0cc;
        }

        select, input[type="range"] {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #e0e0ff;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
        }

        select:focus, input[type="range"]:focus {
            border-color: #7b2ff7;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100px;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            padding: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(123, 47, 247, 0.6);
        }

        button {
            padding: 8px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #00d4ff, #0088cc);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        .btn-solve {
            background: linear-gradient(135deg, #7b2ff7, #5a1fd0);
            color: #fff;
            box-shadow: 0 4px 15px rgba(123, 47, 247, 0.3);
        }

        .btn-solve:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 47, 247, 0.5);
        }

        .btn-reset {
            background: linear-gradient(135deg, #ff2d95, #cc1a70);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 45, 149, 0.3);
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 45, 149, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .canvas-container {
            position: relative;
            margin: 10px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(123, 47, 247, 0.1);
            border: 2px solid rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            background: #0a0a1a;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            margin: 10px 0 20px;
            font-size: 0.85rem;
            color: #a0a0cc;
            flex-wrap: wrap;
            justify-content: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-start { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .dot-end { background: #ff2d95; box-shadow: 0 0 8px #ff2d95; }
        .dot-visited { background: rgba(123, 47, 247, 0.6); }
        .dot-path { background: #ffd700; box-shadow: 0 0 8px #ffd700; }
        .dot-current { background: #00d4ff; box-shadow: 0 0 8px #00d4ff; }

        .speed-value {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
            color: #7b2ff7;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; margin-top: 10px; }
            .controls { gap: 8px; }
            .control-group { padding: 6px 10px; }
            button { padding: 6px 14px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <h1>✨ Maze Generator & Solver</h1>
    
    <div class="controls">
        <div class="control-group">
            <label for="sizeSelect">Size:</label>
            <select id="sizeSelect">
                <option value="10">10×10</option>
                <option value="15">15×15</option>
                <option value="20" selected>20×20</option>
                <option value="30">30×30</option>
                <option value="40">40×40</option>
                <option value="50">50×50</option>
            </select>
        </div>
        
        <div class="control-group">
            <label for="algoSelect">Algorithm:</label>
            <select id="algoSelect">
                <option value="dfs">DFS Backtracker</option>
                <option value="bfs">BFS</option>
                <option value="astar">A* Search</option>
            </select>
        </div>
        
        <div class="control-group">
            <label for="speedRange">Speed:</label>
            <input type="range" id="speedRange" min="1" max="100" value="50">
            <span class="speed-value" id="speedValue">50</span>
        </div>
        
        <button class="btn-generate" id="btnGenerate">🔄 Generate</button>
        <button class="btn-solve" id="btnSolve">🧩 Solve</button>
        <button class="btn-reset" id="btnReset">🗑️ Clear</button>
    </div>
    
    <div class="canvas-container">
        <canvas id="mazeCanvas"></canvas>
    </div>
    
    <div class="status-bar">
        <div class="status-item"><div class="status-dot dot-start"></div> Start</div>
        <div class="status-item"><div class="status-dot dot-end"></div> End</div>
        <div class="status-item"><div class="status-dot dot-visited"></div> Visited</div>
        <div class="status-item"><div class="status-dot dot-current"></div> Current</div>
        <div class="status-item"><div class="status-dot dot-path"></div> Solution</div>
        <div class="status-item" id="statusText">Ready</div>
    </div>

    <script>
    (function() {
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const sizeSelect = document.getElementById('sizeSelect');
        const algoSelect = document.getElementById('algoSelect');
        const speedRange = document.getElementById('speedRange');
        const speedValue = document.getElementById('speedValue');
        const btnGenerate = document.getElementById('btnGenerate');
        const btnSolve = document.getElementById('btnSolve');
        const btnReset = document.getElementById('btnReset');
        const statusText = document.getElementById('statusText');

        let maze = null;
        let rows = 20, cols = 20;
        let cellSize = 20;
        let wallWidth = 2;
        let animating = false;
        let animationId = null;
        let solveState = null; // for storing solve progress

        // Cell: { top, right, bottom, left } walls (true = wall exists)
        // Also: visited (for generation), solveVisited, onPath, current

        class MazeCell {
            constructor() {
                this.top = true;
                this.right = true;
                this.bottom = true;
                this.left = true;
                this.visited = false;
                this.solveVisited = false;
                this.onPath = false;
                this.current = false;
            }
        }

        function createGrid(r, c) {
            let grid = [];
            for (let i = 0; i < r; i++) {
                grid[i] = [];
                for (let j = 0; j < c; j++) {
                    grid[i][j] = new MazeCell();
                }
            }
            return grid;
        }

        function generateMaze(r, c) {
            let grid = createGrid(r, c);
            let stack = [];
            let startRow = 0, startCol = 0;
            grid[startRow][startCol].visited = true;
            stack.push([startRow, startCol]);

            while (stack.length > 0) {
                let [cr, cc] = stack[stack.length - 1];
                let neighbors = [];
                // top
                if (cr > 0 && !grid[cr-1][cc].visited) neighbors.push([cr-1, cc, 'top']);
                // right
                if (cc < c-1 && !grid[cr][cc+1].visited) neighbors.push([cr, cc+1, 'right']);
                // bottom
                if (cr < r-1 && !grid[cr+1][cc].visited) neighbors.push([cr+1, cc, 'bottom']);
                // left
                if (cc > 0 && !grid[cr][cc-1].visited) neighbors.push([cr, cc-1, 'left']);

                if (neighbors.length > 0) {
                    let [nr, nc, dir] = neighbors[Math.floor(Math.random() * neighbors.length)];
                    // Remove walls
                    if (dir === 'top') { grid[cr][cc].top = false; grid[nr][nc].bottom = false; }
                    if (dir === 'right') { grid[cr][cc].right = false; grid[nr][nc].left = false; }
                    if (dir === 'bottom') { grid[cr][cc].bottom = false; grid[nr][nc].top = false; }
                    if (dir === 'left') { grid[cr][cc].left = false; grid[nr][nc].right = false; }
                    grid[nr][nc].visited = true;
                    stack.push([nr, nc]);
                } else {
                    stack.pop();
                }
            }

            // Reset visited for solving
            for (let i = 0; i < r; i++)
                for (let j = 0; j < c; j++)
                    grid[i][j].visited = false;

            return grid;
        }

        function calculateDimensions() {
            const padding = 40;
            const maxW = window.innerWidth - padding;
            const maxH = window.innerHeight - 260;
            
            const isLandscape = window.innerWidth > window.innerHeight;
            
            let effectiveRows = rows;
            let effectiveCols = cols;
            
            cellSize = Math.floor(Math.min(maxW / effectiveCols, maxH / effectiveRows));
            cellSize = Math.max(cellSize, 6);
            cellSize = Math.min(cellSize, 40);
            
            wallWidth = cellSize > 15 ? 2 : 1;
            
            canvas.width = effectiveCols * cellSize + wallWidth;
            canvas.height = effectiveRows * cellSize + wallWidth;
        }

        function drawMaze() {
            if (!maze) return;
            
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startR = 0, startC = 0;
            const endR = rows - 1, endC = cols - 1;

            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    let x = j * cellSize;
                    let y = i * cellSize;
                    let cell = maze[i][j];

                    // Fill cell background
                    if (i === startR && j === startC) {
                        ctx.fillStyle = 'rgba(0, 255, 136, 0.3)';
                        ctx.fillRect(x + wallWidth, y + wallWidth, cellSize - wallWidth, cellSize - wallWidth);
                        // Glow
                        let grd = ctx.createRadialGradient(x + cellSize/2, y + cellSize/2, 0, x + cellSize/2, y + cellSize/2, cellSize/2);
                        grd.addColorStop(0, 'rgba(0, 255, 136, 0.5)');
                        grd.addColorStop(1, 'rgba(0, 255, 136, 0)');
                        ctx.fillStyle = grd;
                        ctx.fillRect(x, y, cellSize, cellSize);
                    } else if (i === endR && j === endC) {
                        ctx.fillStyle = 'rgba(255, 45, 149, 0.3)';
                        ctx.fillRect(x + wallWidth, y + wallWidth, cellSize - wallWidth, cellSize - wallWidth);
                        let grd = ctx.createRadialGradient(x + cellSize/2, y + cellSize/2, 0, x + cellSize/2, y + cellSize/2, cellSize/2);
                        grd.addColorStop(0, 'rgba(255, 45, 149, 0.5)');
                        grd.addColorStop(1, 'rgba(255, 45, 149, 0)');
                        ctx.fillStyle = grd;
                        ctx.fillRect(x, y, cellSize, cellSize);
                    } else if (cell.onPath) {
                        ctx.fillStyle = 'rgba(255, 215, 0, 0.35)';
                        ctx.fillRect(x + wallWidth, y + wallWidth, cellSize - wallWidth, cellSize - wallWidth);
                    } else if (cell.current) {
                        ctx.fillStyle = 'rgba(0, 212, 255, 0.4)';
                        ctx.fillRect(x + wallWidth, y + wallWidth, cellSize - wallWidth, cellSize - wallWidth);
                    } else if (cell.solveVisited) {
                        ctx.fillStyle = 'rgba(123, 47, 247, 0.15)';
                        ctx.fillRect(x + wallWidth, y + wallWidth, cellSize - wallWidth, cellSize - wallWidth);
                    }

                    // Draw path line through solution cells
                    if (cell.onPath && cellSize > 8) {
                        ctx.fillStyle = 'rgba(255, 215, 0, 0.8)';
                        let dotSize = Math.max(cellSize * 0.25, 2);
                        ctx.beginPath();
                        ctx.arc(x + cellSize / 2, y + cellSize / 2, dotSize, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Current cell marker
                    if (cell.current && cellSize > 8) {
                        ctx.fillStyle = 'rgba(0, 212, 255, 0.9)';
                        let dotSize = Math.max(cellSize * 0.3, 2);
                        ctx.beginPath();
                        ctx.arc(x + cellSize / 2, y + cellSize / 2, dotSize, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Draw walls
                    ctx.strokeStyle = '#2a2a5a';
                    ctx.lineWidth = wallWidth;
                    ctx.lineCap = 'round';

                    if (cell.top) {
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x + cellSize, y);
                        ctx.stroke();
                    }
                    if (cell.right) {
                        ctx.beginPath();
                        ctx.moveTo(x + cellSize, y);
                        ctx.lineTo(x + cellSize, y + cellSize);
                        ctx.stroke();
                    }
                    if (cell.bottom) {
                        ctx.beginPath();
                        ctx.moveTo(x, y + cellSize);
                        ctx.lineTo(x + cellSize, y + cellSize);
                        ctx.stroke();
                    }
                    if (cell.left) {
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x, y + cellSize);
                        ctx.stroke();
                    }
                }
            }

            // Draw start and end icons
            if (cellSize >= 10) {
                // Start icon (play triangle)
                let sx = 0 * cellSize + cellSize * 0.3;
                let sy = 0 * cellSize + cellSize * 0.25;
                ctx.fillStyle = '#00ff88';
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx + cellSize * 0.5, sy + cellSize * 0.25);
                ctx.lineTo(sx, sy + cellSize * 0.5);
                ctx.closePath();
                ctx.fill();

                // End icon (flag/star)
                let ex = (cols-1) * cellSize + cellSize * 0.5;
                let ey = (rows-1) * cellSize + cellSize * 0.5;
                ctx.fillStyle = '#ff2d95';
                ctx.beginPath();
                let spikes = 5, outerR = cellSize * 0.35, innerR = cellSize * 0.15;
                for (let k = 0; k < spikes * 2; k++) {
                    let r = k % 2 === 0 ? outerR : innerR;
                    let angle = (k * Math.PI / spikes) - Math.PI / 2;
                    if (k === 0) ctx.moveTo(ex + r * Math.cos(angle), ey + r * Math.sin(angle));
                    else ctx.lineTo(ex + r * Math.cos(angle), ey + r * Math.sin(angle));
                }
                ctx.closePath();
                ctx.fill();
            }
        }

        function getNeighbors(r, c) {
            let neighbors = [];
            let cell = maze[r][c];
            if (!cell.top && r > 0) neighbors.push([r-1, c]);
            if (!cell.right && c < cols-1) neighbors.push([r, c+1]);
            if (!cell.bottom && r < rows-1) neighbors.push([r+1, c]);
            if (!cell.left && c > 0) neighbors.push([r, c-1]);
            return neighbors;
        }

        function getSpeed() {
            let v = parseInt(speedRange.value);
            // Map 1-100 to delay: 200ms to 1ms
            return Math.max(1, Math.floor(201 - v * 2));
        }

        // ---- SOLVE ALGORITHMS ----

        async function solveDFS() {
            animating = true;
            updateButtons();
            statusText.textContent = '🔍 Solving with DFS...';
            
            let stack = [[0, 0, null]]; // [row, col, parent]
            let parentMap = {};
            let found = false;
            let endR = rows - 1, endC = cols - 1;
            
            maze[0][0].solveVisited = true;
            parentMap['0,0'] = null;

            while (stack.length > 0 && animating) {
                let [cr, cc] = stack.pop();
                
                // Clear previous current
                for (let i = 0; i < rows; i++)
                    for (let j = 0; j < cols; j++)
                        maze[i][j].current = false;
                
                maze[cr][cc].current = true;
                maze[cr][cc].solveVisited = true;
                
                drawMaze();
                saveState();
                
                if (cr === endR && cc === endC) {
                    found = true;
                    break;
                }

                let neighbors = getNeighbors(cr, cc);
                // Shuffle for variety
                neighbors.sort(() => Math.random() - 0.5);
                
                for (let [nr, nc] of neighbors) {
                    if (!maze[nr][nc].solveVisited) {
                        maze[nr][nc].solveVisited = true;
                        parentMap[`${nr},${nc}`] = `${cr},${cc}`;
                        stack.push([nr, nc]);
                    }
                }

                await delay(getSpeed());
            }

            if (found && animating) {
                await tracePath(parentMap, endR, endC);
                statusText.textContent = '✅ Path found!';
            } else if (animating) {
                statusText.textContent = '❌ No path found';
            }

            // Clear current markers
            for (let i = 0; i < rows; i++)
                for (let j = 0; j < cols; j++)
                    maze[i][j].current = false;
            
            drawMaze();
            animating = false;
            updateButtons();
            saveState();
        }

        async function solveBFS() {
            animating = true;
            updateButtons();
            statusText.textContent = '🔍 Solving with BFS...';
            
            let queue = [[0, 0]];
            let parentMap = {};
            let found = false;
            let endR = rows - 1, endC = cols - 1;
            
            maze[0][0].solveVisited = true;
            parentMap['0,0'] = null;

            while (queue.length > 0 && animating) {
                let [cr, cc] = queue.shift();
                
                for (let i = 0; i < rows; i++)
                    for (let j = 0; j < cols; j++)
                        maze[i][j].current = false;
                
                maze[cr][cc].current = true;
                
                drawMaze();
                saveState();
                
                if (cr === endR && cc === endC) {
                    found = true;
                    break;
                }

                let neighbors = getNeighbors(cr, cc);
                for (let [nr, nc] of neighbors) {
                    if (!maze[nr][nc].solveVisited) {
                        maze[nr][nc].solveVisited = true;
                        parentMap[`${nr},${nc}`] = `${cr},${cc}`;
                        queue.push([nr, nc]);
                    }
                }

                await delay(getSpeed());
            }

            if (found && animating) {
                await tracePath(parentMap, endR, endC);
                statusText.textContent = '✅ Path found!';
            } else if (animating) {
                statusText.textContent = '❌ No path found';
            }

            for (let i = 0; i < rows; i++)
                for (let j = 0; j < cols; j++)
                    maze[i][j].current = false;
            
            drawMaze();
            animating = false;
            updateButtons();
            saveState();
        }

        async function solveAStar() {
            animating = true;
            updateButtons();
            statusText.textContent = '🔍 Solving with A*...';
            
            let endR = rows - 1, endC = cols - 1;
            
            function heuristic(r, c) {
                return Math.abs(r - endR) + Math.abs(c - endC);
            }

            let openSet = [{ r: 0, c: 0, g: 0, f: heuristic(0, 0) }];
            let gScore = {};
            gScore['0,0'] = 0;
            let parentMap = {};
            parentMap['0,0'] = null;
            let closedSet = new Set();
            let found = false;

            maze[0][0].solveVisited = true;

            while (openSet.length > 0 && animating) {
                // Get node with lowest f
                openSet.sort((a, b) => a.f - b.f);
                let current = openSet.shift();
                let { r: cr, c: cc } = current;
                let key = `${cr},${cc}`;

                if (closedSet.has(key)) continue;
                closedSet.add(key);

                for (let i = 0; i < rows; i++)
                    for (let j = 0; j < cols; j++)
                        maze[i][j].current = false;
                
                maze[cr][cc].current = true;
                maze[cr][cc].solveVisited = true;
                
                drawMaze();
                saveState();

                if (cr === endR && cc === endC) {
                    found = true;
                    break;
                }

                let neighbors = getNeighbors(cr, cc);
                for (let [nr, nc] of neighbors) {
                    let nkey = `${nr},${nc}`;
                    if (closedSet.has(nkey)) continue;
                    
                    let tentativeG = (gScore[key] || 0) + 1;
                    if (tentativeG < (gScore[nkey] || Infinity)) {
                        gScore[nkey] = tentativeG;
                        parentMap[nkey] = key;
                        openSet.push({ r: nr, c: nc, g: tentativeG, f: tentativeG + heuristic(nr, nc) });
                        maze[nr][nc].solveVisited = true;
                    }
                }

                await delay(getSpeed());
            }

            if (found && animating) {
                await tracePath(parentMap, endR, endC);
                statusText.textContent = '✅ Path found!';
            } else if (animating) {
                statusText.textContent = '❌ No path found';
            }

            for (let i = 0; i < rows; i++)
                for (let j = 0; j < cols; j++)
                    maze[i][j].current = false;
            
            drawMaze();
            animating = false;
            updateButtons();
            saveState();
        }

        async function tracePath(parentMap, endR, endC) {
            let path = [];
            let key = `${endR},${endC}`;
            while (key !== null) {
                let [r, c] = key.split(',').map(Number);
                path.unshift([r, c]);
                key = parentMap[key];
            }

            for (let [r, c] of path) {
                if (!animating) break;
                maze[r][c].onPath = true;
                drawMaze();
                saveState();
                await delay(Math.max(getSpeed() / 2, 5));
            }
        }

        function delay(ms) {
            return new Promise(resolve => {
                animationId = setTimeout(resolve, ms);
            });
        }

        function updateButtons() {
            btnGenerate.disabled = animating;
            btnSolve.disabled = animating || !maze;
            btnReset.disabled = false;
        }

        function clearSolveState() {
            if (!maze) return;
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    maze[i][j].solveVisited = false;
                    maze[i][j].onPath = false;
                    maze[i][j].current = false;
                }
            }
        }

        // ---- SAVE / LOAD STATE ----

        function saveState() {
            if (!maze) return;
            let state = {
                rows,
                cols,
                algorithm: algoSelect.value,
                speed: speedRange.value,
                size: sizeSelect.value,
                maze: maze.map(row => row.map(cell => ({
                    top: cell.top,
                    right: cell.right,
                    bottom: cell.bottom,
                    left: cell.left,
                    solveVisited: cell.solveVisited,
                    onPath: cell.onPath,
                    current: cell.current
                })))
            };
            try {
                localStorage.setItem('mazeState', JSON.stringify(state));
            } catch(e) {}
        }

        function loadState() {
            try {
                let data = localStorage.getItem('mazeState');
                if (!data) return false;
                let state = JSON.parse(data);
                rows = state.rows;
                cols = state.cols;
                sizeSelect.value = state.size || String(rows);
                algoSelect.value = state.algorithm || 'dfs';
                speedRange.value = state.speed || 50;
                speedValue.textContent = speedRange.value;

                maze = [];
                for (let i = 0; i < rows; i++) {
                    maze[i] = [];
                    for (let j = 0; j < cols; j++) {
                        let c = new MazeCell();
                        let s = state.maze[i][j];
                        c.top = s.top;
                        c.right = s.right;
                        c.bottom = s.bottom;
                        c.left = s.left;
                        c.solveVisited = s.solveVisited || false;
                        c.onPath = s.onPath || false;
                        c.current = s.current || false;
                        maze[i][j] = c;
                    }
                }

                calculateDimensions();
                drawMaze();
                updateButtons();
                statusText.textContent = '🔄 Restored from save';
                return true;
            } catch(e) {
                return false;
            }
        }

        // ---- EVENT HANDLERS ----

        btnGenerate.addEventListener('click', () => {
            if (animating) return;
            rows = cols = parseInt(sizeSelect.value);
            calculateDimensions();
            maze = generateMaze(rows, cols);
            drawMaze();
            saveState();
            statusText.textContent = `✅ Generated ${rows}×${cols} maze`;
            updateButtons();
        });

        btnSolve.addEventListener('click', () => {
            if (animating || !maze) return;
            clearSolveState();
            drawMaze();
            
            let algo = algoSelect.value;
            if (algo === 'dfs') solveDFS();
            else if (algo === 'bfs') solveBFS();
            else if (algo === 'astar') solveAStar();
        });

        btnReset.addEventListener('click', () => {
            if (animating) {
                animating = false;
                clearTimeout(animationId);
            }
            if (maze) {
                clearSolveState();
                drawMaze();
                saveState();
            }
            statusText.textContent = 'Ready';
            updateButtons();
        });

        speedRange.addEventListener('input', () => {
            speedValue.textContent = speedRange.value;
            saveState();
        });

        sizeSelect.addEventListener('change', () => saveState());
        algoSelect.addEventListener('change', () => saveState());

        // Handle resize and orientation change
        function handleResize() {
            if (maze) {
                calculateDimensions();
                drawMaze();
            }
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', () => {
            setTimeout(handleResize, 100);
        });

        // ---- INIT ----
        if (!loadState()) {
            rows = cols = parseInt(sizeSelect.value);
            calculateDimensions();
            maze = generateMaze(rows, cols);
            drawMaze();
            saveState();
            statusText.textContent = `✅ Generated ${rows}×${cols} maze`;
        }
        updateButtons();
    })();
    </script>
</body>
</html>
