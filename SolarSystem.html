<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Interactive Solar System simulator with accurate relative orbital speeds, detailed planet information, zoom and pan controls, and persistent state. Explore all 8 planets orbiting the Sun in real-time.">
    <meta name="keywords" content="solar system, planets, astronomy, space, simulator, interactive, orbits, sun, mercury, venus, earth, mars, jupiter, saturn, uranus, neptune">
    <meta name="author" content="The Solar System">
    <meta name="theme-color" content="#000022">
    <meta property="og:title" content="The Solar System - Interactive Space Simulator">
    <meta property="og:description" content="Explore an interactive Solar System with orbiting planets, accurate speeds, and detailed information tooltips.">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><radialGradient id='s' cx='40%25' cy='40%25'><stop offset='0%25' stop-color='%23fff8e0'/><stop offset='30%25' stop-color='%23ffdd44'/><stop offset='70%25' stop-color='%23ffaa22'/><stop offset='100%25' stop-color='%23ff6600'/></radialGradient></defs><circle cx='50' cy='50' r='45' fill='url(%23s)'/><ellipse cx='50' cy='50' rx='30' ry='8' fill='none' stroke='%234488ff' stroke-width='2' transform='rotate(-20 50 50)' opacity='0.6'/><circle cx='75' cy='38' r='5' fill='%234da6ff'/><ellipse cx='50' cy='50' rx='42' ry='12' fill='none' stroke='%23e8d5a0' stroke-width='1.5' transform='rotate(10 50 50)' opacity='0.4'/><circle cx='20' cy='62' r='4' fill='%23e8d5a0'/></svg>" type="image/svg+xml">
    <title>The Solar System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000011;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
        }

        .tooltip {
            position: absolute;
            background: rgba(10, 10, 40, 0.92);
            border: 1px solid rgba(100, 150, 255, 0.4);
            border-radius: 12px;
            padding: 14px 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 100, 255, 0.15);
            max-width: 280px;
            min-width: 200px;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip h3 {
            margin-bottom: 8px;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .tooltip .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .tooltip .info-row .label {
            color: rgba(180, 200, 255, 0.7);
        }

        .tooltip .info-row .value {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 500;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 50;
            background: rgba(10, 10, 40, 0.8);
            padding: 10px 18px;
            border-radius: 30px;
            border: 1px solid rgba(100, 150, 255, 0.2);
            backdrop-filter: blur(10px);
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button {
            background: rgba(60, 100, 200, 0.3);
            border: 1px solid rgba(100, 150, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .controls button:hover {
            background: rgba(60, 100, 200, 0.6);
        }

        .controls button.active {
            background: rgba(60, 130, 255, 0.6);
            border-color: rgba(100, 180, 255, 0.6);
        }

        .controls .speed-label {
            font-size: 12px;
            color: rgba(180, 200, 255, 0.7);
        }

        .controls input[type="range"] {
            width: 100px;
            accent-color: #4488ff;
        }

        .title-bar {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 50;
        }

        .title-bar h1 {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(180, 210, 255, 0.8);
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.3);
        }

        @media (max-width: 600px) {
            .controls {
                bottom: 10px;
                padding: 8px 12px;
                gap: 6px;
            }
            .controls button {
                padding: 6px 12px;
                font-size: 11px;
            }
            .title-bar h1 {
                font-size: 14px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="title-bar">
        <h1>The Solar System</h1>
    </div>

    <div id="canvas-container">
        <canvas id="solarCanvas"></canvas>
    </div>

    <div class="tooltip" id="tooltip">
        <h3 id="tt-name"></h3>
        <div id="tt-content"></div>
    </div>

    <div class="controls">
        <span class="speed-label">Speed:</span>
        <input type="range" id="speedSlider" min="0" max="5" step="0.1" value="1">
        <button id="btnPause">⏸ Pause</button>
        <button id="btnReset">↺ Reset</button>
        <button id="btnOrbits">◯ Orbits</button>
        <button id="btnLabels">Aa Labels</button>
        <button id="btnZoomIn">+</button>
        <button id="btnZoomOut">−</button>
    </div>

    <script>
        const STORAGE_KEY = 'theSolarSystemState';

        const planetData = [
            {
                name: 'Mercury',
                color: '#b5b5b5',
                radius: 3,
                orbitRadius: 58,
                orbitalPeriod: 88,
                info: {
                    'Type': 'Terrestrial',
                    'Diameter': '4,879 km',
                    'Distance from Sun': '57.9M km',
                    'Orbital Period': '88 days',
                    'Day Length': '59 Earth days',
                    'Temperature': '-180°C to 430°C',
                    'Moons': '0',
                    'Fun Fact': 'Smallest planet in our solar system'
                }
            },
            {
                name: 'Venus',
                color: '#e8cda0',
                radius: 5,
                orbitRadius: 90,
                orbitalPeriod: 225,
                info: {
                    'Type': 'Terrestrial',
                    'Diameter': '12,104 km',
                    'Distance from Sun': '108.2M km',
                    'Orbital Period': '225 days',
                    'Day Length': '243 Earth days',
                    'Temperature': '462°C average',
                    'Moons': '0',
                    'Fun Fact': 'Rotates backwards compared to most planets'
                }
            },
            {
                name: 'Earth',
                color: '#4da6ff',
                radius: 5.5,
                orbitRadius: 125,
                orbitalPeriod: 365,
                info: {
                    'Type': 'Terrestrial',
                    'Diameter': '12,756 km',
                    'Distance from Sun': '149.6M km',
                    'Orbital Period': '365.25 days',
                    'Day Length': '24 hours',
                    'Temperature': '15°C average',
                    'Moons': '1',
                    'Fun Fact': 'Only known planet with life'
                }
            },
            {
                name: 'Mars',
                color: '#e07040',
                radius: 4,
                orbitRadius: 165,
                orbitalPeriod: 687,
                info: {
                    'Type': 'Terrestrial',
                    'Diameter': '6,792 km',
                    'Distance from Sun': '227.9M km',
                    'Orbital Period': '687 days',
                    'Day Length': '24.6 hours',
                    'Temperature': '-65°C average',
                    'Moons': '2',
                    'Fun Fact': 'Has the tallest volcano: Olympus Mons'
                }
            },
            {
                name: 'Jupiter',
                color: '#d4a574',
                radius: 14,
                orbitRadius: 230,
                orbitalPeriod: 4333,
                info: {
                    'Type': 'Gas Giant',
                    'Diameter': '142,984 km',
                    'Distance from Sun': '778.6M km',
                    'Orbital Period': '11.86 years',
                    'Day Length': '9.9 hours',
                    'Temperature': '-110°C average',
                    'Moons': '95',
                    'Fun Fact': 'Largest planet, Great Red Spot is a giant storm'
                }
            },
            {
                name: 'Saturn',
                color: '#e8d5a0',
                radius: 12,
                orbitRadius: 300,
                orbitalPeriod: 10759,
                hasRings: true,
                info: {
                    'Type': 'Gas Giant',
                    'Diameter': '120,536 km',
                    'Distance from Sun': '1.434B km',
                    'Orbital Period': '29.46 years',
                    'Day Length': '10.7 hours',
                    'Temperature': '-140°C average',
                    'Moons': '146',
                    'Fun Fact': 'Its rings are mostly ice and rock particles'
                }
            },
            {
                name: 'Uranus',
                color: '#7de3e3',
                radius: 8,
                orbitRadius: 370,
                orbitalPeriod: 30687,
                info: {
                    'Type': 'Ice Giant',
                    'Diameter': '51,118 km',
                    'Distance from Sun': '2.871B km',
                    'Orbital Period': '84.01 years',
                    'Day Length': '17.2 hours',
                    'Temperature': '-195°C average',
                    'Moons': '27',
                    'Fun Fact': 'Rotates on its side with a 98° axial tilt'
                }
            },
            {
                name: 'Neptune',
                color: '#4466ff',
                radius: 7.5,
                orbitRadius: 430,
                orbitalPeriod: 60190,
                info: {
                    'Type': 'Ice Giant',
                    'Diameter': '49,528 km',
                    'Distance from Sun': '4.495B km',
                    'Orbital Period': '164.8 years',
                    'Day Length': '16.1 hours',
                    'Temperature': '-200°C average',
                    'Moons': '16',
                    'Fun Fact': 'Has the strongest winds in the solar system'
                }
            }
        ];

        let state = {
            time: 0,
            speed: 1,
            paused: false,
            showOrbits: true,
            showLabels: true,
            zoom: 1,
            panX: 0,
            panY: 0
        };

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                }
            } catch (e) {
                console.warn('Failed to load state:', e);
            }
        }

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {
                console.warn('Failed to save state:', e);
            }
        }

        loadState();

        const canvas = document.getElementById('solarCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const ttName = document.getElementById('tt-name');
        const ttContent = document.getElementById('tt-content');

        let width, height, centerX, centerY, scaleFactor;
        let stars = [];
        let hoveredPlanet = null;
        let mouseX = 0, mouseY = 0;
        let lastTime = performance.now();

        function generateStars() {
            stars = [];
            for (let i = 0; i < 400; i++) {
                stars.push({
                    x: Math.random(),
                    y: Math.random(),
                    size: Math.random() * 2 + 0.5,
                    brightness: Math.random() * 0.5 + 0.5,
                    twinkleSpeed: Math.random() * 2 + 1
                });
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2 + state.panX;
            centerY = height / 2 + state.panY;
            const minDim = Math.min(width, height);
            scaleFactor = (minDim / 950) * state.zoom;
        }

        generateStars();
        resize();
        window.addEventListener('resize', () => { resize(); });

        const speedSlider = document.getElementById('speedSlider');
        const btnPause = document.getElementById('btnPause');
        const btnReset = document.getElementById('btnReset');
        const btnOrbits = document.getElementById('btnOrbits');
        const btnLabels = document.getElementById('btnLabels');
        const btnZoomIn = document.getElementById('btnZoomIn');
        const btnZoomOut = document.getElementById('btnZoomOut');

        speedSlider.value = state.speed;
        btnPause.classList.toggle('active', state.paused);
        btnPause.textContent = state.paused ? '▶ Play' : '⏸ Pause';
        btnOrbits.classList.toggle('active', state.showOrbits);
        btnLabels.classList.toggle('active', state.showLabels);

        speedSlider.addEventListener('input', (e) => {
            state.speed = parseFloat(e.target.value);
            saveState();
        });

        btnPause.addEventListener('click', () => {
            state.paused = !state.paused;
            btnPause.classList.toggle('active', state.paused);
            btnPause.textContent = state.paused ? '▶ Play' : '⏸ Pause';
            saveState();
        });

        btnReset.addEventListener('click', () => {
            state.time = 0;
            state.speed = 1;
            state.paused = false;
            state.zoom = 1;
            state.panX = 0;
            state.panY = 0;
            speedSlider.value = 1;
            btnPause.classList.remove('active');
            btnPause.textContent = '⏸ Pause';
            resize();
            saveState();
        });

        btnOrbits.addEventListener('click', () => {
            state.showOrbits = !state.showOrbits;
            btnOrbits.classList.toggle('active', state.showOrbits);
            saveState();
        });

        btnLabels.addEventListener('click', () => {
            state.showLabels = !state.showLabels;
            btnLabels.classList.toggle('active', state.showLabels);
            saveState();
        });

        btnZoomIn.addEventListener('click', () => {
            state.zoom = Math.min(state.zoom * 1.2, 5);
            resize();
            saveState();
        });

        btnZoomOut.addEventListener('click', () => {
            state.zoom = Math.max(state.zoom / 1.2, 0.3);
            resize();
            saveState();
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            checkHover(e.clientX, e.clientY);
        });

        canvas.addEventListener('mouseleave', () => {
            hoveredPlanet = null;
            tooltip.classList.remove('visible');
        });

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            checkHover(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            checkHover(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchend', () => {
            hoveredPlanet = null;
            tooltip.classList.remove('visible');
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                state.zoom = Math.min(state.zoom * 1.08, 5);
            } else {
                state.zoom = Math.max(state.zoom / 1.08, 0.3);
            }
            resize();
            saveState();
        }, { passive: false });

        let isPanning = false;
        let panStartX, panStartY, panStartStateX, panStartStateY;

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 1 || (e.button === 0 && e.shiftKey)) {
                isPanning = true;
                panStartX = e.clientX;
                panStartY = e.clientY;
                panStartStateX = state.panX;
                panStartStateY = state.panY;
                e.preventDefault();
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isPanning) {
                state.panX = panStartStateX + (e.clientX - panStartX);
                state.panY = panStartStateY + (e.clientY - panStartY);
                resize();
            }
        });

        window.addEventListener('mouseup', () => {
            if (isPanning) {
                isPanning = false;
                saveState();
            }
        });

        function checkHover(mx, my) {
            hoveredPlanet = null;

            const sunDist = Math.sqrt((mx - centerX) ** 2 + (my - centerY) ** 2);
            if (sunDist < 25 * scaleFactor) {
                hoveredPlanet = {
                    name: 'Sun',
                    color: '#ffdd44',
                    info: {
                        'Type': 'G-type Main Sequence Star',
                        'Diameter': '1,391,000 km',
                        'Mass': '1.989 × 10³⁰ kg',
                        'Surface Temp': '5,500°C',
                        'Core Temp': '15,000,000°C',
                        'Age': '4.6 billion years',
                        'Composition': '73% Hydrogen, 25% Helium',
                        'Fun Fact': 'Contains 99.86% of the solar system mass'
                    }
                };
            }

            for (const planet of planetData) {
                const angle = (state.time / planet.orbitalPeriod) * Math.PI * 2;
                const orbitR = planet.orbitRadius * scaleFactor;
                const px = centerX + Math.cos(angle) * orbitR;
                const py = centerY + Math.sin(angle) * orbitR;
                const pr = Math.max(planet.radius * scaleFactor, 4);
                const dist = Math.sqrt((mx - px) ** 2 + (my - py) ** 2);

                if (dist < pr + 8) {
                    hoveredPlanet = planet;
                    break;
                }
            }

            if (hoveredPlanet) {
                showTooltip(hoveredPlanet, mx, my);
            } else {
                tooltip.classList.remove('visible');
            }
        }

        function showTooltip(planet, mx, my) {
            ttName.textContent = planet.name;
            ttName.style.color = planet.color;

            let html = '';
            for (const [key, val] of Object.entries(planet.info)) {
                html += `<div class="info-row"><span class="label">${key}</span><span class="value">${val}</span></div>`;
            }
            ttContent.innerHTML = html;

            let tx = mx + 20;
            let ty = my - 20;

            if (tx + 280 > width) tx = mx - 290;
            if (ty + 250 > height) ty = height - 260;
            if (ty < 10) ty = 10;
            if (tx < 10) tx = 10;

            tooltip.style.left = tx + 'px';
            tooltip.style.top = ty + 'px';
            tooltip.classList.add('visible');
        }

        function drawStars(time) {
            for (const star of stars) {
                const twinkle = 0.5 + 0.5 * Math.sin(time * 0.001 * star.twinkleSpeed);
                const alpha = star.brightness * twinkle;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x * width, star.y * height, star.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawSun() {
            const sunRadius = 22 * scaleFactor;

            const glowGrad = ctx.createRadialGradient(centerX, centerY, sunRadius * 0.5, centerX, centerY, sunRadius * 5);
            glowGrad.addColorStop(0, 'rgba(255, 200, 50, 0.15)');
            glowGrad.addColorStop(0.5, 'rgba(255, 150, 30, 0.05)');
            glowGrad.addColorStop(1, 'rgba(255, 100, 0, 0)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius * 5, 0, Math.PI * 2);
            ctx.fill();

            const coronaGrad = ctx.createRadialGradient(centerX, centerY, sunRadius * 0.8, centerX, centerY, sunRadius * 2.5);
            coronaGrad.addColorStop(0, 'rgba(255, 220, 100, 0.3)');
            coronaGrad.addColorStop(1, 'rgba(255, 150, 50, 0)');
            ctx.fillStyle = coronaGrad;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius * 2.5, 0, Math.PI * 2);
            ctx.fill();

            const sunGrad = ctx.createRadialGradient(centerX - sunRadius * 0.2, centerY - sunRadius * 0.2, sunRadius * 0.1, centerX, centerY, sunRadius);
            sunGrad.addColorStop(0, '#fff8e0');
            sunGrad.addColorStop(0.3, '#ffdd44');
            sunGrad.addColorStop(0.7, '#ffaa22');
            sunGrad.addColorStop(1, '#ff6600');
            ctx.fillStyle = sunGrad;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.globalCompositeOperation = 'overlay';
            for (let i = 0; i < 5; i++) {
                const angle = (state.time * 0.01 + i * 1.3);
                const sx = centerX + Math.cos(angle) * sunRadius * 0.3;
                const sy = centerY + Math.sin(angle) * sunRadius * 0.3;
                const spotGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, sunRadius * 0.4);
                spotGrad.addColorStop(0, 'rgba(255, 200, 100, 0.3)');
                spotGrad.addColorStop(1, 'rgba(255, 150, 50, 0)');
                ctx.fillStyle = spotGrad;
                ctx.beginPath();
                ctx.arc(sx, sy, sunRadius * 0.4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';

            if (state.showLabels) {
                ctx.fillStyle = 'rgba(255, 220, 100, 0.8)';
                ctx.font = `${Math.max(11, 13 * scaleFactor)}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('Sun', centerX, centerY + sunRadius + 18 * scaleFactor);
            }
        }

        function drawOrbit(orbitRadius) {
            const r = orbitRadius * scaleFactor;
            ctx.strokeStyle = 'rgba(80, 120, 200, 0.12)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function lightenColor(hex, amount) {
            const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + amount);
            const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + amount);
            const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + amount);
            return `rgb(${r},${g},${b})`;
        }

        function darkenColor(hex, amount) {
            const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - amount);
            const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - amount);
            const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - amount);
            return `rgb(${r},${g},${b})`;
        }

        function drawPlanet(planet, time) {
            const angle = (time / planet.orbitalPeriod) * Math.PI * 2;
            const orbitR = planet.orbitRadius * scaleFactor;
            const px = centerX + Math.cos(angle) * orbitR;
            const py = centerY + Math.sin(angle) * orbitR;
            const pr = Math.max(planet.radius * scaleFactor, 3);

            ctx.strokeStyle = planet.color + '15';
            ctx.lineWidth = Math.max(1, pr * 0.4);
            ctx.beginPath();
            for (let i = 0; i <= 60; i++) {
                const trailAngle = angle - (i / 60) * 0.5;
                const tx = centerX + Math.cos(trailAngle) * orbitR;
                const ty = centerY + Math.sin(trailAngle) * orbitR;
                if (i === 0) ctx.moveTo(tx, ty);
                else ctx.lineTo(tx, ty);
            }
            ctx.stroke();

            const glowGrad = ctx.createRadialGradient(px, py, pr * 0.5, px, py, pr * 3);
            glowGrad.addColorStop(0, planet.color + '30');
            glowGrad.addColorStop(1, planet.color + '00');
            ctx.fillStyle = glowGrad;
            ctx.beginPath();
            ctx.arc(px, py, pr * 3, 0, Math.PI * 2);
            ctx.fill();

            const bodyGrad = ctx.createRadialGradient(px - pr * 0.3, py - pr * 0.3, pr * 0.1, px, py, pr);
            bodyGrad.addColorStop(0, lightenColor(planet.color, 40));
            bodyGrad.addColorStop(0.7, planet.color);
            bodyGrad.addColorStop(1, darkenColor(planet.color, 40));
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(px, py, pr, 0, Math.PI * 2);
            ctx.fill();

            if (planet.hasRings) {
                ctx.save();
                ctx.translate(px, py);
                ctx.scale(1, 0.35);

                ctx.strokeStyle = 'rgba(210, 190, 150, 0.5)';
                ctx.lineWidth = Math.max(2, pr * 0.25);
                ctx.beginPath();
                ctx.arc(0, 0, pr * 1.6, 0, Math.PI * 2);
                ctx.stroke();

                ctx.strokeStyle = 'rgba(190, 170, 130, 0.35)';
                ctx.lineWidth = Math.max(1.5, pr * 0.2);
                ctx.beginPath();
                ctx.arc(0, 0, pr * 2, 0, Math.PI * 2);
                ctx.stroke();

                ctx.strokeStyle = 'rgba(170, 155, 120, 0.2)';
                ctx.lineWidth = Math.max(1, pr * 0.15);
                ctx.beginPath();
                ctx.arc(0, 0, pr * 2.3, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            }

            if (planet.name === 'Earth') {
                const moonAngle = time * 0.3;
                const moonDist = pr * 2.8;
                const mx = px + Math.cos(moonAngle) * moonDist;
                const my = py + Math.sin(moonAngle) * moonDist;
                const moonR = Math.max(1.5, pr * 0.27);

                ctx.fillStyle = '#cccccc';
                ctx.beginPath();
                ctx.arc(mx, my, moonR, 0, Math.PI * 2);
                ctx.fill();
            }

            if (planet.name === 'Jupiter' && pr > 5) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(px, py, pr, 0, Math.PI * 2);
                ctx.clip();

                const bands = [
                    { y: -0.6, color: 'rgba(180, 130, 80, 0.3)' },
                    { y: -0.2, color: 'rgba(200, 150, 100, 0.25)' },
                    { y: 0.2, color: 'rgba(160, 110, 70, 0.3)' },
                    { y: 0.5, color: 'rgba(190, 140, 90, 0.2)' }
                ];

                for (const band of bands) {
                    ctx.fillStyle = band.color;
                    ctx.fillRect(px - pr, py + band.y * pr - pr * 0.08, pr * 2, pr * 0.16);
                }

                const spotAngle = time * 0.05;
                ctx.fillStyle = 'rgba(200, 80, 50, 0.4)';
                ctx.beginPath();
                ctx.ellipse(px + Math.cos(spotAngle) * pr * 0.3, py + pr * 0.2, pr * 0.2, pr * 0.12, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            if (state.showLabels) {
                ctx.fillStyle = planet.color + 'cc';
                ctx.font = `${Math.max(10, 11 * scaleFactor)}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                const labelOffset = planet.hasRings ? pr * 2.8 : pr + 14 * scaleFactor;
                ctx.fillText(planet.name, px, py + labelOffset);
            }

            if (hoveredPlanet && hoveredPlanet.name === planet.name) {
                ctx.strokeStyle = planet.color + '80';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(px, py, pr + 5, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function drawAsteroidBelt(time) {
            const innerR = 190 * scaleFactor;
            const outerR = 215 * scaleFactor;

            for (let i = 0; i < 150; i++) {
                const seed = i * 137.508;
                const angle = (seed % (Math.PI * 2)) + time * 0.00005 * ((i % 3) + 1);
                const r = innerR + (seed * 7.3 % (outerR - innerR));
                const ax = centerX + Math.cos(angle) * r;
                const ay = centerY + Math.sin(angle) * r;
                const size = (seed % 1.5) + 0.5;

                ctx.fillStyle = `rgba(150, 140, 130, ${0.2 + (seed % 0.3)})`;
                ctx.beginPath();
                ctx.arc(ax, ay, size * scaleFactor, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        let saveTimer = 0;

        function animate(currentTime) {
            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            if (!state.paused) {
                state.time += dt * state.speed * 50;
            }

            saveTimer += dt;
            if (saveTimer > 2) {
                saveTimer = 0;
                saveState();
            }

            ctx.fillStyle = '#000011';
            ctx.fillRect(0, 0, width, height);

            const nebulaGrad = ctx.createRadialGradient(width * 0.3, height * 0.4, 0, width * 0.3, height * 0.4, width * 0.6);
            nebulaGrad.addColorStop(0, 'rgba(20, 10, 50, 0.3)');
            nebulaGrad.addColorStop(0.5, 'rgba(10, 5, 30, 0.1)');
            nebulaGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = nebulaGrad;
            ctx.fillRect(0, 0, width, height);

            const nebulaGrad2 = ctx.createRadialGradient(width * 0.8, height * 0.7, 0, width * 0.8, height * 0.7, width * 0.4);
            nebulaGrad2.addColorStop(0, 'rgba(10, 20, 50, 0.2)');
            nebulaGrad2.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = nebulaGrad2;
            ctx.fillRect(0, 0, width, height);

            drawStars(currentTime);

            if (state.showOrbits) {
                for (const planet of planetData) {
                    drawOrbit(planet.orbitRadius);
                }
            }

            drawAsteroidBelt(state.time);
            drawSun();

            for (const planet of planetData) {
                drawPlanet(planet, state.time);
            }

            if (hoveredPlanet) {
                showTooltip(hoveredPlanet, mouseX, mouseY);
            }

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);

        window.addEventListener('beforeunload', saveState);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) saveState();
        });
    </script>
</body>
</html>
