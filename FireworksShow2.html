<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <meta name="theme-color" content="#0c0c1e">
    <meta name="description" content="Fireworks Show">
    <title>🎆 Fireworks Show Deluxe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }

        #canvas {
            display: block;
            background: linear-gradient(to bottom, 
                #05050f 0%, 
                #0d0d2b 35%,
                #1a1a3e 65%, 
                #2a2a55 100%);
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateY(-2px);
        }

        .btn-secondary.active {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.5);
        }

        .settings-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 24px;
            background: rgba(20, 20, 40, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            color: white;
            min-width: 260px;
            max-height: 85vh;
            overflow-y: auto;
            z-index: 100;
            transform: translateX(calc(100% + 40px));
            transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .settings-panel.open {
            transform: translateX(0);
        }

        .settings-panel::-webkit-scrollbar {
            width: 6px;
        }
        .settings-panel::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        .settings-panel h3 {
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            opacity: 0.85;
        }

        .setting-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        .setting-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(255, 107, 107, 0.5);
        }

        .color-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .color-btn:hover, .color-btn.active {
            transform: scale(1.2);
            border-color: white;
            box-shadow: 0 0 12px rgba(255,255,255,0.5);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .switch {
            position: relative;
            width: 44px;
            height: 24px;
        }
        .switch input { display: none; }
        .slider-toggle {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 24px;
            transition: 0.3s;
        }
        .slider-toggle:before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .switch input:checked + .slider-toggle {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }
        .switch input:checked + .slider-toggle:before {
            transform: translateX(20px);
        }

        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 20px;
            background: rgba(20, 20, 40, 0.6);
            backdrop-filter: blur(14px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 13px;
            z-index: 100;
        }

        .stats div {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats span {
            font-weight: bold;
            color: #4facfe;
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1s ease;
            z-index: 50;
        }

        .title.hidden {
            opacity: 0;
        }

        .title h1 {
            font-size: 52px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.8),
                         0 0 60px rgba(255, 107, 107, 0.4);
            animation: glow 2s ease-in-out infinite alternate;
        }

        .title p {
            font-size: 18px;
            opacity: 0.75;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 30px rgba(255, 107, 107, 0.8),
                             0 0 60px rgba(255, 107, 107, 0.4);
            }
            to {
                text-shadow: 0 0 40px rgba(79, 172, 254, 0.8),
                             0 0 80px rgba(79, 172, 254, 0.4);
            }
        }

        .pattern-select {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pattern-btn {
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .pattern-btn:hover, .pattern-btn.active {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border-color: transparent;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .moon {
            position: fixed;
            top: 8%;
            right: 12%;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fffdf0, #e8e4c9 60%, #cfc9a8);
            box-shadow: 0 0 60px rgba(255, 253, 220, 0.5),
                        0 0 120px rgba(255, 253, 220, 0.25),
                        inset -10px -10px 20px rgba(180, 175, 140, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        .cityscape {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 160px;
            pointer-events: none;
            z-index: 3;
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 10px;
                padding: 10px 15px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 12px;
            }
            .title h1 {
                font-size: 32px;
            }
            .stats {
                font-size: 11px;
                padding: 10px 15px;
            }
            .settings-panel {
                width: calc(100% - 40px);
                right: 20px;
            }
            .moon {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="moon"></div>
    <canvas id="canvas"></canvas>
    <svg class="cityscape" viewBox="0 0 1920 150" preserveAspectRatio="xMidYMax slice">
        <defs>
            <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#181830"/>
                <stop offset="100%" style="stop-color:#080810"/>
            </linearGradient>
        </defs>
        <path fill="url(#buildingGrad)" d="M0,150 L0,100 L50,100 L50,80 L80,80 L80,60 L100,60 L100,80 L150,80 L150,50 L170,50 L170,30 L190,30 L190,50 L220,50 L220,70 L280,70 L280,40 L300,40 L300,20 L320,20 L320,40 L350,40 L350,60 L400,60 L400,90 L450,90 L450,50 L480,50 L480,70 L520,70 L520,45 L540,45 L540,25 L560,25 L560,45 L600,45 L600,80 L650,80 L650,55 L680,55 L680,35 L700,35 L700,55 L750,55 L750,75 L800,75 L800,40 L830,40 L830,60 L880,60 L880,30 L900,30 L900,15 L920,15 L920,30 L960,30 L960,65 L1000,65 L1000,45 L1040,45 L1040,70 L1100,70 L1100,35 L1130,35 L1130,55 L1180,55 L1180,25 L1200,25 L1200,10 L1220,10 L1220,25 L1260,25 L1260,60 L1300,60 L1300,80 L1350,80 L1350,50 L1400,50 L1400,70 L1450,70 L1450,40 L1480,40 L1480,60 L1520,60 L1520,85 L1580,85 L1580,55 L1620,55 L1620,75 L1680,75 L1680,45 L1720,45 L1720,65 L1780,65 L1780,50 L1820,50 L1820,80 L1880,80 L1880,60 L1920,60 L1920,150 Z"/>
        <g fill="#ffeb3b" opacity="0.35">
            <rect x="55" y="85" width="4" height="5"/>
            <rect x="65" y="85" width="4" height="5"/>
            <rect x="155" y="55" width="4" height="5"/>
            <rect x="175" y="35" width="4" height="5"/>
            <rect x="285" y="45" width="4" height="5"/>
            <rect x="305" y="25" width="4" height="5"/>
            <rect x="455" y="55" width="4" height="5"/>
            <rect x="545" y="30" width="4" height="5"/>
            <rect x="905" y="20" width="4" height="5"/>
            <rect x="1205" y="15" width="4" height="5"/>
        </g>
    </svg>

    <div class="title" id="title">
        <h1>🎆 Fireworks Show</h1>
        <p>Click anywhere to launch • Press Space, M, A</p>
    </div>

    <div class="stats" id="stats">
        <div>🎆 Launched: <span id="launchCount">0</span></div>
        <div>✨ Particles: <span id="particleCount">0</span></div>
        <div>⏱️ Session: <span id="sessionTime">0:00</span></div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <h3>⚙️ Settings</h3>
        
        <div class="setting-group">
            <label>Particle Count: <span id="particleSizeLabel">120</span></label>
            <input type="range" id="particleSize" min="30" max="300" value="120">
        </div>

        <div class="setting-group">
            <label>Explosion Size: <span id="explosionSizeLabel">1.0</span></label>
            <input type="range" id="explosionSize" min="0.5" max="2.5" step="0.1" value="1">
        </div>

        <div class="setting-group">
            <label>Trail Length: <span id="trailLengthLabel">0.15</span></label>
            <input type="range" id="trailLength" min="0.03" max="0.5" step="0.01" value="0.15">
        </div>

        <div class="setting-group">
            <label>Auto Launch Speed: <span id="autoSpeedLabel">1000</span>ms</label>
            <input type="range" id="autoSpeed" min="200" max="3000" step="100" value="1000">
        </div>

        <div class="setting-group">
            <label>Gravity: <span id="gravityLabel">0.05</span></label>
            <input type="range" id="gravity" min="0.01" max="0.15" step="0.01" value="0.05">
        </div>

        <div class="setting-group">
            <div class="toggle-row">
                <label style="margin:0;">✨ Glitter Trails</label>
                <label class="switch"><input type="checkbox" id="glitterToggle" checked><span class="slider-toggle"></span></label>
            </div>
            <div class="toggle-row">
                <label style="margin:0;">🌈 Screen Flash</label>
                <label class="switch"><input type="checkbox" id="flashToggle" checked><span class="slider-toggle"></span></label>
            </div>
            <div class="toggle-row">
                <label style="margin:0;">🔊 Sound FX</label>
                <label class="switch"><input type="checkbox" id="soundToggle"><span class="slider-toggle"></span></label>
            </div>
        </div>

        <div class="setting-group">
            <label>Colors</label>
            <div class="color-options" id="colorOptions">
                <button class="color-btn active" data-color="rainbow" style="background: linear-gradient(45deg, red, orange, yellow, green, blue, purple);"></button>
                <button class="color-btn" data-color="red" style="background: linear-gradient(45deg, #ff4444, #ff8888);"></button>
                <button class="color-btn" data-color="blue" style="background: linear-gradient(45deg, #4444ff, #8888ff);"></button>
                <button class="color-btn" data-color="green" style="background: linear-gradient(45deg, #44ff44, #88ff88);"></button>
                <button class="color-btn" data-color="gold" style="background: linear-gradient(45deg, #ffd700, #ffeb3b);"></button>
                <button class="color-btn" data-color="purple" style="background: linear-gradient(45deg, #9c27b0, #e91e63);"></button>
                <button class="color-btn" data-color="pastel" style="background: linear-gradient(45deg, #ffb3ba, #bae1ff, #baffc9);"></button>
                <button class="color-btn" data-color="fire" style="background: linear-gradient(45deg, #ff0000, #ff8800, #ffdd00);"></button>
                <button class="color-btn" data-color="ice" style="background: linear-gradient(45deg, #00ffff, #0088ff, #ffffff);"></button>
                <button class="color-btn" data-color="white" style="background: linear-gradient(45deg, #ffffff, #dddddd);"></button>
            </div>
        </div>

        <div class="setting-group">
            <label>Explosion Pattern</label>
            <div class="pattern-select" id="patternSelect">
                <button class="pattern-btn active" data-pattern="circle">Circle</button>
                <button class="pattern-btn" data-pattern="heart">Heart</button>
                <button class="pattern-btn" data-pattern="star">Star</button>
                <button class="pattern-btn" data-pattern="ring">Ring</button>
                <button class="pattern-btn" data-pattern="double">Double</button>
                <button class="pattern-btn" data-pattern="willow">Willow</button>
                <button class="pattern-btn" data-pattern="chrysanthemum">Chrysanth</button>
                <button class="pattern-btn" data-pattern="palm">Palm</button>
                <button class="pattern-btn" data-pattern="spiral">Spiral</button>
                <button class="pattern-btn" data-pattern="random">Random</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" id="launchBtn">🚀 Launch</button>
        <button class="btn btn-secondary" id="autoBtn">🔄 Auto Mode</button>
        <button class="btn btn-secondary" id="multiBtn">💥 Multi Shot</button>
        <button class="btn btn-secondary" id="finaleBtn">🎇 Finale</button>
        <button class="btn btn-secondary" id="settingsBtn">⚙️ Settings</button>
        <button class="btn btn-secondary" id="clearBtn">🗑️ Clear</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Generate stars with varied sizes
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 140; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 65 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            const size = Math.random() * 2.5 + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            if (Math.random() > 0.9) {
                star.style.boxShadow = '0 0 6px 1px rgba(255,255,255,0.8)';
            }
            starsContainer.appendChild(star);
        }

        const defaultState = {
            launchCount: 0,
            totalParticles: 0,
            settings: {
                particleCount: 120,
                explosionSize: 1,
                trailLength: 0.15,
                autoSpeed: 1000,
                gravity: 0.05,
                colorScheme: 'rainbow',
                pattern: 'circle',
                glitter: true,
                flash: true,
                sound: false
            }
        };

        let state = loadState();
        
        function loadState() {
            try {
                const saved = localStorage.getItem('fireworksState');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return { ...defaultState, ...parsed, settings: { ...defaultState.settings, ...parsed.settings } };
                }
            } catch (e) {}
            return JSON.parse(JSON.stringify(defaultState));
        }

        function saveState() {
            try {
                localStorage.setItem('fireworksState', JSON.stringify(state));
            } catch (e) {}
        }

        // ==== Sound Engine (Web Audio API) ====
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        function playLaunchSound() {
            if (!state.settings.sound || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }
        function playBoomSound() {
            if (!state.settings.sound || !audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.4;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            noise.connect(filter).connect(gain).connect(audioCtx.destination);
            noise.start();
        }

        function applySettingsToUI() {
            document.getElementById('particleSize').value = state.settings.particleCount;
            document.getElementById('particleSizeLabel').textContent = state.settings.particleCount;
            document.getElementById('explosionSize').value = state.settings.explosionSize;
            document.getElementById('explosionSizeLabel').textContent = state.settings.explosionSize;
            document.getElementById('trailLength').value = state.settings.trailLength;
            document.getElementById('trailLengthLabel').textContent = state.settings.trailLength;
            document.getElementById('autoSpeed').value = state.settings.autoSpeed;
            document.getElementById('autoSpeedLabel').textContent = state.settings.autoSpeed;
            document.getElementById('gravity').value = state.settings.gravity;
            document.getElementById('gravityLabel').textContent = state.settings.gravity;
            document.getElementById('glitterToggle').checked = state.settings.glitter;
            document.getElementById('flashToggle').checked = state.settings.flash;
            document.getElementById('soundToggle').checked = state.settings.sound;

            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.color === state.settings.colorScheme);
            });
            document.querySelectorAll('.pattern-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.pattern === state.settings.pattern);
            });
            document.getElementById('launchCount').textContent = state.launchCount;
        }

        // ==== Screen Flash ====
        let flashAlpha = 0;
        let flashColor = '255,255,255';
        function triggerFlash(color, intensity = 0.15) {
            if (!state.settings.flash) return;
            flashAlpha = Math.max(flashAlpha, intensity);
            flashColor = color;
        }

        function hslToRgb(h, s, l) {
            s /= 100; l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
            return `${Math.round(f(0)*255)},${Math.round(f(8)*255)},${Math.round(f(4)*255)}`;
        }

        class Particle {
            constructor(x, y, color, velocity, size = 3, opts = {}) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = velocity;
                this.size = size;
                this.baseSize = size;
                this.alpha = 1;
                this.isTrail = opts.isTrail || false;
                this.isGlitter = opts.isGlitter || false;
                this.willow = opts.willow || false;
                this.flicker = opts.flicker || false;
                this.decay = this.isTrail ? 0.03 : (this.willow ? 0.008 : Math.random() * 0.012 + 0.006);
                this.gravity = state.settings.gravity * (this.willow ? 0.6 : 1);
                this.friction = this.willow ? 0.985 : 0.98;
                this.trail = [];
                this.maxTrailLength = this.isTrail ? 0 : (this.willow ? 6 : 4);
                this.spin = Math.random() * 0.2;
            }

            update() {
                if (!this.isTrail && this.maxTrailLength > 0) {
                    this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                    if (this.trail.length > this.maxTrailLength) this.trail.shift();
                }
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.velocity.y += this.gravity;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
                if (this.flicker) {
                    this.size = this.baseSize * (0.6 + Math.random() * 0.6);
                }
            }

            draw() {
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = this.color.replace(/[\d.]+\)$/, `${this.alpha * 0.35})`);
                    ctx.lineWidth = this.size * 0.6;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.shadowBlur = this.isGlitter ? 8 : 18;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                // bright core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.45, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${this.alpha * 0.9})`;
                ctx.fill();
                ctx.restore();
            }
        }

        class Firework {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                const angle = Math.atan2(targetY - startY, targetX - startX);
                const speed = 12 + Math.random() * 4;
                this.velocity = { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed };
                this.color = this.getColor();
                this.trail = [];
                this.maxTrailLength = 18;
                this.exploded = false;
                this.particles = [];
            }

            getColor() {
                const scheme = state.settings.colorScheme;
                const colors = {
                    rainbow: () => `hsla(${Math.random() * 360}, 100%, 62%, 1)`,
                    red: () => `hsla(${Math.random() * 20}, 100%, 60%, 1)`,
                    blue: () => `hsla(${200 + Math.random() * 40}, 100%, 60%, 1)`,
                    green: () => `hsla(${100 + Math.random() * 40}, 100%, 52%, 1)`,
                    gold: () => `hsla(${40 + Math.random() * 20}, 100%, 55%, 1)`,
                    purple: () => `hsla(${280 + Math.random() * 40}, 100%, 62%, 1)`,
                    pastel: () => `hsla(${Math.random() * 360}, 70%, 80%, 1)`,
                    fire: () => `hsla(${Math.random() * 45}, 100%, ${55 + Math.random() * 15}%, 1)`,
                    ice: () => `hsla(${180 + Math.random() * 40}, 100%, ${65 + Math.random() * 25}%, 1)`,
                    white: () => `hsla(0, 0%, ${82 + Math.random() * 18}%, 1)`
                };
                return (colors[scheme] || colors.rainbow)();
            }

            update() {
                if (!this.exploded) {
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > this.maxTrailLength) this.trail.shift();
                    this.velocity.y += 0.03;
                    this.x += this.velocity.x;
                    this.y += this.velocity.y;
                    const dist = Math.hypot(this.targetX - this.x, this.targetY - this.y);
                    if (dist < 50 || this.velocity.y >= 0) this.explode();
                }
                this.particles = this.particles.filter(p => {
                    p.update();
                    return p.alpha > 0 && p.y < canvas.height + 50;
                });
            }

            explode() {
                this.exploded = true;
                state.launchCount++;
                document.getElementById('launchCount').textContent = state.launchCount;
                saveState();
                playBoomSound();

                // parse color for flash
                let rgbForFlash = '255,255,255';
                const hslMatch = this.color.match(/hsla?\(([\d.]+),\s*([\d.]+)%,\s*([\d.]+)%/);
                if (hslMatch) {
                    rgbForFlash = hslToRgb(+hslMatch[1], +hslMatch[2], +hslMatch[3]);
                }
                triggerFlash(rgbForFlash, 0.12 * state.settings.explosionSize);

                const count = state.settings.particleCount;
                const size = state.settings.explosionSize;
                let pattern = state.settings.pattern;
                if (pattern === 'random') {
                    const patterns = ['circle','heart','star','ring','double','willow','chrysanthemum','palm','spiral'];
                    pattern = patterns[Math.floor(Math.random() * patterns.length)];
                }

                switch (pattern) {
                    case 'circle': this.createCircleExplosion(count, size); break;
                    case 'heart': this.createHeartExplosion(count, size); break;
                    case 'star': this.createStarExplosion(count, size); break;
                    case 'ring': this.createRingExplosion(count, size); break;
                    case 'double': this.createDoubleExplosion(count, size); break;
                    case 'willow': this.createWillowExplosion(count, size); break;
                    case 'chrysanthemum': this.createChrysanthemum(count, size); break;
                    case 'palm': this.createPalmExplosion(count, size); break;
                    case 'spiral': this.createSpiralExplosion(count, size); break;
                    default: this.createCircleExplosion(count, size);
                }

                // Glitter sparks
                if (state.settings.glitter) {
                    for (let i = 0; i < count * 0.4; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 3 * size;
                        this.particles.push(new Particle(
                            this.x, this.y, 'rgba(255,255,255,1)',
                            { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                            Math.random() * 1.2 + 0.5, { isGlitter: true, flicker: true }
                        ));
                    }
                }
            }

            createCircleExplosion(count, size) {
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    const speed = (Math.random() * 4 + 4) * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                        Math.random() * 2 + 2));
                }
            }

            createHeartExplosion(count, size) {
                for (let i = 0; i < count; i++) {
                    const t = (i / count) * Math.PI * 2;
                    const hx = 16 * Math.pow(Math.sin(t), 3);
                    const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    const speed = 0.5 * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        { x: hx * speed * 0.16, y: hy * speed * 0.16 },
                        Math.random() * 2 + 2));
                }
            }

            createStarExplosion(count, size) {
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    const rm = i % 2 === 0 ? 1 : 0.5;
                    const speed = (Math.random() * 2 + 4) * size * rm;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                        Math.random() * 2 + 2));
                }
            }

            createRingExplosion(count, size) {
                for (let i = 0; i < count * 0.6; i++) {
                    const angle = (i / (count * 0.6)) * Math.PI * 2;
                    const speed = 6 * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                        Math.random() * 2 + 2));
                }
                for (let i = 0; i < count * 0.4; i++) {
                    const angle = (i / (count * 0.4)) * Math.PI * 2;
                    const speed = 3 * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                        Math.random() * 1.5 + 1.5));
                }
            }

            createDoubleExplosion(count, size) {
                for (let i = 0; i < count * 0.5; i++) {
                    const angle = (i / (count * 0.5)) * Math.PI * 2;
                    const speed = (Math.random() * 2 + 5) * size;
                    this.particles.push(new Particle(this.x, this.y, this.color,
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                        Math.random() * 2 + 2));
                }
                const color2 = this.getColor();
                for (let i = 0; i < count * 0.5; i++) {
                    const angle = (i / (count * 0.5)) * Math.PI * 2 + 0.1;
                    const speed = (Math.random() * 2 + 3) * size;
                    this.particles.push(new Particle(this.x, this.y, color2,
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                        Math.random() * 2 + 1.5));
                }
            }

            createWillowExplosion(count, size) {
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    const speed = (Math.random() * 3 + 3) * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed - 2 },
                        Math.random() * 2 + 2, { willow: true }));
                }
            }

            createChrysanthemum(count, size) {
                // dense layered rings that leave trails
                const layers = 3;
                for (let l = 0; l < layers; l++) {
                    const layerSpeed = (3 + l * 2) * size;
                    const layerCount = Math.floor(count / layers);
                    for (let i = 0; i < layerCount; i++) {
                        const angle = (i / layerCount) * Math.PI * 2 + l * 0.15;
                        this.particles.push(new Particle(this.x, this.y, this.getColor(),
                            { x: Math.cos(angle) * layerSpeed, y: Math.sin(angle) * layerSpeed },
                            Math.random() * 1.5 + 2, { willow: true }));
                    }
                }
            }

            createPalmExplosion(count, size) {
                // fewer, thicker fronds shooting upward then arcing down
                const fronds = 8;
                const perFrond = Math.floor(count / fronds);
                for (let f = 0; f < fronds; f++) {
                    const baseAngle = -Math.PI / 2 + (f - fronds / 2) * 0.28;
                    for (let i = 0; i < perFrond; i++) {
                        const spread = (Math.random() - 0.5) * 0.1;
                        const speed = (5 + Math.random() * 3) * size;
                        this.particles.push(new Particle(this.x, this.y, this.color,
                            { x: Math.cos(baseAngle + spread) * speed, y: Math.sin(baseAngle + spread) * speed },
                            Math.random() * 2 + 2.5, { willow: true }));
                    }
                }
            }

            createSpiralExplosion(count, size) {
                const turns = 4;
                for (let i = 0; i < count; i++) {
                    const t = i / count;
                    const angle = t * Math.PI * 2 * turns;
                    const speed = (1 + t * 6) * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                        Math.random() * 1.5 + 2));
                }
            }

            draw() {
                if (!this.exploded) {
                    if (this.trail.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.trail[0].x, this.trail[0].y);
                        for (let i = 1; i < this.trail.length; i++) {
                            ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        }
                        const grad = ctx.createLinearGradient(this.trail[0].x, this.trail[0].y, this.x, this.y);
                        grad.addColorStop(0, 'rgba(255,200,100,0)');
                        grad.addColorStop(1, 'rgba(255,220,150,0.9)');
                        ctx.strokeStyle = grad;
                        ctx.lineWidth = 3;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                    }
                    ctx.save();
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ffaa33';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.restore();
                }
                this.particles.forEach(p => p.draw());
            }

            isDead() {
                return this.exploded && this.particles.length === 0;
            }
        }

        let fireworks = [];
        let autoMode = false;
        let autoInterval = null;
        let sessionStart = Date.now();

        function animate() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(8, 8, 20, ${state.settings.trailLength})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            fireworks = fireworks.filter(fw => {
                fw.update();
                fw.draw();
                return !fw.isDead();
            });

            // Screen flash overlay
            if (flashAlpha > 0.001) {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = `rgba(${flashColor}, ${flashAlpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
                flashAlpha *= 0.88;
            }

            const totalParticles = fireworks.reduce((s, fw) => s + fw.particles.length, 0);
            document.getElementById('particleCount').textContent = totalParticles;

            const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
            const m = Math.floor(elapsed / 60);
            const s = elapsed % 60;
            document.getElementById('sessionTime').textContent = `${m}:${s.toString().padStart(2, '0')}`;

            requestAnimationFrame(animate);
        }

        function launchFirework(x, y) {
            const startX = (x || Math.random() * canvas.width) + (Math.random() - 0.5) * 100;
            const startY = canvas.height;
            const targetX = x || Math.random() * canvas.width;
            const targetY = y || Math.random() * (canvas.height * 0.5) + 50;
            fireworks.push(new Firework(startX, startY, targetX, targetY));
            playLaunchSound();
            document.getElementById('title').classList.add('hidden');
        }

        function launchMultiple() {
            const count = Math.floor(Math.random() * 4) + 3;
            for (let i = 0; i < count; i++) {
                setTimeout(() => launchFirework(), i * 100);
            }
        }

        function launchFinale() {
            document.getElementById('title').classList.add('hidden');
            let bursts = 0;
            const finaleInterval = setInterval(() => {
                const n = Math.floor(Math.random() * 3) + 2;
                for (let i = 0; i < n; i++) {
                    setTimeout(() => launchFirework(
                        Math.random() * canvas.width,
                        Math.random() * (canvas.height * 0.5) + 40
                    ), i * 60);
                }
                bursts++;
                if (bursts > 20) clearInterval(finaleInterval);
            }, 250);
        }

        canvas.addEventListener('click', (e) => { initAudio(); launchFirework(e.clientX, e.clientY); });

        document.getElementById('launchBtn').addEventListener('click', () => { initAudio(); launchFirework(); });
        document.getElementById('multiBtn').addEventListener('click', () => { initAudio(); launchMultiple(); });
        document.getElementById('finaleBtn').addEventListener('click', () => { initAudio(); launchFinale(); });

        document.getElementById('autoBtn').addEventListener('click', function() {
            initAudio();
            autoMode = !autoMode;
            this.classList.toggle('active', autoMode);
            if (autoMode) {
                autoInterval = setInterval(() => {
                    if (Math.random() > 0.3) launchFirework();
                    if (Math.random() > 0.8) launchMultiple();
                }, state.settings.autoSpeed);
            } else {
                clearInterval(autoInterval);
            }
        });

        document.getElementById('settingsBtn').addEventListener('click', () => {
            document.getElementById('settingsPanel').classList.toggle('open');
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            fireworks = [];
            ctx.fillStyle = 'rgba(8, 8, 20, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        document.getElementById('particleSize').addEventListener('input', function() {
            state.settings.particleCount = parseInt(this.value);
            document.getElementById('particleSizeLabel').textContent = this.value;
            saveState();
        });
        document.getElementById('explosionSize').addEventListener('input', function() {
            state.settings.explosionSize = parseFloat(this.value);
            document.getElementById('explosionSizeLabel').textContent = this.value;
            saveState();
        });
        document.getElementById('trailLength').addEventListener('input', function() {
            state.settings.trailLength = parseFloat(this.value);
            document.getElementById('trailLengthLabel').textContent = this.value;
            saveState();
        });
        document.getElementById('autoSpeed').addEventListener('input', function() {
            state.settings.autoSpeed = parseInt(this.value);
            document.getElementById('autoSpeedLabel').textContent = this.value;
            saveState();
            if (autoMode) {
                clearInterval(autoInterval);
                autoInterval = setInterval(() => {
                    if (Math.random() > 0.3) launchFirework();
                    if (Math.random() > 0.8) launchMultiple();
                }, state.settings.autoSpeed);
            }
        });
        document.getElementById('gravity').addEventListener('input', function() {
            state.settings.gravity = parseFloat(this.value);
            document.getElementById('gravityLabel').textContent = this.value;
            saveState();
        });

        document.getElementById('glitterToggle').addEventListener('change', function() {
            state.settings.glitter = this.checked; saveState();
        });
        document.getElementById('flashToggle').addEventListener('change', function() {
            state.settings.flash = this.checked; saveState();
        });
        document.getElementById('soundToggle').addEventListener('change', function() {
            state.settings.sound = this.checked;
            if (this.checked) initAudio();
            saveState();
        });

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                state.settings.colorScheme = this.dataset.color;
                saveState();
            });
        });
        document.querySelectorAll('.pattern-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                state.settings.pattern = this.dataset.pattern;
                saveState();
            });
        });

        document.addEventListener('keydown', (e) => {
            initAudio();
            if (e.code === 'Space') { e.preventDefault(); launchFirework(); }
            else if (e.code === 'KeyM') { launchMultiple(); }
            else if (e.code === 'KeyA') { document.getElementById('autoBtn').click(); }
            else if (e.code === 'KeyF') { launchFinale(); }
        });

        applySettingsToUI();
        animate();

        setTimeout(() => launchFirework(canvas.width * 0.3, canvas.height * 0.3), 500);
        setTimeout(() => launchFirework(canvas.width * 0.7, canvas.height * 0.4), 800);
        setTimeout(() => launchFirework(canvas.width * 0.5, canvas.height * 0.25), 1100);
    </script>
</body>
</html>
