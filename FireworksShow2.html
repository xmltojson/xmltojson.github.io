<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <meta name="theme-color" content="#0c0c1e">
    <meta name="description" content="Fireworks Show">
    <title>🎆 Fireworks Show Deluxe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }

        #canvas {
            display: block;
            background: linear-gradient(to bottom, 
                #050510 0%, 
                #0a0a24 30%,
                #14143a 60%, 
                #232357 85%,
                #2e2e63 100%);
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.25s ease, background 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            will-change: transform;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
        }
        .btn-primary:active {
            transform: translateY(-1px) scale(0.99);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.11);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.22);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .btn-secondary:active {
            transform: translateY(0) scale(0.99);
        }

        .btn-secondary.active {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.5);
        }

        .settings-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            z-index: 9998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, backdrop-filter 0.4s ease;
        }

        .settings-backdrop.open {
            background: rgba(5, 5, 16, 0.55);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            opacity: 1;
            pointer-events: auto;
        }

        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            padding: 26px;
            background: rgba(18, 18, 38, 0.96);
            backdrop-filter: blur(26px);
            -webkit-backdrop-filter: blur(26px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            box-shadow: 0 20px 70px rgba(0, 0, 0, 0.8),
                        0 0 0 1px rgba(255, 255, 255, 0.06),
                        0 0 50px rgba(79, 172, 254, 0.18);
            color: white;
            width: 340px;
            max-width: calc(100vw - 40px);
            max-height: 88vh;
            overflow-y: auto;
            z-index: 9999;
            transform: translate(-50%, -50%) scale(0.85);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.3s ease;
            will-change: transform, opacity;
        }

        .settings-panel.open {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .settings-panel::-webkit-scrollbar {
            width: 8px;
        }
        .settings-panel::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        .settings-panel::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border-radius: 4px;
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .settings-header h3 {
            font-size: 19px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }
        .close-btn:hover {
            background: rgba(255, 90, 90, 0.7);
            border-color: transparent;
            transform: rotate(90deg);
        }

        .setting-group {
            margin-bottom: 20px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.25s ease;
        }
        .setting-group:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .setting-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0.95;
        }

        .setting-group label span {
            color: #4facfe;
            font-weight: 700;
        }

        .setting-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.25);
            outline: none;
            -webkit-appearance: none;
        }

        .setting-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(255, 107, 107, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.15s ease;
        }
        .setting-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .setting-group input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 12px rgba(255, 107, 107, 0.7);
        }

        .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .color-btn:hover, .color-btn.active {
            transform: scale(1.25);
            border-color: white;
            box-shadow: 0 0 14px rgba(255,255,255,0.7);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .toggle-row:last-child {
            margin-bottom: 0;
        }

        .switch {
            position: relative;
            width: 46px;
            height: 26px;
            flex-shrink: 0;
        }
        .switch input { display: none; }
        .slider-toggle {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: rgba(255,255,255,0.25);
            border-radius: 26px;
            transition: 0.3s;
        }
        .slider-toggle:before {
            content: "";
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .switch input:checked + .slider-toggle {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }
        .switch input:checked + .slider-toggle:before {
            transform: translateX(20px);
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1s ease;
            z-index: 50;
        }

        .title.hidden {
            opacity: 0;
        }

        .title h1 {
            font-size: 52px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.8),
                         0 0 60px rgba(255, 107, 107, 0.4);
            animation: glow 3s ease-in-out infinite alternate;
        }

        .title p {
            font-size: 18px;
            opacity: 0.75;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 30px rgba(255, 107, 107, 0.8),
                             0 0 60px rgba(255, 107, 107, 0.4);
            }
            to {
                text-shadow: 0 0 40px rgba(79, 172, 254, 0.8),
                             0 0 80px rgba(79, 172, 254, 0.4);
            }
        }

        .pattern-select {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pattern-btn {
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: transform 0.2s ease, background 0.25s ease, border-color 0.25s ease;
        }

        .pattern-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .pattern-btn.active {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border-color: transparent;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.15; transform: scale(0.85); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .cityscape {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 160px;
            pointer-events: none;
            z-index: 3;
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 10px;
                padding: 10px 15px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 12px;
            }
            .title h1 {
                font-size: 32px;
            }
            .settings-panel {
                width: calc(100vw - 30px);
                max-height: 82vh;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <canvas id="canvas"></canvas>
    <svg class="cityscape" viewBox="0 0 1920 150" preserveAspectRatio="xMidYMax slice">
        <defs>
            <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#1a1a34"/>
                <stop offset="100%" style="stop-color:#080810"/>
            </linearGradient>
        </defs>
        <path fill="url(#buildingGrad)" d="M0,150 L0,100 L50,100 L50,80 L80,80 L80,60 L100,60 L100,80 L150,80 L150,50 L170,50 L170,30 L190,30 L190,50 L220,50 L220,70 L280,70 L280,40 L300,40 L300,20 L320,20 L320,40 L350,40 L350,60 L400,60 L400,90 L450,90 L450,50 L480,50 L480,70 L520,70 L520,45 L540,45 L540,25 L560,25 L560,45 L600,45 L600,80 L650,80 L650,55 L680,55 L680,35 L700,35 L700,55 L750,55 L750,75 L800,75 L800,40 L830,40 L830,60 L880,60 L880,30 L900,30 L900,15 L920,15 L920,30 L960,30 L960,65 L1000,65 L1000,45 L1040,45 L1040,70 L1100,70 L1100,35 L1130,35 L1130,55 L1180,55 L1180,25 L1200,25 L1200,10 L1220,10 L1220,25 L1260,25 L1260,60 L1300,60 L1300,80 L1350,80 L1350,50 L1400,50 L1400,70 L1450,70 L1450,40 L1480,40 L1480,60 L1520,60 L1520,85 L1580,85 L1580,55 L1620,55 L1620,75 L1680,75 L1680,45 L1720,45 L1720,65 L1780,65 L1780,50 L1820,50 L1820,80 L1880,80 L1880,60 L1920,60 L1920,150 Z"/>
        <g fill="#ffeb3b" opacity="0.35">
            <rect x="55" y="85" width="4" height="5"/>
            <rect x="65" y="85" width="4" height="5"/>
            <rect x="155" y="55" width="4" height="5"/>
            <rect x="175" y="35" width="4" height="5"/>
            <rect x="285" y="45" width="4" height="5"/>
            <rect x="305" y="25" width="4" height="5"/>
            <rect x="455" y="55" width="4" height="5"/>
            <rect x="545" y="30" width="4" height="5"/>
            <rect x="905" y="20" width="4" height="5"/>
            <rect x="1205" y="15" width="4" height="5"/>
        </g>
    </svg>

    <div class="title" id="title">
        <h1>🎆 Fireworks Show</h1>
        <p>Click anywhere to launch • Press Space, M, A, F</p>
    </div>

    <div class="settings-backdrop" id="settingsBackdrop"></div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h3>⚙️ Settings</h3>
            <button class="close-btn" id="closeSettingsBtn" aria-label="Close settings">✕</button>
        </div>
        
        <div class="setting-group">
            <label>Particle Count: <span id="particleSizeLabel">120</span></label>
            <input type="range" id="particleSize" min="30" max="300" value="120">
        </div>

        <div class="setting-group">
            <label>Explosion Size: <span id="explosionSizeLabel">1.0</span></label>
            <input type="range" id="explosionSize" min="0.5" max="2.5" step="0.1" value="1">
        </div>

        <div class="setting-group">
            <label>Trail Length: <span id="trailLengthLabel">0.15</span></label>
            <input type="range" id="trailLength" min="0.03" max="0.5" step="0.01" value="0.15">
        </div>

        <div class="setting-group">
            <label>Auto Launch Speed: <span id="autoSpeedLabel">1000</span>ms</label>
            <input type="range" id="autoSpeed" min="200" max="3000" step="100" value="1000">
        </div>

        <div class="setting-group">
            <label>Gravity: <span id="gravityLabel">0.05</span></label>
            <input type="range" id="gravity" min="0.01" max="0.15" step="0.01" value="0.05">
        </div>

        <div class="setting-group">
            <div class="toggle-row">
                <label style="margin:0;">✨ Glitter Trails</label>
                <label class="switch"><input type="checkbox" id="glitterToggle" checked><span class="slider-toggle"></span></label>
            </div>
            <div class="toggle-row">
                <label style="margin:0;">🌈 Screen Flash</label>
                <label class="switch"><input type="checkbox" id="flashToggle" checked><span class="slider-toggle"></span></label>
            </div>
            <div class="toggle-row">
                <label style="margin:0;">🔊 Sound FX</label>
                <label class="switch"><input type="checkbox" id="soundToggle"><span class="slider-toggle"></span></label>
            </div>
        </div>

        <div class="setting-group">
            <label>Colors</label>
            <div class="color-options" id="colorOptions">
                <button class="color-btn active" data-color="rainbow" style="background: linear-gradient(45deg, red, orange, yellow, green, blue, purple);"></button>
                <button class="color-btn" data-color="red" style="background: linear-gradient(45deg, #ff4444, #ff8888);"></button>
                <button class="color-btn" data-color="blue" style="background: linear-gradient(45deg, #4444ff, #8888ff);"></button>
                <button class="color-btn" data-color="green" style="background: linear-gradient(45deg, #44ff44, #88ff88);"></button>
                <button class="color-btn" data-color="gold" style="background: linear-gradient(45deg, #ffd700, #ffeb3b);"></button>
                <button class="color-btn" data-color="purple" style="background: linear-gradient(45deg, #9c27b0, #e91e63);"></button>
                <button class="color-btn" data-color="pastel" style="background: linear-gradient(45deg, #ffb3ba, #bae1ff, #baffc9);"></button>
                <button class="color-btn" data-color="fire" style="background: linear-gradient(45deg, #ff0000, #ff8800, #ffdd00);"></button>
                <button class="color-btn" data-color="ice" style="background: linear-gradient(45deg, #00ffff, #0088ff, #ffffff);"></button>
                <button class="color-btn" data-color="white" style="background: linear-gradient(45deg, #ffffff, #dddddd);"></button>
            </div>
        </div>

        <div class="setting-group">
            <label>Explosion Pattern</label>
            <div class="pattern-select" id="patternSelect">
                <button class="pattern-btn active" data-pattern="circle">Circle</button>
                <button class="pattern-btn" data-pattern="heart">Heart</button>
                <button class="pattern-btn" data-pattern="star">Star</button>
                <button class="pattern-btn" data-pattern="ring">Ring</button>
                <button class="pattern-btn" data-pattern="double">Double</button>
                <button class="pattern-btn" data-pattern="willow">Willow</button>
                <button class="pattern-btn" data-pattern="chrysanthemum">Chrysanth</button>
                <button class="pattern-btn" data-pattern="palm">Palm</button>
                <button class="pattern-btn" data-pattern="spiral">Spiral</button>
                <button class="pattern-btn" data-pattern="random">Random</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" id="launchBtn">🚀 Launch</button>
        <button class="btn btn-secondary" id="autoBtn">🔄 Auto Mode</button>
        <button class="btn btn-secondary" id="multiBtn">💥 Multi Shot</button>
        <button class="btn btn-secondary" id="finaleBtn">🎇 Finale</button>
        <button class="btn btn-secondary" id="settingsBtn">⚙️ Settings</button>
        <button class="btn btn-secondary" id="clearBtn">🗑️ Clear</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        let dpr = Math.min(window.devicePixelRatio || 1, 2);
        let viewW = window.innerWidth;
        let viewH = window.innerHeight;
        function resizeCanvas() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            viewW = window.innerWidth;
            viewH = window.innerHeight;
            canvas.width = Math.floor(viewW * dpr);
            canvas.height = Math.floor(viewH * dpr);
            canvas.style.width = viewW + 'px';
            canvas.style.height = viewH + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Generate stars with subtle variation and smoother twinkle
        const starsContainer = document.getElementById('stars');
        const starFrag = document.createDocumentFragment();
        for (let i = 0; i < 160; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 68 + '%';
            star.style.animationDelay = Math.random() * 4 + 's';
            star.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
            const size = Math.random() * 2.2 + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            if (Math.random() > 0.88) {
                star.style.boxShadow = '0 0 6px 1px rgba(255,255,255,0.85)';
            }
            starFrag.appendChild(star);
        }
        starsContainer.appendChild(starFrag);

        const defaultState = {
            launchCount: 0,
            settings: {
                particleCount: 120,
                explosionSize: 1,
                trailLength: 0.15,
                autoSpeed: 1000,
                gravity: 0.05,
                colorScheme: 'rainbow',
                pattern: 'circle',
                glitter: true,
                flash: true,
                sound: false
            }
        };

        let state = loadState();
        
        function loadState() {
            try {
                const saved = localStorage.getItem('fireworksState');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return { ...defaultState, ...parsed, settings: { ...defaultState.settings, ...parsed.settings } };
                }
            } catch (e) {}
            return JSON.parse(JSON.stringify(defaultState));
        }

        let saveTimer = null;
        function saveState() {
            if (saveTimer) return;
            saveTimer = setTimeout(() => {
                try { localStorage.setItem('fireworksState', JSON.stringify(state)); } catch (e) {}
                saveTimer = null;
            }, 400);
        }

        // ==== Sound Engine ====
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playLaunchSound() {
            if (!state.settings.sound || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }
        function playBoomSound() {
            if (!state.settings.sound || !audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.4;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            noise.connect(filter).connect(gain).connect(audioCtx.destination);
            noise.start();
        }

        function applySettingsToUI() {
            document.getElementById('particleSize').value = state.settings.particleCount;
            document.getElementById('particleSizeLabel').textContent = state.settings.particleCount;
            document.getElementById('explosionSize').value = state.settings.explosionSize;
            document.getElementById('explosionSizeLabel').textContent = state.settings.explosionSize;
            document.getElementById('trailLength').value = state.settings.trailLength;
            document.getElementById('trailLengthLabel').textContent = state.settings.trailLength;
            document.getElementById('autoSpeed').value = state.settings.autoSpeed;
            document.getElementById('autoSpeedLabel').textContent = state.settings.autoSpeed;
            document.getElementById('gravity').value = state.settings.gravity;
            document.getElementById('gravityLabel').textContent = state.settings.gravity;
            document.getElementById('glitterToggle').checked = state.settings.glitter;
            document.getElementById('flashToggle').checked = state.settings.flash;
            document.getElementById('soundToggle').checked = state.settings.sound;

            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.color === state.settings.colorScheme);
            });
            document.querySelectorAll('.pattern-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.pattern === state.settings.pattern);
            });
        }

        // ==== Screen Flash (radial, softer) ====
        let flashAlpha = 0;
        let flashColor = '255,255,255';
        let flashX = 0, flashY = 0;
        function triggerFlash(color, intensity, x, y) {
            if (!state.settings.flash) return;
            flashAlpha = Math.max(flashAlpha, intensity);
            flashColor = color;
            flashX = x; flashY = y;
        }

        function hslToRgb(h, s, l) {
            s /= 100; l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
            return `${Math.round(f(0)*255)},${Math.round(f(8)*255)},${Math.round(f(4)*255)}`;
        }

        const TWO_PI = Math.PI * 2;

        // ============================================================
        // Frame-rate independent physics (dt normalized to 60fps)
        // Enhanced visuals: softer decay, smoother fading trails
        // ============================================================
        class Particle {
            constructor(x, y, color, vx, vy, size = 3, opts = {}) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.size = size;
                this.baseSize = size;
                this.alpha = 1;
                this.isGlitter = opts.isGlitter || false;
                this.willow = opts.willow || false;
                this.flicker = opts.flicker || false;
                this.decay = this.willow ? 0.007 : Math.random() * 0.011 + 0.005;
                this.gravity = state.settings.gravity * (this.willow ? 0.55 : 1);
                this.friction = this.willow ? 0.986 : 0.982;
                this.tx = [];
                this.ty = [];
                this.maxTrailLength = this.willow ? 7 : 5;
            }

            update(dt) {
                if (this.maxTrailLength > 0) {
                    this.tx.push(this.x);
                    this.ty.push(this.y);
                    if (this.tx.length > this.maxTrailLength) {
                        this.tx.shift();
                        this.ty.shift();
                    }
                }
                const fr = Math.pow(this.friction, dt);
                this.vx *= fr;
                this.vy *= fr;
                this.vy += this.gravity * dt;
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.alpha -= this.decay * dt;
                if (this.flicker) {
                    this.size = this.baseSize * (0.55 + Math.random() * 0.65);
                }
            }

            draw() {
                const a = this.alpha > 0 ? this.alpha : 0;
                if (this.tx.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.tx[0], this.ty[0]);
                    for (let i = 1; i < this.tx.length; i++) {
                        ctx.lineTo(this.tx[i], this.ty[i]);
                    }
                    ctx.strokeStyle = this.color.replace(/[\d.]+\)$/, `${a * 0.3})`);
                    ctx.lineWidth = this.size * 0.55;
                    ctx.stroke();
                }

                ctx.globalAlpha = a;
                if (!this.isGlitter) {
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = this.color;
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, TWO_PI);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.4, 0, TWO_PI);
                ctx.fillStyle = `rgba(255,255,255,${a * 0.85})`;
                ctx.fill();
            }
        }

        class Firework {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                const angle = Math.atan2(targetY - startY, targetX - startX);
                const speed = 12 + Math.random() * 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = this.getColor();
                this.tx = [];
                this.ty = [];
                this.maxTrailLength = 20;
                this.exploded = false;
                this.particles = [];
            }

            getColor() {
                const scheme = state.settings.colorScheme;
                const colors = {
                    rainbow: () => `hsla(${Math.random() * 360}, 100%, 62%, 1)`,
                    red: () => `hsla(${Math.random() * 20}, 100%, 60%, 1)`,
                    blue: () => `hsla(${200 + Math.random() * 40}, 100%, 60%, 1)`,
                    green: () => `hsla(${100 + Math.random() * 40}, 100%, 52%, 1)`,
                    gold: () => `hsla(${40 + Math.random() * 20}, 100%, 55%, 1)`,
                    purple: () => `hsla(${280 + Math.random() * 40}, 100%, 62%, 1)`,
                    pastel: () => `hsla(${Math.random() * 360}, 70%, 80%, 1)`,
                    fire: () => `hsla(${Math.random() * 45}, 100%, ${55 + Math.random() * 15}%, 1)`,
                    ice: () => `hsla(${180 + Math.random() * 40}, 100%, ${65 + Math.random() * 25}%, 1)`,
                    white: () => `hsla(0, 0%, ${82 + Math.random() * 18}%, 1)`
                };
                return (colors[scheme] || colors.rainbow)();
            }

            update(dt) {
                if (!this.exploded) {
                    this.tx.push(this.x);
                    this.ty.push(this.y);
                    if (this.tx.length > this.maxTrailLength) {
                        this.tx.shift();
                        this.ty.shift();
                    }
                    this.vy += 0.03 * dt;
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    if (dx * dx + dy * dy < 2500 || this.vy >= 0) this.explode();
                }
                const ps = this.particles;
                for (let i = ps.length - 1; i >= 0; i--) {
                    const p = ps[i];
                    p.update(dt);
                    if (p.alpha <= 0 || p.y > viewH + 50) {
                        ps[i] = ps[ps.length - 1];
                        ps.pop();
                    }
                }
            }

            explode() {
                this.exploded = true;
                state.launchCount++;
                saveState();
                playBoomSound();

                let rgbForFlash = '255,255,255';
                const hslMatch = this.color.match(/hsla?\(([\d.]+),\s*([\d.]+)%,\s*([\d.]+)%/);
                if (hslMatch) {
                    rgbForFlash = hslToRgb(+hslMatch[1], +hslMatch[2], +hslMatch[3]);
                }
                triggerFlash(rgbForFlash, 0.14 * state.settings.explosionSize, this.x, this.y);

                const count = state.settings.particleCount;
                const size = state.settings.explosionSize;
                let pattern = state.settings.pattern;
                if (pattern === 'random') {
                    const patterns = ['circle','heart','star','ring','double','willow','chrysanthemum','palm','spiral'];
                    pattern = patterns[(Math.random() * patterns.length) | 0];
                }

                switch (pattern) {
                    case 'circle': this.createCircleExplosion(count, size); break;
                    case 'heart': this.createHeartExplosion(count, size); break;
                    case 'star': this.createStarExplosion(count, size); break;
                    case 'ring': this.createRingExplosion(count, size); break;
                    case 'double': this.createDoubleExplosion(count, size); break;
                    case 'willow': this.createWillowExplosion(count, size); break;
                    case 'chrysanthemum': this.createChrysanthemum(count, size); break;
                    case 'palm': this.createPalmExplosion(count, size); break;
                    case 'spiral': this.createSpiralExplosion(count, size); break;
                    default: this.createCircleExplosion(count, size);
                }

                if (state.settings.glitter) {
                    const gCount = (count * 0.4) | 0;
                    for (let i = 0; i < gCount; i++) {
                        const angle = Math.random() * TWO_PI;
                        const speed = Math.random() * 3 * size;
                        this.particles.push(new Particle(
                            this.x, this.y, 'rgba(255,255,255,1)',
                            Math.cos(angle) * speed, Math.sin(angle) * speed,
                            Math.random() * 1.2 + 0.5, { isGlitter: true, flicker: true }
                        ));
                    }
                }
            }

            createCircleExplosion(count, size) {
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * TWO_PI;
                    const speed = (Math.random() * 4 + 4) * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        Math.cos(angle) * speed, Math.sin(angle) * speed,
                        Math.random() * 2 + 2));
                }
            }

            createHeartExplosion(count, size) {
                for (let i = 0; i < count; i++) {
                    const t = (i / count) * TWO_PI;
                    const hx = 16 * Math.pow(Math.sin(t), 3);
                    const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    const speed = 0.5 * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        hx * speed * 0.16, hy * speed * 0.16,
                        Math.random() * 2 + 2));
                }
            }

            createStarExplosion(count, size) {
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * TWO_PI;
                    const rm = i % 2 === 0 ? 1 : 0.5;
                    const speed = (Math.random() * 2 + 4) * size * rm;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        Math.cos(angle) * speed, Math.sin(angle) * speed,
                        Math.random() * 2 + 2));
                }
            }

            createRingExplosion(count, size) {
                const outer = (count * 0.6) | 0;
                for (let i = 0; i < outer; i++) {
                    const angle = (i / outer) * TWO_PI;
                    const speed = 6 * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        Math.cos(angle) * speed, Math.sin(angle) * speed,
                        Math.random() * 2 + 2));
                }
                const inner = (count * 0.4) | 0;
                for (let i = 0; i < inner; i++) {
                    const angle = (i / inner) * TWO_PI;
                    const speed = 3 * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        Math.cos(angle) * speed, Math.sin(angle) * speed,
                        Math.random() * 1.5 + 1.5));
                }
            }

            createDoubleExplosion(count, size) {
                const half = (count * 0.5) | 0;
                for (let i = 0; i < half; i++) {
                    const angle = (i / half) * TWO_PI;
                    const speed = (Math.random() * 2 + 5) * size;
                    this.particles.push(new Particle(this.x, this.y, this.color,
                        Math.cos(angle) * speed, Math.sin(angle) * speed,
                        Math.random() * 2 + 2));
                }
                const color2 = this.getColor();
                for (let i = 0; i < half; i++) {
                    const angle = (i / half) * TWO_PI + 0.1;
                    const speed = (Math.random() * 2 + 3) * size;
                    this.particles.push(new Particle(this.x, this.y, color2,
                        Math.cos(angle) * speed, Math.sin(angle) * speed,
                        Math.random() * 2 + 1.5));
                }
            }

            createWillowExplosion(count, size) {
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * TWO_PI;
                    const speed = (Math.random() * 3 + 3) * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        Math.cos(angle) * speed, Math.sin(angle) * speed - 2,
                        Math.random() * 2 + 2, { willow: true }));
                }
            }

            createChrysanthemum(count, size) {
                const layers = 3;
                for (let l = 0; l < layers; l++) {
                    const layerSpeed = (3 + l * 2) * size;
                    const layerCount = (count / layers) | 0;
                    for (let i = 0; i < layerCount; i++) {
                        const angle = (i / layerCount) * TWO_PI + l * 0.15;
                        this.particles.push(new Particle(this.x, this.y, this.getColor(),
                            Math.cos(angle) * layerSpeed, Math.sin(angle) * layerSpeed,
                            Math.random() * 1.5 + 2, { willow: true }));
                    }
                }
            }

            createPalmExplosion(count, size) {
                const fronds = 8;
                const perFrond = (count / fronds) | 0;
                for (let f = 0; f < fronds; f++) {
                    const baseAngle = -Math.PI / 2 + (f - fronds / 2) * 0.28;
                    for (let i = 0; i < perFrond; i++) {
                        const spread = (Math.random() - 0.5) * 0.1;
                        const speed = (5 + Math.random() * 3) * size;
                        this.particles.push(new Particle(this.x, this.y, this.color,
                            Math.cos(baseAngle + spread) * speed, Math.sin(baseAngle + spread) * speed,
                            Math.random() * 2 + 2.5, { willow: true }));
                    }
                }
            }

            createSpiralExplosion(count, size) {
                const turns = 4;
                for (let i = 0; i < count; i++) {
                    const t = i / count;
                    const angle = t * TWO_PI * turns;
                    const speed = (1 + t * 6) * size;
                    this.particles.push(new Particle(this.x, this.y, this.getColor(),
                        Math.cos(angle) * speed, Math.sin(angle) * speed,
                        Math.random() * 1.5 + 2));
                }
            }

            draw() {
                if (!this.exploded) {
                    if (this.tx.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.tx[0], this.ty[0]);
                        for (let i = 1; i < this.tx.length; i++) {
                            ctx.lineTo(this.tx[i], this.ty[i]);
                        }
                        const grad = ctx.createLinearGradient(this.tx[0], this.ty[0], this.x, this.y);
                        grad.addColorStop(0, 'rgba(255,200,100,0)');
                        grad.addColorStop(1, 'rgba(255,225,160,0.95)');
                        ctx.strokeStyle = grad;
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ffbb44';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3.5, 0, TWO_PI);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                const ps = this.particles;
                for (let i = 0; i < ps.length; i++) ps[i].draw();
            }

            isDead() {
                return this.exploded && this.particles.length === 0;
            }
        }

        let fireworks = [];
        let autoMode = false;
        let autoInterval = null;

        let lastTime = performance.now();
        let running = true;

        function animate(now) {
            let frameMs = now - lastTime;
            lastTime = now;
            if (frameMs > 100) frameMs = 100;
            const dt = frameMs / (1000 / 60);

            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1;
            const fade = 1 - Math.pow(1 - state.settings.trailLength, dt);
            ctx.fillStyle = `rgba(6, 6, 18, ${fade})`;
            ctx.fillRect(0, 0, viewW, viewH);

            ctx.globalCompositeOperation = 'lighter';

            for (let i = fireworks.length - 1; i >= 0; i--) {
                const fw = fireworks[i];
                fw.update(dt);
                fw.draw();
                if (fw.isDead()) {
                    fireworks[i] = fireworks[fireworks.length - 1];
                    fireworks.pop();
                }
            }

            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;

            if (flashAlpha > 0.001) {
                const r = Math.max(viewW, viewH) * 0.7;
                const grad = ctx.createRadialGradient(flashX, flashY, 0, flashX, flashY, r);
                grad.addColorStop(0, `rgba(${flashColor}, ${flashAlpha})`);
                grad.addColorStop(1, `rgba(${flashColor}, 0)`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, viewW, viewH);
                flashAlpha *= Math.pow(0.86, dt);
            }

            ctx.globalCompositeOperation = 'source-over';

            if (running) requestAnimationFrame(animate);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                running = false;
            } else if (!running) {
                running = true;
                lastTime = performance.now();
                requestAnimationFrame(animate);
            }
        });

        function launchFirework(x, y) {
            const startX = (x || Math.random() * viewW) + (Math.random() - 0.5) * 100;
            const startY = viewH;
            const targetX = x || Math.random() * viewW;
            const targetY = y || Math.random() * (viewH * 0.5) + 50;
            fireworks.push(new Firework(startX, startY, targetX, targetY));
            playLaunchSound();
            document.getElementById('title').classList.add('hidden');
        }

        function launchMultiple() {
            const count = (Math.random() * 4 | 0) + 3;
            for (let i = 0; i < count; i++) {
                setTimeout(() => launchFirework(), i * 100);
            }
        }

        function launchFinale() {
            document.getElementById('title').classList.add('hidden');
            let bursts = 0;
            const finaleInterval = setInterval(() => {
                const n = (Math.random() * 3 | 0) + 2;
                for (let i = 0; i < n; i++) {
                    setTimeout(() => launchFirework(
                        Math.random() * viewW,
                        Math.random() * (viewH * 0.5) + 40
                    ), i * 60);
                }
                bursts++;
                if (bursts > 20) clearInterval(finaleInterval);
            }, 250);
        }

        canvas.addEventListener('click', (e) => { initAudio(); launchFirework(e.clientX, e.clientY); });

        document.getElementById('launchBtn').addEventListener('click', () => { initAudio(); launchFirework(); });
        document.getElementById('multiBtn').addEventListener('click', () => { initAudio(); launchMultiple(); });
        document.getElementById('finaleBtn').addEventListener('click', () => { initAudio(); launchFinale(); });

        document.getElementById('autoBtn').addEventListener('click', function() {
            initAudio();
            autoMode = !autoMode;
            this.classList.toggle('active', autoMode);
            if (autoMode) {
                autoInterval = setInterval(() => {
                    if (Math.random() > 0.3) launchFirework();
                    if (Math.random() > 0.8) launchMultiple();
                }, state.settings.autoSpeed);
            } else {
                clearInterval(autoInterval);
            }
        });

        const settingsPanel = document.getElementById('settingsPanel');
        const settingsBackdrop = document.getElementById('settingsBackdrop');
        function openSettings() {
            settingsPanel.classList.add('open');
            settingsBackdrop.classList.add('open');
        }
        function closeSettings() {
            settingsPanel.classList.remove('open');
            settingsBackdrop.classList.remove('open');
        }
        document.getElementById('settingsBtn').addEventListener('click', () => {
            settingsPanel.classList.contains('open') ? closeSettings() : openSettings();
        });
        document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);
        settingsBackdrop.addEventListener('click', closeSettings);

        document.getElementById('clearBtn').addEventListener('click', () => {
            fireworks = [];
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1;
            ctx.fillStyle = 'rgba(6, 6, 18, 1)';
            ctx.fillRect(0, 0, viewW, viewH);
        });

        document.getElementById('particleSize').addEventListener('input', function() {
            state.settings.particleCount = parseInt(this.value);
            document.getElementById('particleSizeLabel').textContent = this.value;
            saveState();
        });
        document.getElementById('explosionSize').addEventListener('input', function() {
            state.settings.explosionSize = parseFloat(this.value);
            document.getElementById('explosionSizeLabel').textContent = this.value;
            saveState();
        });
        document.getElementById('trailLength').addEventListener('input', function() {
            state.settings.trailLength = parseFloat(this.value);
            document.getElementById('trailLengthLabel').textContent = this.value;
            saveState();
        });
        document.getElementById('autoSpeed').addEventListener('input', function() {
            state.settings.autoSpeed = parseInt(this.value);
            document.getElementById('autoSpeedLabel').textContent = this.value;
            saveState();
            if (autoMode) {
                clearInterval(autoInterval);
                autoInterval = setInterval(() => {
                    if (Math.random() > 0.3) launchFirework();
                    if (Math.random() > 0.8) launchMultiple();
                }, state.settings.autoSpeed);
            }
        });
        document.getElementById('gravity').addEventListener('input', function() {
            state.settings.gravity = parseFloat(this.value);
            document.getElementById('gravityLabel').textContent = this.value;
            saveState();
        });

        document.getElementById('glitterToggle').addEventListener('change', function() {
            state.settings.glitter = this.checked; saveState();
        });
        document.getElementById('flashToggle').addEventListener('change', function() {
            state.settings.flash = this.checked; saveState();
        });
        document.getElementById('soundToggle').addEventListener('change', function() {
            state.settings.sound = this.checked;
            if (this.checked) initAudio();
            saveState();
        });

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                state.settings.colorScheme = this.dataset.color;
                saveState();
            });
        });
        document.querySelectorAll('.pattern-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                state.settings.pattern = this.dataset.pattern;
                saveState();
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Escape') { closeSettings(); return; }
            initAudio();
            if (e.code === 'Space') { e.preventDefault(); launchFirework(); }
            else if (e.code === 'KeyM') { launchMultiple(); }
            else if (e.code === 'KeyA') { document.getElementById('autoBtn').click(); }
            else if (e.code === 'KeyF') { launchFinale(); }
        });

        applySettingsToUI();
        requestAnimationFrame(animate);

        setTimeout(() => launchFirework(viewW * 0.3, viewH * 0.3), 500);
        setTimeout(() => launchFirework(viewW * 0.7, viewH * 0.4), 800);
        setTimeout(() => launchFirework(viewW * 0.5, viewH * 0.25), 1100);
    </script>
</body>
