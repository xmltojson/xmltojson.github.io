<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Memory Card Game">
    <title>Memory Card Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --success: #00b894;
            --warning: #fdcb6e;
            --dark: #2d3436;
            --light: #dfe6e9;
            --white: #ffffff;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --card-gradient: linear-gradient(145deg, #6c5ce7, #a29bfe);
            --shadow: 0 10px 40px rgba(108, 92, 231, 0.3);
            --card-size: 72px;
        }

        html {
            font-size: 15px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            animation: float 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        .bg-animation span:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .bg-animation span:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .bg-animation span:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .bg-animation span:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .bg-animation span:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .bg-animation span:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .bg-animation span:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .bg-animation span:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .bg-animation span:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .bg-animation span:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 50%;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 50%;
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 16px;
            z-index: 1;
        }

        .header h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            animation: titleGlow 2s ease-in-out infinite alternate;
            margin-bottom: 4px;
        }

        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 10px rgba(245, 87, 108, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(240, 147, 251, 0.8)); }
        }

        .header p {
            color: var(--light);
            font-size: 0.95rem;
            opacity: 0.8;
        }

        /* Main Layout - desktop three column */
        .layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            z-index: 1;
        }

        .game-area {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 24px;
            width: 100%;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 220px;
            flex-shrink: 0;
        }

        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Stats Panel */
        .stats-panel {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
        }

        .side-panel .stats-panel {
            flex-direction: column;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            padding: 12px 20px;
            text-align: center;
            min-width: 100px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
        }

        .stat-card .icon {
            font-size: 1.3rem;
            margin-bottom: 3px;
        }

        .stat-card .label {
            color: var(--light);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .stat-card .value {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            color: var(--white);
            background: var(--gradient-3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 14px;
            z-index: 1;
        }

        .btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            padding: 10px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: var(--gradient-2);
            color: white;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: white;
            box-shadow: 0 5px 20px rgba(0, 184, 148, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.6);
        }

        /* Difficulty Selector */
        .difficulty-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
        }

        .difficulty-btn {
            padding: 8px 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .difficulty-btn:hover,
        .difficulty-btn.active {
            background: var(--gradient-1);
            border-color: transparent;
            transform: scale(1.05);
        }

        /* Game Board */
        .game-container {
            z-index: 1;
            perspective: 1000px;
        }

        .game-board {
            display: grid;
            gap: 10px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            justify-content: center;
            align-content: center;
        }

        .game-board.easy { 
            grid-template-columns: repeat(4, var(--card-size));
            grid-template-rows: repeat(4, var(--card-size));
        }
        .game-board.medium { 
            grid-template-columns: repeat(4, var(--card-size));
            grid-template-rows: repeat(6, var(--card-size));
        }
        .game-board.hard { 
            grid-template-columns: repeat(6, var(--card-size));
            grid-template-rows: repeat(6, var(--card-size));
        }

        /* Card Styles */
        .card-wrapper {
            width: var(--card-size);
            height: var(--card-size);
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            transform-origin: center center;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: matchPulse 0.6s ease forwards;
        }

        @keyframes matchPulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.08); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        .card.matched .card-front {
            background: linear-gradient(135deg, #00b894, #55efc4);
            box-shadow: 0 0 20px rgba(0, 184, 148, 0.6);
        }

        .card.shake {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            20% { transform: rotateY(180deg) translateX(-8px); }
            40% { transform: rotateY(180deg) translateX(8px); }
            60% { transform: rotateY(180deg) translateX(-8px); }
            80% { transform: rotateY(180deg) translateX(8px); }
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            user-select: none;
        }

        .card-back {
            background: var(--card-gradient);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
            position: relative;
            overflow: hidden;
        }

        .card-back::before {
            content: '?';
            font-family: 'Fredoka One', cursive;
            font-size: 1.7rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .card-back::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .card-front {
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            transform: rotateY(180deg);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        .card-front .emoji {
            font-size: 2.1rem;
            line-height: 1;
            text-align: center;
        }

        .card:not(.flipped):not(.matched):hover {
            transform: translateY(-3px);
        }

        .card:not(.flipped):not(.matched):hover .card-back {
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.6);
        }

        /* High Scores */
        .high-scores {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 16px 22px;
            z-index: 1;
            width: 100%;
        }

        .high-scores h3 {
            font-family: 'Fredoka One', cursive;
            color: var(--warning);
            text-align: center;
            margin-bottom: 12px;
            font-size: 1.3rem;
        }

        .score-list {
            list-style: none;
        }

        .score-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--light);
            font-size: 0.9rem;
        }

        .score-list li:last-child {
            border-bottom: none;
        }

        .score-list .rank {
            font-weight: 700;
            width: 30px;
        }

        .score-list .difficulty-tag {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 10px;
            background: var(--gradient-1);
            color: white;
            text-transform: capitalize;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            margin: 20px;
            animation: modalSlide 0.5s ease;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        @keyframes modalSlide {
            from { 
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to { 
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal h2 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .modal .trophy {
            font-size: 5rem;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .modal .stats {
            margin: 25px 0;
            color: var(--light);
        }

        .modal .stats p {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .modal .stats span {
            font-family: 'Fredoka One', cursive;
            color: var(--warning);
        }

        .modal .new-record {
            color: var(--success);
            font-weight: 700;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall 3s linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotateZ(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotateZ(720deg);
                opacity: 0;
            }
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* Theme indicator */
        .theme-indicator {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
            z-index: 100;
            text-transform: capitalize;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .theme-indicator.show {
            opacity: 1;
        }

        /* ===== DESKTOP LAYOUT ===== */
        /* On wide screens use the side panels; otherwise stack. */
        @media (max-width: 1023px) {
            .game-area {
                flex-direction: column;
                align-items: center;
            }
            .side-panel {
                width: auto;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .side-panel .stats-panel {
                flex-direction: row;
            }
            .side-left { order: -1; }
        }

        /* Scale cards to available viewport height on desktop so no zoom needed */
        @media (min-width: 1024px) {
            :root {
                --card-size: clamp(56px, 8.5vh, 82px);
            }
            .header {
                margin-bottom: 12px;
            }
            .header h1 {
                font-size: 2rem;
            }
        }

        @media (min-width: 1024px) and (min-height: 950px) {
            :root {
                --card-size: 88px;
            }
        }

        /* Tablet / small */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.9rem;
            }

            :root {
                --card-size: 66px;
            }

            .game-board.easy,
            .game-board.medium { 
                gap: 8px;
                padding: 15px;
            }
            .game-board.hard { 
                --card-size: 55px;
                gap: 6px;
                padding: 12px;
            }

            .card-face {
                font-size: 1.8rem;
            }

            .card-front .emoji {
                font-size: 2rem;
            }

            .card-back::before {
                font-size: 1.5rem;
            }

            .stats-panel {
                gap: 10px;
            }

            .stat-card {
                padding: 10px 15px;
                min-width: 80px;
            }

            .stat-card .value {
                font-size: 1.4rem;
            }

            .stat-card .label {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 500px) {
            .header h1 {
                font-size: 1.6rem;
            }

            :root {
                --card-size: 60px;
            }

            .game-board.easy,
            .game-board.medium { 
                gap: 6px;
                padding: 12px;
            }
            .game-board.hard { 
                --card-size: 48px;
                gap: 5px;
                padding: 10px;
            }

            .card-face {
                font-size: 1.5rem;
                border-radius: 8px;
            }

            .card-front .emoji {
                font-size: 1.6rem;
            }

            .card-back::before {
                font-size: 1.2rem;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.85rem;
            }

            .difficulty-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
            }

            .controls {
                gap: 10px;
            }
        }

        /* Paused state */
        .game-board.paused {
            filter: blur(10px);
            pointer-events: none;
        }

        .game-board.paused::after {
            content: 'PAUSED';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: white;
            z-index: 10;
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" title="Change Card Theme">🎨</button>
    <div class="theme-indicator" id="themeIndicator">animals</div>

    <!-- Header -->
    <header class="header">
        <h1>✨ Memory Card Game ✨</h1>
        <p>Find all matching pairs to win!</p>
    </header>

    <!-- Main Layout -->
    <div class="layout">
        <div class="game-area">
            <!-- Left side panel: stats -->
            <aside class="side-panel side-left">
                <div class="stats-panel">
                    <div class="stat-card">
                        <div class="icon">🎯</div>
                        <div class="label">Moves</div>
                        <div class="value" id="moves">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">✅</div>
                        <div class="label">Matches</div>
                        <div class="value" id="matches">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">⏱️</div>
                        <div class="label">Time</div>
                        <div class="value" id="timer">0:00</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">⭐</div>
                        <div class="label">Score</div>
                        <div class="value" id="score">0</div>
                    </div>
                </div>
            </aside>

            <!-- Center: controls + board -->
            <div class="center-panel">
                <!-- Difficulty Selector -->
                <div class="difficulty-selector">
                    <button class="difficulty-btn active" data-difficulty="easy">Easy (8)</button>
                    <button class="difficulty-btn" data-difficulty="medium">Medium (12)</button>
                    <button class="difficulty-btn" data-difficulty="hard">Hard (18)</button>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="btn btn-primary" id="newGame">🔄 New Game</button>
                    <button class="btn btn-secondary" id="pauseGame">⏸️ Pause</button>
                    <button class="btn btn-success" id="hint">💡 Hint</button>
                </div>

                <!-- Game Board -->
                <div class="game-container">
                    <div class="game-board easy" id="gameBoard">
                        <!-- Cards will be generated here -->
                    </div>
                </div>
            </div>

            <!-- Right side panel: high scores -->
            <aside class="side-panel side-right">
                <div class="high-scores">
                    <h3>🏆 High Scores</h3>
                    <ul class="score-list" id="highScores">
                        <!-- Scores will be loaded here -->
                    </ul>
                </div>
            </aside>
        </div>
    </div>

    <!-- Win Modal -->
    <div class="modal-overlay" id="winModal">
        <div class="modal">
            <div class="trophy">🏆</div>
            <h2>Congratulations!</h2>
            <div class="stats">
                <p>Moves: <span id="finalMoves">0</span></p>
                <p>Time: <span id="finalTime">0:00</span></p>
                <p>Score: <span id="finalScore">0</span></p>
                <p id="newRecord" class="new-record" style="display: none;">🎉 New High Score! 🎉</p>
            </div>
            <button class="btn btn-primary" id="playAgain">Play Again</button>
        </div>
    </div>

    <!-- Confetti Container -->
    <div class="confetti" id="confetti"></div>

    <script>
        // Game Configuration
        const CARD_THEMES = {
            animals: ['🐶', '🐱', '🐼', '🦊', '🦁', '🐯', '🐨', '🐰', '🐸', '🐵', '🦄', '🐲', '🦋', '🐢', '🦀', '🐙', '🦈', '🐬'],
            food: ['🍎', '🍕', '🍔', '🍟', '🌮', '🍣', '🍩', '🍪', '🍰', '🍫', '🍿', '🥤', '🍺', '🍷', '🥗', '🥪', '🌭', '🍱'],
            nature: ['🌸', '🌺', '🌻', '🌷', '🌹', '🌴', '🌵', '🍀', '🍁', '🌈', '⭐', '🌙', '☀️', '⚡', '❄️', '🔥', '💧', '🌊'],
            space: ['🚀', '🛸', '🌍', '🌙', '⭐', '💫', '☄️', '🌌', '👽', '🤖', '🛰️', '🔭', '🌑', '🌕', '💥', '🪐', '✨', '🌟']
        };

        const DIFFICULTIES = {
            easy: { pairs: 8, columns: 4, rows: 4 },
            medium: { pairs: 12, columns: 4, rows: 6 },
            hard: { pairs: 18, columns: 6, rows: 6 }
        };

        // Game State
        let gameState = {
            cards: [],
            flippedCards: [],
            matchedPairs: 0,
            moves: 0,
            score: 0,
            timer: 0,
            timerInterval: null,
            isPlaying: false,
            isPaused: false,
            difficulty: 'easy',
            theme: 'animals',
            hintsUsed: 0,
            totalPairs: 8,
            isLocked: false
        };

        // DOM Elements
        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const matchesDisplay = document.getElementById('matches');
        const timerDisplay = document.getElementById('timer');
        const scoreDisplay = document.getElementById('score');
        const highScoresList = document.getElementById('highScores');
        const winModal = document.getElementById('winModal');
        const confettiContainer = document.getElementById('confetti');
        const themeIndicator = document.getElementById('themeIndicator');

        // Initialize Game
        function init() {
            loadState();
            setupEventListeners();
            updateDisplay();
            renderHighScores();
            
            if (gameState.cards.length > 0 && !gameState.isComplete) {
                renderCards();
                if (gameState.isPlaying && !gameState.isPaused) {
                    startTimer();
                }
            } else {
                startNewGame();
            }
        }

        // Setup Event Listeners
        function setupEventListeners() {
            document.getElementById('newGame').addEventListener('click', startNewGame);
            document.getElementById('pauseGame').addEventListener('click', togglePause);
            document.getElementById('hint').addEventListener('click', showHint);
            document.getElementById('playAgain').addEventListener('click', () => {
                winModal.classList.remove('active');
                startNewGame();
            });
            document.getElementById('themeToggle').addEventListener('click', cycleTheme);

            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    gameState.difficulty = btn.dataset.difficulty;
                    startNewGame();
                });
            });
        }

        // Start New Game
        function startNewGame() {
            stopTimer();
            
            const difficulty = DIFFICULTIES[gameState.difficulty];
            gameState.totalPairs = difficulty.pairs;
            gameState.cards = generateCards(difficulty.pairs);
            gameState.flippedCards = [];
            gameState.matchedPairs = 0;
            gameState.moves = 0;
            gameState.score = 0;
            gameState.timer = 0;
            gameState.isPlaying = true;
            gameState.isPaused = false;
            gameState.hintsUsed = 0;
            gameState.isComplete = false;
            gameState.isLocked = false;

            gameBoard.className = `game-board ${gameState.difficulty}`;
            gameBoard.classList.remove('paused');
            
            renderCards();
            updateDisplay();
            saveState();
            startTimer();

            document.getElementById('pauseGame').textContent = '⏸️ Pause';
        }

        // Generate Cards
        function generateCards(numPairs) {
            const emojis = CARD_THEMES[gameState.theme].slice(0, numPairs);
            const cards = [];

            emojis.forEach((emoji, index) => {
                cards.push({ id: index * 2, emoji, isFlipped: false, isMatched: false });
                cards.push({ id: index * 2 + 1, emoji, isFlipped: false, isMatched: false });
            });

            return shuffleArray(cards);
        }

        // Shuffle Array
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // Render Cards
        function renderCards() {
            gameBoard.innerHTML = '';
            
            gameState.cards.forEach((card, index) => {
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'card-wrapper';
                
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.dataset.index = index;
                
                if (card.isFlipped || card.isMatched) {
                    cardElement.classList.add('flipped');
                }
                if (card.isMatched) {
                    cardElement.classList.add('matched');
                }

                cardElement.innerHTML = `
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">
                        <span class="emoji">${card.emoji}</span>
                    </div>
                `;

                cardElement.addEventListener('click', () => handleCardClick(index));
                cardWrapper.appendChild(cardElement);
                gameBoard.appendChild(cardWrapper);
            });
        }

        // Handle Card Click
        function handleCardClick(index) {
            if (gameState.isPaused || !gameState.isPlaying || gameState.isLocked) return;

            const card = gameState.cards[index];
            
            if (card.isFlipped || card.isMatched || gameState.flippedCards.length >= 2) {
                return;
            }

            card.isFlipped = true;
            gameState.flippedCards.push(index);
            
            const cardElement = gameBoard.querySelectorAll('.card')[index];
            cardElement.classList.add('flipped');

            if (gameState.flippedCards.length === 2) {
                gameState.moves++;
                gameState.isLocked = true;
                checkMatch();
            }

            updateDisplay();
            saveState();
        }

        // Check Match
        function checkMatch() {
            const [index1, index2] = gameState.flippedCards;
            const card1 = gameState.cards[index1];
            const card2 = gameState.cards[index2];
            const cardElements = gameBoard.querySelectorAll('.card');

            if (card1.emoji === card2.emoji) {
                // Match found
                card1.isMatched = true;
                card2.isMatched = true;
                gameState.matchedPairs++;
                gameState.score += calculateMatchScore();

                setTimeout(() => {
                    cardElements[index1].classList.add('matched');
                    cardElements[index2].classList.add('matched');
                    gameState.flippedCards = [];
                    gameState.isLocked = false;

                    if (gameState.matchedPairs === gameState.totalPairs) {
                        gameWon();
                    }
                    saveState();
                }, 300);

            } else {
                // No match
                cardElements[index1].classList.add('shake');
                cardElements[index2].classList.add('shake');

                setTimeout(() => {
                    card1.isFlipped = false;
                    card2.isFlipped = false;
                    cardElements[index1].classList.remove('flipped', 'shake');
                    cardElements[index2].classList.remove('flipped', 'shake');
                    gameState.flippedCards = [];
                    gameState.isLocked = false;
                    saveState();
                }, 1000);
            }

            updateDisplay();
            saveState();
        }

        // Calculate Match Score
        function calculateMatchScore() {
            const baseScore = 100;
            const moveBonus = Math.max(0, 20 - gameState.moves) * 5;
            const timeBonus = Math.max(0, 60 - gameState.timer) * 2;
            const difficultyMultiplier = {
                easy: 1,
                medium: 1.5,
                hard: 2
            };
            
            return Math.round((baseScore + moveBonus + timeBonus) * difficultyMultiplier[gameState.difficulty]);
        }

        // Game Won
        function gameWon() {
            stopTimer();
            gameState.isPlaying = false;
            gameState.isComplete = true;

            const finalScore = gameState.score;
            const isNewRecord = saveHighScore(finalScore);

            document.getElementById('finalMoves').textContent = gameState.moves;
            document.getElementById('finalTime').textContent = formatTime(gameState.timer);
            document.getElementById('finalScore').textContent = finalScore;
            document.getElementById('newRecord').style.display = isNewRecord ? 'block' : 'none';

            setTimeout(() => {
                winModal.classList.add('active');
                createConfetti();
            }, 600);

            renderHighScores();
            saveState();
        }

        // Timer Functions
        function startTimer() {
            if (gameState.timerInterval) return;
            
            gameState.timerInterval = setInterval(() => {
                gameState.timer++;
                updateTimerDisplay();
                if (gameState.timer % 10 === 0) {
                    saveState();
                }
            }, 1000);
        }

        function stopTimer() {
            if (gameState.timerInterval) {
                clearInterval(gameState.timerInterval);
                gameState.timerInterval = null;
            }
        }

        function togglePause() {
            if (!gameState.isPlaying) return;

            gameState.isPaused = !gameState.isPaused;
            const pauseBtn = document.getElementById('pauseGame');

            if (gameState.isPaused) {
                stopTimer();
                pauseBtn.textContent = '▶️ Resume';
                gameBoard.classList.add('paused');
            } else {
                startTimer();
                pauseBtn.textContent = '⏸️ Pause';
                gameBoard.classList.remove('paused');
            }

            saveState();
        }

        // Show Hint
        function showHint() {
            if (!gameState.isPlaying || gameState.isPaused || gameState.hintsUsed >= 3 || gameState.isLocked) return;

            const unmatchedCards = gameState.cards
                .map((card, index) => ({ ...card, index }))
                .filter(card => !card.isMatched && !card.isFlipped);

            if (unmatchedCards.length < 2) return;

            const emoji = unmatchedCards[0].emoji;
            const pairCards = unmatchedCards.filter(card => card.emoji === emoji).slice(0, 2);
            const cardElements = gameBoard.querySelectorAll('.card');

            gameState.isLocked = true;

            pairCards.forEach(card => {
                cardElements[card.index].classList.add('flipped');
            });

            setTimeout(() => {
                pairCards.forEach(card => {
                    if (!gameState.cards[card.index].isFlipped) {
                        cardElements[card.index].classList.remove('flipped');
                    }
                });
                gameState.isLocked = false;
            }, 1000);

            gameState.hintsUsed++;
            gameState.score = Math.max(0, gameState.score - 50);
            updateDisplay();
            saveState();
        }

        // Cycle Theme
        function cycleTheme() {
            const themes = Object.keys(CARD_THEMES);
            const currentIndex = themes.indexOf(gameState.theme);
            gameState.theme = themes[(currentIndex + 1) % themes.length];
            
            // Show theme indicator
            themeIndicator.textContent = gameState.theme;
            themeIndicator.classList.add('show');
            setTimeout(() => {
                themeIndicator.classList.remove('show');
            }, 1500);
            
            startNewGame();
        }

        // Update Display
        function updateDisplay() {
            movesDisplay.textContent = gameState.moves;
            matchesDisplay.textContent = `${gameState.matchedPairs}/${gameState.totalPairs}`;
            scoreDisplay.textContent = gameState.score;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = formatTime(gameState.timer);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // High Scores
        function saveHighScore(score) {
            let highScores = JSON.parse(localStorage.getItem('memoryGameHighScores') || '[]');
            
            const newScore = {
                score,
                moves: gameState.moves,
                time: gameState.timer,
                difficulty: gameState.difficulty,
                date: new Date().toLocaleDateString()
            };

            highScores.push(newScore);
            highScores.sort((a, b) => b.score - a.score);
            highScores = highScores.slice(0, 10);

            localStorage.setItem('memoryGameHighScores', JSON.stringify(highScores));

            return highScores.findIndex(s => s.score === score && s.time === gameState.timer) === 0;
        }

        function renderHighScores() {
            const highScores = JSON.parse(localStorage.getItem('memoryGameHighScores') || '[]');

            if (highScores.length === 0) {
                highScoresList.innerHTML = '<li style="justify-content: center;">No scores yet!</li>';
                return;
            }

            const rankIcons = ['🥇', '🥈', '🥉', '4', '5'];
            
            highScoresList.innerHTML = highScores.slice(0, 5).map((score, index) => `
                <li>
                    <span class="rank">${rankIcons[index]}</span>
                    <span>${score.score} pts</span>
                    <span class="difficulty-tag">${score.difficulty}</span>
                </li>
            `).join('');
        }

        // Create Confetti
        function createConfetti() {
            confettiContainer.innerHTML = '';
            const colors = ['#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#fa709a', '#fee140', '#ffd700'];

            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                
                // Random shapes
                const shapes = ['50%', '0%', '3px'];
                confetti.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
                
                confettiContainer.appendChild(confetti);
            }

            setTimeout(() => {
                confettiContainer.innerHTML = '';
            }, 5000);
        }

        // Local Storage Functions
        function saveState() {
            const stateToSave = {
                cards: gameState.cards,
                flippedCards: gameState.flippedCards,
                matchedPairs: gameState.matchedPairs,
                moves: gameState.moves,
                score: gameState.score,
                timer: gameState.timer,
                isPlaying: gameState.isPlaying,
                isPaused: gameState.isPaused,
                difficulty: gameState.difficulty,
                theme: gameState.theme,
                hintsUsed: gameState.hintsUsed,
                totalPairs: gameState.totalPairs,
                isComplete: gameState.isComplete
            };
            localStorage.setItem('memoryGameState', JSON.stringify(stateToSave));
        }

        function loadState() {
            const savedState = localStorage.getItem('memoryGameState');
            if (savedState) {
                const parsed = JSON.parse(savedState);
                Object.assign(gameState, parsed);
                
                // Update UI to reflect loaded state
                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.difficulty === gameState.difficulty);
                });
            }
        }

        // Start the game
        init();
    </script>
</body>
</html>
