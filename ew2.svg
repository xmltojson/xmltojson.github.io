<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  
  <!-- Black border rectangle -->
  <rect x="40" y="40" width="430" height="320" rx="3" ry="3" fill="black"/>
  
  <!-- Light blue inner rectangle -->
  <rect x="48" y="48" width="414" height="304" fill="#87CEFA"/>
  
  <!-- "EW" text centered inside the rectangle, bigger -->
  <text x="255" y="215" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="140" 
        fill="black" 
        text-anchor="middle" 
        dominant-baseline="middle">EW</text>
  
  <!-- "БЛАСТЕР (ДАМБА)" text on the right side, normal horizontal -->
  <text x="510" y="190" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="22" 
        fill="black" 
        text-anchor="start" 
        dominant-baseline="middle">БЛАСТЕР</text>
  
  <text x="510" y="220" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="22" 
        fill="black" 
        text-anchor="start" 
        dominant-baseline="middle">(ДАМБА)</text>
  
</svg>