<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Переглядач — Живий редактор Markdown з експортом</title>
<meta name="description" content="Безкоштовний онлайн Markdown редактор з живим попереднім переглядом, підсвіткою синтаксису, українською мовою та експортом у PDF, HTML і MD формати. Автозбереження та підтримка вертикальної/горизонтальної орієнтації.">
<meta name="keywords" content="markdown, редактор, previewer, українська, export, PDF, HTML, syntax highlighting, живий перегляд">
<meta name="author" content="Markdown Previewer">
<meta property="og:title" content="Markdown Переглядач — Живий редактор">
<meta property="og:description" content="Пишіть Markdown з живим попереднім переглядом, підсвіткою коду та експортом у різні формати.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#7c3aed">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%237c3aed'/%3E%3Cstop offset='100%25' style='stop-color:%23ec4899'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='Arial,sans-serif' font-weight='bold'%3EM%E2%86%93%3C/text%3E%3C/svg%3E">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0f0f1e;
  --bg-secondary: #1a1a2e;
  --bg-tertiary: #252540;
  --accent: #7c3aed;
  --accent-hover: #9333ea;
  --accent-light: #a78bfa;
  --text-primary: #e4e4e7;
  --text-secondary: #a1a1aa;
  --border: #3f3f5f;
  --success: #10b981;
  --danger: #ef4444;
  --gradient: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 1.4rem;
  font-weight: 700;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: var(--gradient);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
}

.logo-text {
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.btn {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.875rem;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
}

.btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
}

.btn.primary {
  background: var(--gradient);
  border: none;
}

.btn.primary:hover {
  filter: brightness(1.1);
}

.btn.icon-only {
  padding: 8px 10px;
}

select.btn {
  padding-right: 8px;
}

.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  padding: 16px;
  gap: 16px;
}

.main.vertical {
  flex-direction: column;
}

.panel {
  flex: 1;
  background: var(--bg-secondary);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  border: 1px solid var(--border);
  min-height: 0;
  min-width: 0;
}

.panel-header {
  background: var(--bg-tertiary);
  padding: 10px 16px;
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.panel-header .badge {
  background: var(--accent);
  color: white;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
}

.editor {
  flex: 1;
  width: 100%;
  background: transparent;
  color: var(--text-primary);
  border: none;
  outline: none;
  padding: 20px;
  font-family: 'Fira Code', 'Consolas', monospace;
  font-size: 14px;
  line-height: 1.6;
  resize: none;
}

.preview {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  line-height: 1.7;
}

.preview h1, .preview h2, .preview h3, .preview h4 {
  margin-top: 1em;
  margin-bottom: 0.5em;
  color: var(--accent-light);
}

.preview h1 { font-size: 2em; border-bottom: 2px solid var(--border); padding-bottom: 0.3em; }
.preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.preview h3 { font-size: 1.25em; }

.preview p { margin: 0.8em 0; }
.preview a { color: var(--accent-light); text-decoration: none; }
.preview a:hover { text-decoration: underline; }

.preview ul, .preview ol { margin: 0.8em 0; padding-left: 2em; }
.preview li { margin: 0.3em 0; }

.preview blockquote {
  border-left: 4px solid var(--accent);
  padding: 0.5em 1em;
  margin: 1em 0;
  background: rgba(124, 58, 237, 0.1);
  border-radius: 0 8px 8px 0;
  color: var(--text-secondary);
}

.preview code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Fira Code', monospace;
  font-size: 0.9em;
  color: #f472b6;
}

.preview pre {
  background: #282c34;
  padding: 16px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 1em 0;
  border: 1px solid var(--border);
}

.preview pre code {
  background: transparent;
  padding: 0;
  color: inherit;
  font-size: 0.9em;
}

.preview table {
  border-collapse: collapse;
  margin: 1em 0;
  width: 100%;
}

.preview th, .preview td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}

.preview th {
  background: var(--bg-tertiary);
  color: var(--accent-light);
}

.preview img {
  max-width: 100%;
  border-radius: 8px;
  margin: 1em 0;
}

.preview hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2em 0;
}

.status-bar {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 6px 20px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: flex;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.status-bar span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.preview::-webkit-scrollbar,
.editor::-webkit-scrollbar {
  width: 10px;
}

.preview::-webkit-scrollbar-track,
.editor::-webkit-scrollbar-track {
  background: var(--bg-tertiary);
}

.preview::-webkit-scrollbar-thumb,
.editor::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 5px;
}

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--gradient);
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s;
  z-index: 1000;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

@media (max-width: 768px) {
  header { padding: 10px; }
  .logo { font-size: 1.1rem; }
  .btn { padding: 6px 10px; font-size: 0.8rem; }
  .main { padding: 8px; gap: 8px; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">📝</div>
      <div class="logo-text" data-i18n="title">Markdown Переглядач</div>
    </div>
    <div class="toolbar">
      <select id="langSelect" class="btn">
        <option value="uk">🇺🇦 Українська</option>
        <option value="en">🇬🇧 English</option>
      </select>
      <button class="btn" id="toggleOrientation" title="Toggle layout">
        <span id="orientIcon">⬌</span>
        <span data-i18n="layout">Розташування</span>
      </button>
      <button class="btn" id="clearBtn">
        🗑 <span data-i18n="clear">Очистити</span>
      </button>
      <button class="btn" id="sampleBtn">
        ✨ <span data-i18n="sample">Приклад</span>
      </button>
      <button class="btn" id="copyBtn">
        📋 <span data-i18n="copy">Копіювати HTML</span>
      </button>
      <button class="btn" id="exportMd">
        💾 <span data-i18n="exportMd">MD</span>
      </button>
      <button class="btn" id="exportHtml">
        🌐 <span data-i18n="exportHtml">HTML</span>
      </button>
      <button class="btn primary" id="exportPdf">
        📄 <span data-i18n="exportPdf">PDF</span>
      </button>
    </div>
  </header>

  <div class="main" id="mainContainer">
    <div class="panel">
      <div class="panel-header">
        <span data-i18n="editor">✍️ Редактор</span>
        <span class="badge" id="charCount">0</span>
      </div>
      <textarea class="editor" id="editor" spellcheck="false"></textarea>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span data-i18n="preview">👁 Попередній перегляд</span>
        <span class="badge" data-i18n="live">Наживо</span>
      </div>
      <div class="preview" id="preview"></div>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="status-dot"></span> <span data-i18n="autosave">Автозбереження увімкнено</span></span>
    <span id="stats"></span>
    <span data-i18n="footer">Markdown Previewer v1.0</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const translations = {
  uk: {
    title: "Markdown Переглядач",
    layout: "Розташування",
    clear: "Очистити",
    sample: "Приклад",
    copy: "Копіювати HTML",
    exportMd: "MD",
    exportHtml: "HTML",
    exportPdf: "PDF",
    editor: "✍️ Редактор",
    preview: "👁 Попередній перегляд",
    live: "Наживо",
    autosave: "Автозбереження увімкнено",
    footer: "Markdown Previewer v1.0",
    copied: "HTML скопійовано в буфер обміну!",
    cleared: "Редактор очищено",
    exported: "Файл експортовано",
    words: "слів",
    chars: "символів",
    lines: "рядків",
    confirmClear: "Ви впевнені, що хочете очистити текст?"
  },
  en: {
    title: "Markdown Previewer",
    layout: "Layout",
    clear: "Clear",
    sample: "Sample",
    copy: "Copy HTML",
    exportMd: "MD",
    exportHtml: "HTML",
    exportPdf: "PDF",
    editor: "✍️ Editor",
    preview: "👁 Preview",
    live: "Live",
    autosave: "Autosave enabled",
    footer: "Markdown Previewer v1.0",
    copied: "HTML copied to clipboard!",
    cleared: "Editor cleared",
    exported: "File exported",
    words: "words",
    chars: "chars",
    lines: "lines",
    confirmClear: "Are you sure you want to clear the text?"
  }
};

const sampleText = {
  uk: `# Ласкаво просимо до Markdown Переглядача! 🎉

## Основні можливості

- **Живий попередній перегляд** з підсвіткою синтаксису
- 🌍 Підтримка **української** та англійської мов
- 📱 Вертикальна та горизонтальна орієнтація
- 💾 Автоматичне збереження в локальному сховищі
- 📄 Експорт у форматах MD, HTML та PDF

## Приклад коду

\`\`\`javascript
function привіт(імʼя) {
  console.log(\`Привіт, \${імʼя}!\`);
  return true;
}

привіт('Світ');
\`\`\`

## Список завдань

1. Написати markdown
2. Побачити результат
3. Експортувати файл

> **Порада:** Використовуйте панель інструментів для швидких дій!

### Таблиця

| Функція | Опис | Статус |
|---------|------|--------|
| Редактор | Написання тексту | ✅ |
| Перегляд | Живий рендер | ✅ |
| Експорт | PDF/HTML/MD | ✅ |

---

**Створено з любов'ю в Україні** 🇺🇦`,
  en: `# Welcome to Markdown Previewer! 🎉

## Key Features

- **Live preview** with syntax highlighting
- 🌍 **Ukrainian** and English language support
- 📱 Vertical and horizontal orientation
- 💾 Automatic local storage
- 📄 Export as MD, HTML, and PDF

## Code Example

\`\`\`javascript
function hello(name) {
  console.log(\`Hello, \${name}!\`);
  return true;
}

hello('World');
\`\`\`

## Todo List

1. Write markdown
2. See the result
3. Export the file

> **Tip:** Use the toolbar for quick actions!

### Table

| Feature | Description | Status |
|---------|-------------|--------|
| Editor | Text writing | ✅ |
| Preview | Live render | ✅ |
| Export | PDF/HTML/MD | ✅ |

---

**Made with love** ❤️`
};

let currentLang = localStorage.getItem('md_lang') || 'uk';
let orientation = localStorage.getItem('md_orientation') || 'horizontal';

marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true
});

const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const mainContainer = document.getElementById('mainContainer');
const langSelect = document.getElementById('langSelect');
const charCount = document.getElementById('charCount');
const stats = document.getElementById('stats');
const orientIcon = document.getElementById('orientIcon');

function t(key) {
  return translations[currentLang][key] || key;
}

function applyTranslations() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  document.title = t('title');
  updateStats();
}

function updatePreview() {
  const md = editor.value;
  preview.innerHTML = marked.parse(md);
  preview.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
  updateStats();
  localStorage.setItem('md_content', md);
}

function updateStats() {
  const text = editor.value;
  const chars = text.length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const lines = text.split('\n').length;
  charCount.textContent = chars;
  stats.textContent = `${words} ${t('words')} · ${chars} ${t('chars')} · ${lines} ${t('lines')}`;
}

function setOrientation(orient) {
  orientation = orient;
  if (orient === 'vertical') {
    mainContainer.classList.add('vertical');
    orientIcon.textContent = '⬍';
  } else {
    mainContainer.classList.remove('vertical');
    orientIcon.textContent = '⬌';
  }
  localStorage.setItem('md_orientation', orient);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function exportHtml() {
  const html = `<!DOCTYPE html>
<html lang="${currentLang}">
<head>
<meta charset="UTF-8">
<title>Markdown Export</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.7; color: #333; }
h1, h2, h3 { color: #7c3aed; }
code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
pre { background: #282c34; color: #eee; padding: 16px; border-radius: 8px; overflow-x: auto; }
pre code { background: transparent; color: inherit; }
blockquote { border-left: 4px solid #7c3aed; padding-left: 16px; color: #666; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 8px; }
th { background: #f4f4f4; }
</style>
</head>
<body>
${preview.innerHTML}
</body>
</html>`;
  downloadFile(html, 'markdown-export.html', 'text/html');
  showToast(t('exported'));
}

async function exportPdf() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const text = editor.value;
  const lines = doc.splitTextToSize(text, 180);
  let y = 20;
  doc.setFont("helvetica", "normal");
  doc.setFontSize(11);
  lines.forEach(line => {
    if (y > 280) {
      doc.addPage();
      y = 20;
    }
    doc.text(line, 15, y);
    y += 7;
  });
  doc.save('markdown-export.pdf');
  showToast(t('exported'));
}

// Event listeners
editor.addEventListener('input', updatePreview);

langSelect.addEventListener('change', (e) => {
  currentLang = e.target.value;
  localStorage.setItem('md_lang', currentLang);
  applyTranslations();
});

document.getElementById('toggleOrientation').addEventListener('click', () => {
  setOrientation(orientation === 'horizontal' ? 'vertical' : 'horizontal');
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm(t('confirmClear'))) {
    editor.value = '';
    updatePreview();
    showToast(t('cleared'));
  }
});

document.getElementById('sampleBtn').addEventListener('click', () => {
  editor.value = sampleText[currentLang];
  updatePreview();
});

document.getElementById('copyBtn').addEventListener('click', async () => {
  await navigator.clipboard.writeText(preview.innerHTML);
  showToast(t('copied'));
});

document.getElementById('exportMd').addEventListener('click', () => {
  downloadFile(editor.value, 'document.md', 'text/markdown');
  showToast(t('exported'));
});

document.getElementById('exportHtml').addEventListener('click', exportHtml);
document.getElementById('exportPdf').addEventListener('click', exportPdf);

// Init
langSelect.value = currentLang;
setOrientation(orientation);
applyTranslations();

const savedContent = localStorage.getItem('md_content');
editor.value = savedContent !== null ? savedContent : sampleText[currentLang];
updatePreview();

// Keyboard shortcuts
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    updatePreview();
  }
});
</script>
</body>
</html>
