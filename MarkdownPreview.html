// Restore settings
let currentLang = localStorage.getItem('md_lang') || 'uk';
let orientation = localStorage.getItem('md_orientation') || 'horizontal';
let theme = localStorage.getItem('md_theme') || 'dark';
let lastUrl = localStorage.getItem('md_last_url') || '';

marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true
});

const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const mainContainer = document.getElementById('mainContainer');
const langToggle = document.getElementById('langToggle');

const urlInput = document.getElementById('urlInput');
const exportPdfBtn = document.getElementById('exportPdf');

function t(key) {
  return translations[currentLang][key] || key;
}

function applyTranslations() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  document.title = t('title');
  langToggle.textContent = currentLang === 'uk' ? 'UA' : 'EN';
  updateStats();
}

function toggleLanguage() {
  currentLang = currentLang === 'uk' ? 'en' : 'uk';
  localStorage.setItem('md_lang', currentLang);
  applyTranslations();
}

function applyTheme(newTheme) {
  theme = newTheme;
  document.documentElement.setAttribute('data-theme', newTheme);
  themeToggle.textContent = newTheme === 'dark' ? '🌙' : '☀️';
  const darkSheet = document.getElementById('hljs-dark');
  const lightSheet = document.getElementById('hljs-light');
  if (newTheme === 'dark') {
    darkSheet.disabled = false;
    lightSheet.disabled = true;
  } else {
    darkSheet.disabled = true;
    lightSheet.disabled = false;
  }
  localStorage.setItem('md_theme', newTheme);
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) metaTheme.content = newTheme === 'dark' ? '#0f0f1e' : '#f5f5fa';
}

function toggleTheme() {
  applyTheme(theme === 'dark' ? 'light' : 'dark');
}

function updatePreview() {
  const md = editor.value;
  preview.innerHTML = marked.parse(md);
  preview.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
  updateStats();
  localStorage.setItem('md_content', md);
}

function updateStats() {
  const text = editor.value;
  const chars = text.length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const lines = text.split('\n').length;
  charCount.textContent = chars;
  stats.textContent = `${words} ${t('words')} · ${chars} ${t('chars')} · ${lines} ${t('lines')}`;
}

function setOrientation(orient) {
  orientation = orient;
  if (orient === 'vertical') {
    mainContainer.classList.add('vertical');
    orientIcon.textContent = '⬍';
  } else {
    mainContainer.classList.remove('vertical');
    orientIcon.textContent = '⬌';
  }
  localStorage.setItem('md_orientation', orient);
}

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.toggle('error', isError);
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function loadFromFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    editor.value = e.target.result;
    updatePreview();
    showToast(`${t('loaded')}: ${file.name}`);
  };
  reader.onerror = () => showToast(t('loadError'), true);
  reader.readAsText(file);
}

async function loadFromUrl(url) {
  try {
    new URL(url);
  } catch {
    showToast(t('invalidUrl'), true);
    return;
  }
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    editor.value = text;
    updatePreview();
    localStorage.setItem('md_last_url', url);
    lastUrl = url;
    showToast(t('loaded'));
    closeUrlModal();
  } catch (err) {
    showToast(`${t('loadError')}: ${err.message}`, true);
  }
}

function openUrlModal() {
  urlInput.value = lastUrl;
  urlModal.classList.add('show');
  setTimeout(() => urlInput.focus(), 100);
}

function closeUrlModal() {
  urlModal.classList.remove('show');
}

function exportHtml() {
  const html = `<!DOCTYPE html>
<html lang="${currentLang}">
<head>
<meta charset="UTF-8">
<title>Markdown Export</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.7; color: #333; }
h1, h2, h3 { color: #7c3aed; }
code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
pre { background: #282c34; color: #eee; padding: 16px; border-radius: 8px; overflow-x: auto; }
pre code { background: transparent; color: inherit; }
blockquote { border-left: 4px solid #7c3aed; padding-left: 16px; color: #666; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 8px; }
th { background: #f4f4f4; }
</style>
</head>
<body>
${preview.innerHTML}
</body>
</html>`;
  downloadFile(html, 'markdown-export.html', 'text/html');
  showToast(t('exported'));
}

// ==================== PDF Generation with pdfmake ====================
// Uses Noto Sans - Google Font with full Cyrillic support
// Fonts are fetched from Google Fonts CDN and embedded into pdfmake VFS

const FONTS = {
  regular: 'https://fonts.gstatic.com/s/notosans/v27/o-0IIpQlx3QUlC5A4PNr5TRA.ttf',
  bold: 'https://fonts.gstatic.com/s/notosans/v27/o-0NIpQlx3QUlC5A4PNjXhFVZNyBx2pqPIif.ttf',
  italic: 'https://fonts.gstatic.com/s/notosans/v27/o-0OIpQlx3QUlC5A4PNr4Az5ZuyN.ttf',
  bolditalic: 'https://fonts.gstatic.com/s/notosans/v27/o-0TIpQlx3QUlC5A4PNjXhFlY9aA5Wl6PQ.ttf',
  mono: 'https://fonts.gstatic.com/s/notosansmono/v30/BngrUXNETWXI6LwhGYvaxZikqZqK6fBq6kPvUce2oAZcdthSBUsYck4-_FNIQ7ktzg.ttf'
};

let fontsReady = false;

function arrayBufferToBase64(buffer) {
  let binary = '';
  const bytes = new Uint8Array(buffer);
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

async function fetchFontBase64(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Failed to load font: ${url}`);
  const buffer = await res.arrayBuffer();
  return arrayBufferToBase64(buffer);
}

async function ensureFonts() {
  if (fontsReady) return;
  showToast(t('loadingFonts'));
  
  const [regular, bold, italic, bolditalic, mono] = await Promise.all([
    fetchFontBase64(FONTS.regular),
    fetchFontBase64(FONTS.bold),
    fetchFontBase64(FONTS.italic),
    fetchFontBase64(FONTS.bolditalic),
    fetchFontBase64(FONTS.mono)
  ]);
  
  pdfMake.vfs = {
    'NotoSans-Regular.ttf': regular,
    'NotoSans-Bold.ttf': bold,
    'NotoSans-Italic.ttf': italic,
    'NotoSans-BoldItalic.ttf': bolditalic,
    'NotoSansMono-Regular.ttf': mono
  };
  
  pdfMake.fonts = {
    NotoSans: {
      normal: 'NotoSans-Regular.ttf',
      bold: 'NotoSans-Bold.ttf',
      italics: 'NotoSans-Italic.ttf',
      bolditalics: 'NotoSans-BoldItalic.ttf'
    },
    NotoMono: {
      normal: 'NotoSansMono-Regular.ttf',
      bold: 'NotoSansMono-Regular.ttf',
      italics: 'NotoSansMono-Regular.ttf',
      bolditalics: 'NotoSansMono-Regular.ttf'
    }
  };
  
  fontsReady = true;
}

// Convert marked tokens to pdfmake content
function getInlineText(tokens) {
  const result = [];
  if (!tokens) return result;
  
  for (const token of tokens) {
    if (token.type === 'text') {
      if (token.tokens) {
        result.push(...getInlineText(token.tokens));
      } else {
        result.push({ text: token.text });
      }
    } else if (token.type === 'strong') {
      const inner = getInlineText(token.tokens);
      inner.forEach(t => t.bold = true);
      result.push(...inner);
    } else if (token.type === 'em') {
      const inner = getInlineText(token.tokens);
      inner.forEach(t => t.italics = true);
      result.push(...inner);
    } else if (token.type === 'codespan') {
      result.push({ text: token.text, font: 'NotoMono', background: '#f4f4f4', color: '#d81b60' });
    } else if (token.type === 'link') {
      const inner = getInlineText(token.tokens);
      inner.forEach(t => { t.color = '#7c3aed'; t.decoration = 'underline'; t.link = token.href; });
      result.push(...inner);
    } else if (token.type === 'del') {
      const inner = getInlineText(token.tokens);
      inner.forEach(t => t.decoration = 'lineThrough');
      result.push(...inner);
    } else if (token.type === 'br') {
      result.push({ text: '\n' });
    } else if (token.type === 'image') {
      result.push({ text: `[${token.text || 'image'}]`, italics: true, color: '#888' });
    } else if (token.text) {
      result.push({ text: token.text });
    }
  }
  return result;
}

function tokensToPdfContent(tokens) {
  const content = [];
  
  for (const token of tokens) {
    switch (token.type) {
      case 'heading': {
        content.push({
          text: getInlineText(token.tokens),
          style: `h${token.depth}`,
          margin: [0, 12, 0, 6]
        });
        break;
      }
      case 'paragraph': {
        content.push({
          text: getInlineText(token.tokens),
          margin: [0, 4, 0, 4]
        });
        break;
      }
      case 'blockquote': {
        const inner = tokensToPdfContent(token.tokens);
        content.push({
          table: {
            widths: [3, '*'],
            body: [[
              { text: '', fillColor: '#7c3aed', border: [false, false, false, false] },
              { stack: inner, border: [false, false, false, false], margin: [8, 4, 4, 4], fillColor: '#f9f5ff' }
            ]]
          },
          layout: 'noBorders',
          margin: [0, 6, 0, 6]
        });
        break;
      }
      case 'code': {
        content.push({
          table: {
            widths: ['*'],
            body: [[{
              text: token.text,
              font: 'NotoMono',
              color: '#e4e4e7',
              fontSize: 10,
              preserveLeadingSpaces: true
            }]]
          },
          layout: {
            fillColor: () => '#282c34',
            hLineWidth: () => 0,
            vLineWidth: () => 0,
            paddingLeft: () => 10,
            paddingRight: () => 10,
            paddingTop: () => 8,
            paddingBottom: () => 8
          },
          margin: [0, 6, 0, 6]
        });
        break;
      }
      case 'list': {
        const items = token.items.map(item => {
          const itemContent = tokensToPdfContent(item.tokens);
          return itemContent.length === 1 ? itemContent[0] : { stack: itemContent };
        });
        if (token.ordered) {
          content.push({ ol: items, margin: [0, 4, 0, 4] });
        } else {
          content.push({ ul: items, margin: [0, 4, 0, 4] });
        }
        break;
      }
      case 'table': {
        const header = token.header.map(cell => ({
          text: getInlineText(cell.tokens),
          fillColor: '#f0e9ff',
          bold: true,
          color: '#7c3aed',
          margin: [4, 4, 4, 4]
        }));
        const rows = token.rows.map(row =>
          row.map(cell => ({
            text: getInlineText(cell.tokens),
            margin: [4, 4, 4, 4]
          }))
        );
        content.push({
          table: {
            headerRows: 1,
            widths: token.header.map(() => '*'),
            body: [header, ...rows]
          },
          layout: {
            hLineColor: () => '#dddddd',
            vLineColor: () => '#dddddd'
          },
          margin: [0, 6, 0, 6]
        });
        break;
      }
      case 'hr': {
        content.push({
          canvas: [{ type: 'line', x1: 0, y1: 5, x2: 515, y2: 5, lineWidth: 1, lineColor: '#dddddd' }],
          margin: [0, 8, 0, 8]
        });
        break;
      }
      case 'space':
        break;
      case 'text': {
        if (token.tokens) {
          content.push({ text: getInlineText(token.tokens), margin: [0, 2, 0, 2] });
        } else {
          content.push({ text: token.text, margin: [0, 2, 0, 2] });
        }
        break;
      }
      case 'html':
        break;
      default:
        if (token.text) content.push({ text: token.text });
    }
  }
  
  return content;
}

async function exportPdf() {
  try {
    exportPdfBtn.disabled = true;
    
    await ensureFonts();
    
    showToast(t('generatingPdf'));
    
    const tokens = marked.lexer(editor.value);
    const content = tokensToPdfContent(tokens);
    
    const docDefinition = {
      content: content,
      defaultStyle: {
        font: 'NotoSans',
        fontSize: 11,
        lineHeight: 1.4,
        color: '#1a1a2e'
      },
      styles: {
        h1: { fontSize: 24, bold: true, color: '#7c3aed' },
        h2: { fontSize: 20, bold: true, color: '#7c3aed' },
        h3: { fontSize: 16, bold: true, color: '#7c3aed' },
        h4: { fontSize: 14, bold: true, color: '#7c3aed' },
        h5: { fontSize: 12, bold: true, color: '#7c3aed' },
        h6: { fontSize: 11, bold: true, color: '#7c3aed' }
      },
      pageSize: 'A4',
      pageMargins: [40, 50, 40, 50],
      info: {
        title: t('title'),
        author: 'Markdown Previewer',
        creator: 'Markdown Previewer'
      }
    };
    
    pdfMake.createPdf(docDefinition).download('markdown-export.pdf', () => {
      showToast(t('exported'));
      exportPdfBtn.disabled = false;
    });
  } catch (err) {
    console.error(err);
    showToast(`${t('loadError')}: ${err.message}`, true);
    exportPdfBtn.disabled = false;
  }
}

// Event listeners
editor.addEventListener('input', updatePreview);
langToggle.addEventListener('click', toggleLanguage);
themeToggle.addEventListener('click', toggleTheme);

document.getElementById('toggleOrientation').addEventListener('click', () => {
  setOrientation(orientation === 'horizontal' ? 'vertical' : 'horizontal');
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm(t('confirmClear'))) {
    editor.value = '';
    updatePreview();
    showToast(t('cleared'));
  }
});

document.getElementById('sampleBtn').addEventListener('click', () => {
  editor.value = sampleText[currentLang];
  updatePreview();
});

document.getElementById('copyBtn').addEventListener('click', async () => {
  await navigator.clipboard.writeText(preview.innerHTML);
  showToast(t('copied'));
});

document.getElementById('exportMd').addEventListener('click', () => {
  downloadFile(editor.value, 'document.md', 'text/markdown');
  showToast(t('exported'));
});

document.getElementById('exportHtml').addEventListener('click', exportHtml);
exportPdfBtn.addEventListener('click', exportPdf);

document.getElementById('loadFileBtn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  loadFromFile(e.target.files[0]);
  e.target.value = '';
});

document.getElementById('loadUrlBtn').addEventListener('click', openUrlModal);
document.getElementById('urlCancel').addEventListener('click', closeUrlModal);
document.getElementById('urlLoad').addEventListener('click', () => loadFromUrl(urlInput.value.trim()));
urlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') loadFromUrl(urlInput.value.trim());
  if (e.key === 'Escape') closeUrlModal();
});
urlModal.addEventListener('click', (e) => {
  if (e.target === urlModal) closeUrlModal();
});

document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) loadFromFile(file);
});

editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    updatePreview();
  }
});

// Init
applyTheme(theme);
setOrientation(orientation);
applyTranslations();

const savedContent = localStorage.getItem('md_content');
editor.value = savedContent !== null ? savedContent : sampleText[currentLang];
updatePreview();
</script>
