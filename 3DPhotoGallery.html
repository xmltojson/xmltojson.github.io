<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Фотогалерея</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --accent: #00d4ff;
    --accent2: #ff00aa;
  }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-size: 400% 400%;
    animation: bgShift 20s ease infinite;
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  header {
    text-align: center;
    padding: 20px;
    position: relative;
    z-index: 10;
  }

  h1 {
    font-size: 2.2rem;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
    letter-spacing: 2px;
  }

  .subtitle {
    color: rgba(255,255,255,0.6);
    margin-top: 8px;
    font-size: 0.9rem;
  }

  .controls-top {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 0 20px 10px;
  }

  .btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 24px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover {
    background: rgba(0,212,255,0.2);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0,212,255,0.3);
  }

  .btn.active {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-color: transparent;
  }

  /* Scene */
  .scene {
    flex: 1;
    perspective: 1400px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 480px;
    position: relative;
  }

  .carousel {
    position: relative;
    width: 240px;
    height: 320px;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .scene.vertical {
    perspective: 1400px;
  }

  .card {
    position: absolute;
    width: 240px;
    height: 320px;
    left: 0;
    top: 0;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    transition: box-shadow 0.4s;
    cursor: pointer;
    backface-visibility: hidden;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    pointer-events: none;
  }

  .card .caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 30px 12px 12px;
    font-size: 0.9rem;
  }

  /* Reflection */
  .reflection {
    position: absolute;
    width: 240px;
    height: 320px;
    left: 0;
    top: 100%;
    margin-top: 8px;
    border-radius: 14px;
    overflow: hidden;
    transform: scaleY(-1);
    opacity: 0.35;
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 60%);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 60%);
    pointer-events: none;
  }

  .reflection img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Bottom controls */
  .controls-bottom {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 20px;
    z-index: 10;
  }

  .nav-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 5px 20px rgba(0,212,255,0.4);
  }

  .nav-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 30px rgba(255,0,170,0.5);
  }

  .nav-btn:active {
    transform: scale(0.95);
  }

  .counter {
    font-size: 1rem;
    min-width: 70px;
    text-align: center;
    color: rgba(255,255,255,0.8);
  }

  .auto-toggle {
    margin-left: 10px;
  }

  footer {
    text-align: center;
    padding: 14px;
    color: rgba(255,255,255,0.4);
    font-size: 0.8rem;
  }

  /* Modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 16px;
    padding: 20px;
  }

  .modal.open { display: flex; }

  .modal img {
    max-width: 90%;
    max-height: 75vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }

  .modal-close {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 2rem;
    cursor: pointer;
    color: #fff;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    line-height: 44px;
    text-align: center;
  }

  @media (max-width: 600px) {
    h1 { font-size: 1.5rem; }
    .carousel, .card, .reflection { width: 180px; height: 240px; }
  }
</style>
</head>
<body>
  <header>
    <h1 data-i18n="title">3D Фотогалерея</h1>
    <div class="subtitle" data-i18n="subtitle">Обертова карусель з 3D-ефектами та відображенням</div>
  </header>

  <div class="controls-top">
    <button class="btn" id="orientBtn">🔄 <span data-i18n="orientation">Орієнтація</span></button>
    <button class="btn" id="langBtn">🌐 <span id="langLabel">EN</span></button>
    <button class="btn" id="reflectBtn">✨ <span data-i18n="reflection">Відображення</span></button>
  </div>

  <div class="scene" id="scene">
    <div class="carousel" id="carousel"></div>
  </div>

  <div class="controls-bottom">
    <button class="nav-btn" id="prevBtn">‹</button>
    <span class="counter" id="counter">1 / 8</span>
    <button class="nav-btn" id="nextBtn">›</button>
    <button class="btn auto-toggle" id="autoBtn">▶ <span data-i18n="auto">Авто</span></button>
  </div>

  <footer data-i18n="footer">Клацніть на фото для перегляду • Використовуйте стрілки клавіатури</footer>

  <div class="modal" id="modal">
    <span class="modal-close" id="modalClose">×</span>
    <img id="modalImg" src="" alt="">
    <div id="modalCaption"></div>
  </div>

<script>
  // ===== Translations =====
  const i18n = {
    uk: {
      title: "3D Фотогалерея",
      subtitle: "Обертова карусель з 3D-ефектами та відображенням",
      orientation: "Орієнтація",
      reflection: "Відображення",
      auto: "Авто",
      footer: "Клацніть на фото для перегляду • Використовуйте стрілки клавіатури",
      photos: ["Гори","Океан","Ліс","Місто","Пустеля","Водоспад","Поле","Небо"],
      lang: "EN"
    },
    en: {
      title: "3D Photo Gallery",
      subtitle: "Rotating carousel with 3D effects and reflection",
      orientation: "Orientation",
      reflection: "Reflection",
      auto: "Auto",
      footer: "Click a photo to view • Use arrow keys",
      photos: ["Mountains","Ocean","Forest","City","Desert","Waterfall","Field","Sky"],
      lang: "UA"
    }
  };

  // ===== Image data (using picsum placeholders) =====
  const photoIds = [1018, 1015, 1043, 1011, 1036, 1039, 1016, 1024];
  const images = photoIds.map(id => `https://picsum.photos/id/${id}/400/520`);

  // ===== State =====
  const defaultState = {
    lang: 'uk',
    orientation: 'horizontal',
    reflection: true,
    current: 0,
    auto: false
  };

  let state = loadState();

  function loadState() {
    try {
      const s = JSON.parse(localStorage.getItem('gallery3d'));
      return s ? { ...defaultState, ...s } : { ...defaultState };
    } catch { return { ...defaultState }; }
  }

  function saveState() {
    localStorage.setItem('gallery3d', JSON.stringify(state));
  }

  // ===== DOM =====
  const carousel = document.getElementById('carousel');
  const scene = document.getElementById('scene');
  const counter = document.getElementById('counter');
  const langLabel = document.getElementById('langLabel');

  const N = images.length;
  const cards = [];

  // Build cards
  function buildCarousel() {
    carousel.innerHTML = '';
    cards.length = 0;
    for (let i = 0; i < N; i++) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${images[i]}" alt="">
        <div class="caption"></div>`;
      card.addEventListener('click', () => {
        if (i === state.current) openModal(i);
        else { state.current = i; update(); }
      });

      const reflection = document.createElement('div');
      reflection.className = 'reflection';
      reflection.innerHTML = `<img src="${images[i]}" alt="">`;

      carousel.appendChild(card);
      carousel.appendChild(reflection);
      cards.push({ card, reflection });
    }
  }

  // Position cards in 3D circle
  function update() {
    const isVert = state.orientation === 'vertical';
    const radius = isVert ? 360 : 420;
    const angleStep = 360 / N;

    cards.forEach((c, i) => {
      let offset = i - state.current;
      // normalize to shortest path
      if (offset > N/2) offset -= N;
      if (offset < -N/2) offset += N;

      const angle = offset * angleStep;
      const rad = angle * Math.PI / 180;
      const dist = Math.abs(offset);
      const opacity = dist > 3 ? 0 : 1 - dist * 0.18;
      const z = Math.cos(rad) * radius - radius;

      let transform;
      if (isVert) {
        transform = `rotateX(${-angle}deg) translateZ(${radius}px)`;
      } else {
        transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
      }

      c.card.style.transform = transform;
      c.card.style.opacity = opacity;
      c.card.style.zIndex = Math.round(100 - dist);
      c.card.style.boxShadow = offset === 0
        ? '0 10px 50px rgba(0,212,255,0.5)'
        : '0 10px 40px rgba(0,0,0,0.6)';

      // reflection follows card transform (positioned below via top:100%)
      c.reflection.style.transform = transform + ' scaleY(-1)';
      c.reflection.style.opacity = state.reflection ? opacity * 0.35 : 0;
      c.reflection.style.zIndex = Math.round(50 - dist);

      // caption text
      c.card.querySelector('.caption').textContent = i18n[state.lang].photos[i];
    });

    counter.textContent = `${state.current + 1} / ${N}`;
    scene.classList.toggle('vertical', isVert);
    saveState();
  }

  // ===== Navigation =====
  function next() { state.current = (state.current + 1) % N; update(); }
  function prev() { state.current = (state.current - 1 + N) % N; update(); }

  document.getElementById('nextBtn').addEventListener('click', next);
  document.getElementById('prevBtn').addEventListener('click', prev);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
    if (e.key === 'Escape') closeModal();
  });

  // ===== Orientation =====
  document.getElementById('orientBtn').addEventListener('click', () => {
    state.orientation = state.orientation === 'horizontal' ? 'vertical' : 'horizontal';
    update();
  });

  // ===== Reflection toggle =====
  const reflectBtn = document.getElementById('reflectBtn');
  reflectBtn.addEventListener('click', () => {
    state.reflection = !state.reflection;
    reflectBtn.classList.toggle('active', state.reflection);
    update();
  });

  // ===== Language =====
  document.getElementById('langBtn').addEventListener('click', () => {
    state.lang = state.lang === 'uk' ? 'en' : 'uk';
    applyLang();
    update();
  });

  function applyLang() {
    const t = i18n[state.lang];
    document.documentElement.lang = state.lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key]) el.textContent = t[key];
    });
    langLabel.textContent = t.lang;
    saveState();
  }

  // ===== Auto-rotate =====
  let autoTimer = null;
  const autoBtn = document.getElementById('autoBtn');
  function setAuto(on) {
    state.auto = on;
    autoBtn.classList.toggle('active', on);
    autoBtn.querySelector('span').previousSibling.textContent = on ? '⏸ ' : '▶ ';
    clearInterval(autoTimer);
    if (on) autoTimer = setInterval(next, 2500);
    saveState();
  }
  autoBtn.addEventListener('click', () => setAuto(!state.auto));

  // ===== Modal =====
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modalImg');
  const modalCaption = document.getElementById('modalCaption');

  function openModal(i) {
    modalImg.src = images[i].replace('400/520','900/1100');
    modalCaption.textContent = i18n[state.lang].photos[i];
    modal.classList.add('open');
  }
  function closeModal() { modal.classList.remove('open'); }
  document.getElementById('modalClose').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

  // Touch / swipe support
  let touchX = 0;
  scene.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
  scene.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (dx > 50) prev();
    else if (dx < -50) next();
  });

  // ===== Init =====
  function init() {
    buildCarousel();
    applyLang();
    reflectBtn.classList.toggle('active', state.reflection);
    update();
    setAuto(state.auto);
  }

  init();
</script>
</body>
</html>
