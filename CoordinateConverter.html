<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 14px; }

  :root {
    --bg-1: #2c3e50;
    --bg-2: #3d5a6c;
    --bg-3: #34495e;
    --accent: #7fa3bf;
    --accent-2: #a8c5a0;
    --success: #81a582;
    --danger: #c08080;
    --warning: #d4b483;
    --card: rgba(255, 255, 255, 0.06);
    --card-hover: rgba(255, 255, 255, 0.10);
    --border: rgba(255, 255, 255, 0.12);
    --text: #e8ecef;
    --text-dim: #9aa5b1;
  }

  body {
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-size: 400% 400%;
    animation: gradientShift 25s ease infinite;
    padding: 14px;
    overflow-x: hidden;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .app {
    max-width: 1200px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 10px 0 18px;
  }

  h1 {
    font-size: clamp(1.4rem, 2.4vw, 1.9rem);
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .subtitle {
    color: var(--text-dim);
    margin-top: 4px;
    font-size: 0.82rem;
  }

  .orientation-toggle {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
  }

  .orient-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .orient-btn:hover { background: var(--card-hover); }
  .orient-btn.active {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-color: transparent;
    color: #1f2d38;
    font-weight: 600;
  }

  .container {
    display: grid;
    gap: 14px;
    transition: all 0.3s;
  }

  .container.horizontal {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .container.vertical {
    grid-template-columns: 1fr;
    max-width: 640px;
    margin: 0 auto;
  }

  @media (max-width: 880px) {
    .container.horizontal { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    transition: box-shadow 0.2s;
  }

  .card:hover {
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 0.98rem;
    font-weight: 600;
  }

  .icon {
    width: 26px;
    height: 26px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
  }

  .form-group {
    margin-bottom: 10px;
  }

  label {
    display: block;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .label-row label { margin-bottom: 0; }

  .precision-select {
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 7px;
    border-radius: 5px;
    font-size: 0.72rem;
    cursor: pointer;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 9px 11px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.87rem;
    font-family: 'Consolas', monospace;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(127, 163, 191, 0.18);
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;

  .btn {
    width: 100%;
    padding: 9px;

    border-radius: 8px;

  .btn:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(127, 163, 191, 0.3); }
  .btn:active { transform: translateY(0); }

  .result {
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Consolas', monospace;
    font-size: 0.88rem;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    word-break: break-all;
    gap: 8px;
  }

  .result.success { border-color: var(--success); }
  .result.error { border-color: var(--danger); color: var(--danger); }
  .result.warning { border-color: var(--warning); }

  .result-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.2s;
    white-space: nowrap;
    text-decoration: none;
    display: inline-flex;
    align-items: center;

  .icon-btn:hover { background: var(--card-hover); border-color: var(--accent); }

  .info-note {
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 4px;

  .info-note.warn { color: var(--warning); }

  .history-list {
    max-height: 440px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;

  }

  .history-list::-webkit-scrollbar { width: 5px; }
  .history-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.15); border-radius: 3px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

  .history-item {
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px;
    font-size: 0.8rem;
    transition: all 0.2s;
    position: relative;
  }

  .history-item:hover {
    background: rgba(0, 0, 0, 0.32);
    border-color: var(--accent);
  }

  .history-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
    gap: 6px;
    flex-wrap: wrap;
  }

  .history-type {
    display: inline-block;
    font-size: 0.62rem;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--accent);
    color: #1f2d38;
    font-weight: 700;
  }

  .history-type.mgrs { background: var(--accent-2); color: #2a3d2a; }

  .history-actions-row {
    display: flex;
    gap: 3px;
  }

  .history-item-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.65rem;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    line-height: 1;
  }

  .history-item-btn:hover {
    background: var(--card-hover);
    color: var(--text);
    border-color: var(--accent);
  }

  .history-body { cursor: pointer; }

  .history-from, .history-to {
    font-family: 'Consolas', monospace;
    font-size: 0.78rem;
    word-break: break-all;
    line-height: 1.3;
  }

  .history-from { color: var(--text-dim); }
  .history-arrow { color: var(--accent); margin: 2px 0; font-size: 0.75rem; }
  .history-time {
    font-size: 0.64rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .history-empty {
    text-align: center;
    color: var(--text-dim);
    padding: 28px 16px;
    font-style: italic;
    font-size: 0.85rem;
  }

  .history-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.72rem;
    transition: all 0.2s;
  }

  .clear-btn:hover { background: var(--danger); color: #fff; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--success);
    color: #1f2d1f;
    padding: 9px 18px;
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    font-weight: 600;
    font-size: 0.85rem;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error { background: var(--danger); color: #fff; }
</style>

<body>
  <div class="app">
    <header>
      <h1>🌍 Coordinate Converter</h1>
      <p class="subtitle">Convert between Google Maps (Lat/Lng) ↔ MGRS coordinates</p>
    </header>

    <div class="orientation-toggle">
      <button class="orient-btn" id="horizontalBtn">▦ Horizontal</button>
      <button class="orient-btn" id="verticalBtn">▤ Vertical</button>
    </div>

    <div class="container horizontal" id="container">
      <!-- Lat/Lng to MGRS -->
      <div class="card">
        <div class="card-header">
          <div class="icon">📍</div>
          <span>Lat/Lng → MGRS</span>
        </div>
        <div class="row">
          <div class="form-group">
            <label>Latitude</label>
            <input type="text" id="latInput" placeholder="40.712800" />
          </div>
          <div class="form-group">
            <label>Longitude</label>
            <input type="text" id="lngInput" placeholder="-74.006000" />
          </div>
        </div>
        <div class="form-group">
          <label>Or paste Google Maps coordinates</label>
          <input type="text" id="gmapInput" placeholder="40.712800, -74.006000" />
        </div>
        <div class="form-group">
          <div class="label-row">
            <label>MGRS Precision</label>
            <select class="precision-select" id="precisionSelect">
              <option value="1">1 m (5 digits)</option>
              <option value="2">10 m (4 digits)</option>
              <option value="3">100 m (3 digits)</option>
              <option value="4">1 km (2 digits)</option>
              <option value="5">10 km (1 digit)</option>
            </select>
          </div>
          <div class="info-note">Higher precision = better round-trip accuracy</div>
        </div>
        <button class="btn" id="toMgrsBtn">Convert to MGRS</button>
        <div class="form-group" style="margin-top: 12px;">
          <label>MGRS Result</label>
          <div class="result" id="mgrsResult">
            <span>—</span>
          </div>
          <div class="info-note" id="mgrsRoundTripNote"></div>
        </div>
      </div>

      <!-- MGRS to Lat/Lng -->
      <div class="card">
        <div class="card-header">
          <div class="icon">🎯</div>
          <span>MGRS → Lat/Lng</span>
        </div>
        <div class="form-group">
          <label>MGRS Coordinate</label>
          <input type="text" id="mgrsInput" placeholder="18TWL8085712345" />
          <div class="info-note">Format: GZD + 100km square + easting/northing (e.g. 18TWL8085712345)</div>
        </div>
        <button class="btn" id="toLatLngBtn">Convert to Lat/Lng</button>
        <div class="form-group" style="margin-top: 12px;">
          <label>Lat/Lng Result (center of MGRS cell)</label>
          <div class="result" id="latLngResult">
            <span>—</span>
          </div>
        </div>
        <div class="form-group" style="margin-top: 8px;">
          <label>Google Maps Link</label>
          <div class="result" id="gmapLinkResult">
            <span>—</span>
          </div>
        </div>
        <div class="info-note" id="llRoundTripNote"></div>
      </div>

      <!-- History -->
      <div class="card">
        <div class="card-header">
          <div class="icon">📜</div>
          <span>Conversion History</span>
        </div>
        <div class="history-actions">
          <span id="historyCount" style="color: var(--text-dim); font-size: 0.75rem;">0 conversions</span>
          <button class="clear-btn" id="clearHistoryBtn">Clear All</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">No conversions yet</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function() {
  const STORAGE_KEY = 'coordConverter_state_v2';
  
  const $ = id => document.getElementById(id);
  
  const state = {
    orientation: 'horizontal',
    inputs: { lat: '', lng: '', gmap: '', mgrs: '', precision: '1' },
    outputs: { mgrs: '', latLng: '', gmapLink: '' },
    history: []
  };

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e) { console.warn('Storage failed', e); }
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      Object.assign(state, data);
      if (!state.inputs.precision) state.inputs.precision = '1';
    } catch(e) { console.warn('Load failed', e); }
  }

  function toast(msg, isError = false) {
    const t = $('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 2500);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function gmapsUrl(lat, lng) {
    return `https://www.google.com/maps?q=${Number(lat).toFixed(6)},${Number(lng).toFixed(6)}`;
  }

  function setResult(elId, value, opts = {}) {
    const el = $(elId);
    if (!value) {
      el.innerHTML = '<span>—</span>';
      el.className = 'result';
      return;
    }
    const cls = opts.error ? 'error' : (opts.warning ? 'warning' : 'success');
    el.className = 'result ' + cls;

    if (opts.error) {
      el.innerHTML = `<span>${escapeHtml(value)}</span>`;
      return;
    }

    const actions = [];
    actions.push(`<button class="icon-btn" data-copy="${escapeHtml(value)}" title="Copy">📋</button>`);
    if (opts.mapUrl) {
      actions.push(`<a class="icon-btn" href="${escapeHtml(opts.mapUrl)}" target="_blank" rel="noopener" title="Open in Google Maps">🗺️</a>`);
    }

    el.innerHTML = `<span>${escapeHtml(value)}</span><div class="result-actions">${actions.join('')}</div>`;
  }

  function parseLat(s) {
    if (typeof s !== 'string') s = String(s);
    s = s.trim();
    if (!/^-?\d+(\.\d+)?$/.test(s)) return NaN;
    const n = parseFloat(s);
    if (n < -80 || n > 84) return NaN;
    return n;
  }

  function parseLng(s) {
    if (typeof s !== 'string') s = String(s);
    s = s.trim();
    if (!/^-?\d+(\.\d+)?$/.test(s)) return NaN;
    const n = parseFloat(s);
    if (n < -180 || n > 180) return NaN;
    return n;
  }

  function parseGoogleMaps(str) {
    const m = str.trim().match(/^(-?\d+(?:\.\d+)?)\s*[,\s]\s*(-?\d+(?:\.\d+)?)$/);
    if (!m) return null;
    const lat = parseLat(m[1]);
    const lng = parseLng(m[2]);
    if (isNaN(lat) || isNaN(lng)) return null;
    return { lat, lng };
  }

  function validateMgrs(raw) {
    const s = raw.trim().toUpperCase().replace(/\s+/g, '');
    const re = /^([0-9]{1,2})([C-HJ-NP-X])([A-HJ-NP-Z])([A-HJ-NP-V])((?:[0-9]{2}){0,5})$/;
    const m = s.match(re);
    if (!m) return null;
    return { normalized: s, digits: m[5].length };
  }

  function convertToMgrs() {
    let lat, lng;
    const gmapRaw = $('gmapInput').value.trim();

    if (gmapRaw) {
      const parsed = parseGoogleMaps(gmapRaw);
      if (!parsed) {
        setResult('mgrsResult', 'Invalid format. Use: lat, lng (e.g. 40.7128, -74.0060). Lat: -80..84, Lng: -180..180', { error: true });
        $('mgrsRoundTripNote').textContent = '';
        return;
      }
      lat = parsed.lat;
      lng = parsed.lng;
      $('latInput').value = lat;
      $('lngInput').value = lng;
    } else {
      lat = parseLat($('latInput').value);
      lng = parseLng($('lngInput').value);
    }

    if (isNaN(lat) || isNaN(lng)) {
      setResult('mgrsResult', 'Invalid coordinates. Lat must be -80..84, Lng must be -180..180', { error: true });
      $('mgrsRoundTripNote').textContent = '';
      return;
    }

    const precision = parseInt($('precisionSelect').value, 10) || 1;

    try {
      const mgrsStr = window.mgrs.forward([lng, lat], precision);

      let roundTripNote = '';
      let warning = false;
      try {
        const back = window.mgrs.toPoint(mgrsStr);
        const distM = haversine(lat, lng, back[1], back[0]);
        const cellSize = Math.pow(10, 5 - precision);
        if (distM > cellSize * 1.5) {
          roundTripNote = `⚠️ Round-trip drift: ${distM.toFixed(1)} m (precision cell: ${cellSize} m)`;
          warning = true;
        } else {
          roundTripNote = `✓ Round-trip verified: ${distM.toFixed(2)} m drift (within ${cellSize} m cell)`;
        }
      } catch(e) {
        roundTripNote = '⚠️ Could not verify round-trip';
        warning = true;
      }

      setResult('mgrsResult', mgrsStr, { warning, mapUrl: gmapsUrl(lat, lng) });
      $('mgrsRoundTripNote').textContent = roundTripNote;
      $('mgrsRoundTripNote').className = 'info-note' + (warning ? ' warn' : '');
      state.outputs.mgrs = mgrsStr;

      addHistory({
        type: 'latlng-to-mgrs',
        from: `${lat}, ${lng}`,
        to: mgrsStr,
        lat, lng,
        mgrs: mgrsStr,
        time: Date.now()
      });
    } catch(e) {
      setResult('mgrsResult', 'Conversion error: ' + e.message, { error: true });
      $('mgrsRoundTripNote').textContent = '';
    }
  }

  function convertToLatLng() {
    const raw = $('mgrsInput').value;
    const validated = validateMgrs(raw);
    if (!validated) {
      setResult('latLngResult', 'Invalid MGRS format. Expected: ZoneBand + 100kmSq + digits (e.g. 18TWL8085712345)', { error: true });
      setResult('gmapLinkResult', '');
      $('llRoundTripNote').textContent = '';
      return;
    }
    $('mgrsInput').value = validated.normalized;

    try {
      const bbox = window.mgrs.inverse(validated.normalized);
      const lng = (bbox[0] + bbox[2]) / 2;
      const lat = (bbox[1] + bbox[3]) / 2;

      const latLngStr = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      const gmapLink = gmapsUrl(lat, lng);

      let roundTripNote = '';
      let warning = false;
      try {
        const precision = Math.max(1, validated.digits / 2);
        const backMgrs = window.mgrs.forward([lng, lat], precision);
        if (backMgrs === validated.normalized) {
          roundTripNote = `✓ Round-trip exact match at precision ${precision}`;
        } else {
          roundTripNote = `⚠️ Round-trip differs: ${validated.normalized} → ${backMgrs}`;
          warning = true;
        }
      } catch(e) {
        roundTripNote = '⚠️ Could not verify round-trip';
        warning = true;
      }

      setResult('latLngResult', latLngStr, { warning, mapUrl: gmapLink });
      setResult('gmapLinkResult', gmapLink, { warning, mapUrl: gmapLink });
      $('llRoundTripNote').textContent = roundTripNote;
      $('llRoundTripNote').className = 'info-note' + (warning ? ' warn' : '');

      state.outputs.latLng = latLngStr;
      state.outputs.gmapLink = gmapLink;

      addHistory({
        type: 'mgrs-to-latlng',
        from: validated.normalized,
        to: latLngStr,
        lat, lng,
        mgrs: validated.normalized,
        time: Date.now()
      });
    } catch(e) {
      setResult('latLngResult', 'Invalid MGRS: ' + e.message, { error: true });
      setResult('gmapLinkResult', '');
      $('llRoundTripNote').textContent = '';
    }
  }

  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLng/2)**2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function addHistory(entry) {
    state.history.unshift(entry);
    if (state.history.length > 50) state.history = state.history.slice(0, 50);
    renderHistory();
    saveState();
  }

  function renderHistory() {
    const list = $('historyList');
    $('historyCount').textContent = `${state.history.length} conversion${state.history.length !== 1 ? 's' : ''}`;
    
    if (state.history.length === 0) {
      list.innerHTML = '<div class="history-empty">No conversions yet</div>';
      return;
    }

    list.innerHTML = state.history.map((h, i) => {
      const typeLabel = h.type === 'mgrs-to-latlng' ? 'MGRS → LL' : 'LL → MGRS';
      const typeClass = h.type === 'mgrs-to-latlng' ? 'mgrs' : '';
      const date = new Date(h.time);
      const timeStr = date.toLocaleString();
      const mapUrl = (h.lat != null && h.lng != null) ? gmapsUrl(h.lat, h.lng) : '';

      return `
        <div class="history-item" data-idx="${i}">
          <div class="history-top">
            <span class="history-type ${typeClass}">${typeLabel}</span>
            <div class="history-actions-row">
              <button class="history-item-btn" data-copy-from="${i}" title="Copy source">📋 From</button>
              <button class="history-item-btn" data-copy-to="${i}" title="Copy result">📋 To</button>
              ${mapUrl ? `<a class="history-item-btn" href="${escapeHtml(mapUrl)}" target="_blank" rel="noopener" title="Open in Google Maps">🗺️</a>` : ''}
              <button class="history-item-btn" data-delete="${i}" title="Delete">✕</button>
            </div>
          </div>
          <div class="history-body" data-load="${i}">
            <div class="history-from">${escapeHtml(h.from)}</div>
            <div class="history-arrow">↓</div>
            <div class="history-to">${escapeHtml(h.to)}</div>
            <div class="history-time">${timeStr}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function setOrientation(orient) {
    state.orientation = orient;
    const container = $('container');
    container.className = 'container ' + orient;
    $('horizontalBtn').classList.toggle('active', orient === 'horizontal');
    $('verticalBtn').classList.toggle('active', orient === 'vertical');
    saveState();
  }

  function syncInputsToState() {
    state.inputs.lat = $('latInput').value;
    state.inputs.lng = $('lngInput').value;
    state.inputs.gmap = $('gmapInput').value;
    state.inputs.mgrs = $('mgrsInput').value;
    state.inputs.precision = $('precisionSelect').value;
    saveState();
  }

  function restoreInputs() {
    $('latInput').value = state.inputs.lat || '';
    $('lngInput').value = state.inputs.lng || '';
    $('gmapInput').value = state.inputs.gmap || '';
    $('mgrsInput').value = state.inputs.mgrs || '';
    $('precisionSelect').value = state.inputs.precision || '1';

    if (state.outputs.mgrs) {
      const lat = parseFloat(state.inputs.lat);
      const lng = parseFloat(state.inputs.lng);
      const mapUrl = (!isNaN(lat) && !isNaN(lng)) ? gmapsUrl(lat, lng) : null;
      setResult('mgrsResult', state.outputs.mgrs, mapUrl ? { mapUrl } : {});
    }
    if (state.outputs.latLng) {
      setResult('latLngResult', state.outputs.latLng, { mapUrl: state.outputs.gmapLink });
    }
    if (state.outputs.gmapLink) {
      setResult('gmapLinkResult', state.outputs.gmapLink, { mapUrl: state.outputs.gmapLink });
    }
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text)
        .then(() => toast('Copied to clipboard!'))
        .catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.top = '-1000px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('Copied to clipboard!');
    } catch(e) {
      toast('Copy failed', true);
    }
  }

  function init() {
    loadState();
    setOrientation(state.orientation || 'horizontal');
    restoreInputs();
    renderHistory();

    $('toMgrsBtn').addEventListener('click', convertToMgrs);
    $('toLatLngBtn').addEventListener('click', convertToLatLng);
    $('horizontalBtn').addEventListener('click', () => setOrientation('horizontal'));
    $('verticalBtn').addEventListener('click', () => setOrientation('vertical'));
    $('precisionSelect').addEventListener('change', syncInputsToState);
    
    ['latInput', 'lngInput', 'gmapInput', 'mgrsInput'].forEach(id => {
      $(id).addEventListener('input', syncInputsToState);
      $(id).addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          if (id === 'mgrsInput') convertToLatLng();
          else convertToMgrs();
        }
      });
    });

    $('clearHistoryBtn').addEventListener('click', () => {
      if (state.history.length === 0) return;
      if (confirm('Clear all conversion history?')) {
        state.history = [];
        renderHistory();
        saveState();
        toast('History cleared');
      }
    });

    document.addEventListener('click', (e) => {
      const copyEl = e.target.closest('[data-copy]');
      if (copyEl) {
        e.preventDefault();
        copyToClipboard(copyEl.getAttribute('data-copy'));
      }
    });

    $('historyList').addEventListener('click', (e) => {
      const copyFromBtn = e.target.closest('[data-copy-from]');
      if (copyFromBtn) {
        e.stopPropagation();
        const idx = parseInt(copyFromBtn.getAttribute('data-copy-from'));
        const entry = state.history[idx];
        if (entry) copyToClipboard(entry.from);
        return;
      }
      const copyToBtn = e.target.closest('[data-copy-to]');
      if (copyToBtn) {
        e.stopPropagation();
        const idx = parseInt(copyToBtn.getAttribute('data-copy-to'));
        const entry = state.history[idx];
        if (entry) copyToClipboard(entry.to);
        return;
      }
      const delBtn = e.target.closest('[data-delete]');
      if (delBtn) {
        e.stopPropagation();
        const idx = parseInt(delBtn.getAttribute('data-delete'));
        state.history.splice(idx, 1);
        renderHistory();
        saveState();
        toast('Entry removed');
        return;
      }
      const loadBody = e.target.closest('[data-load]');
      if (loadBody) {
        const idx = parseInt(loadBody.getAttribute('data-load'));
        const entry = state.history[idx];
        if (!entry) return;
        
        if (entry.type === 'mgrs-to-latlng') {
          $('mgrsInput').value = entry.from;
        } else {
          const parsed = parseGoogleMaps(entry.from);
          if (parsed) {
            $('latInput').value = parsed.lat;
            $('lngInput').value = parsed.lng;
            $('gmapInput').value = entry.from;
          }
        }
        syncInputsToState();
        toast('Loaded from history');
      }
    });
  }

  if (window.mgrs) {
    init();
  } else {
    window.addEventListener('load', () => {
      if (window.mgrs) init();
      else toast('Failed to load MGRS library', true);
    });
  }
})();
</script>
</body>
</html>
