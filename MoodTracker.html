<title>🌈 Трекер Настрою — Щоденний журнал емоцій</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, sans-serif;
}

html, body {
    height: 100%;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 12px 20px;
    color: #2d3748;
    overflow-x: hidden;
}

.container {
    max-width: 1320px;
    margin: 0 auto;
    position: relative;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    color: white;
    flex-wrap: wrap;
    gap: 10px;
}

.header-text h1 {
    font-size: 1.5rem;
    margin-bottom: 0;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}

.header-text p {
    font-size: 0.85rem;
    opacity: 0.9;
}

.lang-switcher {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.2);
    padding: 4px;
    border-radius: 22px;
    backdrop-filter: blur(10px);
}

.lang-btn {
    padding: 5px 12px;
    border: none;
    background: transparent;
    color: white;
    cursor: pointer;
    border-radius: 18px;
    font-weight: 600;
    transition: all 0.3s;
    font-size: 0.8rem;
}

.lang-btn.active {
    background: white;
    color: #667eea;
}

.main-grid {
    display: grid;
    grid-template-columns: 320px 1fr 300px;
    gap: 14px;
    align-items: start;
}

@media (max-width: 1180px) {
    .main-grid {
        grid-template-columns: 300px 1fr;
    }
    .stats-column {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
    }
}

@media (max-width: 800px) {
    .main-grid {
        grid-template-columns: 1fr;
    }
    .stats-column {
        grid-template-columns: 1fr;
    }
    .header-text h1 { font-size: 1.3rem; }
}

.card {
    background: rgba(255,255,255,0.95);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    backdrop-filter: blur(10px);
}

.card h2 {
    margin-bottom: 10px;
    color: #4a5568;
    font-size: 1rem;
}

.mood-selector {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 10px;
}

.mood-btn {
    aspect-ratio: 1;
    border: 2px solid transparent;
    border-radius: 10px;
    background: #f7fafc;
    cursor: pointer;
    font-size: 1.4rem;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.mood-btn:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

.mood-btn.selected {
    border-color: #667eea;
    background: #edf2f7;
    transform: scale(1.05);
}

.mood-btn[data-mood="1"] { background: #fed7d7; }
.mood-btn[data-mood="2"] { background: #feebc8; }
.mood-btn[data-mood="3"] { background: #fefcbf; }
.mood-btn[data-mood="4"] { background: #c6f6d5; }
.mood-btn[data-mood="5"] { background: #9ae6b4; }

.note-input {
    width: 100%;
    padding: 8px 10px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.85rem;
    resize: vertical;
    min-height: 56px;
    max-height: 100px;
    font-family: inherit;
    transition: border-color 0.3s;
}

.note-input:focus {
    outline: none;
    border-color: #667eea;
}

.save-btn {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}

.save-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 16px rgba(102,126,234,0.4);
}

.calendar-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.nav-btn {
    background: #edf2f7;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
}

.nav-btn:hover {
    background: #e2e8f0;
    transform: scale(1.1);
}

.month-label {
    font-size: 1rem;
    font-weight: 600;
    color: #4a5568;
}

.heatmap {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 10px;
}

.day-label {
    text-align: center;
    font-size: 0.7rem;
    color: #718096;
    font-weight: 600;
    padding: 3px 0;
}

.day-cell {
    aspect-ratio: 1;
    background: #f7fafc;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    border: 2px solid transparent;
}

.day-cell:hover:not(.empty) {
    transform: scale(1.1);
    z-index: 5;
    border-color: #667eea;
}

.day-cell.empty {
    background: transparent;
    cursor: default;
}

.day-cell.today {
    border-color: #667eea;
    font-weight: bold;
}

.day-cell[data-mood="1"] { background: #fc8181; color: white; }
.day-cell[data-mood="2"] { background: #f6ad55; color: white; }
.day-cell[data-mood="3"] { background: #f6e05e; }
.day-cell[data-mood="4"] { background: #68d391; color: white; }
.day-cell[data-mood="5"] { background: #38a169; color: white; }

.tooltip {
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: #2d3748;
    color: white;
    padding: 5px 9px;
    border-radius: 6px;
    font-size: 0.7rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 100;
    text-align: center;
    width: max-content;
    max-width: 170px;
    white-space: pre-line;
}

.day-cell:hover .tooltip {
    opacity: 1;
}

.legend {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-size: 0.72rem;
    color: #718096;
    flex-wrap: wrap;
}

.legend-color {
    width: 14px;
    height: 14px;
    border-radius: 4px;
}

.stats-column {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.stat-card {
    background: linear-gradient(135deg, #edf2f7, #e2e8f0);
    padding: 10px 8px;
    border-radius: 10px;
    text-align: center;
}

.stat-value {
    font-size: 1.3rem;
    font-weight: bold;
    color: #667eea;
    margin-bottom: 2px;
    line-height: 1.1;
}

.stat-label {
    font-size: 0.7rem;
    color: #718096;
    line-height: 1.2;
}

.chart-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
}

.chart-emoji {
    font-size: 1.05rem;
    width: 22px;
}

.chart-progress {
    flex: 1;
    height: 18px;
    background: #e2e8f0;
    border-radius: 9px;
    overflow: hidden;
}

.chart-fill {
    height: 100%;
    border-radius: 9px;
    transition: width 0.6s ease;
    display: flex;
    align-items: center;
    padding: 0 8px;
    color: white;
    font-size: 0.7rem;
    font-weight: 600;
}

.chart-fill[data-mood="1"] { background: #fc8181; }
.chart-fill[data-mood="2"] { background: #f6ad55; }
.chart-fill[data-mood="3"] { background: #f6e05e; color: #2d3748; }
.chart-fill[data-mood="4"] { background: #68d391; }
.chart-fill[data-mood="5"] { background: #38a169; }

.no-data {
    text-align: center;
    color: #a0aec0;
    padding: 12px;
    font-style: italic;
    font-size: 0.85rem;
}

.toast {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #2d3748;
    color: white;
    padding: 10px 20px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: transform 0.4s;
    z-index: 1000;
    font-size: 0.9rem;
}

.toast.show {
    transform: translateX(-50%) translateY(0);
}

@media (orientation: landscape) and (max-height: 700px) {
    body { padding: 8px 16px; }
    .top-bar { margin-bottom: 8px; }
    .header-text h1 { font-size: 1.2rem; }
    .header-text p { font-size: 0.78rem; }
    .card { padding: 10px 12px; }
    .mood-btn { font-size: 1.2rem; }
    .stat-value { font-size: 1.15rem; }
}
</style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="header-text">
            <h1 id="title">🌈 Трекер Настрою</h1>
            <p id="subtitle">Відстежуйте свій настрій щодня</p>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="uk">УКР</button>
            <button class="lang-btn" data-lang="en">ENG</button>
        </div>
    </div>

    <div class="main-grid">
        <!-- Left column: Mood input -->
        <div class="card">
            <h2 id="todayLabel">Як ви почуваєтесь сьогодні?</h2>
            <div class="mood-selector" id="moodSelector">
                <button class="mood-btn" data-mood="1" title="">😢</button>
                <button class="mood-btn" data-mood="2" title="">😕</button>
                <button class="mood-btn" data-mood="3" title="">😐</button>
                <button class="mood-btn" data-mood="4" title="">🙂</button>
                <button class="mood-btn" data-mood="5" title="">😄</button>
            </div>
            <textarea class="note-input" id="noteInput" placeholder="Додайте нотатку (необов'язково)..."></textarea>
            <button class="save-btn" id="saveBtn">💾 Зберегти настрій</button>
        </div>

        <!-- Center column: Calendar -->
        <div class="card">
            <div class="calendar-controls">
                <button class="nav-btn" id="prevMonth">‹</button>
                <div class="month-label" id="monthLabel"></div>
                <button class="nav-btn" id="nextMonth">›</button>
            </div>
            <div class="heatmap" id="heatmap"></div>
            <div class="legend">
                <span id="legendLow">Поганий</span>
                <div class="legend-color" style="background:#fc8181"></div>
                <div class="legend-color" style="background:#f6ad55"></div>
                <div class="legend-color" style="background:#f6e05e"></div>
                <div class="legend-color" style="background:#68d391"></div>
                <div class="legend-color" style="background:#38a169"></div>
                <span id="legendHigh">Чудовий</span>
            </div>
        </div>

        <!-- Right column: Statistics + Chart -->
        <div class="stats-column">
            <div class="card">
                <h2 id="statsLabel">📈 Статистика</h2>
                <div class="stats-grid" id="statsGrid"></div>
            </div>
            <div class="card">
                <h2 id="distLabel">📊 Розподіл настрою</h2>
                <div id="moodChart"></div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const translations = {
    uk: {
        title: '🌈 Трекер Настрою',
        subtitle: 'Відстежуйте свій настрій щодня',
        pageTitle: '🌈 Трекер Настрою — Щоденний журнал емоцій',
        todayLabel: 'Як ви почуваєтесь сьогодні?',
        notePlaceholder: "Додайте нотатку (необов'язково)...",
        saveBtn: '💾 Зберегти настрій',
        distLabel: '📊 Розподіл настрою',
        statsLabel: '📈 Статистика',
        legendLow: 'Поганий',
        legendHigh: 'Чудовий',
        moods: ['Жахливий', 'Поганий', 'Нормальний', 'Добрий', 'Чудовий'],
        days: ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'],
        months: ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'],
        statsTotal: 'Всього записів',
        statsAvg: 'Середній настрій',
        statsStreak: 'Поточна серія',
        statsBest: 'Найкращий день',
        days_: 'днів',
        saved: '✅ Настрій збережено!',
        selectMood: 'Оберіть настрій!',
        noData: 'Поки немає даних',
        note: 'Нотатка'
    },
    en: {
        title: '🌈 Mood Tracker',
        subtitle: 'Track your mood daily',
        pageTitle: '🌈 Mood Tracker — Daily Emotion Journal',
        todayLabel: 'How are you feeling today?',
        notePlaceholder: 'Add a note (optional)...',
        saveBtn: '💾 Save mood',
        distLabel: '📊 Mood Distribution',
        statsLabel: '📈 Statistics',
        legendLow: 'Bad',
        legendHigh: 'Great',
        moods: ['Terrible', 'Bad', 'Okay', 'Good', 'Great'],
        days: ['Mo','Tu','We','Th','Fr','Sa','Su'],
        months: ['January','February','March','April','May','June','July','August','September','October','November','December'],
        statsTotal: 'Total entries',
        statsAvg: 'Average mood',
        statsStreak: 'Current streak',
        statsBest: 'Best day',
        days_: 'days',
        saved: '✅ Mood saved!',
        selectMood: 'Please select a mood!',
        noData: 'No data yet',
        note: 'Note'
    }
};

let state = {
    lang: 'uk',
    selectedMood: null,
    moods: {},
    currentMonth: new Date().getMonth(),
    currentYear: new Date().getFullYear()
};

function loadState() {
    const saved = localStorage.getItem('moodTracker');
    if (saved) {
        const data = JSON.parse(saved);
        state.lang = data.lang || 'uk';
        state.moods = data.moods || {};
    }
}

function saveState() {
    localStorage.setItem('moodTracker', JSON.stringify({
        lang: state.lang,
        moods: state.moods
    }));
}

function getDateKey(date) {
    return date.toISOString().split('T')[0];
}

function t(key) {
    return translations[state.lang][key];
}

function applyLanguage() {
    const tr = translations[state.lang];
    document.getElementById('title').textContent = tr.title;
    document.getElementById('subtitle').textContent = tr.subtitle;
    document.getElementById('todayLabel').textContent = tr.todayLabel;
    document.getElementById('noteInput').placeholder = tr.notePlaceholder;
    document.getElementById('saveBtn').textContent = tr.saveBtn;
    document.getElementById('distLabel').textContent = tr.distLabel;
    document.getElementById('statsLabel').textContent = tr.statsLabel;
    document.getElementById('legendLow').textContent = tr.legendLow;
    document.getElementById('legendHigh').textContent = tr.legendHigh;
    document.title = tr.pageTitle;
    document.documentElement.lang = state.lang;

    document.querySelectorAll('.mood-btn').forEach(btn => {
        const mood = parseInt(btn.dataset.mood);
        btn.title = tr.moods[mood-1];
    });

    document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === state.lang);
    });

    renderCalendar();
    renderStats();
    renderChart();
    loadTodayMood();
}

function loadTodayMood() {
    const today = getDateKey(new Date());
    const todayData = state.moods[today];
    state.selectedMood = todayData ? todayData.mood : null;
    document.getElementById('noteInput').value = todayData?.note || '';

    document.querySelectorAll('.mood-btn').forEach(btn => {
        btn.classList.toggle('selected', parseInt(btn.dataset.mood) === state.selectedMood);
    });
}

function renderCalendar() {
    const tr = translations[state.lang];
    document.getElementById('monthLabel').textContent = `${tr.months[state.currentMonth]} ${state.currentYear}`;

    const heatmap = document.getElementById('heatmap');
    heatmap.innerHTML = '';

    tr.days.forEach(d => {
        const lbl = document.createElement('div');
        lbl.className = 'day-label';
        lbl.textContent = d;
        heatmap.appendChild(lbl);
    });

    const firstDay = new Date(state.currentYear, state.currentMonth, 1);
    const lastDay = new Date(state.currentYear, state.currentMonth + 1, 0);
    let startOffset = firstDay.getDay() - 1;
    if (startOffset < 0) startOffset = 6;

    const todayKey = getDateKey(new Date());

    for (let i = 0; i < startOffset; i++) {
        const empty = document.createElement('div');
        empty.className = 'day-cell empty';
        heatmap.appendChild(empty);
    }

    for (let day = 1; day <= lastDay.getDate(); day++) {
        const date = new Date(state.currentYear, state.currentMonth, day);
        const key = getDateKey(date);
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.textContent = day;

        if (key === todayKey) cell.classList.add('today');

        if (state.moods[key]) {
            cell.dataset.mood = state.moods[key].mood;
            const tooltip = document.createElement('div');
            tooltip.className = 'tooltip';
            const m = state.moods[key];
            let tipText = `${tr.moods[m.mood-1]}`;
            if (m.note) tipText += `\n${tr.note}: ${m.note}`;
            tooltip.textContent = tipText;
            cell.appendChild(tooltip);
        }

        cell.addEventListener('click', () => {
            if (state.moods[key]) {
                showToast(`${day} ${tr.months[state.currentMonth]}: ${tr.moods[state.moods[key].mood-1]}`);
            }
        });

        heatmap.appendChild(cell);
    }
}

function renderStats() {
    const tr = translations[state.lang];
    const entries = Object.values(state.moods);
    const total = entries.length;

    let avg = 0, streak = 0, best = 0;
    if (total > 0) {
        avg = (entries.reduce((s, e) => s + e.mood, 0) / total).toFixed(1);
        best = Math.max(...entries.map(e => e.mood));

        const today = new Date();
        for (let i = 0; i < 365; i++) {
            const d = new Date(today);
            d.setDate(d.getDate() - i);
            if (state.moods[getDateKey(d)]) streak++;
            else if (i > 0) break;
        }
    }

    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
            <div class="stat-value">${total}</div>
            <div class="stat-label">${tr.statsTotal}</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${avg || '—'}</div>
            <div class="stat-label">${tr.statsAvg}</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${streak}</div>
            <div class="stat-label">${tr.statsStreak} (${tr.days_})</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${best ? ['😢','😕','😐','🙂','😄'][best-1] : '—'}</div>
            <div class="stat-label">${tr.statsBest}</div>
        </div>
    `;
}

function renderChart() {
    const tr = translations[state.lang];
    const counts = [0,0,0,0,0];
    Object.values(state.moods).forEach(e => counts[e.mood-1]++);
    const total = counts.reduce((a,b) => a+b, 0);

    const chart = document.getElementById('moodChart');
    if (total === 0) {
        chart.innerHTML = `<div class="no-data">${tr.noData}</div>`;
        return;
    }

    const emojis = ['😢','😕','😐','🙂','😄'];
    chart.innerHTML = counts.map((count, i) => {
        const pct = total ? (count/total*100) : 0;
        return `
            <div class="chart-bar">
                <span class="chart-emoji">${emojis[i]}</span>
                <div class="chart-progress">
                    <div class="chart-fill" data-mood="${i+1}" style="width:${pct}%">
                        ${count > 0 ? count : ''}
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        state.selectedMood = parseInt(btn.dataset.mood);
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    });
});

document.getElementById('saveBtn').addEventListener('click', () => {
    if (!state.selectedMood) {
        showToast(t('selectMood'));
        return;
    }
    const today = getDateKey(new Date());
    state.moods[today] = {
        mood: state.selectedMood,
        note: document.getElementById('noteInput').value.trim()
    };
    saveState();
    renderCalendar();
    renderStats();
    renderChart();
    showToast(t('saved'));
});

document.getElementById('prevMonth').addEventListener('click', () => {
    state.currentMonth--;
    if (state.currentMonth < 0) {
        state.currentMonth = 11;
        state.currentYear--;
    }
    renderCalendar();
});

document.getElementById('nextMonth').addEventListener('click', () => {
    state.currentMonth++;
    if (state.currentMonth > 11) {
        state.currentMonth = 0;
        state.currentYear++;
    }
    renderCalendar();
});

document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        state.lang = btn.dataset.lang;
        saveState();
        applyLanguage();
    });
});

loadState();
applyLanguage();
</script>
</body>
</html>
