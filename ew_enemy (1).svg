<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  
  <!-- Light red rhombus (diamond shape) -->
  <polygon points="200,20 380,200 200,380 20,200" 
           fill="#FF6B6B" 
           stroke="black" 
           stroke-width="5"/>
  
  <!-- "EW" text centered inside the rhombus -->
  <text x="200" y="210" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="120" 
        fill="black" 
        text-anchor="middle" 
        dominant-baseline="middle">EW</text>
  
</svg>