<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дихальна вправа</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg-1: #0f2027;
    --bg-2: #203a43;
    --bg-3: #2c5364;
    --accent: #4fd1c5;
    --accent-glow: rgba(79, 209, 197, 0.6);
    --text: #e8f4f8;
    --gold: #ffd166;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-size: 300% 300%;
    animation: gradientShift 20s ease infinite;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .particle {
    position: absolute;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    animation: float linear infinite;
  }
  @keyframes float {
    from { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    to { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* Top bar */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.15);
  }
  .topbar h1 {
    font-size: clamp(1rem, 4vw, 1.4rem);
    font-weight: 300;
    letter-spacing: 2px;
  }
  .topbar-right { display: flex; gap: 6px; align-items: center; }
  .lang-switch { display: flex; gap: 4px; }
  .lang-switch button {
    padding: 6px 10px;
    font-size: 0.8rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(79,209,197,0.4);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
  }
  .lang-switch button.active { background: var(--accent); color: #06282b; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 8px 10px;
    position: sticky;
    top: 52px;
    z-index: 15;
    background: rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    overflow-x: auto;
  }
  .tab {
    flex: 1;
    min-width: 90px;
    padding: 10px;
    background: rgba(255,255,255,0.06);
    border: none;
    color: var(--text);
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.85rem;
    letter-spacing: 1px;
    transition: all .3s;
    white-space: nowrap;
  }
  .tab.active {
    background: linear-gradient(135deg, var(--accent), #2c9d92);
    color: #06282b;
    font-weight: 600;
  }

  .page { display: none; padding: 16px; animation: fade .4s ease; }
  .page.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px);} to {opacity:1; transform:none;} }

  .content {
    max-width: 640px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }

  /* --- Breathe page --- */
  .breathe-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .breath-area {
    position: relative;
    width: min(300px, 72vw);
    height: min(300px, 72vw);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(79, 209, 197, 0.3);
    inset: 0;
  }
  .ring:nth-child(2) { inset: 8%; opacity: 0.5; }
  .ring:nth-child(3) { inset: 16%; opacity: 0.3; }
  .circle {
    position: relative;
    width: 55%;
    height: 55%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #7ee8dc, var(--accent) 60%, #2c9d92);
    box-shadow: 0 0 60px var(--accent-glow), inset 0 0 40px rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
    will-change: transform;
  }
  .phase-text {
    font-size: clamp(0.9rem, 3vw, 1.3rem);
    text-align: center;
    color: #06282b;
    text-shadow: 0 1px 3px rgba(255,255,255,0.4);
    padding: 0 8px;
  }
  .counter {
    font-size: clamp(2rem, 8vw, 3.4rem);
    font-weight: 200;
    text-shadow: 0 0 30px var(--accent-glow);
    min-height: 1em;
  }

  .controls { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
  button.btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(79, 209, 197, 0.4);
    color: var(--text);
    padding: 12px 26px;
    border-radius: 50px;
    font-size: 1rem;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    letter-spacing: 1px;
  }
  button.btn:hover { background: rgba(79,209,197,0.2); box-shadow: 0 0 16px var(--accent-glow); }
  button.btn.primary { background: linear-gradient(135deg, var(--accent), #2c9d92); color: #06282b; font-weight: 600; border: none; }

  /* Program cards */
  .program-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    width: 100%;
  }
  .prog-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(79,209,197,0.25);
    border-radius: 14px;
    padding: 12px;
    cursor: pointer;
    transition: all .25s;
    text-align: left;
  }
  .prog-card.sel { border-color: var(--accent); background: rgba(79,209,197,0.15); box-shadow: 0 0 16px var(--accent-glow); }
  .prog-card .pname { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
  .prog-card .pdesc { font-size: 0.72rem; opacity: 0.7; line-height: 1.3; }
  .prog-card .ptime { font-size: 0.7rem; margin-top: 6px; color: var(--accent); }

  .settings {
    display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;
    background: rgba(0,0,0,0.15); padding: 14px; border-radius: 16px; width: 100%;
  }
  .setting { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .setting label { font-size: 0.75rem; opacity: 0.8; }
  .setting input {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(79,209,197,0.3);
    color: var(--text); padding: 8px; border-radius: 10px;
    width: 70px; text-align: center; font-size: 0.95rem;
  }
  .stats-mini { font-size: 0.85rem; opacity: 0.75; text-align: center; }

  /* --- Stats page / calendar --- */
  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit,minmax(90px,1fr)); gap: 10px; margin-bottom: 18px; }
  .stat-card {
    background: rgba(255,255,255,0.06); border-radius: 14px; padding: 14px 8px; text-align: center;
    border: 1px solid rgba(79,209,197,0.2);
  }
  .stat-card .num { font-size: 1.6rem; font-weight: 300; color: var(--accent); }
  .stat-card .lbl { font-size: 0.7rem; opacity: 0.75; margin-top: 4px; }

  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px; }
  .cal-header button { background: rgba(255,255,255,0.08); border:none; color: var(--text); border-radius: 8px; padding: 6px 14px; cursor:pointer; font-size:1.1rem; }
  .cal-title { font-size: 1rem; letter-spacing: 1px; }
  .calendar { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cal-dow { text-align:center; font-size:0.7rem; opacity:0.6; padding: 4px 0; }
  .cal-day {
    aspect-ratio: 1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: rgba(255,255,255,0.04); border-radius: 8px; font-size: 0.8rem; position: relative;
  }
  .cal-day.empty { background: transparent; }
  .cal-day.today { outline: 2px solid var(--accent); }
  .cal-day.done { background: linear-gradient(135deg, var(--accent), #2c9d92); color: #06282b; font-weight:600; }
  .cal-day .dot { font-size: 0.6rem; margin-top: 1px; }

  /* --- Awards page --- */
  .award-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); gap: 12px; }
  .award {
    background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px 10px;
    text-align: center; border: 1px solid rgba(255,255,255,0.08);
    transition: all .3s; opacity: 0.55; position: relative;
  }
  .award.unlocked { opacity: 1; border-color: var(--gold); background: rgba(255,209,102,0.1); box-shadow: 0 0 18px rgba(255,209,102,0.3); }
  .award .icon { font-size: 2.4rem; margin-bottom: 8px; filter: grayscale(1); }
  .award.unlocked .icon { filter: none; }
  .award .aname { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
  .award .adesc { font-size: 0.7rem; opacity: 0.75; line-height: 1.3; }
  .award .prog { font-size: 0.65rem; color: var(--accent); margin-top: 6px; }

  /* Toast for new award */
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(120px);
    background: linear-gradient(135deg,#ffd166,#f4a261); color:#332200;
    padding: 14px 22px; border-radius: 14px; font-weight:600; z-index: 100;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4); transition: transform .5s cubic-bezier(.2,1.4,.4,1);
    max-width: 90vw; text-align:center; display:flex; align-items:center; gap:10px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast .ti { font-size: 1.6rem; }

  h2.section { font-size: 1rem; font-weight: 400; opacity: 0.85; margin: 4px 0 12px; letter-spacing: 1px; }

  /* Landscape breathe layout */
  @media (orientation: landscape) and (max-height: 520px) {
    .breathe-wrap { flex-direction: row; flex-wrap: wrap; align-items: flex-start; }
    .breath-area { width: min(200px, 55vh); height: min(200px, 55vh); }
    .breathe-side { flex: 1; min-width: 240px; display:flex; flex-direction:column; gap:14px; }
  }
  @media not all and (orientation: landscape) and (max-height: 520px) {
    .breathe-side { display: contents; }
  }
  .breathe-side { display: contents; }
  @media (orientation: landscape) and (max-height: 520px) {
    .breathe-side { display: flex; }
  }

  @media (max-width: 360px) {
    .program-list { grid-template-columns: 1fr 1fr; }
    button.btn { padding: 10px 18px; font-size: 0.9rem; }
  }
</style>
</head>
<body>
<div class="particles" id="particles"></div>

<div class="topbar">
  <h1 id="appTitle">Дихальна вправа</h1>
  <div class="topbar-right">
    <div class="lang-switch">
      <button data-lang="uk" class="active">УКР</button>
      <button data-lang="en">ENG</button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-page="breathe" id="tabBreathe">Вправа</button>
  <button class="tab" data-page="stats" id="tabStats">Статистика</button>
  <button class="tab" data-page="awards" id="tabAwards">Нагороди</button>
</div>

<!-- BREATHE PAGE -->
<div class="page active" id="page-breathe">
  <div class="content breathe-wrap">
    <div class="breath-area">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="circle" id="circle"><div class="phase-text" id="phaseText">Готові?</div></div>
    </div>
    <div class="counter" id="counter"></div>

    <div class="breathe-side">
      <div class="controls">
        <button class="btn primary" id="startBtn">Почати</button>
        <button class="btn" id="resetBtn">Скинути</button>
      </div>

      <div class="settings">
        <div class="setting">
          <label id="lblCycles">Цикли</label>
          <input type="number" id="cycles" min="1" max="99" value="5">
        </div>
      </div>

      <div class="stats-mini" id="statsMini"></div>

      <h2 class="section" id="lblPrograms">Оберіть техніку</h2>
      <div class="program-list" id="programList"></div>
    </div>
  </div>
</div>

<!-- STATS PAGE -->
<div class="page" id="page-stats">
  <div class="content">
    <div class="stat-cards" id="statCards"></div>
    <div class="cal-header">
      <button id="calPrev">‹</button>
      <div class="cal-title" id="calTitle"></div>
      <button id="calNext">›</button>
    </div>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<!-- AWARDS PAGE -->
<div class="page" id="page-awards">
  <div class="content">
    <h2 class="section" id="awardsHeader">Ваші досягнення</h2>
    <div class="award-grid" id="awardGrid"></div>
  </div>
</div>

<div class="toast" id="toast"><span class="ti">🏆</span><span id="toastText"></span></div>

<script>
// ================= Translations =================
const i18n = {
  uk: {
    appTitle: "Дихальна вправа",
    tabBreathe: "Вправа", tabStats: "Статистика", tabAwards: "Нагороди",
    start:"Почати", pause:"Пауза", resume:"Продовжити", reset:"Скинути",
    lblCycles:"Цикли", lblPrograms:"Оберіть техніку",
    ready:"Готові?", inhale:"Вдих", hold:"Затримка", exhale:"Видих", holdEmpty:"Пауза",
    done:"Чудово! 🌿",
    statsMini:(d,t)=>`Цикл ${d} / ${t}`,
    awardsHeader:"Ваші досягнення",
    stat_days:"Днів активності", stat_sessions:"Сесій", stat_cycles:"Всього циклів", stat_streak:"Серія днів", stat_awards:"Нагород",
    dow:["Пн","Вт","Ср","Чт","Пт","Сб","Нд"],
    months:["Січень","Лютий","Березень","Квітень","Травень","Червень","Липень","Серпень","Вересень","Жовтень","Листопад","Грудень"],
    newAward:"Нова нагорода!",
    programs:{
      "478":{n:"4-7-8", d:"Розслаблення перед сном"},
      "box":{n:"Квадрат", d:"Фокус і спокій 4-4-4-4"},
      "calm":{n:"Спокій", d:"М'яке заспокоєння 4-6"},
      "deep":{n:"Глибоке", d:"Рівне дихання 5-5"},
      "energy":{n:"Енергія", d:"Бадьорість 2-2 швидко"},
      "coherent":{n:"Когерентне", d:"Баланс серця 5.5-5.5"},
      "triangle":{n:"Трикутник", d:"Три фази 4-4-4"},
      "relax":{n:"Антистрес", d:"Довгий видих 4-7-8-4"}
    },
    awards:{
      first:{n:"Перший подих", d:"Завершіть першу сесію", i:"🌱"},
      streak3:{n:"Три дні поспіль", d:"Займайтесь 3 дні підряд", i:"🔥"},
      streak7:{n:"Тиждень спокою", d:"7 днів поспіль", i:"⭐"},
      streak30:{n:"Майстер дзен", d:"30 днів поспіль", i:"🧘"},
      cycles50:{n:"50 циклів", d:"Виконайте 50 циклів", i:"💨"},
      cycles200:{n:"200 циклів", d:"Виконайте 200 циклів", i:"🌊"},
      cycles500:{n:"500 циклів", d:"Виконайте 500 циклів", i:"🏔️"},
      sessions10:{n:"Постійність", d:"10 завершених сесій", i:"📅"},
      sessions50:{n:"Відданість", d:"50 завершених сесій", i:"💎"},
      allprograms:{n:"Дослідник", d:"Спробуйте всі техніки", i:"🧭"},
      earlybird:{n:"Рання пташка", d:"Сесія до 8:00 ранку", i:"🌅"},
      nightowl:{n:"Нічна сова", d:"Сесія після 22:00", i:"🌙"}
    }
  },
  en: {
    appTitle:"Breathing Exercise",
    tabBreathe:"Exercise", tabStats:"Statistics", tabAwards:"Awards",
    start:"Start", pause:"Pause", resume:"Resume", reset:"Reset",
    lblCycles:"Cycles", lblPrograms:"Choose technique",
    ready:"Ready?", inhale:"Inhale", hold:"Hold", exhale:"Exhale", holdEmpty:"Hold",
    done:"Well done! 🌿",
    statsMini:(d,t)=>`Cycle ${d} / ${t}`,
    awardsHeader:"Your achievements",
    stat_days:"Active days", stat_sessions:"Sessions", stat_cycles:"Total cycles", stat_streak:"Day streak", stat_awards:"Awards",
    dow:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
    months:["January","February","March","April","May","June","July","August","September","October","November","December"],
    newAward:"New award!",
    programs:{
      "478":{n:"4-7-8", d:"Relaxation before sleep"},
      "box":{n:"Box", d:"Focus & calm 4-4-4-4"},
      "calm":{n:"Calm", d:"Gentle calming 4-6"},
      "deep":{n:"Deep", d:"Even breathing 5-5"},
      "energy":{n:"Energy", d:"Alertness 2-2 fast"},
      "coherent":{n:"Coherent", d:"Heart balance 5.5-5.5"},
      "triangle":{n:"Triangle", d:"Three phases 4-4-4"},
      "relax":{n:"Anti-stress", d:"Long exhale 4-7-8-4"}
    },
    awards:{
      first:{n:"First breath", d:"Complete first session", i:"🌱"},
      streak3:{n:"Three in a row", d:"Practice 3 days straight", i:"🔥"},
      streak7:{n:"Week of calm", d:"7 days in a row", i:"⭐"},
      streak30:{n:"Zen master", d:"30 days in a row", i:"🧘"},
      cycles50:{n:"50 cycles", d:"Complete 50 cycles", i:"💨"},
      cycles200:{n:"200 cycles", d:"Complete 200 cycles", i:"🌊"},
      cycles500:{n:"500 cycles", d:"Complete 500 cycles", i:"🏔️"},
      sessions10:{n:"Consistency", d:"10 completed sessions", i:"📅"},
      sessions50:{n:"Devotion", d:"50 completed sessions", i:"💎"},
      allprograms:{n:"Explorer", d:"Try all techniques", i:"🧭"},
      earlybird:{n:"Early bird", d:"Session before 8:00 AM", i:"🌅"},
      nightowl:{n:"Night owl", d:"Session after 10:00 PM", i:"🌙"}
    }
  }
};

// ================= Programs =================
// phases: [name, seconds]
const patterns = {
  "478":      [["inhale",4],["hold",7],["exhale",8]],
  "box":      [["inhale",4],["hold",4],["exhale",4],["holdEmpty",4]],
  "calm":     [["inhale",4],["exhale",6]],
  "deep":     [["inhale",5],["exhale",5]],
  "energy":   [["inhale",2],["exhale",2]],
  "coherent": [["inhale",5.5],["exhale",5.5]],
  "triangle": [["inhale",4],["hold",4],["exhale",4]],
  "relax":    [["inhale",4],["hold",7],["exhale",8],["holdEmpty",4]]
};
const PROGRAM_KEYS = Object.keys(patterns);

// ================= State =================
let state = {
  lang: "uk",
  pattern: "478",
  cycles: 5,
  totalCycles: 0,
  totalSessions: 0,
  history: {},          // {"YYYY-MM-DD": sessionsCount}
  usedPrograms: {},     // {key:true}
  awards: {},           // {awardKey:true}
  lastVisit: null
};

let phaseIndex=0, timeLeft=0, timerId=null, currentCycle=0, running=false, paused=false;
let calMonth = new Date().getMonth(), calYear = new Date().getFullYear();

// ================= Elements =================
const el = id => document.getElementById(id);
const circle = el('circle'), phaseText = el('phaseText'), counter = el('counter');
const startBtn = el('startBtn'), resetBtn = el('resetBtn');
const cyclesInput = el('cycles'), statsMini = el('statsMini');

// ================= Persistence =================
function save(){ localStorage.setItem('breathAppV2', JSON.stringify(state)); }
function load(){
  try {
    const s = JSON.parse(localStorage.getItem('breathAppV2'));
    if (s) state = Object.assign(state, s);
  } catch(e){}
}

function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ================= Language =================
function t(){ return i18n[state.lang]; }
function applyLang(){
  const L = t();
  el('appTitle').textContent = L.appTitle;
  el('tabBreathe').textContent = L.tabBreathe;
  el('tabStats').textContent = L.tabStats;
  el('tabAwards').textContent = L.tabAwards;
  el('lblCycles').textContent = L.lblCycles;
  el('lblPrograms').textContent = L.lblPrograms;
  el('awardsHeader').textContent = L.awardsHeader;
  resetBtn.textContent = L.reset;
  document.documentElement.lang = state.lang;
  startBtn.textContent = !running ? L.start : (paused ? L.resume : L.pause);
  if(!running) phaseText.textContent = L.ready; else updatePhaseText();
  document.querySelectorAll('.lang-switch button').forEach(b=>b.classList.toggle('active', b.dataset.lang===state.lang));
  updateStatsMini();
  renderPrograms();
  renderStats();
  renderCalendar();
  renderAwards();
}
function updateStatsMini(){ statsMini.textContent = t().statsMini(currentCycle, state.cycles); }
function updatePhaseText(){ phaseText.textContent = t()[ patterns[state.pattern][phaseIndex][0] ]; }

// ================= Programs UI =================
function renderPrograms(){
  const list = el('programList');
  list.innerHTML = '';
  PROGRAM_KEYS.forEach(key=>{
    const p = t().programs[key];
    const seq = patterns[key];
    const per = seq.reduce((a,[,s])=>a+s,0);
    const card = document.createElement('div');
    card.className = 'prog-card' + (state.pattern===key?' sel':'');
    card.innerHTML = `<div class="pname">${p.n}</div><div class="pdesc">${p.d}</div><div class="ptime">~${per}s/${t().statsMini?'':''}${per}</div>`;
    card.querySelector('.ptime').textContent = `~${per}s`;
    card.addEventListener('click', ()=>{
      if(running) return;
      state.pattern = key; save(); renderPrograms();
    });
    list.appendChild(card);
  });
}

// ================= Breathing engine =================
function setCircle(name, secs){
  circle.style.transition = `transform ${secs}s ease-in-out`;
  if(name==='inhale') circle.style.transform='scale(1.55)';
  else if(name==='exhale') circle.style.transform='scale(0.85)';
}
function startPhase(){
  const [name,secs] = patterns[state.pattern][phaseIndex];
  timeLeft = secs; updatePhaseText();
  counter.textContent = Math.ceil(timeLeft);
  setCircle(name,secs);
}
function tick(){
  timeLeft--;
  counter.textContent = timeLeft>0 ? Math.ceil(timeLeft):'';
  if(timeLeft<=0) nextPhase();
}
function nextPhase(){
  const seq = patterns[state.pattern];
  phaseIndex++;
  if(phaseIndex>=seq.length){
    phaseIndex=0; currentCycle++; updateStatsMini();
    if(currentCycle>=state.cycles){ finish(); return; }
  }
  startPhase();
}
function runLoop(){ clearInterval(timerId); timerId=setInterval(tick, 1000); }

function startExercise(){
  running=true; paused=false; phaseIndex=0; currentCycle=0;
  updateStatsMini(); startPhase(); runLoop(); applyLang();
  cyclesInput.disabled=true;
}
function pauseExercise(){
  paused=true; clearInterval(timerId);
  const cs=getComputedStyle(circle).transform;
  circle.style.transition='none'; circle.style.transform=cs; applyLang();
}
function resumeExercise(){
  paused=false;
  setCircle(patterns[state.pattern][phaseIndex][0], timeLeft>0?timeLeft:1);
  runLoop(); applyLang();
}
function finish(){
  clearInterval(timerId); running=false; paused=false;
  counter.textContent=''; phaseText.textContent=t().done;
  circle.style.transition='transform 1.5s ease'; circle.style.transform='scale(1)';
  cyclesInput.disabled=false;
  recordSession();
  applyLang();
}
function resetExercise(){
  clearInterval(timerId); running=false; paused=false;
  phaseIndex=0; currentCycle=0; timeLeft=0;
  counter.textContent=''; circle.style.transition='transform 1s ease'; circle.style.transform='scale(1)';
  cyclesInput.disabled=false; applyLang();
}

// ================= Record session & awards =================
function recordSession(){
  const key = todayKey();
  state.history[key] = (state.history[key]||0)+1;
  state.totalSessions++;
  state.totalCycles += state.cycles;
  state.usedPrograms[state.pattern] = true;
  save();
  checkAwards();
}

function currentStreak(){
  let streak=0; const d=new Date();
  for(;;){
    const k = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(state.history[k]){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}
function activeDays(){ return Object.keys(state.history).length; }

function checkAwards(silent){
  const newly=[];
  const grant = k => { if(!state.awards[k]){ state.awards[k]=true; newly.push(k); } };
  const streak = currentStreak();
  const hour = new Date().getHours();

  if(state.totalSessions>=1) grant('first');
  if(streak>=3) grant('streak3');
  if(streak>=7) grant('streak7');
  if(streak>=30) grant('streak30');
  if(state.totalCycles>=50) grant('cycles50');
  if(state.totalCycles>=200) grant('cycles200');
  if(state.totalCycles>=500) grant('cycles500');
  if(state.totalSessions>=10) grant('sessions10');
  if(state.totalSessions>=50) grant('sessions50');
  if(PROGRAM_KEYS.every(k=>state.usedPrograms[k])) grant('allprograms');
  if(!silent && hour<8) grant('earlybird');
  if(!silent && hour>=22) grant('nightowl');

  save();
  if(!silent && newly.length){ showToast(newly[0]); }
  renderAwards();
  renderStats();
}

// ================= Stats & Calendar =================
function renderStats(){
  const L=t();
  const cards=[
    {num:activeDays(), lbl:L.stat_days},
    {num:state.totalSessions, lbl:L.stat_sessions},
    {num:state.totalCycles, lbl:L.stat_cycles},
    {num:currentStreak(), lbl:L.stat_streak},
    {num:Object.keys(state.awards).length, lbl:L.stat_awards}
  ];
  el('statCards').innerHTML = cards.map(c=>`<div class="stat-card"><div class="num">${c.num}</div><div class="lbl">${c.lbl}</div></div>`).join('');
}

function renderCalendar(){
  const L=t();
  el('calTitle').textContent = `${L.months[calMonth]} ${calYear}`;
  const cal = el('calendar'); cal.innerHTML='';
  L.dow.forEach(d=> cal.insertAdjacentHTML('beforeend', `<div class="cal-dow">${d}</div>`));
  const first = new Date(calYear, calMonth, 1);
  let startDow = (first.getDay()+6)%7; // Monday first
  const days = new Date(calYear, calMonth+1, 0).getDate();
  const tk = todayKey();
  for(let i=0;i<startDow;i++) cal.insertAdjacentHTML('beforeend','<div class="cal-day empty"></div>');
  for(let d=1; d<=days; d++){
    const k = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const done = state.history[k];
    const cls = 'cal-day'+(done?' done':'')+(k===tk?' today':'');
    cal.insertAdjacentHTML('beforeend', `<div class="${cls}">${d}${done?`<span class="dot">●${done>1?done:''}</span>`:''}</div>`);
  }
}

// ================= Awards UI =================
function renderAwards(){
  const L=t(); const grid=el('awardGrid'); grid.innerHTML='';
  Object.keys(L.awards).forEach(k=>{
    const a=L.awards[k]; const unlocked=!!state.awards[k];
    grid.insertAdjacentHTML('beforeend',
      `<div class="award ${unlocked?'unlocked':''}">
        <div class="icon">${a.i}</div>
        <div class="aname">${a.n}</div>
        <div class="adesc">${a.d}</div>
        <div class="prog">${unlocked?'✓':''}</div>
      </div>`);
  });
}

// ================= Toast =================
let toastTimer=null;
function showToast(awardKey){
  const a = t().awards[awardKey];
  el('toastText').textContent = `${t().newAward} ${a.i} ${a.n}`;
  const toast=el('toast'); toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'), 3500);
}

// ================= Tabs =================
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    el('page-'+tab.dataset.page).classList.add('active');
    if(tab.dataset.page==='stats'){ renderStats(); renderCalendar(); }
    if(tab.dataset.page==='awards') renderAwards();
  });
});

// ================= Events =================
startBtn.addEventListener('click', ()=>{
  if(!running) startExercise();
  else if(paused) resumeExercise();
  else pauseExercise();
});
resetBtn.addEventListener('click', resetExercise);
cyclesInput.addEventListener('change', ()=>{
  let v=parseInt(cyclesInput.value)||1; v=Math.max(1,Math.min(99,v));
  cyclesInput.value=v; state.cycles=v; save(); updateStatsMini();
});
document.querySelectorAll('.lang-switch button').forEach(b=>{
  b.addEventListener('click', ()=>{ state.lang=b.dataset.lang; save(); applyLang(); });
});
el('calPrev').addEventListener('click', ()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); });
el('calNext').addEventListener('click', ()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); });

// ================= Particles =================
function createParticles(){
  const c=el('particles');
  for(let i=0;i<22;i++){
    const p=document.createElement('div'); p.className='particle';
    const s=Math.random()*6+2;
    p.style.width=s+'px'; p.style.height=s+'px';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(Math.random()*15+10)+'s';
    p.style.animationDelay=(Math.random()*15)+'s';
    c.appendChild(p);
  }
}

// ================= Init =================
function init(){
  load();
  if(!patterns[state.pattern]) state.pattern='478';
  cyclesInput.value = state.cycles;
  calMonth=new Date().getMonth(); calYear=new Date().getFullYear();

  // Daily visit tracking (marks visit day, but session award only on completion)
  const tk = todayKey();
  state.lastVisit = tk;
  save();

  applyLang();
  createParticles();
  checkAwards(true); // re-evaluate silent (no time-based/toast on load)
}
init();
</script>
