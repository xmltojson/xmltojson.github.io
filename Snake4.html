<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <meta name="description" content="Snake">
    <title>Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            color: #fff;
            overflow-x: hidden;
        }

        h1 {
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin-bottom: 8px;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            color: #00ff88;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
        }

        .main-game-area {
            display: flex;
            flex-direction: row;
            gap: 15px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 220px;
            max-width: 260px;
        }

        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 0 1 auto;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 220px;
            max-width: 260px;
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 10px;
            border-radius: 8px;
        }

        .control-group label {
            font-size: 0.85rem;
        }

        select, button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select {
            background: #2d3748;
            color: #fff;
            flex: 1;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .button-row {
            display: flex;
            gap: 6px;
        }

        .button-row button {
            flex: 1;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            width: 100%;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .label {
            font-size: 0.75rem;
            color: #aaa;
        }

        .stat-box .value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ff88;
        }

        .canvas-wrapper {
            position: relative;
            width: min(70vh, 90vw, 600px);
            height: min(70vh, 90vw, 600px);
            aspect-ratio: 1;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3), inset 0 0 50px rgba(0, 0, 0, 0.5);
            background: #0a0a15;
            display: block;
        }

        .virtual-keyboard {
            display: none;
            width: 100%;
            max-width: 280px;
            margin-top: 10px;
        }

        .vk-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 4px 0;
        }

        .vk-btn {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            background: linear-gradient(145deg, #2d3748, #1a202c);
            border: 2px solid #00ff88;
            color: #00ff88;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .vk-btn:active {
            transform: scale(0.95);
            background: #00ff88;
            color: #1a1a2e;
        }

        .level-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .level-info h3 {
            color: #00ff88;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .level-requirements {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .requirement .icon {
            font-size: 1.1rem;
        }

        .message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            z-index: 10;
            display: none;
            max-width: 90%;
        }

        .message-overlay h2 {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            margin-bottom: 12px;
        }

        .message-overlay.success h2 {
            color: #00ff88;
        }

        .message-overlay.failure h2 {
            color: #ff4444;
        }

        .message-overlay p {
            margin: 8px 0;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
        }

        .message-overlay button {
            margin-top: 12px;
        }

        .countdown {
            font-size: 1.3rem;
            color: #ffaa00;
            margin-top: 8px;
        }

        .high-scores {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .high-scores h3 {
            color: #00ff88;
            margin-bottom: 8px;
            text-align: center;
            font-size: 1rem;
        }

        .scores-list {
            max-height: 320px;
            overflow-y: auto;
            font-size: 0.78rem;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            padding: 6px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            gap: 2px;
        }

        .score-item:last-child {
            border-bottom: none;
        }

        .score-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-item-rank {
            color: #00ff88;
            font-weight: bold;
        }

        .score-item-stats {
            color: #fff;
        }

        .score-item-date {
            color: #888;
            font-size: 0.7rem;
            text-align: right;
        }

        .victory-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease;
        }

        .victory-modal.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .victory-content {
            text-align: center;
            padding: 40px;
            max-width: 90%;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .victory-content h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            color: #ffd700;
            text-shadow: 0 0 30px #ffd700, 0 0 60px #ffd700;
            margin-bottom: 20px;
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .victory-content .trophy {
            font-size: clamp(4rem, 15vw, 8rem);
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .victory-content p {
            font-size: clamp(1rem, 4vw, 1.5rem);
            margin: 15px 0;
            color: #fff;
        }

        .victory-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .victory-stat {
            background: rgba(255, 215, 0, 0.2);
            padding: 20px 30px;
            border-radius: 15px;
            border: 2px solid #ffd700;
        }

        .victory-stat .stat-label {
            color: #aaa;
            font-size: 0.9rem;
        }

        .victory-stat .stat-value {
            color: #ffd700;
            font-size: 2rem;
            font-weight: bold;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            to {
                top: 100vh;
                transform: rotate(720deg);
            }
        }

        .firework {
            position: fixed;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            animation: fireworkExplode 1s ease-out forwards;
        }

        @keyframes fireworkExplode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(20); opacity: 0; }
        }

        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            z-index: 5;
        }

        .pause-overlay.show {
            display: flex;
        }

        .pause-overlay h2 {
            color: #ffaa00;
            font-size: clamp(2rem, 6vw, 3rem);
            text-shadow: 0 0 20px #ffaa00;
        }

        .ai-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 165, 0, 0.9);
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8rem;
            display: none;
            z-index: 6;
        }

        .ai-indicator.active {
            display: block;
        }

        @media (max-width: 900px) {
            .main-game-area {
                flex-direction: column;
                align-items: center;
            }

            .left-panel, .right-panel {
                width: 100%;
                max-width: 500px;
                min-width: 0;
            }

            .left-panel {
                flex-direction: row;
                flex-wrap: wrap;
                max-width: 100%;
            }

            .controls-panel {
                flex: 1;
                min-width: 250px;
            }

            .stats-panel {
                grid-template-columns: repeat(4, 1fr);
            }

            .canvas-wrapper {
                width: min(80vw, 500px);
                height: min(80vw, 500px);
            }

            .level-info {
                flex: 1;
                min-width: 200px;
            }

            .level-requirements {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
        }

        @media (max-width: 600px) {
            .virtual-keyboard {
                display: block;
            }

            .left-panel {
                flex-direction: column;
            }

            .canvas-wrapper {
                width: min(90vw, 400px);
                height: min(90vw, 400px);
            }
        }

        @media (orientation: landscape) and (max-height: 600px) {
            body {
                padding: 4px;
            }

            h1 {
                margin-bottom: 4px;
                font-size: 1.2rem;
            }

            .canvas-wrapper {
                width: min(80vh, 90vw);
                height: min(80vh, 90vw);
            }
        }
    </style>
</head>
<body>
    <h1>🐍 Snake</h1>
    
    <div class="game-container">
        <div class="main-game-area">
            <div class="left-panel">
                <div class="controls-panel">
                    <div class="control-group">
                        <label for="levelSelect">Level:</label>
                        <select id="levelSelect"></select>
                    </div>
                    <div class="button-row">
                        <button id="startBtn">Start</button>
                        <button id="pauseBtn" disabled>Pause</button>
                    </div>
                    <div class="control-group checkbox-wrapper">
                        <input type="checkbox" id="aiMode">
                        <label for="aiMode">AI Mode</label>
                    </div>
                </div>

                <div class="stats-panel">
                    <div class="stat-box">
                        <div class="label">Score</div>
                        <div class="value" id="score">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="label">Level</div>
                        <div class="value" id="currentLevel">1</div>
                    </div>
                    <div class="stat-box">
                        <div class="label">Time</div>
                        <div class="value" id="timer">0:00</div>
                    </div>
                    <div class="stat-box">
                        <div class="label">Target</div>
                        <div class="value" id="target">10</div>
                    </div>
                </div>

                <div class="level-info">
                    <h3>Level <span id="levelInfoNum">1</span></h3>
                    <div class="level-requirements">
                        <div class="requirement">
                            <span class="icon">🎯</span>
                            <span>Points: <span id="reqPoints">10</span></span>
                        </div>
                        <div class="requirement">
                            <span class="icon">⏱️</span>
                            <span>Time: <span id="reqTime">60s</span></span>
                        </div>
                        <div class="requirement">
                            <span class="icon">🚧</span>
                            <span>Obstacles: <span id="reqObstacles">No</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="center-panel">
                <div class="canvas-wrapper">
                    <canvas id="gameCanvas"></canvas>
                    <div class="ai-indicator" id="aiIndicator">🤖 AI MODE</div>
                    <div class="pause-overlay" id="pauseOverlay">
                        <h2>⏸️ PAUSED</h2>
                    </div>
                    <div class="message-overlay" id="messageOverlay">
                        <h2 id="messageTitle">Level Complete!</h2>
                        <p id="messageText"></p>
                        <div class="countdown" id="countdown"></div>
                        <button id="messageBtn">Continue</button>
                    </div>
                </div>

                <div class="virtual-keyboard">
                    <div class="vk-row">
                        <div class="vk-btn" data-dir="up">▲</div>
                    </div>
                    <div class="vk-row">
                        <div class="vk-btn" data-dir="left">◄</div>
                        <div class="vk-btn" data-dir="down">▼</div>
                        <div class="vk-btn" data-dir="right">►</div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="high-scores" id="highScores">
                    <h3>🏆 High Scores</h3>
                    <div class="scores-list" id="scoresList"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="victory-modal" id="victoryModal">
        <div class="victory-content">
            <div class="trophy">🏆</div>
            <h1>CONGRATULATIONS!</h1>
            <p>You've completed all 20 levels!</p>
            <p>You are a true Snake Master!</p>
            <div class="victory-stats">
                <div class="victory-stat">
                    <div class="stat-label">Total Score</div>
                    <div class="stat-value" id="totalScore">0</div>
                </div>
                <div class="victory-stat">
                    <div class="stat-label">Total Time</div>
                    <div class="stat-value" id="totalTime">0:00</div>
                </div>
            </div>
            <button id="playAgainBtn">Play Again</button>
        </div>
    </div>

    <script>
        // Polyfills for older browsers
        if (!String.prototype.padStart) {
            String.prototype.padStart = function(targetLength, padString) {
                targetLength = targetLength >> 0;
                padString = String(typeof padString !== 'undefined' ? padString : ' ');
                if (this.length >= targetLength) {
                    return String(this);
                }
                targetLength = targetLength - this.length;
                if (targetLength > padString.length) {
                    padString += padString.repeat(targetLength / padString.length);
                }
                return padString.slice(0, targetLength) + String(this);
            };
        }

        if (!Array.prototype.find) {
            Array.prototype.find = function(predicate) {
                for (let i = 0; i < this.length; i++) {
                    if (predicate(this[i], i, this)) return this[i];
                }
                return undefined;
            };
        }

        if (!Array.prototype.findIndex) {
            Array.prototype.findIndex = function(predicate) {
                for (let i = 0; i < this.length; i++) {
                    if (predicate(this[i], i, this)) return i;
                }
                return -1;
            };
        }

        if (!Array.prototype.includes) {
            Array.prototype.includes = function(item) {
                return this.indexOf(item) !== -1;
            };
        }

        // Polyfill for requestAnimationFrame
        if (!window.requestAnimationFrame) {
            window.requestAnimationFrame = window.webkitRequestAnimationFrame ||
                window.mozRequestAnimationFrame ||
                window.msRequestAnimationFrame ||
                function(callback) { return setTimeout(callback, 1000 / 60); };
            window.cancelAnimationFrame = window.webkitCancelAnimationFrame ||
                window.mozCancelAnimationFrame ||
                window.msCancelAnimationFrame ||
                function(id) { clearTimeout(id); };
        }

        // Helper: shallow clone of plain object (replaces {...obj})
        function cloneObj(obj) {
            const result = {};
            for (const key in obj) {
                if (Object.prototype.hasOwnProperty.call(obj, key)) {
                    result[key] = obj[key];
                }
            }
            return result;
        }

        // Helper: roundRect polyfill for canvas
        function drawRoundRect(ctx, x, y, width, height, radius) {
            if (typeof radius === 'undefined') radius = 5;
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRID_SIZE = 20;
        let CELL_SIZE;
        
        function resizeCanvas() {
            const wrapper = document.querySelector('.canvas-wrapper');
            const size = Math.min(wrapper.clientWidth, wrapper.clientHeight);
            canvas.width = size;
            canvas.height = size;
            CELL_SIZE = size / GRID_SIZE;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Level configurations
        const LEVELS = [];
        for (let i = 1; i <= 20; i++) {
            const targetScore = Math.round(3 + (i - 1) * (60 - 3) / (20 - 1));
            const originalTime = Math.max(30, 90 - (i - 1) * 3);
            
            let timeMultiplier;
            if (i <= 6) {
                timeMultiplier = 1.2;
            } else {
                timeMultiplier = 1.5 + (i - 7) * (0.5 / 13);
            }
            const increasedTime = Math.round(originalTime * timeMultiplier);
            
            let finalTime = increasedTime;
            if (i >= 7) {
                finalTime = Math.max(increasedTime, Math.round(targetScore * 4.5));
            }
            
            const speedMultiplier = 1 + 0.2 * (i - 1) / 19;
            const baseSpeed = 200 - (i - 1) * 6;
            const adjustedSpeed = Math.round(Math.max(80, baseSpeed) * speedMultiplier);
            
            LEVELS.push({
                level: i,
                targetScore: targetScore,
                timeLimit: finalTime,
                speed: adjustedSpeed,
                hasObstacles: i >= 5,
                obstacleCount: i >= 5 ? Math.min(15, (i - 4) * 2) : 0
            });
        }

        let snake = [];
        let food = null;
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let currentLevel = 1;
        let isPlaying = false;
        let isPaused = false;
        let timeRemaining = 0;
        let timerInterval = null;
        let obstacles = [];
        let aiMode = false;
        let highScores = [];
        let totalGameScore = 0;
        let totalGameTime = 0;
        let autoNextTimeout = null;
        let countdownInterval = null;

        let lastTime = 0;
        let accumulator = 0;
        let animationId = null;
        
        let snakePositions = [];
        let interpolation = 0;
        let previousSnake = [];

        let autoSaveInterval = null;
        let restoredFromSave = false;

        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const levelSelect = document.getElementById('levelSelect');
        const aiModeCheckbox = document.getElementById('aiMode');
        const scoreDisplay = document.getElementById('score');
        const currentLevelDisplay = document.getElementById('currentLevel');
        const timerDisplay = document.getElementById('timer');
        const targetDisplay = document.getElementById('target');
        const messageOverlay = document.getElementById('messageOverlay');
        const messageTitle = document.getElementById('messageTitle');
        const messageText = document.getElementById('messageText');
        const messageBtn = document.getElementById('messageBtn');
        const aiIndicator = document.getElementById('aiIndicator');
        const scoresList = document.getElementById('scoresList');
        const countdownDisplay = document.getElementById('countdown');
        const victoryModal = document.getElementById('victoryModal');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const pauseOverlay = document.getElementById('pauseOverlay');

        for (let li = 0; li < LEVELS.length; li++) {
            const option = document.createElement('option');
            option.value = li + 1;
            option.textContent = 'Level ' + (li + 1);
            levelSelect.appendChild(option);
        }

        function formatDate(dateInput) {
            let date;
            if (typeof dateInput === 'number') {
                date = new Date(dateInput);
            } else if (typeof dateInput === 'string') {
                const parsed = new Date(dateInput);
                if (isNaN(parsed.getTime())) {
                    return dateInput;
                }
                date = parsed;
            } else {
                date = new Date();
            }

            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return diffMins + 'm ago';
            if (diffHours < 24) return diffHours + 'h ago';
            if (diffDays < 7) return diffDays + 'd ago';

            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
                          'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const day = date.getDate();
            const month = months[date.getMonth()];
            const year = date.getFullYear();
            const currentYear = now.getFullYear();

            if (year === currentYear) {
                return month + ' ' + day;
            }
            return month + ' ' + day + ', ' + year;
        }

        function getCurrentGameState() {
            return {
                snake: JSON.parse(JSON.stringify(snake)),
                food: food ? cloneObj(food) : null,
                direction: direction,
                nextDirection: nextDirection,
                score: score,
                currentLevel: currentLevel,
                isPlaying: isPlaying,
                isPaused: isPaused,
                timeRemaining: timeRemaining,
                obstacles: JSON.parse(JSON.stringify(obstacles)),
                aiMode: aiMode,
                totalGameScore: totalGameScore,
                totalGameTime: totalGameTime
            };
        }

        function saveFullState() {
            const state = {
                highScores: highScores,
                lastLevel: currentLevel,
                gameState: isPlaying ? getCurrentGameState() : null
            };
            localStorage.setItem('snakeGameState', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('snakeGameState');
            if (saved) {
                const state = JSON.parse(saved);
                highScores = state.highScores || [];
                currentLevel = state.lastLevel || 1;
                levelSelect.value = currentLevel;
                
                if (state.gameState && state.gameState.isPlaying) {
                    restoreGameState(state.gameState);
                    restoredFromSave = true;
                }
            }
            updateHighScoresDisplay();
        }

        function restoreGameState(gameState) {
            snake = gameState.snake;
            food = gameState.food;
            direction = gameState.direction;
            nextDirection = gameState.nextDirection;
            score = gameState.score;
            currentLevel = gameState.currentLevel;
            timeRemaining = gameState.timeRemaining;
            obstacles = gameState.obstacles;
            aiMode = gameState.aiMode;
            totalGameScore = gameState.totalGameScore || 0;
            totalGameTime = gameState.totalGameTime || 0;
            
            levelSelect.value = currentLevel;
            aiModeCheckbox.checked = aiMode;
            aiIndicator.classList.toggle('active', aiMode);
            
            previousSnake = JSON.parse(JSON.stringify(snake));
            snakePositions = JSON.parse(JSON.stringify(snake));
            
            updateDisplay();
            updateLevelInfo();
            draw();
            
            isPlaying = true;
            isPaused = true;
            startBtn.disabled = true;
            pauseBtn.disabled = false;

            pauseOverlay.classList.add('show');
            
            setTimeout(function() {

        function startAutoSave() {
            if (autoSaveInterval) {
                clearInterval(autoSaveInterval);
            }
            autoSaveInterval = setInterval(function() {

                    saveFullState();

        function updateLevelInfo() {
            const level = LEVELS[currentLevel - 1];
            document.getElementById('levelInfoNum').textContent = currentLevel;
            document.getElementById('reqPoints').textContent = level.targetScore;
            document.getElementById('reqTime').textContent = aiMode ? '∞' : level.timeLimit + 's';

        function initGame() {
            const level = LEVELS[currentLevel - 1];
            
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            
            previousSnake = JSON.parse(JSON.stringify(snake));
            snakePositions = JSON.parse(JSON.stringify(snake));
            
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            timeRemaining = level.timeLimit;
            obstacles = [];
            interpolation = 0;
            
            if (level.hasObstacles) {
                generateObstacles(level.obstacleCount);
            }
            
            spawnFood();
            updateDisplay();
            updateLevelInfo();
            draw();
        }

        function generateObstacles(count) {
            obstacles = [];

            function patternHorizontal(x, y, len) {
                const arr = [];
                for (let i = 0; i < len; i++) arr.push({ x: x + i, y: y });
                return arr;
            }
            function patternVertical(x, y, len) {
                const arr = [];
                for (let i = 0; i < len; i++) arr.push({ x: x, y: y + i });
                return arr;
            }
            function patternL(x, y) {
                return [{ x: x, y: y }, { x: x + 1, y: y }, { x: x, y: y + 1 }];
            }
            function patternSquare(x, y) {
                return [{ x: x, y: y }, { x: x + 1, y: y }, { x: x, y: y + 1 }, { x: x + 1, y: y + 1 }];
            }

            let placed = 0;
            let attempts = 0;
            
            while (placed < count && attempts < 100) {
                const patternIndex = Math.floor(Math.random() * 4);
                const x = Math.floor(Math.random() * (GRID_SIZE - 5)) + 2;
                const y = Math.floor(Math.random() * (GRID_SIZE - 5)) + 2;
                const len = Math.floor(Math.random() * 3) + 2;
                
                let newObstacles;
                if (patternIndex === 0) {
                    newObstacles = patternHorizontal(x, y, len);
                } else if (patternIndex === 1) {
                    newObstacles = patternVertical(x, y, len);
                } else if (patternIndex === 2) {
                    newObstacles = patternL(x, y);
                } else {
                    newObstacles = patternSquare(x, y);
                }
                
                let valid = true;
                for (let k = 0; k < newObstacles.length; k++) {
                    const obs = newObstacles[k];
                    if (obs.x < 0 || obs.x >= GRID_SIZE ||
                        obs.y < 0 || obs.y >= GRID_SIZE ||
                        isSnakePosition(obs.x, obs.y) ||
                        (obs.x >= 2 && obs.x <= 7 && obs.y >= 8 && obs.y <= 12)) {
                        valid = false;
                        break;
                    }
                    let collision = false;
                    for (let m = 0; m < obstacles.length; m++) {
                        if (obstacles[m].x === obs.x && obstacles[m].y === obs.y) {
                            collision = true;
                            break;
                        }
                    }
                    if (collision) {
                        valid = false;
                        break;
                    }
                }
                
                if (valid) {
                    for (let k = 0; k < newObstacles.length; k++) {
                        obstacles.push(newObstacles[k]);
                    }
                    placed += newObstacles.length;
                }
                attempts++;
            }
        }

        function isSnakePosition(x, y) {
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === x && snake[i].y === y) return true;
            }
            return false;
        }

        function isObstaclePosition(x, y) {
            for (let i = 0; i < obstacles.length; i++) {
                if (obstacles[i].x === x && obstacles[i].y === y) return true;
            }
            return false;
        }

        function isCornerPosition(x, y) {
            const corners = [
                { x: 0, y: 0 }, { x: 0, y: 1 }, { x: 1, y: 0 }, { x: 1, y: 1 },
                { x: GRID_SIZE - 1, y: 0 }, { x: GRID_SIZE - 2, y: 0 },
                { x: GRID_SIZE - 1, y: 1 }, { x: GRID_SIZE - 2, y: 1 },
                { x: 0, y: GRID_SIZE - 1 }, { x: 0, y: GRID_SIZE - 2 },
                { x: 1, y: GRID_SIZE - 1 }, { x: 1, y: GRID_SIZE - 2 },
                { x: GRID_SIZE - 1, y: GRID_SIZE - 1 },
                { x: GRID_SIZE - 2, y: GRID_SIZE - 1 },
                { x: GRID_SIZE - 1, y: GRID_SIZE - 2 },
                { x: GRID_SIZE - 2, y: GRID_SIZE - 2 }
            ];
            for (let i = 0; i < corners.length; i++) {
                if (corners[i].x === x && corners[i].y === y) return true;
            }
            return false;
        }

        function spawnFood() {
            let newFood;
            let attempts = 0;
            const maxAttempts = 200;
            
            do {
                newFood = {
                    x: Math.floor(Math.random() * (GRID_SIZE - 4)) + 2,
                    y: Math.floor(Math.random() * (GRID_SIZE - 4)) + 2
                };
                attempts++;
            } while ((isSnakePosition(newFood.x, newFood.y) || isObstaclePosition(newFood.x, newFood.y)) && attempts < maxAttempts);
            
            if (attempts >= maxAttempts) {
                attempts = 0;
                do {
                    newFood = {
                        x: Math.floor(Math.random() * GRID_SIZE),
                        y: Math.floor(Math.random() * GRID_SIZE)
                    };
                    attempts++;
                } while ((isSnakePosition(newFood.x, newFood.y) || 
                         isObstaclePosition(newFood.x, newFood.y) || 
                         isCornerPosition(newFood.x, newFood.y)) && attempts < maxAttempts);
            }
            
            if (attempts >= maxAttempts) {
                let found = null;
                for (let x = 0; x < GRID_SIZE && !found; x++) {
                    for (let y = 0; y < GRID_SIZE && !found; y++) {
                        if (!isSnakePosition(x, y) && !isObstaclePosition(x, y)) {
                            found = { x: x, y: y };
                        }
                    }
                }
                if (found) newFood = found;
            }
            
            food = newFood;
        }

        function updateDisplay() {
            scoreDisplay.textContent = score;
            currentLevelDisplay.textContent = currentLevel;
            
            if (aiMode) {
                timerDisplay.textContent = '∞';
            } else {
                const minutes = Math.floor(timeRemaining / 60);
                const seconds = timeRemaining % 60;
                timerDisplay.textContent = minutes + ':' + String(seconds).padStart(2, '0');
            }
        }

        function lerp(start, end, t) {
            return start + (end - start) * t;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            for (let oi = 0; oi < obstacles.length; oi++) {
                const obs = obstacles[oi];
                const gradient = ctx.createRadialGradient(
                    (obs.x + 0.5) * CELL_SIZE, (obs.y + 0.5) * CELL_SIZE, 0,
                    (obs.x + 0.5) * CELL_SIZE, (obs.y + 0.5) * CELL_SIZE, CELL_SIZE / 2
                );
                gradient.addColorStop(0, '#8b4513');
                gradient.addColorStop(1, '#5d2e0c');
                ctx.fillStyle = gradient;
                ctx.fillRect(obs.x * CELL_SIZE + 1, obs.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                
                ctx.strokeStyle = '#3d1e08';
                ctx.lineWidth = 2;
                ctx.strokeRect(obs.x * CELL_SIZE + 3, obs.y * CELL_SIZE + 3, CELL_SIZE - 6, CELL_SIZE - 6);
            }
            
            for (let index = 0; index < snake.length; index++) {
                const segment = snake[index];
                const prevSegment = previousSnake[index] || segment;
                
                const visualX = lerp(prevSegment.x, segment.x, interpolation);
                const visualY = lerp(prevSegment.y, segment.y, interpolation);
                
                const isHead = index === 0;
                const gradient = ctx.createRadialGradient(
                    (visualX + 0.5) * CELL_SIZE, (visualY + 0.5) * CELL_SIZE, 0,
                    (visualX + 0.5) * CELL_SIZE, (visualY + 0.5) * CELL_SIZE, CELL_SIZE / 2
                );
                
                if (isHead) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, 'rgba(0, 200, 100, ' + alpha + ')');
                    gradient.addColorStop(1, 'rgba(0, 150, 80, ' + alpha + ')');
                }
                
                ctx.fillStyle = gradient;
                drawRoundRect(
                    ctx,
                    visualX * CELL_SIZE + 2,
                    visualY * CELL_SIZE + 2,
                    CELL_SIZE - 4,
                    CELL_SIZE - 4,
                    5
                );
                ctx.fill();
                
                if (isHead) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = CELL_SIZE / 6;
                    let eye1X, eye1Y, eye2X, eye2Y;
                    
                    switch (direction) {
                        case 'up':
                            eye1X = visualX * CELL_SIZE + CELL_SIZE * 0.3;
                            eye1Y = visualY * CELL_SIZE + CELL_SIZE * 0.3;
                            eye2X = visualX * CELL_SIZE + CELL_SIZE * 0.7;
                            eye2Y = visualY * CELL_SIZE + CELL_SIZE * 0.3;
                            break;
                        case 'down':
                            eye1X = visualX * CELL_SIZE + CELL_SIZE * 0.3;
                            eye1Y = visualY * CELL_SIZE + CELL_SIZE * 0.7;
                            eye2X = visualX * CELL_SIZE + CELL_SIZE * 0.7;
                            eye2Y = visualY * CELL_SIZE + CELL_SIZE * 0.7;
                            break;
                        case 'left':
                            eye1X = visualX * CELL_SIZE + CELL_SIZE * 0.3;
                            eye1Y = visualY * CELL_SIZE + CELL_SIZE * 0.3;
                            eye2X = visualX * CELL_SIZE + CELL_SIZE * 0.3;
                            eye2Y = visualY * CELL_SIZE + CELL_SIZE * 0.7;
                            break;
                        case 'right':
                            eye1X = visualX * CELL_SIZE + CELL_SIZE * 0.7;
                            eye1Y = visualY * CELL_SIZE + CELL_SIZE * 0.3;
                            eye2X = visualX * CELL_SIZE + CELL_SIZE * 0.7;
                            eye2Y = visualY * CELL_SIZE + CELL_SIZE * 0.7;
                            break;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            if (food) {
                const pulseScale = 1 + Math.sin(Date.now() / 200) * 0.1;
                const foodGradient = ctx.createRadialGradient(
                    (food.x + 0.5) * CELL_SIZE, (food.y + 0.5) * CELL_SIZE, 0,
                    (food.x + 0.5) * CELL_SIZE, (food.y + 0.5) * CELL_SIZE, CELL_SIZE / 2 * pulseScale
                );
                foodGradient.addColorStop(0, '#ff6b6b');
                foodGradient.addColorStop(1, '#ee5a5a');
                
                ctx.fillStyle = foodGradient;
                ctx.beginPath();
                ctx.arc(
                    (food.x + 0.5) * CELL_SIZE,
                    (food.y + 0.5) * CELL_SIZE,
                    (CELL_SIZE / 2 - 3) * pulseScale,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(
                    (food.x + 0.45) * CELL_SIZE,
                    food.y * CELL_SIZE + 2,
                    CELL_SIZE * 0.1,
                    CELL_SIZE * 0.2
                );
                
                ctx.fillStyle = '#4caf50';
                if (ctx.ellipse) {
                    ctx.beginPath();
                    ctx.ellipse(
                        (food.x + 0.6) * CELL_SIZE,
                        food.y * CELL_SIZE + 5,
                        CELL_SIZE * 0.15,
                        CELL_SIZE * 0.08,
                        Math.PI / 4,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                } else {
                    // Fallback for browsers without ellipse
                    ctx.save();
                    ctx.translate((food.x + 0.6) * CELL_SIZE, food.y * CELL_SIZE + 5);
                    ctx.rotate(Math.PI / 4);
                    ctx.scale(CELL_SIZE * 0.15, CELL_SIZE * 0.08);
                    ctx.beginPath();
                    ctx.arc(0, 0, 1, 0, Math.PI * 2);
                    ctx.restore();
                    ctx.fill();
                }
            }
        }

        function getAIDirection() {
            const head = snake[0];
            const target = food;
            
            const moves = [
                { dir: 'up', x: head.x, y: head.y - 1 },
                { dir: 'down', x: head.x, y: head.y + 1 },
                { dir: 'left', x: head.x - 1, y: head.y },
                { dir: 'right', x: head.x + 1, y: head.y }
            ];
            
            const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
            const validMoves = [];
            for (let i = 0; i < moves.length; i++) {
                if (moves[i].dir !== opposites[direction]) {
                    validMoves.push(moves[i]);
                }
            }
            
            function isSafe(x, y) {
                if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return false;
                if (isSnakePosition(x, y)) return false;
                if (isObstaclePosition(x, y)) return false;
                return true;
            }
            
            function isSafeWithFutureSnake(x, y, futureSnake) {
                if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return false;
                for (let i = 0; i < futureSnake.length; i++) {
                    if (futureSnake[i].x === x && futureSnake[i].y === y) return false;
                }
                if (isObstaclePosition(x, y)) return false;
                return true;
            }
            
            function floodFill(startX, startY, customSnake) {
                const visited = {};
                const queue = [{ x: startX, y: startY }];
                let count = 0;
                
                const checkSafe = customSnake 
                    ? function(x, y) { return isSafeWithFutureSnake(x, y, customSnake); }
                    : function(x, y) { return isSafe(x, y); };
                
                while (queue.length > 0 && count < 200) {
                    const node = queue.shift();
                    const x = node.x;
                    const y = node.y;
                    const key = x + ',' + y;
                    
                    if (visited[key]) continue;
                    if (!checkSafe(x, y)) continue;
                    
                    visited[key] = true;
                    count++;
                    
                    queue.push({ x: x + 1, y: y });
                    queue.push({ x: x - 1, y: y });
                    queue.push({ x: x, y: y + 1 });
                    queue.push({ x: x, y: y - 1 });
                }
                
                return count;
            }
            
            function isEdgePosition(x, y) {
                return x === 0 || x === GRID_SIZE - 1 || y === 0 || y === GRID_SIZE - 1;
            }
            
            function isCornerFood(x, y) {
                return (x <= 1 || x >= GRID_SIZE - 2) && (y <= 1 || y >= GRID_SIZE - 2);
            }
            
            function findPath(startX, startY, endX, endY, maxSteps) {
                if (typeof maxSteps === 'undefined') maxSteps = 100;
                const openSet = [{ x: startX, y: startY, g: 0, h: 0, f: 0, path: [] }];
                const closedSet = {};
                
                while (openSet.length > 0 && openSet[0].g < maxSteps) {
                    openSet.sort(function(a, b) { return a.f - b.f; });
                    const current = openSet.shift();
                    
                    if (current.x === endX && current.y === endY) {
                        return current.path;
                    }
                    
                    const key = current.x + ',' + current.y;
                    if (closedSet[key]) continue;
                    closedSet[key] = true;
                    
                    const neighbors = [
                        { x: current.x, y: current.y - 1, dir: 'up' },
                        { x: current.x, y: current.y + 1, dir: 'down' },
                        { x: current.x - 1, y: current.y, dir: 'left' },
                        { x: current.x + 1, y: current.y, dir: 'right' }
                    ];
                    
                    for (let ni = 0; ni < neighbors.length; ni++) {
                        const neighbor = neighbors[ni];
                        const nKey = neighbor.x + ',' + neighbor.y;
                        if (closedSet[nKey]) continue;
                        
                        if (!isSafe(neighbor.x, neighbor.y)) continue;
                        
                        const g = current.g + 1;
                        const h = Math.abs(neighbor.x - endX) + Math.abs(neighbor.y - endY);
                        const f = g + h;
                        
                        let existingIndex = -1;
                        for (let ei = 0; ei < openSet.length; ei++) {
                            if (openSet[ei].x === neighbor.x && openSet[ei].y === neighbor.y) {
                                existingIndex = ei;
                                break;
                            }
                        }
                        if (existingIndex === -1 || openSet[existingIndex].g > g) {
                            if (existingIndex !== -1) {
                                openSet.splice(existingIndex, 1);
                            }
                            const newPath = current.path.slice();
                            newPath.push(neighbor.dir);
                            openSet.push({
                                x: neighbor.x,
                                y: neighbor.y,
                                g: g,
                                h: h,
                                f: f,
                                path: newPath
                            });
                        }
                    }
                }
                
                return null;
            }
            
            const pathToFood = findPath(head.x, head.y, target.x, target.y);
            
            const scoredMoves = [];
            for (let mi = 0; mi < validMoves.length; mi++) {
                const move = validMoves[mi];
                if (!isSafe(move.x, move.y)) {
                    scoredMoves.push({
                        dir: move.dir, x: move.x, y: move.y,
                        score: -10000, reachable: 0
                    });
                    continue;
                }
                
                const futureSnake = [{ x: move.x, y: move.y }];
                for (let s = 0; s < snake.length - 1; s++) {
                    futureSnake.push(snake[s]);
                }
                const willEatFood = move.x === target.x && move.y === target.y;
                if (willEatFood) {
                    futureSnake.push(snake[snake.length - 1]);
                }
                
                const dist = Math.abs(move.x - target.x) + Math.abs(move.y - target.y);
                const reachableSpaces = floodFill(move.x, move.y, futureSnake);
                
                const survivalScore = reachableSpaces * 8;
                const foodScore = (GRID_SIZE * 2 - dist) * 3;
                
                let pathBonus = 0;
                if (pathToFood && pathToFood.length > 0 && pathToFood[0] === move.dir) {
                    pathBonus = 500;
                }
                
                let safeNeighbors = 0;
                const neighbors = [
                    { x: move.x + 1, y: move.y },
                    { x: move.x - 1, y: move.y },
                    { x: move.x, y: move.y + 1 },
                    { x: move.x, y: move.y - 1 }
                ];
                for (let nn = 0; nn < neighbors.length; nn++) {
                    if (isSafeWithFutureSnake(neighbors[nn].x, neighbors[nn].y, futureSnake)) {
                        safeNeighbors++;
                    }
                }
                const escapeScore = safeNeighbors * 15;
                
                let directFoodBonus = 0;
                if (willEatFood) {
                    directFoodBonus = 2000;
                    
                    if (isCornerFood(target.x, target.y) || isEdgePosition(target.x, target.y)) {
                        const escapeSpaces = floodFill(move.x, move.y, futureSnake);
                        if (escapeSpaces >= futureSnake.length + 2) {
                            directFoodBonus += 500;
                        }
                    }
                }
                
                let cornerPenalty = 0;
                if (isCornerFood(target.x, target.y)) {
                    if (reachableSpaces < snake.length + 3) {
                        cornerPenalty = -300;
                    }
                }
                
                let edgePenalty = 0;
                if (isEdgePosition(move.x, move.y) && !isEdgePosition(target.x, target.y)) {
                    edgePenalty = -20;
                }
                
                let centerBonus = 0;
                if (dist > 5) {
                    const centerDist = Math.abs(move.x - GRID_SIZE/2) + Math.abs(move.y - GRID_SIZE/2);
                    centerBonus = (GRID_SIZE - centerDist) * 2;
                }
                
                scoredMoves.push({
                    dir: move.dir, x: move.x, y: move.y,
                    score: foodScore + survivalScore + escapeScore + directFoodBonus + pathBonus + cornerPenalty + edgePenalty + centerBonus,
                    reachable: reachableSpaces
                });
            }
            
            const safeMoves = [];
            const okMoves = [];
            const anyMoves = [];
            for (let si = 0; si < scoredMoves.length; si++) {
                const m = scoredMoves[si];
                if (m.reachable >= snake.length + 2) safeMoves.push(m);
                if (m.reachable >= snake.length) okMoves.push(m);
                if (m.score > -10000) anyMoves.push(m);
            }
            
            let movesToConsider = safeMoves.length > 0 ? safeMoves : 
                                  okMoves.length > 0 ? okMoves : anyMoves;
            
            if (movesToConsider.length === 0) {
                let anyValid = null;
                for (let av = 0; av < scoredMoves.length; av++) {
                    if (scoredMoves[av].score > -10000) {
                        anyValid = scoredMoves[av];
                        break;
                    }
                }
                return anyValid ? anyValid.dir : direction;
            }
            
            movesToConsider.sort(function(a, b) { return b.score - a.score; });
            
            return movesToConsider[0].dir;
        }

        function moveSnake() {
            if (aiMode) {
                nextDirection = getAIDirection();
            }
            
            direction = nextDirection;
            
            previousSnake = JSON.parse(JSON.stringify(snake));
            
            const head = cloneObj(snake[0]);
            
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver(false);
                return;
            }
            
            if (isSnakePosition(head.x, head.y)) {
                gameOver(false);
                return;
            }
            
            if (isObstaclePosition(head.x, head.y)) {
                gameOver(false);
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score++;
                previousSnake.push(cloneObj(previousSnake[previousSnake.length - 1]));
                updateDisplay();
                
                if (score >= LEVELS[currentLevel - 1].targetScore) {
                    levelComplete();
                    return;
                }
                
                spawnFood();
            } else {
                snake.pop();
            }
            
            interpolation = 0;
        }

        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffd700'];
            for (let i = 0; i < 100; i++) {
                (function(idx) {
                    setTimeout(function() {
                        const confetti = document.createElement('div');
                        confetti.className = 'confetti';
                        confetti.style.left = Math.random() * 100 + 'vw';
                        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                        confetti.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
                        document.body.appendChild(confetti);
                        
                        setTimeout(function() {
                            if (confetti.parentNode) confetti.parentNode.removeChild(confetti);
                        }, 4000);
                    }, idx * 50);
                })(i);
            }
        }

        function createFireworks() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#ffd700'];
            for (let i = 0; i < 20; i++) {
                (function(idx) {
                    setTimeout(function() {
                        const firework = document.createElement('div');
                        firework.className = 'firework';
                        firework.style.left = (Math.random() * 80 + 10) + 'vw';
                        firework.style.top = (Math.random() * 60 + 10) + 'vh';
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        firework.style.backgroundColor = color;
                        firework.style.boxShadow = '0 0 20px ' + color;
                        document.body.appendChild(firework);
                        
                        setTimeout(function() {
                            if (firework.parentNode) firework.parentNode.removeChild(firework);
                        }, 1000);
                    }, idx * 300);
                })(i);
            }
        }

        function showVictoryScreen() {
            createConfetti();
            createFireworks();
            
            document.getElementById('totalScore').textContent = totalGameScore;
            const mins = Math.floor(totalGameTime / 60);
            const secs = totalGameTime % 60;
            document.getElementById('totalTime').textContent = mins + ':' + String(secs).padStart(2, '0');
            
            victoryModal.classList.add('show');
            
            const celebrationInterval = setInterval(function() {
                createConfetti();
                createFireworks();
            }, 3000);
            
            playAgainBtn.onclick = function() {
                clearInterval(celebrationInterval);
                victoryModal.classList.remove('show');
                currentLevel = 1;
                levelSelect.value = currentLevel;
                totalGameScore = 0;
                totalGameTime = 0;
                saveState();
                initGame();
            };
        }

        function levelComplete() {
            stopGame();
            
            const levelTime = LEVELS[currentLevel - 1].timeLimit - timeRemaining;
            totalGameScore += score;
            totalGameTime += levelTime;
            
            if (!aiMode) {
                const scoreEntry = {
                    level: currentLevel,
                    score: score,
                    time: levelTime,
                    timestamp: Date.now()
                };
                highScores.push(scoreEntry);
                highScores.sort(function(a, b) { return (b.score - a.score) || (a.time - b.time); });
                highScores = highScores.slice(0, 20);
                saveState();
                updateHighScoresDisplay();
            }
            
            if (currentLevel >= 20) {
                if (!aiMode) {
                    showVictoryScreen();
                } else {
                    messageOverlay.className = 'message-overlay success';
                    messageTitle.textContent = '🤖 AI Completed All Levels!';
                    messageText.innerHTML = 'Restarting from Level 1...';
                    countdownDisplay.textContent = '';
                    messageBtn.style.display = 'none';
                    messageOverlay.style.display = 'block';
                    
                    setTimeout(function() {
                        messageOverlay.style.display = 'none';
                        currentLevel = 1;
                        levelSelect.value = currentLevel;
                        totalGameScore = 0;
                        totalGameTime = 0;
                        initGame();
                        startGame();
                    }, 2000);
                }
                return;
            }
            
            messageOverlay.className = 'message-overlay success';
            messageTitle.textContent = '🎉 Level Complete!';
            messageText.innerHTML = 'Score: ' + score + '<br>Time: ' + (aiMode ? 'N/A' : levelTime + 's');
            
            let countdown = 3;
            countdownDisplay.textContent = 'Next level in ' + countdown + '...';
            messageBtn.textContent = 'Continue Now';
            messageBtn.style.display = 'block';
            
            const proceedToNextLevel = function() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                if (autoNextTimeout) {
                    clearTimeout(autoNextTimeout);
                    autoNextTimeout = null;
                }
                messageOverlay.style.display = 'none';
                currentLevel++;
                levelSelect.value = currentLevel;
                saveState();
                initGame();
                startGame();
            };
            
            countdownInterval = setInterval(function() {
                countdown--;
                if (countdown > 0) {
                    countdownDisplay.textContent = 'Next level in ' + countdown + '...';
                } else {
                    countdownDisplay.textContent = 'Starting...';
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    proceedToNextLevel();
                }
            }, 1000);
            
            messageBtn.onclick = proceedToNextLevel;
            
            messageOverlay.style.display = 'block';
        }

        function gameOver(timeout) {
            if (typeof timeout === 'undefined') timeout = false;
            stopGame();
            
            messageOverlay.className = 'message-overlay failure';
            messageTitle.textContent = timeout ? '⏰ Time\'s Up!' : '💀 Game Over!';
            messageText.innerHTML = 'Score: ' + score + '/' + LEVELS[currentLevel - 1].targetScore;
            countdownDisplay.textContent = '';
            messageBtn.textContent = 'Try Again';
            messageBtn.style.display = 'block';
            messageBtn.onclick = function() {
                messageOverlay.style.display = 'none';
                initGame();
                startGame();
            };
            
            messageOverlay.style.display = 'block';
            
            const state = {
                highScores: highScores,
                lastLevel: currentLevel,
                gameState: null
            };
            localStorage.setItem('snakeGameState', JSON.stringify(state));
        }

        function gameLoopFunc(currentTime) {
            if (!isPlaying) {
                return;
            }
            
            if (!lastTime) lastTime = currentTime;
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            if (!isPaused) {
                accumulator += deltaTime;
                
                const level = LEVELS[currentLevel - 1];
                const frameTime = level.speed;
                
                interpolation = Math.min(accumulator / frameTime, 1);
                
                while (accumulator >= frameTime) {
                    moveSnake();
                    accumulator -= frameTime;
                    
                    if (!isPlaying) return;
                }
                
                interpolation = accumulator / frameTime;
            }
            
            draw();
            
            if (isPlaying) {
                animationId = requestAnimationFrame(gameLoopFunc);
            }
        }

        function startGame() {
            if (isPlaying && !isPaused) return;
            
            if (isPaused) {
                resumeGame();
                return;
            }
            
            isPlaying = true;
            isPaused = false;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            pauseBtn.textContent = 'Pause';
            levelSelect.disabled = true;
            pauseOverlay.classList.remove('show');
            
            lastTime = 0;
            accumulator = 0;
            interpolation = 0;
            previousSnake = JSON.parse(JSON.stringify(snake));
            
            animationId = requestAnimationFrame(gameLoopFunc);
            
            if (!aiMode) {
                timerInterval = setInterval(function() {
                    if (!isPaused) {
                        timeRemaining--;
                        updateDisplay();
                        
                        if (timeRemaining <= 0) {
                            gameOver(true);
                        }
                    }
                }, 1000);
            }
            
            startAutoSave();
            updateLevelInfo();
        }

        function resumeGame() {
            if (!isPlaying || !isPaused) return;
            
            isPaused = false;
            pauseBtn.textContent = 'Pause';
            pauseOverlay.classList.remove('show');
            lastTime = 0;
            
            if (!animationId) {
                animationId = requestAnimationFrame(gameLoopFunc);
            }
            
            if (!aiMode && !timerInterval) {
                timerInterval = setInterval(function() {
                    if (!isPaused) {
                        timeRemaining--;
                        updateDisplay();
                        
                        if (timeRemaining <= 0) {
                            gameOver(true);
                        }
                    }
                }, 1000);
            }
            
            startAutoSave();
        }

        function stopGame() {
            isPlaying = false;
            isPaused = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = 'Pause';
            levelSelect.disabled = false;
            pauseOverlay.classList.remove('show');
            
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            if (autoNextTimeout) {
                clearTimeout(autoNextTimeout);
                autoNextTimeout = null;
            }
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            if (autoSaveInterval) {
                clearInterval(autoSaveInterval);
                autoSaveInterval = null;
            }
        }

        function pauseGame() {
            if (!isPlaying) return;
            
            if (isPaused) {
                resumeGame();
            } else {
                isPaused = true;
                pauseBtn.textContent = 'Resume';
                pauseOverlay.classList.add('show');
                saveFullState();
            }
        }

        function updateHighScoresDisplay() {
            if (highScores.length === 0) {
                scoresList.innerHTML = '<p style="text-align: center; color: #aaa;">No scores yet</p>';
                return;
            }
            
            const htmlParts = [];
            for (let i = 0; i < highScores.length; i++) {
                const entry = highScores[i];
                const dateStr = entry.timestamp 
                    ? formatDate(entry.timestamp) 
                    : (entry.date ? formatDate(entry.date) : '');
                htmlParts.push(
                    '<div class="score-item">' +
                        '<div class="score-item-row">' +
                            '<span class="score-item-rank">#' + (i + 1) + ' L' + entry.level + '</span>' +
                            '<span class="score-item-stats">' + entry.score + 'pts · ' + entry.time + 's</span>' +
                        '</div>' +
                        (dateStr ? '<div class="score-item-date">' + dateStr + '</div>' : '') +
                    '</div>'
                );
            }
            scoresList.innerHTML = htmlParts.join('');
        }

        setInterval(function() {
            if (highScores.length > 0) {
                updateHighScoresDisplay();
            }
        }, 60000);

        startBtn.addEventListener('click', function() {
            if (!isPlaying) {
                initGame();
                startGame();
            }
        });

        pauseBtn.addEventListener('click', pauseGame);

        levelSelect.addEventListener('change', function(e) {
            currentLevel = parseInt(e.target.value);
            saveState();
            initGame();
        });

        aiModeCheckbox.addEventListener('change', function(e) {
            aiMode = e.target.checked;
            aiIndicator.classList.toggle('active', aiMode);
            updateLevelInfo();
            updateDisplay();
            
            if (isPlaying) {
                if (aiMode && timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                } else if (!aiMode && !timerInterval && !isPaused) {
                    timerInterval = setInterval(function() {
                        if (!isPaused) {
                            timeRemaining--;
                            updateDisplay();
                            
                            if (timeRemaining <= 0) {
                                gameOver(true);
                            }
                        }
                    }, 1000);
                }
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.keyCode === 13) {
                if (messageOverlay.style.display === 'block' && messageBtn.style.display !== 'none') {
                    e.preventDefault();
                    messageBtn.click();
                    return;
                }
                
                if (victoryModal.classList.contains('show')) {
                    e.preventDefault();
                    playAgainBtn.click();
                    return;
                }
                
                if (!isPlaying) {
                    e.preventDefault();
                    initGame();
                    startGame();
                    return;
                }
                
                if (isPlaying && isPaused) {
                    e.preventDefault();
                    resumeGame();
                    return;
                }
            }
            
            const key = e.key || '';
            const keyCode = e.keyCode;
            
            if (!isPlaying) {
                if (key === ' ' || keyCode === 32) {
                    e.preventDefault();
                    initGame();
                    startGame();
                }
                return;
            }
            
            if (key === ' ' || keyCode === 32) {
                e.preventDefault();
                pauseGame();
                return;
            }
            
            if (isPaused || aiMode) return;
            
            // Up: ArrowUp(38), W(87)
            if (key === 'ArrowUp' || key === 'w' || key === 'W' || keyCode === 38 || keyCode === 87) {
                if (direction !== 'down') nextDirection = 'up';
                e.preventDefault();
            }
            // Down: ArrowDown(40), S(83)
            else if (key === 'ArrowDown' || key === 's' || key === 'S' || keyCode === 40 || keyCode === 83) {
                if (direction !== 'up') nextDirection = 'down';
                e.preventDefault();
            }
            // Left: ArrowLeft(37), A(65)
            else if (key === 'ArrowLeft' || key === 'a' || key === 'A' || keyCode === 37 || keyCode === 65) {
                if (direction !== 'right') nextDirection = 'left';
                e.preventDefault();
            }
            // Right: ArrowRight(39), D(68)
            else if (key === 'ArrowRight' || key === 'd' || key === 'D' || keyCode === 39 || keyCode === 68) {
                if (direction !== 'left') nextDirection = 'right';
                e.preventDefault();
            }
        });

        const vkButtons = document.querySelectorAll('.vk-btn');
        for (let vi = 0; vi < vkButtons.length; vi++) {
            (function(btn) {
                const handleInput = function() {
                    if (!isPlaying || isPaused || aiMode) return;
                    
                    const dir = btn.getAttribute('data-dir');
                    const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
                    
                    if (direction !== opposites[dir]) {
                        nextDirection = dir;
                    }
                };
                
                btn.addEventListener('click', handleInput);
                btn.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    handleInput();
                });
            })(vkButtons[vi]);
        }

        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', function(e) {
            if (!isPlaying || isPaused || aiMode) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && direction !== 'left') nextDirection = 'right';
                else if (dx < -30 && direction !== 'right') nextDirection = 'left';
            } else {
                if (dy > 30 && direction !== 'up') nextDirection = 'down';
                else if (dy < -30 && direction !== 'down') nextDirection = 'up';
            }
        });

        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isPlaying && !isPaused) {
                isPaused = true;
                pauseBtn.textContent = 'Resume';
                pauseOverlay.classList.add('show');
            }
            saveFullState();
        });

        window.addEventListener('beforeunload', function() {
            saveFullState();
        });

        loadState();
        if (!restoredFromSave) {
            initGame();
        }
    </script>
</body>
</html>
