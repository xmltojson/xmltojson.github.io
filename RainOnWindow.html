<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="Релаксаційний інтерактивний симулятор дощу на склі з реалістичними краплями та амбієнтним звуком. Налаштовуйте інтенсивність, швидкість та розмір крапель.">
<meta name="keywords" content="дощ, rain, relax, ambient, краплі, медитація, sleep, focus, дощ на склі">
<meta name="author" content="Rain on Window">
<meta name="theme-color" content="#0a0e1a">
<meta property="og:title" content="Дощ на склі — Rain on Window">
<meta property="og:description" content="Реалістичний симулятор дощу на склі з амбієнтним звуком для релаксації та концентрації">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='g' cx='35%25' cy='30%25'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='40%25' stop-color='%23a8c5e8'/%3E%3Cstop offset='100%25' stop-color='%231a3556'/%3E%3C/radialGradient%3E%3CradialGradient id='b' cx='50%25' cy='50%25'%3E%3Cstop offset='0%25' stop-color='%231a2940'/%3E%3Cstop offset='100%25' stop-color='%23050810'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23b)'/%3E%3Cpath d='M50 15 C 35 35, 25 50, 25 65 A 25 25 0 0 0 75 65 C 75 50, 65 35, 50 15 Z' fill='url(%23g)' stroke='%23ffffff' stroke-opacity='0.3' stroke-width='1'/%3E%3Ccircle cx='40' cy='45' r='4' fill='%23ffffff' fill-opacity='0.6'/%3E%3C/svg%3E">
<title>Дощ на склі — Rain on Window</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0e1a;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  
  #scene {
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 30% 20%, rgba(80, 100, 140, 0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(40, 60, 90, 0.5) 0%, transparent 60%),
      linear-gradient(180deg, #1a2332 0%, #0a1220 50%, #050810 100%);
    overflow: hidden;
  }
  
  #scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,200,0.4), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,200,150,0.3), transparent),
      radial-gradient(1.5px 1.5px at 80% 20%, rgba(200,220,255,0.4), transparent),
      radial-gradient(1px 1px at 40% 90%, rgba(255,255,255,0.2), transparent),
      radial-gradient(2px 2px at 90% 50%, rgba(255,180,100,0.5), transparent);
    filter: blur(2px);
    opacity: 0.6;
    animation: cityFlicker 8s ease-in-out infinite;
  }
  
  @keyframes cityFlicker {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 0.4; }
  }
  
  #rainCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
  }
  
  #fogOverlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(20, 30, 50, 0.4) 100%);
    pointer-events: none;
    z-index: 3;
  }
  
  #controls {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: rgba(15, 25, 40, 0.78);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 18px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    color: #d8e0f0;
    min-width: 260px;
    transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.3s ease;
  }
  
  #controls.hidden {
    transform: translateX(calc(100% + 30px));
    opacity: 0;
    pointer-events: none;
  }
  
  #controls h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.8px;
    color: #9bb0d4;
    text-transform: uppercase;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  
  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
  }
  
  .control-row label {
    flex: 1;
    color: #b8c4dc;
  }
  
  input[type="range"] {
    width: 130px;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
  }
  
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    background: #6a9eff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(106, 158, 255, 0.6);
  }
  
  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: #6a9eff;
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  
  button {
    background: rgba(255,255,255,0.08);
    color: #d8e0f0;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  
  button:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.25);
  }
  
  .lang-toggle {
    display: flex;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  
  .lang-toggle button {
    flex: 1;
    background: transparent;
    border: none;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #8a9cbb;
    border-radius: 6px;
    transition: all 0.2s;
  }
  
  .lang-toggle button.active {
    background: #4a7eff;
    color: white;
    box-shadow: 0 2px 6px rgba(74,126,255,0.3);
  }
  
  .btn-row {
    display: flex;
    gap: 8px;
  }
  
  .btn-row button { flex: 1; }
  
  .btn-primary {
    background: linear-gradient(135deg, #4a7eff, #6a9eff) !important;
    border: none !important;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(74, 126, 255, 0.3);
  }
  
  .btn-primary:hover {
    background: linear-gradient(135deg, #5a8eff, #7aaeff) !important;
  }
  
  .fab {
    position: fixed;
    z-index: 11;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(15, 25, 40, 0.78);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    color: #d8e0f0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  
  .fab:hover { 
    background: rgba(30, 45, 70, 0.85); 
    transform: scale(1.05);
  }
  
  #toggleBtn { top: 20px; right: 20px; }
  #fullscreenBtn { top: 20px; right: 74px; }
  
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: rgba(216, 224, 240, 0.55);
    font-size: 11px;
    z-index: 5;
    letter-spacing: 0.5px;
    background: rgba(15,25,40,0.5);
    padding: 6px 12px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
  }
  
  .switch {
    position: relative;
    width: 40px;
    height: 22px;
    background: rgba(255,255,255,0.15);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.3s;
  }
  
  .switch.on { background: #4a7eff; }
  
  .switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    background: white;
    border-radius: 50%;
    transition: transform 0.3s;
  }
  
  .switch.on::after { transform: translateX(18px); }
  
  @media (max-width: 600px) {
    #controls { 
      top: 10px; 
      right: 10px;
      left: 10px;
      min-width: 0;
      padding: 14px;
    }
    #toggleBtn { top: 10px; right: 10px; }
    #fullscreenBtn { top: 10px; right: 64px; }
    .control-row { font-size: 12px; }
    input[type="range"] { width: 110px; }
    #info { font-size: 10px; bottom: 10px; left: 10px; }
  }
</style>
</head>
<body>

<div id="scene">
  <canvas id="rainCanvas"></canvas>
  <div id="fogOverlay"></div>
</div>

<button class="fab" id="fullscreenBtn" title="Повний екран">⛶</button>
<button class="fab" id="toggleBtn" title="Налаштування">⚙</button>

<div id="controls" class="hidden">
  <h2 data-i18n="title">Дощ на склі</h2>
  
  <div class="control-row">
    <label data-i18n="intensity">Інтенсивність</label>
    <input type="range" id="intensity" min="0" max="100" value="50">
  </div>
  
  <div class="control-row">
    <label data-i18n="dropSize">Розмір крапель</label>
    <input type="range" id="dropSize" min="1" max="10" value="5">
  </div>
  
  <div class="control-row">
    <label data-i18n="speed">Швидкість</label>
    <input type="range" id="speed" min="1" max="10" value="5">
  </div>
  
  <div class="control-row">
    <label data-i18n="sound">Звук</label>
    <div class="switch" id="soundSwitch"></div>
  </div>
  
  <div class="control-row">
    <label data-i18n="volume">Гучність</label>
    <input type="range" id="volume" min="0" max="100" value="40">
  </div>
  
  <div class="control-row">
    <label data-i18n="language">Мова</label>
    <div class="lang-toggle">
      <button data-lang="uk">UA</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
  
  <div class="btn-row">
    <button id="resetBtn" data-i18n="reset">Скинути</button>
    <button class="btn-primary" id="hideBtn" data-i18n="hide">Сховати</button>
  </div>
</div>

<div id="info" data-i18n="info">Натисніть будь-де, щоб увімкнути звук</div>

<script>
// ============== TRANSLATIONS ==============
const i18n = {
  uk: {
    title: 'Дощ на склі',
    intensity: 'Інтенсивність',
    dropSize: 'Розмір крапель',
    speed: 'Швидкість',
    sound: 'Звук',
    volume: 'Гучність',
    language: 'Мова',
    hide: 'Сховати',
    reset: 'Скинути',
    info: 'Натисніть будь-де, щоб увімкнути звук'
  },
  en: {
    title: 'Rain on Window',
    intensity: 'Intensity',
    dropSize: 'Drop Size',
    speed: 'Speed',
    sound: 'Sound',
    volume: 'Volume',
    language: 'Language',
    hide: 'Hide',
    reset: 'Reset',
    info: 'Click anywhere to enable sound'
  }
};

// ============== STATE ==============
const defaultState = {
  intensity: 50,
  dropSize: 5,
  speed: 5,
  sound: true,
  volume: 40,
  language: 'uk'
};

let state = { ...defaultState, ...JSON.parse(localStorage.getItem('rainState') || '{}') };

function saveState() {
  localStorage.setItem('rainState', JSON.stringify(state));
}

// ============== I18N ==============
function applyLanguage() {
  document.documentElement.lang = state.language;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[state.language][key]) el.textContent = i18n[state.language][key];
  });
  document.title = state.language === 'uk' ? 'Дощ на склі — Rain on Window' : 'Rain on Window — Дощ на склі';
  document.querySelectorAll('.lang-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === state.language);
  });
  document.getElementById('toggleBtn').title = state.language === 'uk' ? 'Налаштування' : 'Settings';
  document.getElementById('fullscreenBtn').title = state.language === 'uk' ? 'Повний екран' : 'Fullscreen';
}

// ============== RAIN ENGINE ==============
const canvas = document.getElementById('rainCanvas');
const ctx = canvas.getContext('2d');
let drops = [];

function resize() {
  canvas.width = window.innerWidth * window.devicePixelRatio;
  canvas.height = window.innerHeight * window.devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

class Drop {
  constructor() { this.reset(true); }
  
  reset(initial = false) {
    this.x = Math.random() * window.innerWidth;
    this.y = initial ? Math.random() * window.innerHeight : -20;
    this.r = (state.dropSize * 0.5) + Math.random() * (state.dropSize * 1.2);
    this.vy = 0;
    this.vx = 0;
    this.stuck = Math.random() < 0.4;
    this.stuckTimer = Math.random() * 200;
    this.trail = [];
    this.mass = this.r * this.r;
  }
  
  update() {
    const speedFactor = state.speed * 0.3;
    
    if (this.stuck && this.stuckTimer > 0) {
      this.stuckTimer--;
      if (Math.random() < 0.02) this.stuckTimer = 0;
      return;
    }
    
    const gravity = 0.05 * speedFactor * (this.mass / 25);
    this.vy += gravity;
    this.vy = Math.min(this.vy, this.r * 0.8 + 2);
    
    this.vx += (Math.random() - 0.5) * 0.05;
    this.vx *= 0.9;
    
    this.y += this.vy;
    this.x += this.vx;
    
    if (this.vy > 0.5 && Math.random() < 0.4) {
      this.trail.push({ 
        x: this.x + (Math.random()-0.5)*this.r*0.5, 
        y: this.y, 
        r: this.r * (0.3 + Math.random()*0.3), 
        life: 1 
      });
      if (this.trail.length > 50) this.trail.shift();
    }
    
    if (Math.random() < 0.005 && this.vy > 1) {
      this.stuck = true;
      this.stuckTimer = 30 + Math.random() * 100;
      this.vy = 0;
    }
    
    if (this.y > window.innerHeight + 20) this.reset();
    
    this.trail.forEach(t => t.life -= 0.003);
    this.trail = this.trail.filter(t => t.life > 0);
  }
  
  draw() {
    this.trail.forEach(t => {
      const grd = ctx.createRadialGradient(t.x - t.r*0.3, t.y - t.r*0.3, 0, t.x, t.y, t.r);
      grd.addColorStop(0, `rgba(220, 230, 250, ${0.5 * t.life})`);
      grd.addColorStop(0.5, `rgba(150, 170, 200, ${0.3 * t.life})`);
      grd.addColorStop(1, `rgba(50, 70, 100, ${0.1 * t.life})`);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
      ctx.fill();
    });
    
    const grd = ctx.createRadialGradient(
      this.x - this.r * 0.4, this.y - this.r * 0.4, 0,
      this.x, this.y, this.r
    );
    grd.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
    grd.addColorStop(0.3, 'rgba(200, 220, 240, 0.6)');
    grd.addColorStop(0.7, 'rgba(100, 130, 170, 0.4)');
    grd.addColorStop(1, 'rgba(30, 50, 80, 0.2)');
    
    ctx.fillStyle = grd;
    ctx.beginPath();
    
    if (this.vy > 1 && !this.stuck) {
      const stretch = 1 + this.vy * 0.15;
      ctx.ellipse(this.x, this.y, this.r * 0.9, this.r * stretch, 0, 0, Math.PI * 2);
    } else {
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    }
    ctx.fill();
    
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.beginPath();
    ctx.arc(this.x - this.r * 0.35, this.y - this.r * 0.35, this.r * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }
}

function setupDrops() {
  const count = Math.floor(20 + state.intensity * 1.5);
  drops = [];
  for (let i = 0; i < count; i++) drops.push(new Drop());
}

function animate() {
  ctx.fillStyle = 'rgba(10, 18, 32, 0.05)';
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
  
  drops.forEach(d => { d.update(); d.draw(); });
  
  // Trigger droplet sounds based on intensity
  if (isAudioInit && state.sound) {
    triggerDropletSounds();
  }
  
  requestAnimationFrame(animate);
}

// ============== AUDIO ==============
let audioCtx, masterGain, rainNode, rainGain, lpFilter, hpFilter;
let isAudioInit = false;
let dropletGain;

function initAudio() {
  if (isAudioInit) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  // Master volume
  masterGain = audioCtx.createGain();
  masterGain.gain.value = state.sound ? state.volume / 100 : 0;
  masterGain.connect(audioCtx.destination);
  
  // === BACKGROUND RAIN NOISE ===
  const bufferSize = audioCtx.sampleRate * 4;
  const buffer = audioCtx.createBuffer(2, bufferSize, audioCtx.sampleRate);
  
  for (let ch = 0; ch < 2; ch++) {
    const data = buffer.getChannelData(ch);
    let lastOut = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      lastOut = (lastOut + 0.02 * white) / 1.02;
      data[i] = lastOut * 3.5;
    }
  }
  
  rainNode = audioCtx.createBufferSource();
  rainNode.buffer = buffer;
  rainNode.loop = true;
  
  // Filters - they will be modulated by intensity
  hpFilter = audioCtx.createBiquadFilter();
  hpFilter.type = 'highpass';
  hpFilter.frequency.value = 400;
  
  lpFilter = audioCtx.createBiquadFilter();
  lpFilter.type = 'lowpass';
  lpFilter.frequency.value = 4500;
  
  rainGain = audioCtx.createGain();
  rainGain.gain.value = 0.5;
  
  rainNode.connect(hpFilter);
  hpFilter.connect(lpFilter);
  lpFilter.connect(rainGain);
  rainGain.connect(masterGain);
  rainNode.start();
  
  // Droplet impacts gain channel
  dropletGain = audioCtx.createGain();
  dropletGain.gain.value = 1;
  dropletGain.connect(masterGain);
  
  isAudioInit = true;
  document.getElementById('info').style.display = 'none';
  
  // Apply intensity-based settings
  updateRainSound();
}

// Generates a single droplet "tap" sound
function playDroplet() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  
  // Short noise burst with band-pass filter for "plop" sound
  const bufferSize = audioCtx.sampleRate * 0.1;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }
  
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 800 + Math.random() * 2000;
  bp.Q.value = 3 + Math.random() * 5;
  
  const g = audioCtx.createGain();
  const peakVol = 0.08 + Math.random() * 0.12;
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(peakVol, now + 0.001);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.05 + Math.random() * 0.05);
  
  src.connect(bp);
  bp.connect(g);
  g.connect(dropletGain);
  src.start(now);
  src.stop(now + 0.15);
}

// Triggers droplet impacts based on intensity
let lastDropletTime = 0;
function triggerDropletSounds() {
  const now = performance.now();
  // Probability per frame - heavily based on intensity
  const intensityRatio = state.intensity / 100;
  // From sparse drops at low intensity to torrential downpour
  const dropsPerSecond = 1 + intensityRatio * intensityRatio * 60;
  const interval = 1000 / dropsPerSecond;
  
  if (now - lastDropletTime > interval * (0.5 + Math.random())) {
    lastDropletTime = now;
    playDroplet();
    // At high intensity, sometimes play multiple drops
    if (intensityRatio > 0.5 && Math.random() < intensityRatio) {
      setTimeout(playDroplet, Math.random() * 80);
    }
    if (intensityRatio > 0.8 && Math.random() < 0.5) {
      setTimeout(playDroplet, Math.random() * 120);
    }
  }
}

// Update rain sound character based on intensity
function updateRainSound() {
  if (!isAudioInit) return;
  const t = audioCtx.currentTime;
  const intensityRatio = state.intensity / 100;
  
  // Background rain volume (more = louder)
  // From 0.1 (drizzle) to 1.0 (downpour)
  const targetRainGain = 0.05 + intensityRatio * 0.95;
  rainGain.gain.linearRampToValueAtTime(targetRainGain, t + 0.5);
  
  // Low-pass filter: low intensity = muffled, high intensity = bright
  // From 1500 Hz (soft drizzle) to 7000 Hz (heavy rain)
  const targetLp = 1500 + intensityRatio * 5500;
  lpFilter.frequency.linearRampToValueAtTime(targetLp, t + 0.5);
  
  // High-pass: low intensity has less low-end rumble
  const targetHp = 600 - intensityRatio * 300; // 600 -> 300
  hpFilter.frequency.linearRampToValueAtTime(targetHp, t + 0.5);
  
  // Droplet impacts volume
  const targetDropletGain = 0.3 + intensityRatio * 0.7;
  dropletGain.gain.linearRampToValueAtTime(targetDropletGain, t + 0.5);
}

function updateVolume() {
  if (!masterGain) return;
  const target = state.sound ? state.volume / 100 : 0;
  masterGain.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 0.3);
}

// ============== UI ==============
const intensitySlider = document.getElementById('intensity');
const dropSizeSlider = document.getElementById('dropSize');
const speedSlider = document.getElementById('speed');
const volumeSlider = document.getElementById('volume');
const soundSwitch = document.getElementById('soundSwitch');
const hideBtn = document.getElementById('hideBtn');
const resetBtn = document.getElementById('resetBtn');
const toggleBtn = document.getElementById('toggleBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const controls = document.getElementById('controls');

function applyState() {
  intensitySlider.value = state.intensity;
  dropSizeSlider.value = state.dropSize;
  speedSlider.value = state.speed;
  volumeSlider.value = state.volume;
  soundSwitch.classList.toggle('on', state.sound);
  applyLanguage();
  setupDrops();
  updateVolume();
  updateRainSound();
}

intensitySlider.addEventListener('input', e => {
  state.intensity = +e.target.value;
  setupDrops();
  updateRainSound();
  saveState();
});

dropSizeSlider.addEventListener('input', e => {
  state.dropSize = +e.target.value;
  drops.forEach(d => d.r = (state.dropSize * 0.5) + Math.random() * (state.dropSize * 1.2));
  saveState();
});

speedSlider.addEventListener('input', e => {
  state.speed = +e.target.value;
  saveState();
});

volumeSlider.addEventListener('input', e => {
  state.volume = +e.target.value;
  updateVolume();
  saveState();
});

soundSwitch.addEventListener('click', () => {
  state.sound = !state.sound;
  soundSwitch.classList.toggle('on', state.sound);
  if (state.sound && !isAudioInit) initAudio();
  updateVolume();
  saveState();
});

document.querySelectorAll('.lang-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    state.language = btn.dataset.lang;
    applyLanguage();
    saveState();
  });
});

hideBtn.addEventListener('click', () => {
  controls.classList.add('hidden');
});

toggleBtn.addEventListener('click', () => {
  controls.classList.toggle('hidden');
});

resetBtn.addEventListener('click', () => {
  state = { ...defaultState };
  saveState();
  applyState();
});

// ============== FULLSCREEN ==============
function toggleFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
  }
}

function updateFullscreenIcon() {
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  fullscreenBtn.style.color = isFs ? '#6a9eff' : '#d8e0f0';
}

fullscreenBtn.addEventListener('click', toggleFullscreen);
document.addEventListener('fullscreenchange', updateFullscreenIcon);
document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

// First user interaction enables audio
function firstInteraction() {
  if (state.sound) initAudio();
  document.removeEventListener('click', firstInteraction);
  document.removeEventListener('touchstart', firstInteraction);
  document.removeEventListener('keydown', firstInteraction);
}
document.addEventListener('click', firstInteraction);
document.addEventListener('touchstart', firstInteraction);
document.addEventListener('keydown', firstInteraction);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'Escape') controls.classList.add('hidden');
  if (e.key === 's' || e.key === 'S') controls.classList.toggle('hidden');
});

// ============== INIT ==============
window.addEventListener('resize', () => {
  resize();
  setupDrops();
});
window.addEventListener('orientationchange', () => {
  setTimeout(() => { resize(); setupDrops(); }, 200);
});

resize();
applyState();
animate();
</script>

</body>
