<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менеджер Контактів</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #475569;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --success: #22c55e;
            --warning: #f59e0b;
            --accent: #06b6d4;
            --gradient-1: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #06b6d4, #3b82f6);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .app-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-icon {
            padding: 8px;
            min-width: 36px;
            justify-content: center;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }

        .group-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .group-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            gap: 10px;
        }

        .group-item:hover {
            background: var(--bg-input);
        }

        .group-item.active {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
        }

        .group-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .group-name {
            flex: 1;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .group-count {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .group-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .group-item:hover .group-actions {
            opacity: 1;
        }

        .group-action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 2px;
            font-size: 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .group-action-btn:hover {
            color: var(--text);
            background: var(--bg);
        }

        .group-action-btn.delete:hover {
            color: var(--danger);
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .content-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .contact-count {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .contacts-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .contact-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .contact-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .contact-card:hover::before {
            opacity: 1;
        }

        .contact-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .contact-group-tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            display: inline-block;
        }

        .contact-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        .contact-detail {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .contact-detail-icon {
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .contact-detail-value {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .contact-notes {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 14px;
            line-height: 1.5;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .contact-actions .btn {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.4rem;
            padding: 4px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            color: var(--text);
            background: var(--bg-input);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-select {
            cursor: pointer;
        }

        .form-select option {
            background: var(--bg-card);
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .color-picker-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
            min-width: 250px;
        }

        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast.info { border-left: 3px solid var(--primary); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .sidebar-toggle {
            display: none;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 200;
                transition: left 0.3s ease;
            }
            .sidebar.open { left: 0; }
            .sidebar-overlay {
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0, 0, 0, 0.5); z-index: 199; display: none;
            }
            .sidebar-overlay.active { display: block; }
            .sidebar-toggle { display: flex; }
            .contacts-grid { grid-template-columns: 1fr; }
            .header { padding: 12px 16px; }
            .contacts-container { padding: 16px; }
            .header-actions { width: 100%; justify-content: flex-end; }
            .app-title { font-size: 1.1rem; }
            .btn span.btn-text { display: none; }
        }

        @media (max-width: 480px) {
            .contacts-grid { grid-template-columns: 1fr; }
            .modal { max-width: 100%; margin: 10px; border-radius: 16px; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .header { padding: 8px 16px; }
            .modal { max-height: 95vh; }
            .contacts-container { padding: 12px 16px; }
            .contacts-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
            .contact-card { padding: 14px; }
        }

        .hidden-input { display: none; }

        .lang-switch {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
        }

        .lang-switch:focus { outline: none; border-color: var(--primary); }

        .stats-bar {
            display: flex;
            gap: 16px;
            padding: 12px 24px;
            background: rgba(99, 102, 241, 0.05);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: 600;
            color: var(--text);
        }

        .confirm-dialog {
            text-align: center;
            padding: 20px;
        }

        .confirm-dialog p {
            margin-bottom: 20px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .confirm-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Меню">☰</button>
                <div class="logo">📇</div>
                <h1 class="app-title" data-i18n="appTitle">Менеджер Контактів</h1>
            </div>
            <div class="header-actions">
                <select class="lang-switch" onchange="switchLanguage(this.value)" id="langSwitch">
                    <option value="uk">Українська</option>
                    <option value="en">English</option>
                </select>
                <button class="btn btn-primary" onclick="openContactModal()">
                    <span>➕</span>
                    <span class="btn-text" data-i18n="addContact">Додати контакт</span>
                </button>
                <button class="btn btn-secondary" onclick="importData()">
                    <span>📥</span>
                    <span class="btn-text" data-i18n="import">Імпорт</span>
                </button>
                <button class="btn btn-secondary" onclick="exportJSON()">
                    <span>📤</span>
                    <span class="btn-text" data-i18n="exportJSON">JSON</span>
                </button>
                <button class="btn btn-secondary" onclick="exportPDF()">
                    <span>📄</span>
                    <span class="btn-text" data-i18n="exportPDF">PDF</span>
                </button>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <span>👥</span>
                <span data-i18n="totalContacts">Всього контактів:</span>
                <span class="stat-value" id="totalContacts">0</span>
            </div>
            <div class="stat-item">
                <span>📁</span>
                <span data-i18n="groups">Груп:</span>
                <span class="stat-value" id="totalGroups">0</span>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

            <aside class="sidebar" id="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title" data-i18n="search">Пошук</div>
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="Пошук контактів..." oninput="filterContacts()">
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title" data-i18n="contactGroups">Групи контактів</div>
                    <div class="group-list" id="groupList"></div>
                    <button class="btn btn-secondary" style="width: 100%; margin-top: 12px;" onclick="openGroupModal()">
                        <span>➕</span>
                        <span data-i18n="addGroup">Додати групу</span>
                    </button>
                </div>
            </aside>

            <main class="content-area">
                <div class="content-header">
                    <div>
                        <h2 class="content-title" id="contentTitle" data-i18n="allContacts">Всі контакти</h2>
                        <span class="contact-count" id="contactCount"></span>
                    </div>
                </div>
                <div class="contacts-container" id="contactsContainer"></div>
            </main>
        </div>
    </div>

    <div class="modal-overlay" id="contactModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="contactModalTitle" data-i18n="newContact">Новий контакт</h3>
                <button class="modal-close" onclick="closeContactModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="contactId">
                <div class="form-group">
                    <label class="form-label" data-i18n="firstName">Ім'я *</label>
                    <input type="text" class="form-input" id="contactFirstName" data-i18n-placeholder="firstNamePlaceholder" placeholder="Введіть ім'я">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="lastName">Прізвище</label>
                    <input type="text" class="form-input" id="contactLastName" data-i18n-placeholder="lastNamePlaceholder" placeholder="Введіть прізвище">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="phone">Телефон</label>
                    <input type="tel" class="form-input" id="contactPhone" placeholder="+380 XX XXX XX XX">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="email">Електронна пошта</label>
                    <input type="email" class="form-input" id="contactEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="group">Група</label>
                    <select class="form-select" id="contactGroup">
                        <option value="" data-i18n="noGroup">Без групи</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="notes">Нотатки</label>
                    <textarea class="form-textarea" id="contactNotes" data-i18n-placeholder="notesPlaceholder" placeholder="Додаткова інформація..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeContactModal()" data-i18n="cancel">Скасувати</button>
                <button class="btn btn-primary" onclick="saveContact()" data-i18n="save">Зберегти</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="groupModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="groupModalTitle" data-i18n="newGroup">Нова група</h3>
                <button class="modal-close" onclick="closeGroupModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="groupId">
                <div class="form-group">
                    <label class="form-label" data-i18n="groupName">Назва групи *</label>
                    <input type="text" class="form-input" id="groupName" data-i18n-placeholder="groupNamePlaceholder" placeholder="Введіть назву групи">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="color">Колір</label>
                    <div class="color-picker-group" id="colorPicker">
                        <div class="color-option selected" data-color="#6366f1" style="background: #6366f1;"></div>
                        <div class="color-option" data-color="#8b5cf6" style="background: #8b5cf6;"></div>
                        <div class="color-option" data-color="#ec4899" style="background: #ec4899;"></div>
                        <div class="color-option" data-color="#ef4444" style="background: #ef4444;"></div>
                        <div class="color-option" data-color="#f59e0b" style="background: #f59e0b;"></div>
                        <div class="color-option" data-color="#22c55e" style="background: #22c55e;"></div>
                        <div class="color-option" data-color="#06b6d4" style="background: #06b6d4;"></div>
                        <div class="color-option" data-color="#3b82f6" style="background: #3b82f6;"></div>
                        <div class="color-option" data-color="#a855f7" style="background: #a855f7;"></div>
                        <div class="color-option" data-color="#14b8a6" style="background: #14b8a6;"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeGroupModal()" data-i18n="cancel">Скасувати</button>
                <button class="btn btn-primary" onclick="saveGroup()" data-i18n="save">Зберегти</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-body">
                <div class="confirm-dialog">
                    <div style="font-size: 3rem; margin-bottom: 12px;">⚠️</div>
                    <p id="confirmMessage"></p>
                    <div class="confirm-actions">
                        <button class="btn btn-secondary" onclick="closeConfirmModal()" data-i18n="cancel">Скасувати</button>
                        <button class="btn btn-danger" id="confirmBtn" data-i18n="delete">Видалити</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <input type="file" class="hidden-input" id="fileInput" accept=".json" onchange="handleImport(event)">

    <script>
        const translations = {
            uk: {
                appTitle: 'Менеджер Контактів',
                addContact: 'Додати контакт',
                import: 'Імпорт',
                exportJSON: 'JSON',
                exportPDF: 'PDF',
                totalContacts: 'Всього контактів:',
                groups: 'Груп:',
                search: 'Пошук',
                searchPlaceholder: 'Пошук контактів...',
                contactGroups: 'Групи контактів',
                addGroup: 'Додати групу',
                allContacts: 'Всі контакти',
                newContact: 'Новий контакт',
                editContact: 'Редагувати контакт',
                firstName: "Ім'я *",
                lastName: 'Прізвище',
                firstNamePlaceholder: "Введіть ім'я",
                lastNamePlaceholder: 'Введіть прізвище',
                phone: 'Телефон',
                email: 'Електронна пошта',
                group: 'Група',
                noGroup: 'Без групи',
                notes: 'Нотатки',
                notesPlaceholder: 'Додаткова інформація...',
                cancel: 'Скасувати',
                save: 'Зберегти',
                delete: 'Видалити',
                edit: 'Змінити',
                newGroup: 'Нова група',
                editGroup: 'Редагувати групу',
                groupName: 'Назва групи *',
                groupNamePlaceholder: 'Введіть назву групи',
                color: 'Колір',
                confirmDeleteContact: 'Ви впевнені, що хочете видалити цей контакт?',
                confirmDeleteGroup: 'Ви впевнені, що хочете видалити цю групу? Контакти з цієї групи не будуть видалені.',
                contactSaved: 'Контакт збережено!',
                contactDeleted: 'Контакт видалено!',
                groupSaved: 'Групу збережено!',
                groupDeleted: 'Групу видалено!',
                dataExported: 'Дані експортовано!',
                dataImported: 'Дані імпортовано!',
                importError: 'Помилка імпорту даних',
                nameRequired: "Ім'я обов'язкове!",
                groupNameRequired: "Назва групи обов'язкова!",
                noContacts: 'Контактів поки немає',
                noContactsText: 'Натисніть "Додати контакт" щоб створити перший контакт',
                noResults: 'Нічого не знайдено',
                noResultsText: 'Спробуйте змінити параметри пошуку',
                contactsCount: 'контактів',
                pdfTitle: 'Менеджер Контактів - Експорт',
                pdfGenerated: 'PDF файл створено!',
                all: 'Всі',
                ungrouped: 'Без групи',
                pdfPhone: 'Тел',
                pdfEmail: 'Пошта',
                pdfGroup: 'Група',
                pdfNotes: 'Нотатки',
                pdfDate: 'Дата',
                pdfTotal: 'Всього контактів'
            },
            en: {
                appTitle: 'Contact Manager',
                addContact: 'Add Contact',
                import: 'Import',
                exportJSON: 'JSON',
                exportPDF: 'PDF',
                totalContacts: 'Total contacts:',
                groups: 'Groups:',
                search: 'Search',
                searchPlaceholder: 'Search contacts...',
                contactGroups: 'Contact Groups',
                addGroup: 'Add Group',
                allContacts: 'All Contacts',
                newContact: 'New Contact',
                editContact: 'Edit Contact',
                firstName: 'First Name *',
                lastName: 'Last Name',
                firstNamePlaceholder: 'Enter first name',
                lastNamePlaceholder: 'Enter last name',
                phone: 'Phone',
                email: 'Email',
                group: 'Group',
                noGroup: 'No group',
                notes: 'Notes',
                notesPlaceholder: 'Additional information...',
                cancel: 'Cancel',
                save: 'Save',
                delete: 'Delete',
                edit: 'Edit',
                newGroup: 'New Group',
                editGroup: 'Edit Group',
                groupName: 'Group Name *',
                groupNamePlaceholder: 'Enter group name',
                color: 'Color',
                confirmDeleteContact: 'Are you sure you want to delete this contact?',
                confirmDeleteGroup: 'Are you sure you want to delete this group? Contacts in this group will not be deleted.',
                contactSaved: 'Contact saved!',
                contactDeleted: 'Contact deleted!',
                groupSaved: 'Group saved!',
                groupDeleted: 'Group deleted!',
                dataExported: 'Data exported!',
                dataImported: 'Data imported!',
                importError: 'Import error',
                nameRequired: 'First name is required!',
                groupNameRequired: 'Group name is required!',
                noContacts: 'No contacts yet',
                noContactsText: 'Click "Add Contact" to create your first contact',
                noResults: 'Nothing found',
                noResultsText: 'Try changing your search criteria',
                contactsCount: 'contacts',
                pdfTitle: 'Contact Manager - Export',
                pdfGenerated: 'PDF file generated!',
                all: 'All',
                ungrouped: 'Ungrouped',
                pdfPhone: 'Phone',
                pdfEmail: 'Email',
                pdfGroup: 'Group',
                pdfNotes: 'Notes',
                pdfDate: 'Date',
                pdfTotal: 'Total contacts'
            }
        };

        let state = {
            contacts: [],
            groups: [],
            activeGroup: 'all',
            searchQuery: '',
            language: 'uk'
        };

        let cyrillicFont = null;

        function init() {
            loadState();
            applyLanguage();
            renderGroups();
            renderContacts();
            updateStats();
            setupColorPicker();
            loadCyrillicFont();
        }

        async function loadCyrillicFont() {
            try {
                const response = await fetch('https://cdn.jsdelivr.net/gh/nicholasgasior/gfonts-base64@master/fonts/roboto/Roboto-Regular-base64.txt');
                if (response.ok) {
                    cyrillicFont = await response.text();
                }
            } catch (e) {
                // We'll build our own base64 font inline as fallback
                // Try another source
                try {
                    const r2 = await fetch('https://raw.githubusercontent.com/nicholasgasior/gfonts-base64/master/fonts/roboto/Roboto-Regular-base64.txt');
                    if (r2.ok) {
                        cyrillicFont = await r2.text();
                    }
                } catch (e2) {
                    console.log('Could not load Cyrillic font, will use canvas-based PDF export');
                }
            }
        }

        function saveState() {
            localStorage.setItem('contactManagerState', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('contactManagerState');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                    document.getElementById('langSwitch').value = state.language;
                    document.getElementById('searchInput').value = state.searchQuery || '';
                } catch (e) {
                    console.error('Error loading state:', e);
                }
            }
        }

        function switchLanguage(lang) {
            state.language = lang;
            applyLanguage();
            renderGroups();
            renderContacts();
            updateStats();
            updateContentTitle();
            saveState();
        }

        function t(key) {
            return translations[state.language]?.[key] || translations['uk'][key] || key;
        }

        function applyLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[state.language]?.[key]) {
                    el.textContent = translations[state.language][key];
                }
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[state.language]?.[key]) {
                    el.placeholder = translations[state.language][key];
                }
            });
        }

        function renderGroups() {
            const list = document.getElementById('groupList');
            const allCount = state.contacts.length;
            const ungroupedCount = state.contacts.filter(c => !c.groupId).length;

            let html = `
                <div class="group-item ${state.activeGroup === 'all' ? 'active' : ''}" onclick="selectGroup('all')">
                    <div class="group-dot" style="background: var(--gradient-1);"></div>
                    <span class="group-name">${t('all')}</span>
                    <span class="group-count">${allCount}</span>
                </div>
                <div class="group-item ${state.activeGroup === 'ungrouped' ? 'active' : ''}" onclick="selectGroup('ungrouped')">
                    <div class="group-dot" style="background: var(--text-secondary);"></div>
                    <span class="group-name">${t('ungrouped')}</span>
                    <span class="group-count">${ungroupedCount}</span>
                </div>
            `;

            state.groups.forEach(group => {
                const count = state.contacts.filter(c => c.groupId === group.id).length;
                html += `
                    <div class="group-item ${state.activeGroup === group.id ? 'active' : ''}" onclick="selectGroup('${group.id}')">
                        <div class="group-dot" style="background: ${group.color};"></div>
                        <span class="group-name">${escapeHtml(group.name)}</span>
                        <span class="group-count">${count}</span>
                        <div class="group-actions">
                            <button class="group-action-btn" onclick="event.stopPropagation(); editGroup('${group.id}')" title="${t('edit')}">✏️</button>
                            <button class="group-action-btn delete" onclick="event.stopPropagation(); deleteGroup('${group.id}')" title="${t('delete')}">🗑️</button>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        function selectGroup(groupId) {
            state.activeGroup = groupId;
            renderGroups();
            renderContacts();
            updateContentTitle();
            saveState();
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function updateContentTitle() {
            const titleEl = document.getElementById('contentTitle');
            if (state.activeGroup === 'all') {
                titleEl.textContent = t('allContacts');
            } else if (state.activeGroup === 'ungrouped') {
                titleEl.textContent = t('ungrouped');
            } else {
                const group = state.groups.find(g => g.id === state.activeGroup);
                titleEl.textContent = group ? group.name : t('allContacts');
            }
        }

        function openGroupModal(groupId = null) {
            const modal = document.getElementById('groupModal');
            const title = document.getElementById('groupModalTitle');
            document.getElementById('groupId').value = '';
            document.getElementById('groupName').value = '';

            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
            document.querySelector('.color-option[data-color="#6366f1"]').classList.add('selected');

            if (groupId) {
                const group = state.groups.find(g => g.id === groupId);
                if (group) {
                    title.textContent = t('editGroup');
                    document.getElementById('groupId').value = group.id;
                    document.getElementById('groupName').value = group.name;
                    document.querySelectorAll('.color-option').forEach(el => {
                        el.classList.toggle('selected', el.dataset.color === group.color);
                    });
                }
            } else {
                title.textContent = t('newGroup');
            }

            modal.classList.add('active');
        }

        function closeGroupModal() {
            document.getElementById('groupModal').classList.remove('active');
        }

        function saveGroup() {
            const id = document.getElementById('groupId').value;
            const name = document.getElementById('groupName').value.trim();
            const selectedColor = document.querySelector('.color-option.selected');
            const color = selectedColor ? selectedColor.dataset.color : '#6366f1';

            if (!name) {
                showToast(t('groupNameRequired'), 'error');
                return;
            }

            if (id) {
                const group = state.groups.find(g => g.id === id);
                if (group) {
                    group.name = name;
                    group.color = color;
                }
            } else {
                state.groups.push({ id: generateId(), name, color });
            }

            saveState();
            renderGroups();
            renderContacts();
            updateStats();
            closeGroupModal();
            showToast(t('groupSaved'), 'success');
        }

        function editGroup(groupId) { openGroupModal(groupId); }

        function deleteGroup(groupId) {
            showConfirm(t('confirmDeleteGroup'), () => {
                state.contacts.forEach(c => { if (c.groupId === groupId) c.groupId = ''; });
                state.groups = state.groups.filter(g => g.id !== groupId);
                if (state.activeGroup === groupId) state.activeGroup = 'all';
                saveState();
                renderGroups();
                renderContacts();
                updateStats();
                updateContentTitle();
                showToast(t('groupDeleted'), 'success');
            });
        }

        function renderContacts() {
            const container = document.getElementById('contactsContainer');
            let contacts = getFilteredContacts();

            if (contacts.length === 0) {
                const isSearching = state.searchQuery.length > 0;
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">${isSearching ? '🔍' : '📇'}</div>
                        <div class="empty-title">${isSearching ? t('noResults') : t('noContacts')}</div>
                        <div class="empty-text">${isSearching ? t('noResultsText') : t('noContactsText')}</div>
                    </div>
                `;
                document.getElementById('contactCount').textContent = `0 ${t('contactsCount')}`;
                return;
            }

            document.getElementById('contactCount').textContent = `${contacts.length} ${t('contactsCount')}`;

            const avatarColors = [
                'linear-gradient(135deg, #6366f1, #8b5cf6)',
                'linear-gradient(135deg, #ec4899, #f43f5e)',
                'linear-gradient(135deg, #06b6d4, #3b82f6)',
                'linear-gradient(135deg, #22c55e, #16a34a)',
                'linear-gradient(135deg, #f59e0b, #ef4444)',
                'linear-gradient(135deg, #8b5cf6, #ec4899)',
                'linear-gradient(135deg, #14b8a6, #06b6d4)',
            ];

            let html = '<div class="contacts-grid">';
            contacts.forEach(contact => {
                const group = state.groups.find(g => g.id === contact.groupId);
                const initials = getInitials(contact.firstName, contact.lastName);
                const colorIndex = Math.abs(hashCode(contact.id)) % avatarColors.length;

                html += `
                    <div class="contact-card">
                        <div class="contact-header">
                            <div class="contact-avatar" style="background: ${avatarColors[colorIndex]};">${initials}</div>
                            <div class="contact-info">
                                <div class="contact-name">${escapeHtml(contact.firstName)} ${escapeHtml(contact.lastName || '')}</div>
                                ${group ? `<span class="contact-group-tag" style="background: ${group.color}22; color: ${group.color};">${escapeHtml(group.name)}</span>` : ''}
                            </div>
                        </div>
                        <div class="contact-details">
                            ${contact.phone ? `<div class="contact-detail"><span class="contact-detail-icon">📞</span><span class="contact-detail-value">${escapeHtml(contact.phone)}</span></div>` : ''}
                            ${contact.email ? `<div class="contact-detail"><span class="contact-detail-icon">📧</span><span class="contact-detail-value">${escapeHtml(contact.email)}</span></div>` : ''}
                        </div>
                        ${contact.notes ? `<div class="contact-notes">${escapeHtml(contact.notes)}</div>` : ''}
                        <div class="contact-actions">
                            <button class="btn btn-secondary" onclick="editContact('${contact.id}')">✏️ ${t('edit')}</button>
                            <button class="btn btn-danger" onclick="deleteContact('${contact.id}')">🗑️ ${t('delete')}</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function getFilteredContacts() {
            let contacts = [...state.contacts];

            if (state.activeGroup === 'ungrouped') {
                contacts = contacts.filter(c => !c.groupId);
            } else if (state.activeGroup !== 'all') {
                contacts = contacts.filter(c => c.groupId === state.activeGroup);
            }

            if (state.searchQuery) {
                const query = state.searchQuery.toLowerCase();
                contacts = contacts.filter(c =>
                    (c.firstName && c.firstName.toLowerCase().includes(query)) ||
                    (c.lastName && c.lastName.toLowerCase().includes(query)) ||
                    (c.phone && c.phone.toLowerCase().includes(query)) ||
                    (c.email && c.email.toLowerCase().includes(query)) ||
                    (c.notes && c.notes.toLowerCase().includes(query))
                );
            }

            contacts.sort((a, b) => {
                const nameA = `${a.firstName} ${a.lastName}`.toLowerCase();
                const nameB = `${b.firstName} ${b.lastName}`.toLowerCase();
                return nameA.localeCompare(nameB, state.language);
            });

            return contacts;
        }

        function filterContacts() {
            state.searchQuery = document.getElementById('searchInput').value;
            renderContacts();
            saveState();
        }

        function openContactModal(contactId = null) {
            const modal = document.getElementById('contactModal');
            const title = document.getElementById('contactModalTitle');

            const groupSelect = document.getElementById('contactGroup');
            groupSelect.innerHTML = `<option value="">${t('noGroup')}</option>`;
            state.groups.forEach(g => {
                groupSelect.innerHTML += `<option value="${g.id}">${escapeHtml(g.name)}</option>`;
            });

            document.getElementById('contactId').value = '';
            document.getElementById('contactFirstName').value = '';
            document.getElementById('contactLastName').value = '';
            document.getElementById('contactPhone').value = '';
            document.getElementById('contactEmail').value = '';
            document.getElementById('contactGroup').value = '';
            document.getElementById('contactNotes').value = '';

            if (contactId) {
                const contact = state.contacts.find(c => c.id === contactId);
                if (contact) {
                    title.textContent = t('editContact');
                    document.getElementById('contactId').value = contact.id;
                    document.getElementById('contactFirstName').value = contact.firstName;
                    document.getElementById('contactLastName').value = contact.lastName || '';
                    document.getElementById('contactPhone').value = contact.phone || '';
                    document.getElementById('contactEmail').value = contact.email || '';
                    document.getElementById('contactGroup').value = contact.groupId || '';
                    document.getElementById('contactNotes').value = contact.notes || '';
                }
            } else {
                title.textContent = t('newContact');
                if (state.activeGroup !== 'all' && state.activeGroup !== 'ungrouped') {
                    document.getElementById('contactGroup').value = state.activeGroup;
                }
            }

            modal.classList.add('active');
            setTimeout(() => document.getElementById('contactFirstName').focus(), 300);
        }

        function closeContactModal() {
            document.getElementById('contactModal').classList.remove('active');
        }

        function saveContact() {
            const id = document.getElementById('contactId').value;
            const firstName = document.getElementById('contactFirstName').value.trim();
            const lastName = document.getElementById('contactLastName').value.trim();
            const phone = document.getElementById('contactPhone').value.trim();
            const email = document.getElementById('contactEmail').value.trim();
            const groupId = document.getElementById('contactGroup').value;
            const notes = document.getElementById('contactNotes').value.trim();

            if (!firstName) {
                showToast(t('nameRequired'), 'error');
                document.getElementById('contactFirstName').focus();
                return;
            }

            if (id) {
                const contact = state.contacts.find(c => c.id === id);
                if (contact) {
                    contact.firstName = firstName;
                    contact.lastName = lastName;
                    contact.phone = phone;
                    contact.email = email;
                    contact.groupId = groupId;
                    contact.notes = notes;
                    contact.updatedAt = new Date().toISOString();
                }
            } else {
                state.contacts.push({
                    id: generateId(),
                    firstName, lastName, phone, email, groupId, notes,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });
            }

            saveState();
            renderContacts();
            renderGroups();
            updateStats();
            closeContactModal();
            showToast(t('contactSaved'), 'success');
        }

        function editContact(contactId) { openContactModal(contactId); }

        function deleteContact(contactId) {
            showConfirm(t('confirmDeleteContact'), () => {
                state.contacts = state.contacts.filter(c => c.id !== contactId);
                saveState();
                renderContacts();
                renderGroups();
                updateStats();
                showToast(t('contactDeleted'), 'success');
            });
        }

        function exportJSON() {
            const data = {
                contacts: state.contacts,
                groups: state.groups,
                exportDate: new Date().toISOString(),
                version: '1.0'
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `contacts_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast(t('dataExported'), 'success');
        }

        function importData() {
            document.getElementById('fileInput').click();
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.contacts && Array.isArray(data.contacts)) state.contacts = data.contacts;
                    if (data.groups && Array.isArray(data.groups)) state.groups = data.groups;
                    state.activeGroup = 'all';
                    saveState();
                    renderGroups();
                    renderContacts();
                    updateStats();
                    updateContentTitle();
                    showToast(t('dataImported'), 'success');
                } catch (err) {
                    showToast(t('importError'), 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function exportPDF() {
            const contacts = getFilteredContacts();
            const pageW = 595;
            const pageH = 842;
            const margin = 40;
            const contentW = pageW - 2 * margin;
            const lineHeight = 16;
            const smallLineHeight = 14;

            const canvas = document.createElement('canvas');
            canvas.width = pageW * 2;
            canvas.height = pageH * 2;
            const ctx = canvas.getContext('2d');
            ctx.scale(2, 2);

            const pages = [];
            let currentPage = createPage();
            let y = margin;

            function createPage() {
                const c = document.createElement('canvas');
                c.width = pageW * 2;
                c.height = pageH * 2;
                const cx = c.getContext('2d');
                cx.scale(2, 2);
                cx.fillStyle = '#ffffff';
                cx.fillRect(0, 0, pageW, pageH);
                return { canvas: c, ctx: cx };
            }

            function getCtx() { return currentPage.ctx; }

            function checkNewPage(needed) {
                if (y + needed > pageH - margin) {
                    pages.push(currentPage);
                    currentPage = createPage();
                    y = margin;
                }
            }

            // Title
            let cx = getCtx();
            cx.fillStyle = '#6366f1';
            cx.font = 'bold 22px Inter, Arial, sans-serif';
            cx.fillText(t('pdfTitle'), margin, y + 22);
            y += 34;

            cx.fillStyle = '#64748b';
            cx.font = '11px Inter, Arial, sans-serif';
            const dateStr = `${t('pdfDate')}: ${new Date().toLocaleDateString(state.language === 'uk' ? 'uk-UA' : 'en-US')}`;
            cx.fillText(dateStr, margin, y);
            y += 16;
            cx.fillText(`${t('pdfTotal')}: ${contacts.length}`, margin, y);
            y += 20;

            // Line
            cx.strokeStyle = '#6366f1';
            cx.lineWidth = 1.5;
            cx.beginPath();
            cx.moveTo(margin, y);
            cx.lineTo(pageW - margin, y);
            cx.stroke();
            y += 20;

            contacts.forEach((contact, index) => {
                const group = state.groups.find(g => g.id === contact.groupId);
                const lines = [];
                lines.push({ type: 'name', text: `${index + 1}. ${contact.firstName} ${contact.lastName || ''}` });
                if (contact.phone) lines.push({ type: 'detail', text: `${t('pdfPhone')}: ${contact.phone}` });
                if (contact.email) lines.push({ type: 'detail', text: `${t('pdfEmail')}: ${contact.email}` });
                if (group) lines.push({ type: 'detail', text: `${t('pdfGroup')}: ${group.name}` });
                if (contact.notes) {
                    const noteLines = wrapText(getCtx(), `${t('pdfNotes')}: ${contact.notes}`, contentW - 16, '11px Inter, Arial, sans-serif');
                    noteLines.forEach(nl => lines.push({ type: 'note', text: nl }));
                }

                const blockHeight = lineHeight + (lines.length - 1) * smallLineHeight + 16;
                checkNewPage(blockHeight);
                cx = getCtx();

                // Name
                cx.fillStyle = '#1e293b';
                cx.font = 'bold 13px Inter, Arial, sans-serif';
                cx.fillText(lines[0].text, margin, y + 13);
                y += lineHeight + 2;

                // Details
                cx.font = '11px Inter, Arial, sans-serif';
                cx.fillStyle = '#475569';
                for (let i = 1; i < lines.length; i++) {
                    checkNewPage(smallLineHeight);
                    cx = getCtx();
                    cx.font = '11px Inter, Arial, sans-serif';
                    cx.fillStyle = '#475569';
                    cx.fillText(lines[i].text, margin + 12, y + 11);
                    y += smallLineHeight;
                }

                y += 6;

                // Separator
                checkNewPage(10);
                cx = getCtx();
                cx.strokeStyle = '#e2e8f0';
                cx.lineWidth = 0.5;
                cx.beginPath();
                cx.moveTo(margin, y);
                cx.lineTo(pageW - margin, y);
                cx.stroke();
                y += 12;
            });

            pages.push(currentPage);

            // Build PDF from canvas pages
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'pt', format: 'a4' });

            pages.forEach((page, i) => {
                if (i > 0) doc.addPage();
                const imgData = page.canvas.toDataURL('image/png', 1.0);
                doc.addImage(imgData, 'PNG', 0, 0, pageW, pageH);
            });

            doc.save(`contacts_${new Date().toISOString().slice(0, 10)}.pdf`);
            showToast(t('pdfGenerated'), 'success');
        }

        function wrapText(ctx, text, maxWidth, font) {
            ctx.font = font;
            const words = text.split(' ');
            const lines = [];
            let currentLine = '';

            words.forEach(word => {
                const testLine = currentLine ? currentLine + ' ' + word : word;
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                } else {
                    currentLine = testLine;
                }
            });
            if (currentLine) lines.push(currentLine);
            return lines;
        }

        function updateStats() {
            document.getElementById('totalContacts').textContent = state.contacts.length;
            document.getElementById('totalGroups').textContent = state.groups.length;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function setupColorPicker() {
            document.querySelectorAll('.color-option').forEach(el => {
                el.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }

        function showConfirm(message, onConfirm) {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmBtn').onclick = function() {
                closeConfirmModal();
                onConfirm();
            };
            modal.classList.add('active');
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${escapeHtml(message)}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        }

        function getInitials(firstName, lastName) {
            let initials = '';
            if (firstName) initials += firstName.charAt(0).toUpperCase();
            if (lastName) initials += lastName.charAt(0).toUpperCase();
            return initials || '?';
        }

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return hash;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeContactModal();
                closeGroupModal();
                closeConfirmModal();
            }
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                openContactModal();
            }
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
        });

        init();
    </script>
</body>
</html>
